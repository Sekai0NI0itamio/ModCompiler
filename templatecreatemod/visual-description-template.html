<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TNT Duper Description Example</title>
  <style>
    :root {
      color-scheme: dark;
      --glass: rgba(10, 10, 12, 0.46);
      --glass-edge: rgba(255, 255, 255, 0.14);
      --copy: rgba(244, 247, 251, 0.92);
      --muted: rgba(244, 247, 251, 0.74);
      --accent: #ff7f2f;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 1024px;
      height: 1024px;
      overflow: hidden;
      font-family: "Helvetica Neue", "Avenir Next", "SF Pro Display", Arial, sans-serif;
      background: #050505;
    }

    body {
      position: relative;
      color: white;
      isolation: isolate;
      background:
        linear-gradient(180deg, rgba(4, 4, 5, 0.18), rgba(4, 4, 5, 0.86)),
        radial-gradient(circle at 80% 20%, rgba(255, 126, 36, 0.18), transparent 26%),
        radial-gradient(circle at 18% 80%, rgba(255, 94, 32, 0.16), transparent 24%),
        url("background.jpg") center center / cover no-repeat;
    }

    #root {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      opacity: 0.8;
      padding: 170px 94px 172px;
    }

    .layout {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) 260px;
      gap: 42px;
      align-items: stretch;
    }

    .hero {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 62px 68px 62px;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02)),
        var(--glass);
      border: 1px solid var(--glass-edge);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(14px);
      overflow: hidden;
    }

    .kicker {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: rgba(255,255,255,0.82);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    h1 {
      margin: 26px 0 14px;
      font-size: 118px;
      line-height: 0.9;
      letter-spacing: -0.06em;
      font-weight: 900;
      color: white;
    }

    .tagline {
      max-width: 680px;
      margin: 0;
      font-size: 30px;
      line-height: 1.45;
      color: var(--copy);
      font-weight: 500;
    }

    .meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .chip {
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="layout">
      <section class="hero">
        <div class="kicker">Utility Mod</div>
        <h1>TNT Duper</h1>
        <p class="tagline">Launch primed TNT from dispensers without draining your stock, wrapped in a sharper industrial presentation built for automated chaos.</p>
        <div class="meta">
          <div class="chip">Infinite Dispense</div>
          <div class="chip">Redstone Driven</div>
          <div class="chip">Forge 1.12.2</div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
