# This is an example mods.toml file. It contains the required information for the mod to be loaded by NeoForge.

modLoader="javafml"
loaderVersion="[1.0,)"
license="LicenseRef-All-Rights-Reserved"
showAsResourcePack=false
[[mods]]
modId="snowaccumulation"
version="1.0"
displayName="Snow Accumulation"
displayURL="https://modrinth.com/mod/snowaccumulation"
authors="Itamio"
description='''
Tired of only 1 layer of snow? This mod fixes that, allowing snow to accumulate to world height (configurable)
'''
# A list of dependencies of the mod.
[[dependencies.snowaccumulation]]
    modId="neoforge"
    mandatory=true
    versionRange="[1.0,)"
    ordering="NONE"
    side="BOTH"
[[dependencies.snowaccumulation]]
    modId="minecraft"
    mandatory=true
    versionRange="[1.20.2,1.20.2]"
    ordering="AFTER"
    side="BOTH"