<!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>No Hostile Mobs</title>
          <style>
            :root {
              color-scheme: dark;
            }

            * {
              box-sizing: border-box;
            }

            html, body {
              margin: 0;
              width: 1024px;
              height: 1024px;
              overflow: hidden;
              background: #000;
            }

            body {
              position: relative;
              font-family: "Helvetica Neue", "Avenir Next", "SF Pro Display", Arial, sans-serif;
              color: #fff;
              isolation: isolate;
            }

            body::before {
              content: "";
              position: absolute;
              inset: 0;
              background:
                linear-gradient(180deg, rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.72)),
                url("background.webp") center center / cover no-repeat;
              filter: saturate(1.05) brightness(0.68);
              transform: scale(1.06);
              transform-origin: center;
            }

            body::after {
              content: "";
              position: absolute;
              inset: 0;
              background:
                radial-gradient(circle at top left, rgba(255,255,255,0.12), transparent 38%),
                radial-gradient(circle at bottom right, rgba(255,255,255,0.10), transparent 34%);
              mix-blend-mode: screen;
              pointer-events: none;
            }

            #modcompiler-root {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  opacity: 1;
}

            .frame {
  position: absolute;
  inset: var(--frame-inset, 62px);
  border-radius: 42px;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.015)),
    rgba(14, 14, 16, 0.64);
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow:
    0 35px 100px rgba(0, 0, 0, 0.55),
    inset 0 1px 0 rgba(255, 255, 255, 0.08),
    inset 0 -24px 40px rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(14px);
  overflow: hidden;
}
.frame::before,
.frame::after {
  content: "";
  position: absolute;
  width: 320px;
  height: 320px;
  border-radius: 999px;
  filter: blur(18px);
  opacity: 0.72;
}
.frame::before {
  top: -96px;
  left: -82px;
  background: radial-gradient(circle, color-mix(in srgb, #ff7f2f 75%, white 25%), transparent 72%);
}
.frame::after {
  right: -100px;
  bottom: -120px;
  background: radial-gradient(circle, color-mix(in srgb, #ff7f2f 68%, black 12%), transparent 72%);
}
.rings {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  pointer-events: none;
}
.ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.12);
  box-shadow: 0 0 0 1px color-mix(in srgb, #ff7f2f 22%, transparent) inset;
}
.ring.one { width: 610px; height: 610px; }
.ring.two { width: 470px; height: 470px; }
.ring.three { width: 310px; height: 310px; }
.brackets {
  position: absolute;
  inset: var(--bracket-inset, 112px);
  pointer-events: none;
}
.brackets span {
  position: absolute;
  width: 92px;
  height: 92px;
  border-color: rgba(255, 255, 255, 0.24);
  border-style: solid;
  opacity: 0.88;
}
.brackets .tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
.brackets .tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
.brackets .bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
.brackets .br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
.content {
  position: relative;
  z-index: 2;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: 0;
  padding:
    var(--content-pad-top, 110px)
    var(--content-pad-x, 110px)
    var(--content-pad-bottom, 94px);
  text-align: center;
}
.eyebrow {
  margin-bottom: 26px;
  padding: 10px 18px 11px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  background: rgba(255, 255, 255, 0.05);
  font-size: var(--eyebrow-size, 18px);
  font-weight: 700;
  letter-spacing: var(--eyebrow-spacing, 0.32em);
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.82);
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
}
.mark {
  position: relative;
  line-height: 0.82;
  font-size: var(--mark-size, 320px);
  font-weight: 900;
  letter-spacing: -0.08em;
  text-transform: uppercase;
  color: #f4f7fb;
  text-shadow:
    0 0 18px rgba(255, 255, 255, 0.28),
    0 0 46px rgba(255, 255, 255, 0.18),
    0 26px 65px rgba(0, 0, 0, 0.48);
}
.mark::after {
  content: "";
  position: absolute;
  left: 6%;
  right: 6%;
  top: 54%;
  height: 18px;
  border-radius: 999px;
  background: linear-gradient(90deg, transparent, #ff7f2f, transparent);
  box-shadow: 0 0 18px color-mix(in srgb, #ff7f2f 82%, transparent);
  transform: skewX(-18deg);
}
.title {
  margin-top: 18px;
  max-width: var(--title-max-width, 88%);
  font-size: var(--title-size, 74px);
  line-height: var(--title-line-height, 0.94);
  font-weight: 900;
  letter-spacing: -0.04em;
  text-transform: uppercase;
  color: white;
  text-wrap: balance;
  overflow-wrap: normal;
  word-break: keep-all;
  hyphens: none;
}
.sub {
  margin-top: 22px;
  max-width: var(--sub-max-width, 660px);
  font-size: var(--sub-size, 24px);
  line-height: 1.45;
  color: rgba(255, 255, 255, 0.74);
  letter-spacing: 0.02em;
  text-wrap: pretty;
}
.rail {
  position: absolute;
  left: var(--rail-inset, 110px);
  right: var(--rail-inset, 110px);
  bottom: 72px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  font-size: var(--rail-size, 18px);
  font-weight: 700;
  letter-spacing: var(--rail-spacing, 0.26em);
  text-transform: uppercase;
  color: rgba(255, 255, 255, 0.56);
}
.rail span {
  min-width: 0;
}
.rail::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: -20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.10), transparent);
}
.rail .warn {
  color: color-mix(in srgb, #ff7f2f 76%, white 24%);
}
          </style>
        </head>
        <body class="modcompiler-logo">
          <div id="modcompiler-root">
            <div class="frame" style="--frame-inset: 52px; --bracket-inset: 98px; --content-pad-top: 102px; --content-pad-x: 90px; --content-pad-bottom: 88px; --eyebrow-size: 17px; --eyebrow-spacing: 0.28em; --mark-size: 300px; --title-size: 66px; --title-line-height: 0.94; --title-max-width: 94%; --sub-size: 22px; --sub-max-width: 720px; --rail-inset: 92px; --rail-size: 17px; --rail-spacing: 0.24em"><div class="rings"><div class="ring one"></div><div class="ring two"></div><div class="ring three"></div></div><div class="brackets"><span class="tl"></span><span class="tr"></span><span class="bl"></span><span class="br"></span></div><div class="content"><div class="eyebrow">Hostile-Free</div><div class="mark">NH</div><div class="title">No Hostile Mobs</div><div class="sub">Eliminates hostile mob spawns with live config reload.</div></div><div class="rail"><span>Zero Spawns</span><span class="warn">Instant Reload</span></div></div>
          </div>
        </body>
        </html>
