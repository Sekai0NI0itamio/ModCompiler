name: Build Mods

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: Repo-relative path to the committed input zip under incoming/
        required: true
        type: string
      max_parallel:
        description: Number of build jobs to run at once. Use all for no scaffold-side cap.
        required: true
        default: "all"
        type: string
      modrinth_project_url:
        description: Optional Modrinth project URL or slug. If set, successful jars are uploaded using the MODRINTH_TOKEN repository secret.
        required: false
        default: ""
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      max_parallel: ${{ steps.prepare.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: prepare
        shell: bash
        env:
          MAX_PARALLEL_INPUT: ${{ inputs.max_parallel }}
        run: |
          mkdir -p .workflow_state/prepared
          python build_mods.py prepare \
            --zip-path "${{ inputs.zip_path }}" \
            --manifest version-manifest.json \
            --output-dir .workflow_state/prepared
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          matrix = json.loads(Path(".workflow_state/prepared/matrix.json").read_text(encoding="utf-8"))
          count = max(1, len(matrix.get("include", [])))
          raw = os.environ.get("MAX_PARALLEL_INPUT", "all").strip().lower()
          if raw in {"", "all", "unlimited", "max"}:
              resolved = count
          else:
              value = int(raw)
              if value < 1:
                  raise SystemExit("max_parallel must be >= 1 or one of: all, unlimited, max")
              resolved = value
          Path(".workflow_state/prepared/max_parallel.txt").write_text(str(resolved), encoding="utf-8")
          print(f"Resolved max_parallel={resolved}")
          PY
          printf 'matrix=%s\n' "$(tr -d '\n' < .workflow_state/prepared/matrix.json)" >> "$GITHUB_OUTPUT"
          printf 'max_parallel=%s\n' "$(tr -d '\n' < .workflow_state/prepared/max_parallel.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: prepared-inputs
          path: .workflow_state/prepared

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.prepare.outputs.max_parallel) }}
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/download-artifact@v4
        with:
          name: prepared-inputs
          path: .workflow_state/prepared

      - name: Build one mod
        shell: bash
        run: |
          python build_mods.py build-one \
            --plan .workflow_state/prepared/build-plan.json \
            --manifest version-manifest.json \
            --prepared-dir .workflow_state/prepared \
            --slug "${{ matrix.slug }}" \
            --artifact-dir ".workflow_artifacts/per-mod/${{ matrix.slug }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mod-${{ matrix.slug }}
          path: .workflow_artifacts/per-mod/${{ matrix.slug }}

  bundle:
    needs:
      - prepare
      - build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          pattern: mod-*
          path: .workflow_downloads

      - id: bundle
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python build_mods.py bundle \
            --artifacts-root .workflow_downloads \
            --output-dir .workflow_artifacts/combined
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-mod-builds
          path: .workflow_artifacts/combined

      - if: always()
        shell: bash
        run: cat .workflow_artifacts/combined/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        shell: bash
        run: exit "${{ steps.bundle.outputs.exit_code }}"

  publish-modrinth:
    needs:
      - bundle
    if: ${{ always() && inputs.modrinth_project_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: all-mod-builds
          path: .workflow_downloads/combined

      - name: Mask Modrinth token
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - id: publish
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          python build_mods.py publish-modrinth \
            --artifacts-root .workflow_downloads/combined \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir .workflow_artifacts/modrinth-publish
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modrinth-publish
          path: .workflow_artifacts/modrinth-publish

      - if: always()
        shell: bash
        run: |
          if [ -f .workflow_artifacts/modrinth-publish/SUMMARY.md ]; then
            cat .workflow_artifacts/modrinth-publish/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - if: always()
        shell: bash
        run: exit "${{ steps.publish.outputs.exit_code }}"
