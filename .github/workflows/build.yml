name: Build Mods

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: Repo-relative path to the committed input zip under incoming/
        required: true
        type: string
      max_parallel:
        description: |
          Number of build jobs to run at once.
          ALWAYS leave this as the default "all". The workflow automatically sets it to the exact
          number of jobs in the matrix so every version+loader builds in parallel. Lower values
          are only for emergency throttling and will make the run much slower.
        required: true
        default: "all"
        type: string
      modrinth_project_url:
        description: Optional Modrinth project URL or slug. If set, successful jars are uploaded using the MODRINTH_TOKEN repository secret.
        required: false
        default: ""
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      max_parallel: ${{ steps.prepare.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: prepare
        shell: bash
        env:
          MAX_PARALLEL_INPUT: ${{ inputs.max_parallel }}
        run: |
          mkdir -p .workflow_state/prepared
          python build_mods.py prepare \
            --zip-path "${{ inputs.zip_path }}" \
            --manifest version-manifest.json \
            --output-dir .workflow_state/prepared
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          matrix = json.loads(Path(".workflow_state/prepared/matrix.json").read_text(encoding="utf-8"))
          count = max(1, len(matrix.get("include", [])))
          raw = os.environ.get("MAX_PARALLEL_INPUT", "all").strip().lower()
          if raw in {"", "all", "unlimited", "max"}:
              resolved = count
          else:
              value = int(raw)
              if value < 1:
                  raise SystemExit("max_parallel must be >= 1 or one of: all, unlimited, max")
              resolved = value
          Path(".workflow_state/prepared/max_parallel.txt").write_text(str(resolved), encoding="utf-8")
          print(f"Resolved max_parallel={resolved}")
          PY
          printf 'matrix=%s\n' "$(tr -d '\n' < .workflow_state/prepared/matrix.json)" >> "$GITHUB_OUTPUT"
          printf 'max_parallel=%s\n' "$(tr -d '\n' < .workflow_state/prepared/max_parallel.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: prepared-inputs
          path: .workflow_state/prepared

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.prepare.outputs.max_parallel) }}
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/download-artifact@v4
        with:
          name: prepared-inputs
          path: .workflow_state/prepared

      - name: Check pre-build validation
        id: precheck
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from pathlib import Path
          plan_path = Path(".workflow_state/prepared/build-plan.json")
          slug = "${{ matrix.slug }}"
          artifact_dir = Path(f".workflow_artifacts/per-mod/{slug}")
          artifact_dir.mkdir(parents=True, exist_ok=True)
          skip = "false"
          if not plan_path.exists():
              print("Plan file not found")
          else:
              plan = json.loads(plan_path.read_text(encoding="utf-8"))
              entry = next((m for m in plan.get("mods", []) if m.get("slug") == slug), None)
              if entry and entry.get("precheck_error"):
                  print(f"SKIPPED: {slug} has precheck_error: {entry['precheck_error']}")
                  result = {
                      "slug": slug,
                      "status": "skipped_precheck",
                      "precheck_error": entry["precheck_error"],
                      "minecraft_version": entry.get("minecraft_version"),
                      "loader": entry.get("loader"),
                      "jar_names": [],
                  }
                  (artifact_dir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
                  skip = "true"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={skip}\n")
          PYEOF

      - name: Build one mod
        if: steps.precheck.outputs.skip != 'true'
        shell: bash
        run: |
          python build_mods.py build-one \
            --plan .workflow_state/prepared/build-plan.json \
            --manifest version-manifest.json \
            --prepared-dir .workflow_state/prepared \
            --slug "${{ matrix.slug }}" \
            --artifact-dir ".workflow_artifacts/per-mod/${{ matrix.slug }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mod-${{ matrix.slug }}
          path: .workflow_artifacts/per-mod/${{ matrix.slug }}

  bundle:
    needs:
      - prepare
      - build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          pattern: mod-*
          path: .workflow_downloads

      - id: bundle
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python build_mods.py bundle \
            --artifacts-root .workflow_downloads \
            --output-dir .workflow_artifacts/combined
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-mod-builds
          path: .workflow_artifacts/combined

      - if: always()
        shell: bash
        run: cat .workflow_artifacts/combined/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        shell: bash
        run: exit "${{ steps.bundle.outputs.exit_code }}"

  # ------------------------------------------------------------------
  # Parallel launcher tests: prepare-tests -> launcher-test (matrix) -> collect-tests
  # ------------------------------------------------------------------

  prepare-tests:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare-tests.outputs.matrix }}
      total: ${{ steps.prepare-tests.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mod-*
          path: .workflow_downloads/builds

      - id: prepare-tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, urllib.request
          from pathlib import Path

          BUILD_DIR = Path(".workflow_downloads/builds")

          def parse_mc_version(v):
              parts = []
              for token in re.split(r'[.\-_]', str(v).strip()):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      break
              return tuple(parts) if parts else (0,)

          def minor_key(v):
              p = parse_mc_version(v)
              if p[0] == 1 and len(p) >= 2:
                  return (1, p[1])
              return p[:2]

          def safe_artifact_key(loader, gv):
              return re.sub(r"[^A-Za-z0-9._-]+", "_", f"{loader}-{gv}").strip("_")

          # Find successful builds
          build_entries = []
          for result_file in sorted(BUILD_DIR.rglob("result.json")):
              try:
                  data = json.loads(result_file.read_text(encoding="utf-8"))
              except Exception:
                  continue
              if data.get("status") != "success":
                  continue
              slug = data.get("slug", "")
              jar_names = data.get("jar_names", [])
              mc_version = data.get("minecraft_version", "")
              loader = data.get("loader", "")
              if not jar_names or not mc_version or not loader:
                  continue
              build_entries.append({
                  "slug": slug,
                  "jar_name": jar_names[0],
                  "mc_version": mc_version,
                  "loader": loader,
                  "mod_java": data.get("java_version", 8),
              })

          if not build_entries:
              print("No successful builds to test")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write('matrix={"include":[]}\n')
                  f.write("total=0\n")
              exit(0)

          # Fetch ci-data.json
          ci_url = "https://raw.githubusercontent.com/headlesshq/mc-runtime-test/main/ci-data.json"
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "").strip()
          headers = {"User-Agent": "ModCompiler/1.0"}
          if GITHUB_TOKEN:
              headers["Authorization"] = f"Bearer {GITHUB_TOKEN}"
          try:
              req = urllib.request.Request(ci_url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as r:
                  ci_data = json.loads(r.read().decode())
          except Exception as e:
              print(f"ERROR: Could not fetch ci-data.json: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write('matrix={"include":[]}\n')
                  f.write("total=0\n")
              exit(0)

          run_data = ci_data.get("run_data", [])
          supported = {}
          for entry in run_data:
              mc = entry.get("mc")
              ltype = entry.get("type")
              modloader = entry.get("modloader")
              regex = entry.get("regex")
              java_str = entry.get("java")
              if not all([mc, ltype, modloader, regex, java_str]):
                  continue
              try:
                  java = int(java_str)
              except (ValueError, TypeError):
                  java = 17
              supported[(mc, modloader)] = {
                  "mc": mc, "modloader": modloader,
                  "mcrt_jar": ltype, "regex": regex, "java": java,
              }

          by_minor = {}
          for (mc, modloader), cfg in supported.items():
              key = (minor_key(mc), modloader)
              if key not in by_minor or parse_mc_version(mc) > parse_mc_version(by_minor[key]["mc"]):
                  by_minor[key] = cfg

          def map_loader(loader):
              if loader == "quilt":
                  return "fabric"
              return loader

          def find_test_config(gv, loader):
              if (gv, loader) in supported:
                  return supported[(gv, loader)]
              mk = minor_key(gv)
              if (mk, loader) in by_minor:
                  return by_minor[(mk, loader)]
              return None

          test_entries = []
          for entry in build_entries:
              test_loader = map_loader(entry["loader"])
              test_config = find_test_config(entry["mc_version"], test_loader)
              if test_config is None:
                  continue
              # Use the maximum of ci-data Java and mod's required Java
              ci_java = int(test_config["java"])
              mod_java = int(entry.get("mod_java", 8))
              java_version = str(max(ci_java, mod_java))
              test_entries.append({
                  "slug": entry["slug"],
                  "game_version": entry["mc_version"],
                  "test_mc": test_config["mc"],
                  "loader": test_config["modloader"],
                  "original_loader": entry["loader"],
                  "jar_name": entry["jar_name"],
                  "java_version": java_version,
                  "loader_regex": test_config["regex"],
                  "mcrt_jar": test_config["mcrt_jar"],
                  "safe_key": safe_artifact_key(entry["loader"], entry["mc_version"]),
              })

          matrix = {"include": test_entries}
          matrix_json = json.dumps(matrix)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix_json}\n")
              f.write(f"total={len(test_entries)}\n")

          print(f"Prepared {len(test_entries)} test entries")
          for e in test_entries:
              print(f"  {e['original_loader']} MC {e['game_version']} -> test_mc={e['test_mc']} java={e['java_version']}")
          PYEOF

  launcher-test:
    needs: [prepare-tests]
    if: always() && needs.prepare-tests.outputs.total != '0' && needs.prepare-tests.outputs.total != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.prepare-tests.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: mod-${{ matrix.slug }}
          path: .workflow_downloads/builds

      - name: Cache Minecraft
        uses: actions/cache@v4
        with:
          path: /home/runner/.minecraft
          key: mc-test-${{ matrix.test_mc }}-${{ matrix.loader }}

      - name: Cache HeadlessMC
        id: cache-hmc
        uses: actions/cache@v4
        with:
          path: headlessmc-launcher-wrapper-2.9.0.jar
          key: hmc-wrapper-2.9.0

      - name: Get HeadlessMC
        if: steps.cache-hmc.outputs.cache-hit != 'true'
        uses: robinraju/release-downloader@a96f54c1b5f5e09e47d9504526e96febd949d4c2
        with:
          repository: 3arthqu4ke/headlessmc
          tag: "2.9.0"
          fileName: headlessmc-launcher-wrapper-2.9.0.jar

      - name: Install xvfb dependencies
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y x11-xserver-utils

      - name: Run launcher test
        id: run-test
        continue-on-error: true
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          SLUG: ${{ matrix.slug }}
          JAR_NAME: ${{ matrix.jar_name }}
          GAME_VERSION: ${{ matrix.game_version }}
          TEST_MC: ${{ matrix.test_mc }}
          LOADER: ${{ matrix.loader }}
          ORIGINAL_LOADER: ${{ matrix.original_loader }}
          JAVA_VERSION: ${{ matrix.java_version }}
          LOADER_REGEX: ${{ matrix.loader_regex }}
          MCRT_JAR: ${{ matrix.mcrt_jar }}
          SAFE_KEY: ${{ matrix.safe_key }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR_PATH=$(find .workflow_downloads/builds -name "${{ matrix.jar_name }}" | head -1)
          mkdir -p launcher-results crash-logs

          run_test() {
            local round=$1
            echo "=== Launcher test round $round ==="
            rm -rf run
            python3 -u scripts/launcher_test.py \
              --slug "${{ matrix.slug }}" \
              --jar-name "${{ matrix.jar_name }}" \
              --jar-path "${JAR_PATH}" \
              --game-version "${{ matrix.game_version }}" \
              --test-mc "${{ matrix.test_mc }}" \
              --loader "${{ matrix.loader }}" \
              --original-loader "${{ matrix.original_loader }}" \
              --java-version "${{ matrix.java_version }}" \
              --loader-regex "${{ matrix.loader_regex }}" \
              --mcrt-jar "${{ matrix.mcrt_jar }}" \
              --safe-key "${{ matrix.safe_key }}" \
              --out-dir launcher-results
          }

          test_passed() {
            local status_file="launcher-results/${{ matrix.safe_key }}.txt"
            if [ -f "$status_file" ]; then
              local status=$(cat "$status_file")
              if [ "$status" = "pass" ] || [ "$status" = "not_tested" ]; then
                return 0
              fi
            fi
            return 1
          }

          # Round 1
          run_test 1
          if test_passed; then
            echo "Round 1 passed"
            exit 0
          fi
          echo "Round 1 result: FAILED"

          # Round 2 (retry)
          echo "Round 1 failed, retrying (round 2)..."
          pkill -9 -f "headlessmc-launcher-wrapper" 2>/dev/null || true
          pkill -9 -f "Xvfb" 2>/dev/null || true
          rm -rf run launcher-results
          mkdir -p launcher-results

          run_test 2
          if test_passed; then
            echo "Round 2 passed (retry succeeded)"
            exit 0
          fi

          echo "Both rounds failed"
          exit 1

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-result-${{ matrix.slug }}
          path: launcher-results/

      - name: Upload crash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.safe_key }}
          path: launcher-results/crash-logs/
          if-no-files-found: ignore

  collect-tests:
    needs: [launcher-test]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.collect.outputs.passed }}
      failed: ${{ steps.collect.outputs.failed }}
      skipped: ${{ steps.collect.outputs.skipped }}
      total: ${{ steps.collect.outputs.total }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: test-result-*
          path: .workflow_downloads/test-results
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: crash-*
          path: .workflow_downloads/crash-logs
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: all-mod-builds
          path: .workflow_downloads/combined

      - id: collect
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          results_dir = Path(".workflow_downloads/test-results")
          summary_path = Path(".workflow_downloads/combined/run-summary.json")

          # Load build results
          build_results = {}
          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))
              for mod in summary.get("mods", []):
                  slug = mod.get("slug", "")
                  if slug:
                      build_results[slug] = {
                          "mod_id": mod.get("metadata", {}).get("mod_id", slug),
                          "name": mod.get("metadata", {}).get("name", slug),
                          "mc": mod.get("minecraft_version", ""),
                          "folder": mod.get("range_folder", ""),
                          "loader": mod.get("loader", ""),
                          "build_status": mod.get("status", "unknown"),
                          "jar": ", ".join(mod.get("jar_names", [])) or "-",
                          "log": mod.get("log_relpath", "-"),
                      }

          # Load launcher results
          launcher_results = {}
          passed = 0
          failed = 0
          skipped = 0
          total = 0

          if results_dir.exists():
              for txt_file in sorted(results_dir.glob("*.txt")):
                  total += 1
                  content = txt_file.read_text(encoding="utf-8").strip()
                  slug = txt_file.stem
                  launcher_results[slug] = content
                  if content == "pass":
                      passed += 1
                  elif content == "fail":
                      failed += 1
                  elif content == "not_tested":
                      skipped += 1
                      failed += 1  # not_tested is treated as failure
                  print(f"  {slug}: {content}")

          # Build combined summary table
          all_slugs = set(build_results.keys()) | set(launcher_results.keys())
          rows = []
          for slug in sorted(all_slugs):
              br = build_results.get(slug, {})
              lr = launcher_results.get(slug, "N/A")
              rows.append({
                  "slug": slug,
                  "mod_id": br.get("mod_id", slug),
                  "name": br.get("name", slug),
                  "mc": br.get("mc", ""),
                  "folder": br.get("folder", ""),
                  "loader": br.get("loader", ""),
                  "build": br.get("build_status", "N/A"),
                  "launcher": lr,
                  "jar": br.get("jar", "-"),
                  "log": br.get("log", "-"),
              })

          # Print combined table
          print(f"\n{'='*90}")
          print(f"COMBINED BUILD & LAUNCHER SUMMARY")
          print(f"{'='*90}")
          header = f"  {'Mod ID':<16} {'Name':<16} {'MC':<10} {'Folder':<18} {'Loader':<8} {'Build':<10} {'Launcher':<10} {'Jar'}"
          print(header)
          print(f"  {'-'*16} {'-'*16} {'-'*10} {'-'*18} {'-'*8} {'-'*10} {'-'*10} {'-'*20}")
          for r in rows:
              print(f"  {r['mod_id']:<16} {r['name']:<16} {r['mc']:<10} {r['folder']:<18} {r['loader']:<8} {r['build']:<10} {r['launcher']:<10} {r['jar']:<20}")

          # Overall status
          build_failures = sum(1 for r in rows if r["build"] not in ("success", "N/A"))
          print(f"\n  Build: {len(rows) - build_failures} success, {build_failures} failed")
          print(f"  Launcher: {passed} passed, {failed} failed ({skipped} skipped/not_tested) out of {total} tests")
          print(f"{'='*90}")

          # Write GITHUB_STEP_SUMMARY with markdown table
          summary_lines = [
              "## Combined Build & Launcher Summary",
              "",
              "| Mod ID | Name | MC | Folder | Loader | Build | Launcher | Jar |",
              "| --- | --- | --- | --- | --- | --- | --- | --- |",
          ]
          for r in rows:
              b_emoji = {"success": "✅", "failed": "❌", "unknown": "⚠️"}.get(r["build"], "❓")
              l_emoji = {"pass": "✅", "fail": "❌", "not_tested": "⚠️", "N/A": "➖"}.get(r["launcher"], "❓")
              summary_lines.append(
                  f"| {r['mod_id']} | {r['name']} | {r['mc']} | {r['folder']} | {r['loader']} | {b_emoji} {r['build']} | {l_emoji} {r['launcher']} | {r['jar']} |"
              )
          summary_lines += [
              "",
              f"**Build:** {len(rows) - build_failures} success, {build_failures} failed",
              f"**Launcher:** {passed} passed, {failed} failed ({skipped} skipped/not_tested) out of {total} tests",
              "",
              "> ⚠️ **not_tested** = infrastructure limitation (e.g., Fabric installer failed), version is faulty and cannot be published",
          ]
          summary_md = "\n".join(summary_lines)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary_md + "\n")

          # Write combined summary JSON
          combined = {
              "passed": passed, "failed": failed, "skipped": skipped, "total": total,
              "build_failures": build_failures,
              "rows": rows,
          }
          Path(".workflow_downloads/combined-summary.json").write_text(json.dumps(combined, indent=2), encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
              f.write(f"skipped={skipped}\n")
              f.write(f"total={total}\n")
          PYEOF

      - name: Upload combined test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .workflow_downloads/test-results

      - name: Upload combined crash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs
          path: .workflow_downloads/crash-logs
          if-no-files-found: ignore

      - name: Fail if any test failed
        if: always() && steps.collect.outputs.failed != '0' && steps.collect.outputs.failed != ''
        shell: bash
        run: |
          echo "Launcher tests failed: ${{ steps.collect.outputs.failed }} out of ${{ steps.collect.outputs.total }}"
          exit 1

  publish-modrinth:
    needs:
      - bundle
      - collect-tests
    if: ${{ always() && inputs.modrinth_project_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: all-mod-builds
          path: .workflow_downloads/combined

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results
          path: .workflow_downloads/launcher-results

      - name: Filter mods that failed launcher test
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, shutil
          from pathlib import Path
          results_dir = Path(".workflow_downloads/launcher-results")
          combined_dir = Path(".workflow_downloads/combined")
          summary_path = combined_dir / "run-summary.json"
          if not results_dir.exists() or not summary_path.exists():
              print("No launcher test results or summary found, proceeding with all mods")
              exit(0)
          failed_slugs = set()
          for result_file in sorted(results_dir.rglob("*.txt")):
              slug = result_file.stem
              content = result_file.read_text(encoding="utf-8").strip()
              if content in ("fail", "not_tested"):
                  failed_slugs.add(slug)
                  print(f"Mod {slug} launcher test: {content} -> will skip publishing")
          if not failed_slugs:
              print("All launcher tests passed")
              exit(0)
          mods_dir = combined_dir / "mods"
          for slug in failed_slugs:
              mod_dir = mods_dir / slug
              if mod_dir.exists():
                  shutil.rmtree(mod_dir)
                  print(f"Removed {mod_dir}")
          with open(summary_path, encoding="utf-8") as f:
              summary = json.load(f)
          original_count = len(summary.get("mods", []))
          summary["mods"] = [m for m in summary.get("mods", []) if m.get("slug") not in failed_slugs]
          filtered_count = original_count - len(summary["mods"])
          with open(summary_path, "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2)
          print(f"Filtered {filtered_count} mod(s) that failed launcher test")
          PYEOF

      - name: Mask Modrinth token
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - id: publish
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          python build_mods.py publish-modrinth \
            --artifacts-root .workflow_downloads/combined \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir .workflow_artifacts/modrinth-publish
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modrinth-publish
          path: .workflow_artifacts/modrinth-publish

      - if: always()
        shell: bash
        run: |
          if [ -f .workflow_artifacts/modrinth-publish/SUMMARY.md ]; then
            cat .workflow_artifacts/modrinth-publish/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - if: always()
        shell: bash
        run: exit "${{ steps.publish.outputs.exit_code }}"
