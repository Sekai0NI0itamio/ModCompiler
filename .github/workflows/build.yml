name: Build Mods

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: Repo-relative path to the committed input zip under incoming/
        required: true
        type: string
      max_parallel:
        description: Number of build jobs to run at once. Use all for no scaffold-side cap.
        required: true
        default: "all"
        type: string
      modrinth_project_url:
        description: Optional Modrinth project URL or slug. If set, successful jars are uploaded using the MODRINTH_TOKEN repository secret.
        required: false
        default: ""
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare.outputs.matrix }}
      max_parallel: ${{ steps.prepare.outputs.max_parallel }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: prepare
        shell: bash
        env:
          MAX_PARALLEL_INPUT: ${{ inputs.max_parallel }}
        run: |
          mkdir -p .workflow_state/prepared
          python build_mods.py prepare \
            --zip-path "${{ inputs.zip_path }}" \
            --manifest version-manifest.json \
            --output-dir .workflow_state/prepared
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          matrix = json.loads(Path(".workflow_state/prepared/matrix.json").read_text(encoding="utf-8"))
          count = max(1, len(matrix.get("include", [])))
          raw = os.environ.get("MAX_PARALLEL_INPUT", "all").strip().lower()
          if raw in {"", "all", "unlimited", "max"}:
              resolved = count
          else:
              value = int(raw)
              if value < 1:
                  raise SystemExit("max_parallel must be >= 1 or one of: all, unlimited, max")
              resolved = value
          Path(".workflow_state/prepared/max_parallel.txt").write_text(str(resolved), encoding="utf-8")
          print(f"Resolved max_parallel={resolved}")
          PY
          printf 'matrix=%s\n' "$(tr -d '\n' < .workflow_state/prepared/matrix.json)" >> "$GITHUB_OUTPUT"
          printf 'max_parallel=%s\n' "$(tr -d '\n' < .workflow_state/prepared/max_parallel.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: prepared-inputs
          path: .workflow_state/prepared

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.prepare.outputs.max_parallel) }}
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/download-artifact@v4
        with:
          name: prepared-inputs
          path: .workflow_state/prepared

      - name: Check pre-build validation
        id: precheck
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from pathlib import Path
          plan_path = Path(".workflow_state/prepared/build-plan.json")
          slug = "${{ matrix.slug }}"
          artifact_dir = Path(f".workflow_artifacts/per-mod/{slug}")
          artifact_dir.mkdir(parents=True, exist_ok=True)
          skip = "false"
          if not plan_path.exists():
              print("Plan file not found")
          else:
              plan = json.loads(plan_path.read_text(encoding="utf-8"))
              entry = next((m for m in plan.get("mods", []) if m.get("slug") == slug), None)
              if entry and entry.get("precheck_error"):
                  print(f"SKIPPED: {slug} has precheck_error: {entry['precheck_error']}")
                  result = {
                      "slug": slug,
                      "status": "skipped_precheck",
                      "precheck_error": entry["precheck_error"],
                      "minecraft_version": entry.get("minecraft_version"),
                      "loader": entry.get("loader"),
                      "jar_names": [],
                  }
                  (artifact_dir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
                  skip = "true"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"skip={skip}\n")
          PYEOF

      - name: Build one mod
        if: steps.precheck.outputs.skip != 'true'
        shell: bash
        run: |
          python build_mods.py build-one \
            --plan .workflow_state/prepared/build-plan.json \
            --manifest version-manifest.json \
            --prepared-dir .workflow_state/prepared \
            --slug "${{ matrix.slug }}" \
            --artifact-dir ".workflow_artifacts/per-mod/${{ matrix.slug }}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mod-${{ matrix.slug }}
          path: .workflow_artifacts/per-mod/${{ matrix.slug }}

  bundle:
    needs:
      - prepare
      - build
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          pattern: mod-*
          path: .workflow_downloads

      - id: bundle
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python build_mods.py bundle \
            --artifacts-root .workflow_downloads \
            --output-dir .workflow_artifacts/combined
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-mod-builds
          path: .workflow_artifacts/combined

      - if: always()
        shell: bash
        run: cat .workflow_artifacts/combined/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"

      - if: always()
        shell: bash
        run: exit "${{ steps.bundle.outputs.exit_code }}"

  # ------------------------------------------------------------------
  # Parallel launcher tests: prepare-tests -> launcher-test (matrix) -> collect-tests
  # ------------------------------------------------------------------

  prepare-tests:
    needs: [prepare, build]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.prepare-tests.outputs.matrix }}
      total: ${{ steps.prepare-tests.outputs.total }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mod-*
          path: .workflow_downloads/builds

      - id: prepare-tests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, urllib.request
          from pathlib import Path

          BUILD_DIR = Path(".workflow_downloads/builds")

          def parse_mc_version(v):
              parts = []
              for token in re.split(r'[.\-_]', str(v).strip()):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      break
              return tuple(parts) if parts else (0,)

          def minor_key(v):
              p = parse_mc_version(v)
              if p[0] == 1 and len(p) >= 2:
                  return (1, p[1])
              return p[:2]

          def safe_artifact_key(loader, gv):
              return re.sub(r"[^A-Za-z0-9._-]+", "_", f"{loader}-{gv}").strip("_")

          # Find successful builds
          build_entries = []
          for result_file in sorted(BUILD_DIR.rglob("result.json")):
              try:
                  data = json.loads(result_file.read_text(encoding="utf-8"))
              except Exception:
                  continue
              if data.get("status") != "success":
                  continue
              slug = data.get("slug", "")
              jar_names = data.get("jar_names", [])
              mc_version = data.get("minecraft_version", "")
              loader = data.get("loader", "")
              if not jar_names or not mc_version or not loader:
                  continue
              build_entries.append({
                  "slug": slug,
                  "jar_name": jar_names[0],
                  "mc_version": mc_version,
                  "loader": loader,
                  "mod_java": data.get("java_version", 8),
              })

          if not build_entries:
              print("No successful builds to test")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write('matrix={"include":[]}\n')
                  f.write("total=0\n")
              exit(0)

          # Fetch ci-data.json
          ci_url = "https://raw.githubusercontent.com/headlesshq/mc-runtime-test/main/ci-data.json"
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "").strip()
          headers = {"User-Agent": "ModCompiler/1.0"}
          if GITHUB_TOKEN:
              headers["Authorization"] = f"Bearer {GITHUB_TOKEN}"
          try:
              req = urllib.request.Request(ci_url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as r:
                  ci_data = json.loads(r.read().decode())
          except Exception as e:
              print(f"ERROR: Could not fetch ci-data.json: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write('matrix={"include":[]}\n')
                  f.write("total=0\n")
              exit(0)

          run_data = ci_data.get("run_data", [])
          supported = {}
          for entry in run_data:
              mc = entry.get("mc")
              ltype = entry.get("type")
              modloader = entry.get("modloader")
              regex = entry.get("regex")
              java_str = entry.get("java")
              if not all([mc, ltype, modloader, regex, java_str]):
                  continue
              try:
                  java = int(java_str)
              except (ValueError, TypeError):
                  java = 17
              supported[(mc, modloader)] = {
                  "mc": mc, "modloader": modloader,
                  "mcrt_jar": ltype, "regex": regex, "java": java,
              }

          by_minor = {}
          for (mc, modloader), cfg in supported.items():
              key = (minor_key(mc), modloader)
              if key not in by_minor or parse_mc_version(mc) > parse_mc_version(by_minor[key]["mc"]):
                  by_minor[key] = cfg

          def map_loader(loader):
              if loader == "quilt":
                  return "fabric"
              return loader

          def find_test_config(gv, loader):
              if (gv, loader) in supported:
                  return supported[(gv, loader)]
              mk = minor_key(gv)
              if (mk, loader) in by_minor:
                  return by_minor[(mk, loader)]
              return None

          test_entries = []
          for entry in build_entries:
              test_loader = map_loader(entry["loader"])
              test_config = find_test_config(entry["mc_version"], test_loader)
              if test_config is None:
                  continue
              # Use the maximum of ci-data Java and mod's required Java
              ci_java = int(test_config["java"])
              mod_java = int(entry.get("mod_java", 8))
              java_version = str(max(ci_java, mod_java))
              test_entries.append({
                  "slug": entry["slug"],
                  "game_version": entry["mc_version"],
                  "test_mc": test_config["mc"],
                  "loader": test_config["modloader"],
                  "original_loader": entry["loader"],
                  "jar_name": entry["jar_name"],
                  "java_version": java_version,
                  "loader_regex": test_config["regex"],
                  "mcrt_jar": test_config["mcrt_jar"],
                  "safe_key": safe_artifact_key(entry["loader"], entry["mc_version"]),
              })

          matrix = {"include": test_entries}
          matrix_json = json.dumps(matrix)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix_json}\n")
              f.write(f"total={len(test_entries)}\n")

          print(f"Prepared {len(test_entries)} test entries")
          for e in test_entries:
              print(f"  {e['original_loader']} MC {e['game_version']} -> test_mc={e['test_mc']} java={e['java_version']}")
          PYEOF

  launcher-test:
    needs: [prepare-tests]
    if: always() && needs.prepare-tests.outputs.total != '0' && needs.prepare-tests.outputs.total != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix: ${{ fromJson(needs.prepare-tests.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: mod-${{ matrix.slug }}
          path: .workflow_downloads/builds

      - name: Cache Minecraft
        uses: actions/cache@v4
        with:
          path: /home/runner/.minecraft
          key: mc-test-${{ matrix.test_mc }}-${{ matrix.loader }}

      - name: Cache HeadlessMC
        id: cache-hmc
        uses: actions/cache@v4
        with:
          path: headlessmc-launcher-wrapper-2.9.0.jar
          key: hmc-wrapper-2.9.0

      - name: Get HeadlessMC
        if: steps.cache-hmc.outputs.cache-hit != 'true'
        uses: robinraju/release-downloader@a96f54c1b5f5e09e47d9504526e96febd949d4c2
        with:
          repository: 3arthqu4ke/headlessmc
          tag: "2.9.0"
          fileName: headlessmc-launcher-wrapper-2.9.0.jar

      - name: Install xvfb dependencies
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y x11-xserver-utils

      - name: Run launcher test
        id: run-test
        continue-on-error: true
        shell: bash
        env:
          PYTHONUNBUFFERED: "1"
          SLUG: ${{ matrix.slug }}
          JAR_NAME: ${{ matrix.jar_name }}
          GAME_VERSION: ${{ matrix.game_version }}
          TEST_MC: ${{ matrix.test_mc }}
          LOADER: ${{ matrix.loader }}
          ORIGINAL_LOADER: ${{ matrix.original_loader }}
          JAVA_VERSION: ${{ matrix.java_version }}
          LOADER_REGEX: ${{ matrix.loader_regex }}
          MCRT_JAR: ${{ matrix.mcrt_jar }}
          SAFE_KEY: ${{ matrix.safe_key }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 -u - <<'PYEOF'
          import json, os, socket, subprocess, sys, shutil, re, time, urllib.request, zipfile
          from pathlib import Path
          # Defensive network timeout so stalled downloads cannot hang the job
          socket.setdefaulttimeout(120)
          exec(compile(open("scripts/launcher_test_lib.py").read(), "scripts/launcher_test_lib.py", "exec"))
          dep_resolve = resolve_dependencies

          SLUG = os.environ["SLUG"]
          JAR_NAME = os.environ["JAR_NAME"]
          GAME_VERSION = os.environ["GAME_VERSION"]
          TEST_MC = os.environ["TEST_MC"]
          LOADER = os.environ["LOADER"]
          ORIGINAL_LOADER = os.environ["ORIGINAL_LOADER"]
          JAVA_VERSION = int(os.environ["JAVA_VERSION"])
          LOADER_REGEX = os.environ["LOADER_REGEX"]
          MCRT_JAR = os.environ["MCRT_JAR"]
          SAFE_KEY = os.environ["SAFE_KEY"]
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "").strip()
          HMC_JAR = "headlessmc-launcher-wrapper-2.9.0.jar"
          FABRIC_INSTALLER_URL = "https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.1.1/fabric-installer-1.1.1.jar"
          FABRIC_INSTALLER_JAR = "fabric-installer-1.1.1.jar"
          MCRT_VERSION = "4.4.0"
          MCRT_REPO = "headlesshq/mc-runtime-test"
          LAUNCH_TIMEOUT = 120

          RESULTS_DIR = Path("launcher-results")
          CRASH_DIR = Path("crash-logs")
          RESULTS_DIR.mkdir(parents=True, exist_ok=True)
          CRASH_DIR.mkdir(parents=True, exist_ok=True)

          print(f"::group::Test: {ORIGINAL_LOADER} MC {GAME_VERSION} ({SLUG})")

          result = {
              "status": "launcher_failed",
              "slug": SLUG,
              "game_version": GAME_VERSION,
              "loader": ORIGINAL_LOADER,
              "test_mc": TEST_MC,
              "crash_summary": "",
          }

          launch_stdout = ""
          launch_stderr = ""

          try:
              # Kill any leftover processes
              subprocess.run(["pkill", "-f", "java"], capture_output=True)
              time.sleep(1)

              java_home = find_java_home(str(JAVA_VERSION))
              if java_home:
                  os.environ["JAVA_HOME"] = java_home
              print(f"  Java home: {java_home}")

              run_dir = Path("run")
              if run_dir.exists():
                  shutil.rmtree(run_dir)
              run_dir.mkdir()
              (run_dir / "mods").mkdir()

              hmc_dir = Path("HeadlessMC")
              hmc_dir.mkdir(exist_ok=True)
              (hmc_dir / "config.properties").write_text(
                  f"hmc.java.versions={java_home}/bin/java\n"
                  f"hmc.gamedir={Path.cwd()}/run\n"
                  f"hmc.offline=true\n"
                  f"hmc.rethrow.launch.exceptions=true\n"
                  f"hmc.exit.on.failed.command=true\n"
                  f"hmc.assets.dummy=true\n"
              )

              (run_dir / "options.txt").write_text("onboardAccessibility:false\npauseOnLostFocus:false\n")

              # Find the jar in the downloaded artifact
              jar_path = None
              for p in Path(".workflow_downloads/builds").rglob(JAR_NAME):
                  jar_path = p
                  break
              if not jar_path:
                  result["status"] = "not_tested"
                  result["crash_summary"] = f"Jar {JAR_NAME} not found in artifact"
                  print(f"  SKIPPED: {result['crash_summary']}")
              else:
                  print(f"  Copying {JAR_NAME}...")
                  shutil.copy2(str(jar_path), str(run_dir / "mods" / JAR_NAME))

                  skip_launch = False

                  # Resolve mod dependencies (fabric-api, etc.)
                  unresolved = dep_resolve(run_dir / "mods", TEST_MC, LOADER)
                  if unresolved:
                      result["status"] = "dep_unresolved"
                      result["crash_summary"] = f"Unresolved dependencies: {', '.join(unresolved)}"
                      print(f"  FAILED: Unresolved dependencies: {unresolved}")
                      skip_launch = True
                  else:
                      # Patch fabric.mod.json if test_mc != game_version
                      if LOADER == "fabric" and TEST_MC != GAME_VERSION:
                          patch_fabric_mc_version(run_dir / "mods" / JAR_NAME, GAME_VERSION, TEST_MC)

                      # Download Minecraft
                      mc_json = Path(os.path.expanduser("~/.minecraft/versions")) / TEST_MC / f"{TEST_MC}.json"
                      if not mc_json.exists():
                          print(f"  Downloading Minecraft {TEST_MC}...")
                          subprocess.run(
                              ["java", "-jar", HMC_JAR, "--command", "download", TEST_MC],
                              capture_output=True, text=True, timeout=300
                          )

                      # Install modloader
                      if LOADER == "fabric":
                          # Download Fabric installer if needed
                          if not Path(FABRIC_INSTALLER_JAR).exists():
                              print(f"  Downloading Fabric installer...")
                              urllib.request.urlretrieve(FABRIC_INSTALLER_URL, FABRIC_INSTALLER_JAR)
                          minecraft_dir = os.path.expanduser("~/.minecraft")
                          print(f"  Installing Fabric for {TEST_MC} via Fabric Installer...")
                          install_result = subprocess.run(
                              ["java", "-jar", FABRIC_INSTALLER_JAR, "client",
                               "-dir", minecraft_dir,
                               "-mcversion", TEST_MC,
                               "-noprofile"],
                              capture_output=True, text=True, timeout=300
                          )
                          if install_result.returncode != 0:
                              print(f"  WARNING: Fabric installer returned code {install_result.returncode}")
                              if install_result.stderr:
                                  print(f"  stderr: {install_result.stderr[:500]}")
                      else:
                          print(f"  Installing {LOADER} for {TEST_MC} (Java {JAVA_VERSION})...")
                          install_result = subprocess.run(
                              ["java", "-jar", HMC_JAR, "--command", LOADER, TEST_MC, "--java", str(JAVA_VERSION)],
                              capture_output=True, text=True, timeout=600
                          )
                          install_stderr = (install_result.stderr or "")[:2000]
                          install_stdout = (install_result.stdout or "")[:2000]
                          if install_result.returncode != 0:
                              print(f"  WARNING: {LOADER} install returned code {install_result.returncode}")
                          if install_stderr:
                              print(f"  Install stderr: {install_stderr}")
                          if install_stdout:
                              print(f"  Install stdout: {install_stdout}")

                      # Verify installation
                      if LOADER == "fabric":
                          # Check Fabric version JSON directly (Fabric installer creates it)
                          versions_dir = Path(os.path.expanduser("~/.minecraft/versions"))
                          fabric_dirs = list(versions_dir.glob(f"fabric-loader-*-{TEST_MC}"))
                          if not fabric_dirs:
                              result["status"] = "not_tested"
                              reason = f"No Fabric installation found for {TEST_MC}"
                              if install_result.returncode != 0:
                                  reason += f" (installer failed with code {install_result.returncode})"
                              result["crash_summary"] = reason
                              result["launch_stderr"] = (install_result.stderr or "")[:2000]
                              print(f"  SKIPPED: {reason}")
                              skip_launch = True
                          else:
                              version_id = fabric_dirs[0].name
                              print(f"  Fabric installed: {version_id}")
                      else:
                          # Check forge/neoforge installation via filesystem (HeadlessMC install can be async)
                          versions_dir = Path(os.path.expanduser("~/.minecraft/versions"))
                          loader_pattern = "forge" if LOADER == "forge" else "neoforge"
                          version_id = None
                          nf_version = None
                          poll_waited = 0
                          poll_interval = 10
                          while poll_waited < 300:
                              if versions_dir.exists():
                                  loader_dirs = [
                                      d for d in versions_dir.iterdir()
                                      if d.is_dir() and loader_pattern in d.name.lower() and TEST_MC in d.name
                                  ]
                                  if loader_dirs:
                                      version_id = loader_dirs[0].name
                                      print(f"  {LOADER} installed: {version_id} (after {poll_waited}s)")
                                      break
                              time.sleep(poll_interval)
                              poll_waited += poll_interval

                          # Fallback for NeoForge: run the official installer directly
                          if not version_id and LOADER == "neoforge":
                              nf_version = resolve_neoforge_version(TEST_MC, install_stdout)
                              if nf_version:
                                  print(f"  NeoForge version resolved: {nf_version}")
                                  nf_code, nf_out, nf_err = install_neoforge_direct(TEST_MC, nf_version)
                                  print(f"  NeoForge direct installer exit code: {nf_code}")
                                  if nf_out:
                                      print(f"  NeoForge installer stdout: {nf_out[:1000]}")
                                  if nf_err:
                                      print(f"  NeoForge installer stderr: {nf_err[:1000]}")
                                  # Poll again, matching either MC version or NeoForge version
                                  poll_waited = 0
                                  while poll_waited < 300:
                                      if versions_dir.exists():
                                          loader_dirs = [
                                              d for d in versions_dir.iterdir()
                                              if d.is_dir() and loader_pattern in d.name.lower()
                                              and (TEST_MC in d.name or (nf_version and nf_version in d.name))
                                          ]
                                          if loader_dirs:
                                              version_id = loader_dirs[0].name
                                              print(f"  {LOADER} installed via direct installer: {version_id} (after {poll_waited}s)")
                                              break
                                      time.sleep(poll_interval)
                                      poll_waited += poll_interval

                          if not version_id:
                              # Fallback: try hmc list command
                              list_result = subprocess.run(
                                  ["java", "-jar", HMC_JAR, "--command", "list", LOADER_REGEX],
                                  capture_output=True, text=True, timeout=30
                              )
                              list_output = (list_result.stdout or "").strip()
                              if not list_output or "Couldn't find" in list_output or "No" in list_output:
                                  result["status"] = "not_tested"
                                  reason = f"No {LOADER} installation found for {TEST_MC}"
                                  if install_result.returncode != 0:
                                      reason += f" (install failed with code {install_result.returncode})"
                                  result["crash_summary"] = reason
                                  result["launch_stderr"] = (install_result.stderr or "")[:2000]
                                  print(f"  SKIPPED: {reason}")
                                  skip_launch = True
                              else:
                                  version_id = list_output.split("\n")[0].strip()
                                  print(f"  {LOADER} installed (via hmc list): {version_id}")

                  if not skip_launch:
                      # Download mc-runtime-test jar
                      mods_dir = Path("run/mods")
                      pat = f"mc-runtime-test-{TEST_MC}-*-{MCRT_JAR}-release.jar"
                      existing = list(mods_dir.glob(pat))
                      mcrt_name = None
                      if existing:
                          mcrt_name = existing[0].name
                      else:
                          url = f"https://api.github.com/repos/{MCRT_REPO}/releases/tags/{MCRT_VERSION}"
                          headers = {"User-Agent": "ModCompiler/1.0"}
                          if GITHUB_TOKEN:
                              headers["Authorization"] = f"Bearer {GITHUB_TOKEN}"
                          try:
                              req = urllib.request.Request(url, headers=headers)
                              with urllib.request.urlopen(req, timeout=30) as r:
                                  release = json.loads(r.read().decode())
                              for asset in release.get("assets", []):
                                  name = asset.get("name", "")
                                  if re.match(f"mc-runtime-test-{re.escape(TEST_MC)}-.*-{re.escape(MCRT_JAR)}-release\\.jar$", name):
                                      dl_url = asset.get("browser_download_url", "")
                                      if dl_url:
                                          urllib.request.urlretrieve(dl_url, str(mods_dir / name))
                                          mcrt_name = name
                                          print(f"  Downloaded mc-runtime-test: {name}")
                                          break
                          except Exception as e:
                              print(f"  WARNING: Could not fetch mc-runtime-test: {e}")

                      if not mcrt_name:
                          result["status"] = "not_tested"
                          result["crash_summary"] = f"No mc-runtime-test jar for {TEST_MC}/{MCRT_JAR}"
                          print(f"  SKIPPED: No mc-runtime-test jar")
                      else:
                          # Launch game in BACKGROUND
                          print(f"  Launching Minecraft {TEST_MC} with {LOADER}...")
                          launch_proc = subprocess.Popen(
                              ["xvfb-run", "java", "-Dhmc.check.xvfb=true",
                               "-jar", HMC_JAR, "--command", "launch", LOADER_REGEX, "-regex",
                               "--jvm", "-Djava.awt.headless=true"],
                              stdout=subprocess.PIPE, stderr=subprocess.PIPE
                          )

                          # Wait for game to load, then kill
                          game_started = False
                          crash_detected = False
                          waited = 0
                          poll_interval = 5

                          while waited < LAUNCH_TIMEOUT:
                              time.sleep(poll_interval)
                              waited += poll_interval

                              if launch_proc.poll() is not None:
                                  print(f"  Game exited on its own after {waited}s (exit code {launch_proc.returncode})")
                                  game_started = True
                                  break

                              crash_reports_dir = Path("run/crash-reports")
                              crash_files = list(crash_reports_dir.glob("crash-*.txt")) if crash_reports_dir.exists() else []
                              hs_err = list(Path("run").glob("hs_err_pid*.log"))

                              if crash_files or hs_err:
                                  print(f"  CRASH DETECTED after {waited}s!")
                                  crash_detected = True
                                  time.sleep(5)
                                  if launch_proc.poll() is None:
                                      launch_proc.kill()
                                      launch_proc.wait(timeout=10)
                                  break

                              log_path = Path("run/logs/latest.log")
                              if log_path.exists():
                                  log_text = log_path.read_text(encoding="utf-8", errors="replace")
                                  if "Setting user:" in log_text or "Loaded" in log_text:
                                      if not game_started:
                                          print(f"  Game reached title screen after {waited}s")
                                          game_started = True
                                          if waited < LAUNCH_TIMEOUT - 10:
                                              time.sleep(10)
                                              waited += 10
                                          break

                          # Kill if still running
                          if launch_proc.poll() is None:
                              print(f"  Killing game after {waited}s (timeout)")
                              launch_proc.kill()
                              try:
                                  launch_proc.wait(timeout=10)
                              except subprocess.TimeoutExpired:
                                  launch_proc.kill()

                          # Capture stdout/stderr
                          try:
                              if launch_proc.stdout:
                                  launch_stdout = launch_proc.stdout.read().decode("utf-8", errors="replace")[:10000]
                          except Exception:
                              pass
                          try:
                              if launch_proc.stderr:
                                  launch_stderr = launch_proc.stderr.read().decode("utf-8", errors="replace")[:10000]
                          except Exception:
                              pass

                          # Analyse results
                          crash_reports_dir = Path("run/crash-reports")
                          crash_files = list(crash_reports_dir.glob("crash-*.txt")) if crash_reports_dir.exists() else []
                          hs_err = list(Path("run").glob("hs_err_pid*.log"))

                          log_text = ""
                          log_path = Path("run/logs/latest.log")
                          if log_path.exists():
                              log_text = log_path.read_text(encoding="utf-8", errors="replace")[:5000]
                          elif Path("run/latest.log").exists():
                              log_text = Path("run/latest.log").read_text(encoding="utf-8", errors="replace")[:5000]

                          exit_code = launch_proc.returncode if launch_proc.poll() is not None else -9

                          if crash_files or hs_err:
                              result["status"] = "launcher_failed"
                              if crash_files:
                                  result["crash_summary"] = crash_files[0].read_text(encoding="utf-8", errors="replace")[:500]
                                  print(f"  FAILED: Crash report found")
                              elif hs_err:
                                  result["crash_summary"] = hs_err[0].read_text(encoding="utf-8", errors="replace")[:500]
                                  print(f"  FAILED: JVM crash detected")
                              result["launch_stdout"] = launch_stdout[:2000]
                              result["launch_stderr"] = launch_stderr[:2000]

                              cdir = CRASH_DIR / SAFE_KEY
                              cdir.mkdir(parents=True, exist_ok=True)
                              if Path("run/crash-reports").exists():
                                  shutil.copytree("run/crash-reports", cdir / "crash-reports", dirs_exist_ok=True)
                              if Path("run/logs").exists():
                                  shutil.copytree("run/logs", cdir / "logs", dirs_exist_ok=True)
                              for f in Path("run").glob("hs_err_pid*.log"):
                                  shutil.copy2(str(f), str(cdir / f.name))

                          elif game_started and exit_code not in (0, -9):
                              result["status"] = "launcher_failed"
                              crash_info = f"Game exited with code {exit_code}"
                              if not log_text and launch_stderr:
                                  crash_info += f"\nStderr: {launch_stderr[:400]}"
                              elif not log_text and launch_stdout:
                                  crash_info += f"\nStdout: {launch_stdout[:400]}"
                              result["crash_summary"] = crash_info
                              result["launch_stdout"] = launch_stdout[:2000]
                              result["launch_stderr"] = launch_stderr[:2000]
                              print(f"  FAILED: Game exited with code {exit_code}")

                              cdir = CRASH_DIR / SAFE_KEY
                              cdir.mkdir(parents=True, exist_ok=True)
                              if Path("run/logs").exists():
                                  shutil.copytree("run/logs", cdir / "logs", dirs_exist_ok=True)
                              if launch_stdout:
                                  (cdir / "launcher-stdout.log").write_text(launch_stdout, encoding="utf-8")
                              if launch_stderr:
                                  (cdir / "launcher-stderr.log").write_text(launch_stderr, encoding="utf-8")

                          else:
                              result["status"] = "passed"
                              print(f"  PASSED")

                          result["logs"] = log_text

          except Exception as e:
              result["crash_summary"] = str(e)[:500]
              print(f"  ERROR: {e}")

          # Cleanup
          subprocess.run(["pkill", "-f", "java"], capture_output=True)
          time.sleep(1)

          # Write result
          if result["status"] == "passed":
              status_text = "pass"
          elif result["status"] == "not_tested":
              status_text = "not_tested"
          else:
              status_text = "fail"

          (RESULTS_DIR / f"{SLUG}.txt").write_text(status_text, encoding="utf-8")
          rdir = RESULTS_DIR / SAFE_KEY
          rdir.mkdir(parents=True, exist_ok=True)
          (rdir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")

          print(f"  Status: {status_text}")
          print("::endgroup::")
          PYEOF

      - name: Upload test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-result-${{ matrix.slug }}
          path: launcher-results/

      - name: Upload crash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.safe_key }}
          path: crash-logs/
          if-no-files-found: ignore

  collect-tests:
    needs: [launcher-test]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      passed: ${{ steps.collect.outputs.passed }}
      failed: ${{ steps.collect.outputs.failed }}
      skipped: ${{ steps.collect.outputs.skipped }}
      total: ${{ steps.collect.outputs.total }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: test-result-*
          path: .workflow_downloads/test-results
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          pattern: crash-*
          path: .workflow_downloads/crash-logs
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: all-mod-builds
          path: .workflow_downloads/combined

      - id: collect
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          results_dir = Path(".workflow_downloads/test-results")
          summary_path = Path(".workflow_downloads/combined/run-summary.json")

          # Load build results
          build_results = {}
          if summary_path.exists():
              summary = json.loads(summary_path.read_text(encoding="utf-8"))
              for mod in summary.get("mods", []):
                  slug = mod.get("slug", "")
                  if slug:
                      build_results[slug] = {
                          "mod_id": mod.get("metadata", {}).get("mod_id", slug),
                          "name": mod.get("metadata", {}).get("name", slug),
                          "mc": mod.get("minecraft_version", ""),
                          "folder": mod.get("range_folder", ""),
                          "loader": mod.get("loader", ""),
                          "build_status": mod.get("status", "unknown"),
                          "jar": ", ".join(mod.get("jar_names", [])) or "-",
                          "log": mod.get("log_relpath", "-"),
                      }

          # Load launcher results
          launcher_results = {}
          passed = 0
          failed = 0
          skipped = 0
          total = 0

          if results_dir.exists():
              for txt_file in sorted(results_dir.glob("*.txt")):
                  total += 1
                  content = txt_file.read_text(encoding="utf-8").strip()
                  slug = txt_file.stem
                  launcher_results[slug] = content
                  if content == "pass":
                      passed += 1
                  elif content == "fail":
                      failed += 1
                  elif content == "not_tested":
                      skipped += 1
                      failed += 1  # not_tested is treated as failure
                  print(f"  {slug}: {content}")

          # Build combined summary table
          all_slugs = set(build_results.keys()) | set(launcher_results.keys())
          rows = []
          for slug in sorted(all_slugs):
              br = build_results.get(slug, {})
              lr = launcher_results.get(slug, "N/A")
              rows.append({
                  "slug": slug,
                  "mod_id": br.get("mod_id", slug),
                  "name": br.get("name", slug),
                  "mc": br.get("mc", ""),
                  "folder": br.get("folder", ""),
                  "loader": br.get("loader", ""),
                  "build": br.get("build_status", "N/A"),
                  "launcher": lr,
                  "jar": br.get("jar", "-"),
                  "log": br.get("log", "-"),
              })

          # Print combined table
          print(f"\n{'='*90}")
          print(f"COMBINED BUILD & LAUNCHER SUMMARY")
          print(f"{'='*90}")
          header = f"  {'Mod ID':<16} {'Name':<16} {'MC':<10} {'Folder':<18} {'Loader':<8} {'Build':<10} {'Launcher':<10} {'Jar'}"
          print(header)
          print(f"  {'-'*16} {'-'*16} {'-'*10} {'-'*18} {'-'*8} {'-'*10} {'-'*10} {'-'*20}")
          for r in rows:
              print(f"  {r['mod_id']:<16} {r['name']:<16} {r['mc']:<10} {r['folder']:<18} {r['loader']:<8} {r['build']:<10} {r['launcher']:<10} {r['jar']:<20}")

          # Overall status
          build_failures = sum(1 for r in rows if r["build"] not in ("success", "N/A"))
          print(f"\n  Build: {len(rows) - build_failures} success, {build_failures} failed")
          print(f"  Launcher: {passed} passed, {failed} failed ({skipped} skipped/not_tested) out of {total} tests")
          print(f"{'='*90}")

          # Write GITHUB_STEP_SUMMARY with markdown table
          summary_lines = [
              "## Combined Build & Launcher Summary",
              "",
              "| Mod ID | Name | MC | Folder | Loader | Build | Launcher | Jar |",
              "| --- | --- | --- | --- | --- | --- | --- | --- |",
          ]
          for r in rows:
              b_emoji = {"success": "✅", "failed": "❌", "unknown": "⚠️"}.get(r["build"], "❓")
              l_emoji = {"pass": "✅", "fail": "❌", "not_tested": "⚠️", "N/A": "➖"}.get(r["launcher"], "❓")
              summary_lines.append(
                  f"| {r['mod_id']} | {r['name']} | {r['mc']} | {r['folder']} | {r['loader']} | {b_emoji} {r['build']} | {l_emoji} {r['launcher']} | {r['jar']} |"
              )
          summary_lines += [
              "",
              f"**Build:** {len(rows) - build_failures} success, {build_failures} failed",
              f"**Launcher:** {passed} passed, {failed} failed ({skipped} skipped/not_tested) out of {total} tests",
              "",
              "> ⚠️ **not_tested** = infrastructure limitation (e.g., Fabric installer failed), version is faulty and cannot be published",
          ]
          summary_md = "\n".join(summary_lines)
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary_md + "\n")

          # Write combined summary JSON
          combined = {
              "passed": passed, "failed": failed, "skipped": skipped, "total": total,
              "build_failures": build_failures,
              "rows": rows,
          }
          Path(".workflow_downloads/combined-summary.json").write_text(json.dumps(combined, indent=2), encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
              f.write(f"skipped={skipped}\n")
              f.write(f"total={total}\n")
          PYEOF

      - name: Upload combined test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .workflow_downloads/test-results

      - name: Upload combined crash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs
          path: .workflow_downloads/crash-logs
          if-no-files-found: ignore

      - name: Fail if any test failed
        if: always() && steps.collect.outputs.failed != '0' && steps.collect.outputs.failed != ''
        shell: bash
        run: |
          echo "Launcher tests failed: ${{ steps.collect.outputs.failed }} out of ${{ steps.collect.outputs.total }}"
          exit 1

  publish-modrinth:
    needs:
      - bundle
      - collect-tests
    if: ${{ always() && inputs.modrinth_project_url != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: all-mod-builds
          path: .workflow_downloads/combined

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: test-results
          path: .workflow_downloads/launcher-results

      - name: Filter mods that failed launcher test
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, shutil
          from pathlib import Path
          results_dir = Path(".workflow_downloads/launcher-results")
          combined_dir = Path(".workflow_downloads/combined")
          summary_path = combined_dir / "run-summary.json"
          if not results_dir.exists() or not summary_path.exists():
              print("No launcher test results or summary found, proceeding with all mods")
              exit(0)
          failed_slugs = set()
          for result_file in sorted(results_dir.rglob("*.txt")):
              slug = result_file.stem
              content = result_file.read_text(encoding="utf-8").strip()
              if content in ("fail", "not_tested"):
                  failed_slugs.add(slug)
                  print(f"Mod {slug} launcher test: {content} -> will skip publishing")
          if not failed_slugs:
              print("All launcher tests passed")
              exit(0)
          mods_dir = combined_dir / "mods"
          for slug in failed_slugs:
              mod_dir = mods_dir / slug
              if mod_dir.exists():
                  shutil.rmtree(mod_dir)
                  print(f"Removed {mod_dir}")
          with open(summary_path, encoding="utf-8") as f:
              summary = json.load(f)
          original_count = len(summary.get("mods", []))
          summary["mods"] = [m for m in summary.get("mods", []) if m.get("slug") not in failed_slugs]
          filtered_count = original_count - len(summary["mods"])
          with open(summary_path, "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2)
          print(f"Filtered {filtered_count} mod(s) that failed launcher test")
          PYEOF

      - name: Mask Modrinth token
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - id: publish
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          python build_mods.py publish-modrinth \
            --artifacts-root .workflow_downloads/combined \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir .workflow_artifacts/modrinth-publish
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modrinth-publish
          path: .workflow_artifacts/modrinth-publish

      - if: always()
        shell: bash
        run: |
          if [ -f .workflow_artifacts/modrinth-publish/SUMMARY.md ]; then
            cat .workflow_artifacts/modrinth-publish/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - if: always()
        shell: bash
        run: exit "${{ steps.publish.outputs.exit_code }}"
