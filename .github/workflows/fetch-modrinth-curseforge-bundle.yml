name: Fetch Modrinth Bundle for CurseForge

# ---------------------------------------------------------------------------
# Purpose
# -------
# Fetches a Modrinth project and produces a clean bundle ready for manual
# CurseForge upload. No decompilation. No CurseForge token needed.
#
# Output artifact: "modrinth-curseforge-bundle"
# Bundle layout:
#
#   project_info.txt          - all copy-paste fields for CurseForge project page
#   description.html          - mod description converted to HTML (WYSIWYG-ready)
#   description.md            - mod description in original Markdown
#   versions/
#     01_<version>_<loader>_<mc>/
#       version_info.txt      - copy-paste fields for this version upload
#       changelog.txt         - changelog for this version
#       <filename>.jar        - the mod jar file
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      modrinth_url:
        description: "Modrinth project URL or slug (e.g. https://modrinth.com/mod/pingfix)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  fetch:
    name: Fetch and bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install markdown converter
        run: pip install markdown==3.7

      - name: Fetch and assemble bundle
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_URL: ${{ inputs.modrinth_url }}
        run: |
          python3 - <<'PY'
          import json, os, re, sys, time, urllib.error, urllib.parse, urllib.request
          from pathlib import Path
          import markdown as md_lib

          API   = "https://api.modrinth.com/v2"
          TOKEN = os.environ.get("MODRINTH_TOKEN", "").strip()
          RAW   = os.environ.get("MODRINTH_URL", "").strip().rstrip("/")

          def slug_from_url(v):
              m = re.search(r"modrinth\.com/(?:mod|plugin|resourcepack|shader|datapack|modpack)/([^/?#]+)", v)
              return m.group(1) if m else v

          def headers():
              h = {"User-Agent": "ModCompilerFetch/1.0", "Accept": "application/json"}
              if TOKEN:
                  h["Authorization"] = TOKEN
              return h

          def get(path, params=None):
              url = API + path
              if params:
                  url += "?" + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers=headers())
              for attempt in range(1, 6):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode("utf-8", errors="replace"))
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          sys.exit(f"[ERROR] Project not found: {url}")
                      if e.code in {429, 500, 502, 503, 504} and attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"[ERROR] HTTP {e.code}: {url}")
                  except urllib.error.URLError as e:
                      if attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"[ERROR] Network: {e.reason}")
              sys.exit("[ERROR] API failed after retries.")

          def download(url, dest):
              dest = Path(dest)
              dest.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(url, headers={"User-Agent": "ModCompilerFetch/1.0"})
              for attempt in range(1, 4):
                  try:
                      with urllib.request.urlopen(req, timeout=120) as r:
                          dest.write_bytes(r.read())
                      return True
                  except Exception:
                      if attempt < 3:
                          time.sleep(3)
              return False

          def parse_vnum(s):
              parts = []
              for t in re.split(r"[.\-_]", str(s).strip()):
                  parts.append(int(t) if t.isdigit() else t)
              return tuple(parts) if parts else (0,)

          def latest_per_combo(versions):
              best = {}
              for v in versions:
                  loaders = v.get("loaders", [])
                  gvs     = v.get("game_versions", [])
                  if not loaders or not gvs:
                      continue
                  vkey = parse_vnum(v.get("version_number", ""))
                  pub  = v.get("date_published", "")
                  for loader in loaders:
                      for gv in gvs:
                          key = (loader, gv)
                          cur = best.get(key)
                          if cur is None:
                              best[key] = (v, vkey, pub)
                              continue
                          try:
                              newer = vkey > cur[1]
                          except TypeError:
                              newer = str(vkey) > str(cur[1])
                          if newer or (vkey == cur[1] and pub > cur[2]):
                              best[key] = (v, vkey, pub)
              seen = set()
              result = []
              for v, _, _ in best.values():
                  if v["id"] not in seen:
                      seen.add(v["id"])
                      result.append(v)
              result.sort(key=lambda v: v.get("date_published", ""), reverse=True)
              return result

          # ── Fetch project ────────────────────────────────────────────────
          ref = slug_from_url(RAW)
          print(f"Fetching: {ref}")
          project = get(f"/project/{urllib.parse.quote(ref, safe='')}")
          pid   = project["id"]
          slug  = project.get("slug", ref)
          title = project.get("title", slug)
          print(f"  {title}  ({pid})")

          all_versions = get(f"/project/{urllib.parse.quote(pid, safe='')}/version") or []
          versions = latest_per_combo(all_versions)
          print(f"  {len(all_versions)} total versions → {len(versions)} after dedup")

          out = Path(".workflow_artifacts/bundle")
          out.mkdir(parents=True, exist_ok=True)

          # ── project_info.txt ─────────────────────────────────────────────
          lic = project.get("license", {})
          lic_id  = lic.get("id", "") if isinstance(lic, dict) else str(lic)
          lic_url = lic.get("url", "") if isinstance(lic, dict) else ""

          cats = project.get("categories", []) + project.get("additional_categories", [])
          links = []
          for key in ("source_url", "issues_url", "wiki_url", "discord_url"):
              val = project.get(key)
              if val:
                  links.append(f"{key}: {val}")
          for item in (project.get("donation_urls") or []):
              links.append(f"donation ({item.get('platform','')}): {item.get('url','')}")

          info_lines = [
              "=== CURSEFORGE PROJECT INFO ===",
              "",
              f"Title:        {title}",
              f"Summary:      {project.get('description', '')}",
              f"Slug:         {slug}",
              f"License:      {lic_id}",
              f"License URL:  {lic_url}",
              f"Categories:   {', '.join(cats)}",
              f"Client side:  {project.get('client_side', '')}",
              f"Server side:  {project.get('server_side', '')}",
              f"Loaders:      {', '.join(project.get('loaders', []))}",
              f"MC versions:  {', '.join(project.get('game_versions', []))}",
              f"Downloads:    {project.get('downloads', 0):,}",
              "",
              "--- Links ---",
          ] + links + [
              "",
              "--- Modrinth ---",
              f"Project page: https://modrinth.com/mod/{slug}",
              f"Project ID:   {pid}",
          ]
          (out / "project_info.txt").write_text("\n".join(info_lines), encoding="utf-8")

          # ── description.md ───────────────────────────────────────────────
          body_md = project.get("body", project.get("description", ""))
          (out / "description.md").write_text(body_md, encoding="utf-8")

          # ── description.html (WYSIWYG-ready) ────────────────────────────
          body_html = md_lib.markdown(
              body_md,
              extensions=["tables", "fenced_code", "nl2br", "sane_lists"],
          )
          html_doc = f"""<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{title} — Description</title>
<style>
  body {{ font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         max-width: 860px; margin: 40px auto; padding: 0 20px; line-height: 1.6; }}
  img  {{ max-width: 100%; }}
  pre  {{ background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; }}
  code {{ background: #f4f4f4; padding: 2px 4px; border-radius: 3px; }}
  table {{ border-collapse: collapse; width: 100%; }}
  th, td {{ border: 1px solid #ddd; padding: 8px; text-align: left; }}
  th {{ background: #f0f0f0; }}
</style>
</head>
<body>
{body_html}
</body>
</html>"""
          (out / "description.html").write_text(html_doc, encoding="utf-8")

          # ── raw project.json ─────────────────────────────────────────────
          (out / "project.json").write_text(json.dumps(project, indent=2, ensure_ascii=False), encoding="utf-8")

          # ── index.json (machine-readable for the app) ────────────────────
          version_index = []

          # ── per-version folders ──────────────────────────────────────────
          versions_dir = out / "versions"
          versions_dir.mkdir(exist_ok=True)

          for i, v in enumerate(versions, 1):
              vid    = v["id"]
              vnum   = v.get("version_number", vid)
              vname  = v.get("name", vnum)
              vtype  = v.get("version_type", "release")
              vloaders = v.get("loaders", [])
              vgvs     = v.get("game_versions", [])
              pub      = v.get("date_published", "")[:10]
              changelog = v.get("changelog") or ""

              # folder name: zero-padded index + version + loaders + mc
              loader_str = "-".join(sorted(vloaders)) or "unknown"
              mc_str     = "-".join(vgvs[:2]) + ("+" if len(vgvs) > 2 else "") if vgvs else "unknown"
              folder_name = f"{i:03d}_{vnum}_{loader_str}_{mc_str}"
              # sanitise
              folder_name = re.sub(r"[^\w.\-+]", "_", folder_name)
              vdir = versions_dir / folder_name
              vdir.mkdir(exist_ok=True)

              # version_info.txt
              vi_lines = [
                  "=== CURSEFORGE VERSION INFO ===",
                  "",
                  f"Display name:   {vname}",
                  f"Version number: {vnum}",
                  f"Release type:   {vtype}",
                  f"Loaders:        {', '.join(vloaders)}",
                  f"MC versions:    {', '.join(vgvs)}",
                  f"Published:      {pub}",
                  f"Modrinth ID:    {vid}",
                  "",
                  "--- Changelog ---",
                  changelog or "(no changelog)",
              ]
              (vdir / "version_info.txt").write_text("\n".join(vi_lines), encoding="utf-8")
              (vdir / "changelog.txt").write_text(changelog, encoding="utf-8")
              (vdir / "version.json").write_text(json.dumps(v, indent=2, ensure_ascii=False), encoding="utf-8")

              # download jar
              primary = next((f for f in v.get("files", []) if f.get("primary")), None)
              if not primary and v.get("files"):
                  primary = v["files"][0]

              jar_name = ""
              jar_size = 0
              if primary:
                  jar_name = primary["filename"]
                  ok = download(primary["url"], vdir / jar_name)
                  if ok:
                      jar_size = (vdir / jar_name).stat().st_size
                      print(f"  [{i:03d}] {vnum} {vloaders} {vgvs[:2]} → {jar_name} ({jar_size:,}B)")
                  else:
                      print(f"  [{i:03d}] {vnum} — download FAILED")
              else:
                  print(f"  [{i:03d}] {vnum} — no file")

              version_index.append({
                  "index":          i,
                  "folder":         folder_name,
                  "version_id":     vid,
                  "version_number": vnum,
                  "display_name":   vname,
                  "version_type":   vtype,
                  "loaders":        vloaders,
                  "game_versions":  vgvs,
                  "published":      pub,
                  "jar":            jar_name,
                  "jar_size":       jar_size,
                  "changelog":      changelog,
              })

          index = {
              "title":         title,
              "slug":          slug,
              "project_id":    pid,
              "description":   project.get("description", ""),
              "client_side":   project.get("client_side", ""),
              "server_side":   project.get("server_side", ""),
              "license":       lic_id,
              "categories":    cats,
              "loaders":       project.get("loaders", []),
              "game_versions": project.get("game_versions", []),
              "downloads":     project.get("downloads", 0),
              "source_url":    project.get("source_url", ""),
              "issues_url":    project.get("issues_url", ""),
              "wiki_url":      project.get("wiki_url", ""),
              "modrinth_url":  f"https://modrinth.com/mod/{slug}",
              "icon_url":      project.get("icon_url", ""),
              "versions":      version_index,
              "total_versions_on_modrinth": len(all_versions),
              "versions_in_bundle":         len(versions),
          }
          (out / "index.json").write_text(json.dumps(index, indent=2, ensure_ascii=False), encoding="utf-8")

          print(f"\nBundle ready: {len(versions)} versions, {len(version_index)} folders")
          PY

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: modrinth-curseforge-bundle
          path: .workflow_artifacts/bundle
          if-no-files-found: error

      - name: Write step summary
        if: always()
        shell: bash
        env:
          MODRINTH_URL: ${{ inputs.modrinth_url }}
        run: |
          if [ -f .workflow_artifacts/bundle/index.json ]; then
            TITLE=$(python3 -c "import json; d=json.load(open('.workflow_artifacts/bundle/index.json')); print(d.get('title','?'))")
            COUNT=$(python3 -c "import json; d=json.load(open('.workflow_artifacts/bundle/index.json')); print(d.get('versions_in_bundle',0))")
            echo "## Modrinth Bundle: $TITLE" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- Source: \`$MODRINTH_URL\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Versions in bundle: $COUNT" >> "$GITHUB_STEP_SUMMARY"
            echo "- Artifact: \`modrinth-curseforge-bundle\`" >> "$GITHUB_STEP_SUMMARY"
          fi
