name: Grep Minecraft Source Code

on:
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'Minecraft version (e.g., 1.21.5)'
        required: true
        type: string
      loader:
        description: 'Mod loader (forge, fabric, or neoforge)'
        required: true
        type: choice
        options:
          - forge
          - fabric
          - neoforge
      query:
        description: 'Search query (regex pattern, e.g. "computeIfAbsent|SavedDataType")'
        required: true
        type: string
      file_pattern:
        description: 'File pattern to search (e.g., *.java, *SavedData*.java, *DimensionDataStorage*.java)'
        required: false
        default: '*.java'
        type: string
      context_lines:
        description: 'Lines of context around matches'
        required: false
        default: '10'
        type: string

jobs:
  grep-source:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # -------------------------------------------------------
      # Determine which repo folder maps to the requested version
      # -------------------------------------------------------
      - name: Determine version folder
        id: version-folder
        run: |
          VERSION="${{ inputs.minecraft_version }}"
          LOADER="${{ inputs.loader }}"

          if [[ "$VERSION" == "1.8.9" ]]; then
            FOLDER="1.8.9"
          elif [[ "$VERSION" =~ ^1\.12 ]]; then
            FOLDER="1.12-1.12.2"
          elif [[ "$VERSION" == "1.16.5" ]]; then
            FOLDER="1.16.5"
          elif [[ "$VERSION" =~ ^1\.17 ]]; then
            FOLDER="1.17-1.17.1"
          elif [[ "$VERSION" =~ ^1\.18 ]]; then
            FOLDER="1.18-1.18.2"
          elif [[ "$VERSION" =~ ^1\.19 ]]; then
            FOLDER="1.19-1.19.4"
          elif [[ "$VERSION" =~ ^1\.20\.[0-6]$ ]] || [[ "$VERSION" == "1.20" ]]; then
            FOLDER="1.20-1.20.6"
          elif [[ "$VERSION" == "1.21" ]] || [[ "$VERSION" == "1.21.1" ]]; then
            FOLDER="1.21-1.21.1"
          elif [[ "$VERSION" =~ ^1\.21\.[2-8]$ ]]; then
            FOLDER="1.21.2-1.21.8"
          elif [[ "$VERSION" =~ ^1\.21\.(9|10|11)$ ]]; then
            FOLDER="1.21.9-1.21.11"
          else
            echo "ERROR: Unknown version: $VERSION"
            exit 1
          fi

          TEMPLATE_DIR="${FOLDER}/${LOADER}/template"
          if [ ! -d "$TEMPLATE_DIR" ]; then
            echo "ERROR: Template not found: $TEMPLATE_DIR"
            echo "Available templates:"
            ls -d ${FOLDER}/*/template 2>/dev/null || echo "  (none)"
            exit 1
          fi

          echo "folder=$FOLDER" >> $GITHUB_OUTPUT
          echo "template_dir=$TEMPLATE_DIR" >> $GITHUB_OUTPUT
          echo "Using folder: $FOLDER  template: $TEMPLATE_DIR"

      # -------------------------------------------------------
      # Cache Gradle downloads — keyed by template content so
      # a template bump invalidates the cache automatically.
      # -------------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-src-${{ runner.os }}-${{ inputs.loader }}-${{ hashFiles(format('{0}/build.gradle', steps.version-folder.outputs.template_dir), format('{0}/gradle.properties', steps.version-folder.outputs.template_dir), format('{0}/settings.gradle', steps.version-folder.outputs.template_dir)) }}
          restore-keys: |
            gradle-src-${{ runner.os }}-${{ inputs.loader }}-

      # -------------------------------------------------------
      # Copy the template into a clean workspace
      # -------------------------------------------------------
      - name: Set up template workspace
        run: |
          TEMPLATE_DIR="${{ steps.version-folder.outputs.template_dir }}"
          WORKSPACE="/tmp/mc-src-workspace"
          rm -rf "$WORKSPACE"
          cp -r "$TEMPLATE_DIR" "$WORKSPACE"
          chmod +x "$WORKSPACE/gradlew"
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV

      # -------------------------------------------------------
      # Run the Gradle task that forces Minecraft source download
      # and decompilation.
      #
      # ForgeGradle:  `genSources` decompiles Minecraft with
      #               Vineflower and writes .java files into the
      #               Gradle cache under forge_gradle/.
      #
      # NeoForge UDG: sources are downloaded as part of the
      #               dependency resolution; `dependencies` is
      #               enough to pull them.  We also try
      #               `downloadAssets` as a fallback.
      #
      # Fabric Loom:  `genSources` works the same way.
      # -------------------------------------------------------
      - name: Download and decompile Minecraft sources
        run: |
          cd "$WORKSPACE"
          LOADER="${{ inputs.loader }}"

          echo "=== Running Gradle to download/decompile Minecraft sources ==="
          echo "Loader: $LOADER"
          echo "Working dir: $(pwd)"

          # Disable configuration cache — it can interfere with first-run source gen
          GRADLE_OPTS="-Dorg.gradle.configuration-cache=false"
          export GRADLE_OPTS

          if [[ "$LOADER" == "forge" ]]; then
            # ForgeGradle: genSources downloads + decompiles Minecraft
            echo "Running: ./gradlew --no-daemon genSources"
            ./gradlew --no-daemon --stacktrace genSources 2>&1 | tee /tmp/gradle-output.log || {
              echo "genSources failed or not available, trying dependencies..."
              ./gradlew --no-daemon --stacktrace dependencies 2>&1 | tee -a /tmp/gradle-output.log || true
            }
          elif [[ "$LOADER" == "neoforge" ]]; then
            # NeoForge UserDev Gradle: sources come via dependency resolution
            echo "Running: ./gradlew --no-daemon dependencies"
            ./gradlew --no-daemon --stacktrace dependencies 2>&1 | tee /tmp/gradle-output.log || true
            # Also try genSources if it exists
            echo "Trying genSources..."
            ./gradlew --no-daemon genSources 2>&1 | tee -a /tmp/gradle-output.log || true
          elif [[ "$LOADER" == "fabric" ]]; then
            # Fabric Loom: genSources decompiles Minecraft
            echo "Running: ./gradlew --no-daemon genSources"
            ./gradlew --no-daemon --stacktrace genSources 2>&1 | tee /tmp/gradle-output.log || {
              echo "genSources failed, trying dependencies..."
              ./gradlew --no-daemon --stacktrace dependencies 2>&1 | tee -a /tmp/gradle-output.log || true
            }
          fi

          echo ""
          echo "=== Gradle run complete ==="

      # -------------------------------------------------------
      # Find where the decompiled .java files ended up
      # -------------------------------------------------------
      - name: Locate decompiled source files
        id: find-sources
        run: |
          echo "=== Searching for decompiled .java files ==="

          # Collect all candidate directories that contain .java files
          SEARCH_ROOTS=(
            "$HOME/.gradle/caches/forge_gradle"
            "$HOME/.gradle/caches/net.minecraftforge"
            "$HOME/.gradle/caches/minecraft"
            "$HOME/.gradle/caches/fabric-loom"
            "$HOME/.gradle/caches/neoforge"
            "$HOME/.gradle/caches/modules-2"
            "$HOME/.gradle/caches"
            "$WORKSPACE/.gradle"
          )

          JAVA_COUNT=0
          SOURCE_ROOT=""

          for ROOT in "${SEARCH_ROOTS[@]}"; do
            if [ -d "$ROOT" ]; then
              COUNT=$(find "$ROOT" -name "*.java" -type f 2>/dev/null | wc -l)
              if [ "$COUNT" -gt "$JAVA_COUNT" ]; then
                JAVA_COUNT=$COUNT
                SOURCE_ROOT="$ROOT"
              fi
            fi
          done

          echo "Best source root: $SOURCE_ROOT  ($JAVA_COUNT .java files)"

          if [ "$JAVA_COUNT" -eq 0 ]; then
            echo "WARNING: No .java files found in Gradle cache."
            echo "Falling back to full ~/.gradle search..."
            SOURCE_ROOT="$HOME/.gradle"
            JAVA_COUNT=$(find "$HOME/.gradle" -name "*.java" -type f 2>/dev/null | wc -l)
            echo "Full cache: $JAVA_COUNT .java files"
          fi

          # Show a sample of what we found
          echo ""
          echo "Sample .java files found:"
          find "$SOURCE_ROOT" -name "*.java" -type f 2>/dev/null | head -20 || true

          echo "source_root=$SOURCE_ROOT" >> $GITHUB_OUTPUT
          echo "java_count=$JAVA_COUNT" >> $GITHUB_OUTPUT

      # -------------------------------------------------------
      # Search the decompiled source with ripgrep
      # -------------------------------------------------------
      - name: Search source code
        run: |
          SOURCE_ROOT="${{ steps.find-sources.outputs.source_root }}"
          JAVA_COUNT="${{ steps.find-sources.outputs.java_count }}"
          QUERY="${{ inputs.query }}"
          FILE_PATTERN="${{ inputs.file_pattern }}"
          CONTEXT="${{ inputs.context_lines }}"

          mkdir -p search-results

          echo "===================================================" | tee search-results/search-info.txt
          echo "Minecraft Source Code Search" | tee -a search-results/search-info.txt
          echo "===================================================" | tee -a search-results/search-info.txt
          echo "Version  : ${{ inputs.minecraft_version }}" | tee -a search-results/search-info.txt
          echo "Loader   : ${{ inputs.loader }}" | tee -a search-results/search-info.txt
          echo "Query    : $QUERY" | tee -a search-results/search-info.txt
          echo "Pattern  : $FILE_PATTERN" | tee -a search-results/search-info.txt
          echo "Context  : $CONTEXT lines" | tee -a search-results/search-info.txt
          echo "Src root : $SOURCE_ROOT" | tee -a search-results/search-info.txt
          echo "Java files: $JAVA_COUNT" | tee -a search-results/search-info.txt
          echo "===================================================" | tee -a search-results/search-info.txt

          if [ "$JAVA_COUNT" -eq 0 ]; then
            echo "" | tee -a search-results/search-info.txt
            echo "ERROR: No .java files were found. Source decompilation may have failed." | tee -a search-results/search-info.txt
            echo "Check gradle-output.log in the artifacts for details." | tee -a search-results/search-info.txt
            cp /tmp/gradle-output.log search-results/gradle-output.log 2>/dev/null || true
            exit 1
          fi

          echo ""
          echo "Searching with ripgrep..."

          # Use ripgrep (pre-installed on GitHub runners)
          rg \
            --type java \
            --context "$CONTEXT" \
            --heading \
            --line-number \
            --color never \
            --glob "$FILE_PATTERN" \
            "$QUERY" \
            "$SOURCE_ROOT" \
            > search-results/results.txt 2>&1 || SEARCH_EXIT=$?

          if [ ! -s search-results/results.txt ]; then
            echo "No matches found for: $QUERY" | tee search-results/results.txt
            echo "" >> search-results/results.txt
            echo "Searched in: $SOURCE_ROOT" >> search-results/results.txt
            echo "" >> search-results/results.txt
            echo "Sample of available .java files:" >> search-results/results.txt
            find "$SOURCE_ROOT" -name "*.java" -type f 2>/dev/null | head -30 >> search-results/results.txt
            echo "" >> search-results/results.txt
            echo "TIP: Try a broader query or different file_pattern." >> search-results/results.txt
          fi

          # Summary stats
          MATCH_COUNT=$(grep -c "^[0-9]" search-results/results.txt 2>/dev/null || echo "0")
          FILE_COUNT=$(grep -o "^[^:]*\.java" search-results/results.txt 2>/dev/null | sort -u | wc -l || echo "0")

          {
            echo "Total line matches : $MATCH_COUNT"
            echo "Files with matches : $FILE_COUNT"
          } | tee search-results/summary.txt

          # Also save gradle log for debugging
          cp /tmp/gradle-output.log search-results/gradle-output.log 2>/dev/null || true

          echo ""
          echo "=== SEARCH RESULTS ==="
          cat search-results/results.txt

      # -------------------------------------------------------
      # Also dump the full list of .java files found so the AI
      # can browse the class tree even if the query had no hits
      # -------------------------------------------------------
      - name: List all found Java files
        run: |
          SOURCE_ROOT="${{ steps.find-sources.outputs.source_root }}"
          find "$SOURCE_ROOT" -name "*.java" -type f 2>/dev/null \
            | sed "s|$SOURCE_ROOT/||" \
            | sort \
            > search-results/all-java-files.txt || true
          echo "Total .java files: $(wc -l < search-results/all-java-files.txt)"
          echo "Sample:"
          head -50 search-results/all-java-files.txt

      - name: Upload search results
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-source-search-${{ inputs.minecraft_version }}-${{ inputs.loader }}
          path: search-results/
          retention-days: 14

      - name: Print summary
        run: |
          echo "=== SUMMARY ==="
          cat search-results/summary.txt
          echo ""
          echo "Artifact: minecraft-source-search-${{ inputs.minecraft_version }}-${{ inputs.loader }}"
          echo "Files in artifact:"
          ls -lh search-results/
