name: ModLauncherRunDiagnosis

# ---------------------------------------------------------------------------
# Takes a Modrinth project link, fetches all supported Minecraft version +
# loader combinations, finds the LATEST upload for each pair, downloads the
# jar, and launches it in a headless Minecraft client to verify the mod
# actually works at runtime.
#
# Jobs
# ----
#   setup - Parses Modrinth link, fetches versions via API, maps each
#           Modrinth game version to the nearest mc-runtime-test supported
#           version, and emits the test matrix
#   test  - Matrix job (one runner per version+loader pair), launches the mod
#           in a headless client and collects crash logs on failure
#
# Artifacts
# ---------
#   crash-<safe-key>  crash logs uploaded when a test fails
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      modrinth_link:
        description: 'Modrinth project link or slug (e.g. https://modrinth.com/mod/fabric-api or fabric-api)'
        required: true
        type: string

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Job 1 — fetch versions, map to supported test versions, build matrix
# ---------------------------------------------------------------------------
jobs:
  setup:
    name: Setup Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      matrix_count: ${{ steps.set-matrix.outputs.matrix_count }}

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch versions and build test matrix
        id: set-matrix
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_LINK: ${{ inputs.modrinth_link }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, time, urllib.error, urllib.parse, urllib.request

          API   = "https://api.modrinth.com/v2"
          TOKEN = os.environ.get("MODRINTH_TOKEN") or ""
          RAW   = os.environ.get("MODRINTH_LINK", "").strip().strip("`").strip("'").strip('"').rstrip("/")
          MAX_MATRIX = 200

          def slug_from_url(v):
              m = re.search(r"modrinth\.com/(?:mod|plugin|resourcepack|shader|datapack|modpack)/([^/?#]+)", v)
              return m.group(1) if m else v

          def headers():
              h = {"User-Agent": "ModCompilerLauncherDiagnosis/1.0", "Accept": "application/json"}
              if TOKEN:
                  h["Authorization"] = TOKEN
              return h

          def get(url_or_path, is_full_url=False):
              url = url_or_path if is_full_url else API + url_or_path
              req = urllib.request.Request(url, headers=headers())
              for attempt in range(1, 6):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode())
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          sys.exit(f"Not found: {url}")
                      if e.code in {429, 500, 502, 503, 504} and attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"HTTP {e.code} fetching {url}")
                  except urllib.error.URLError as e:
                      if attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"Network error fetching {url}: {e.reason}")
              sys.exit(f"Failed after 5 retries: {url}")

          def parse_mc_version(v):
              parts = []
              for token in re.split(r'[.\-_]', str(v).strip()):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      break
              return tuple(parts) if parts else (0,)

          def minor_key(v):
              p = parse_mc_version(v)
              if p[0] == 1 and len(p) >= 2:
                  return (1, p[1])
              return p[:2]

          def safe_artifact_key(loader, gv):
              return re.sub(r"[^A-Za-z0-9._-]+", "_", f"{loader}-{gv}").strip("_")

          ref = slug_from_url(RAW)
          print(f"Fetching project: {ref}")
          project = get(f"/project/{urllib.parse.quote(ref, safe='')}")
          pid = project.get("id")
          if not pid:
              sys.exit(f"Project has no id: {ref}")
          slug = project.get("slug", ref)
          print(f"Project: {slug} (id={pid})")

          all_versions = get(f"/project/{urllib.parse.quote(pid, safe='')}/version") or []
          print(f"Total versions on Modrinth: {len(all_versions)}")

          print("Fetching mc-runtime-test supported version data...")
          try:
              ci_data = get(
                  "https://raw.githubusercontent.com/headlesshq/mc-runtime-test/main/ci-data.json",
                  is_full_url=True,
              )
          except SystemExit:
              print("ERROR: Could not fetch mc-runtime-test ci-data.json.")
              print("This may be a temporary GitHub outage. Please retry later.")
              raise
          run_data = ci_data.get("run_data", [])
          if not run_data:
              sys.exit("ci-data.json contains no run_data — mc-runtime-test may have changed format.")

          supported = {}
          for entry in run_data:
              mc = entry.get("mc")
              ltype = entry.get("type")
              modloader = entry.get("modloader")
              regex = entry.get("regex")
              java_str = entry.get("java")
              if not all([mc, ltype, modloader, regex, java_str]):
                  continue
              try:
                  java = int(java_str)
              except (ValueError, TypeError):
                  java = 17
              supported[(mc, modloader)] = {
                  "mc": mc,
                  "modloader": modloader,
                  "mcrt_jar": ltype,
                  "regex": regex,
                  "java": java,
              }

          by_minor = {}
          for (mc, modloader), cfg in supported.items():
              key = (minor_key(mc), modloader)
              if key not in by_minor or parse_mc_version(mc) > parse_mc_version(by_minor[key]["mc"]):
                  by_minor[key] = cfg

          print(f"mc-runtime-test supports {len(supported)} (mc, loader) combos")
          print(f"  Versions: {sorted(set(mc for mc, _ in supported.keys()))}")

          def map_loader(loader):
              if loader == "quilt":
                  return "fabric"
              return loader

          def find_test_config(gv, loader):
              if (gv, loader) in supported:
                  return supported[(gv, loader)]
              mk = minor_key(gv)
              if (mk, loader) in by_minor:
                  return by_minor[(mk, loader)]
              return None

          latest_versions = {}
          skipped = []

          for version in all_versions:
              date_published = version.get("date_published", "")
              game_versions = version.get("game_versions") or []
              loaders = version.get("loaders") or []

              files = version.get("files") or []
              primary_file = next((f for f in files if f.get("primary")), None)
              if not primary_file and files:
                  primary_file = files[0]
              if not primary_file:
                  continue

              file_url = primary_file.get("url")
              file_name = primary_file.get("filename")
              if not file_url or not file_name:
                  continue

              version_number = version.get("version_number", "unknown")

              for gv in game_versions:
                  if not isinstance(gv, str) or not gv.strip():
                      continue
                  gv = gv.strip()
                  for loader in loaders:
                      if not isinstance(loader, str) or not loader.strip():
                          continue
                      loader = loader.strip()
                      test_loader = map_loader(loader)
                      if test_loader not in ("fabric", "forge", "neoforge"):
                          skipped.append((gv, loader, "unsupported loader"))
                          continue

                      test_config = find_test_config(gv, test_loader)
                      if test_config is None:
                          skipped.append((gv, test_loader, "no mc-runtime-test support"))
                          continue

                      key = (gv, test_loader)
                      current = latest_versions.get(key)
                      if current is None or date_published > current["date_published"]:
                          latest_versions[key] = {
                              "game_version": gv,
                              "test_mc": test_config["mc"],
                              "loader": test_config["modloader"],
                              "original_loader": loader,
                              "file_url": file_url,
                              "file_name": file_name,
                              "version_number": version_number,
                              "date_published": date_published,
                              "java_version": test_config["java"],
                              "loader_regex": test_config["regex"],
                              "mcrt_jar": test_config["mcrt_jar"],
                              "safe_key": safe_artifact_key(loader, gv),
                          }

          matrix_entries = list(latest_versions.values())
          matrix_entries.sort(key=lambda e: (e["game_version"], e["loader"]))

          if len(matrix_entries) > MAX_MATRIX:
              print(f"WARNING: {len(matrix_entries)} entries exceeds cap of {MAX_MATRIX}. Truncating to latest {MAX_MATRIX}.")
              matrix_entries = matrix_entries[:MAX_MATRIX]

          print(f"\nGenerated {len(matrix_entries)} test entries:")
          for entry in matrix_entries:
              mapped = "" if entry["game_version"] == entry["test_mc"] else f" (tested on {entry['test_mc']})"
              print(f"  {entry['original_loader']:>8}  MC {entry['game_version']:<12} -> {entry['test_mc']}{mapped}  Java {entry['java_version']}  ({entry['version_number']})")

          if skipped:
              unique_skipped = sorted(set(skipped))
              print(f"\nSkipped {len(unique_skipped)} (version, loader) pairs:")
              for gv, loader, reason in unique_skipped:
                  print(f"    {loader} {gv}: {reason}")

          if not matrix_entries:
              print("\nNo testable versions found. The mod may not support any mc-runtime-test compatible version/loader.")

          matrix = json.dumps({"include": matrix_entries})
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
              f.write(f"matrix_count={len(matrix_entries)}\n")
          PYEOF

# ---------------------------------------------------------------------------
# Job 2 — test each version+loader pair in a headless Minecraft client
# ---------------------------------------------------------------------------
  test:
    name: Test ${{ matrix.original_loader }} ${{ matrix.game_version }}
    needs: setup
    if: ${{ needs.setup.outputs.matrix_count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Install Java ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: 'temurin'

      - name: Download Mod Jar
        env:
          MOD_FILE_URL: ${{ matrix.file_url }}
          MOD_FILE_NAME: ${{ matrix.file_name }}
        run: |
          mkdir -p run/mods
          echo "Downloading $MOD_FILE_NAME ..."
          for attempt in 1 2 3; do
            if curl -fsSL --retry 3 --retry-delay 5 "$MOD_FILE_URL" -o "run/mods/$MOD_FILE_NAME"; then
              break
            fi
            echo "Download attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          if [ ! -f "run/mods/$MOD_FILE_NAME" ]; then
            echo "ERROR: Mod jar was not downloaded"
            exit 1
          fi
          if [ ! -s "run/mods/$MOD_FILE_NAME" ]; then
            echo "ERROR: Mod jar is empty (0 bytes)"
            rm -f "run/mods/$MOD_FILE_NAME"
            exit 1
          fi
          SIZE=$(stat -c%s "run/mods/$MOD_FILE_NAME" 2>/dev/null || echo "?")
          echo "Downloaded: $MOD_FILE_NAME ($SIZE bytes)"

      - name: Start crash watcher
        run: |
          cat > /tmp/crash-watcher.sh << 'WATCHER'
          #!/bin/bash
          CRASH_DIR="run/crash-reports"
          MAX_WAIT=1200
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if ls $CRASH_DIR/crash-*.txt 2>/dev/null || ls run/hs_err_pid*.log 2>/dev/null; then
              echo "CRASH WATCHER: Crash detected! Waiting 5s for report to finish writing..."
              sleep 5
              echo "CRASH WATCHER: Killing Java processes..."
              pkill -f 'headlessmc-launcher' 2>/dev/null || true
              pkill -f 'net.minecraft' 2>/dev/null || true
              pkill -f 'net.neoforged' 2>/dev/null || true
              pkill -f 'cpw.mods' 2>/dev/null || true
              pkill -f 'Xvfb' 2>/dev/null || true
              sleep 2
              pkill -9 -f 'java' 2>/dev/null || true
              echo "CRASH WATCHER: Processes killed."
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "CRASH WATCHER: Timeout reached ($MAX_WAIT s), no crash detected."
          WATCHER
          chmod +x /tmp/crash-watcher.sh
          nohup bash /tmp/crash-watcher.sh > /tmp/crash-watcher.log 2>&1 &
          echo "Crash watcher started (PID $!)"

      - name: Launch Headless Minecraft Client
        id: mc-test
        uses: headlesshq/mc-runtime-test@4.4.0
        with:
          mc: ${{ matrix.test_mc }}
          modloader: ${{ matrix.loader }}
          regex: ${{ matrix.loader_regex }}
          java: ${{ matrix.java_version }}
          mc-runtime-test: ${{ matrix.mcrt_jar }}
          dummy-assets: true
          xvfb: true
          cache-mc: github

      - name: Stop crash watcher
        if: always()
        run: |
          pkill -f 'crash-watcher.sh' 2>/dev/null || true
          if [ -f /tmp/crash-watcher.log ]; then
            echo "=== Crash watcher log ==="
            cat /tmp/crash-watcher.log
          fi

      - name: Mark test as passed
        if: success()
        run: |
          echo "SUCCESS: Mod launched correctly for ${{ matrix.original_loader }} on Minecraft ${{ matrix.game_version }} (tested on ${{ matrix.test_mc }})"

      - name: Collect crash logs
        if: failure()
        continue-on-error: true
        run: |
          echo "Game crashed! Collecting diagnostic logs..."
          mkdir -p crash-logs

          if [ -d run/crash-reports ]; then
            cp -r run/crash-reports crash-logs/ 2>/dev/null || true
            echo "  Collected crash-reports/"
          fi

          if [ -d run/logs ]; then
            cp -r run/logs crash-logs/ 2>/dev/null || true
            echo "  Collected logs/"
          fi

          if [ -f run/latest.log ]; then
            cp run/latest.log crash-logs/ 2>/dev/null || true
            echo "  Collected latest.log"
          fi

          for f in run/hs_err_pid*.log; do
            if [ -f "$f" ]; then
              cp "$f" crash-logs/ 2>/dev/null || true
              echo "  Collected JVM crash log: $(basename "$f")"
            fi
          done

          if [ -f run/options.txt ]; then
            cp run/options.txt crash-logs/ 2>/dev/null || true
          fi

          echo ""
          echo "=== Crash log summary ==="
          echo ""
          find crash-logs -type f 2>/dev/null | head -20 | while read -r f; do
            echo "--- $f ---"
            head -50 "$f" 2>/dev/null || true
            echo ""
          done

      - name: Upload crash logs
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.safe_key }}
          path: crash-logs/
          if-no-files-found: warn
