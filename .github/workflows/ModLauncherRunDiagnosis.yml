name: ModLauncherRunDiagnosis

on:
  workflow_dispatch:
    inputs:
      modrinth_link:
        description: 'Modrinth project link or slug (e.g. https://modrinth.com/mod/fabric-api or fabric-api)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  setup:
    name: Setup Test Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_count: ${{ steps.set-matrix.outputs.matrix_count }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch versions and build test matrix
        id: set-matrix
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_LINK: ${{ inputs.modrinth_link }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, time, urllib.error, urllib.parse, urllib.request

          API   = "https://api.modrinth.com/v2"
          TOKEN = os.environ.get("MODRINTH_TOKEN") or ""
          RAW   = os.environ.get("MODRINTH_LINK", "").strip().strip("`").strip("'").strip('"').rstrip("/")
          MAX_MATRIX = 200

          def slug_from_url(v):
              m = re.search(r"modrinth\.com/(?:mod|plugin|resourcepack|shader|datapack|modpack)/([^/?#]+)", v)
              return m.group(1) if m else v

          def headers():
              h = {"User-Agent": "ModCompilerLauncherDiagnosis/1.0", "Accept": "application/json"}
              if TOKEN:
                  h["Authorization"] = TOKEN
              return h

          def get(url_or_path, is_full_url=False):
              url = url_or_path if is_full_url else API + url_or_path
              req = urllib.request.Request(url, headers=headers())
              for attempt in range(1, 6):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode())
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          sys.exit(f"Not found: {url}")
                      if e.code in {429, 500, 502, 503, 504} and attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"HTTP {e.code} fetching {url}")
                  except urllib.error.URLError as e:
                      if attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"Network error fetching {url}: {e.reason}")
              sys.exit(f"Failed after 5 retries: {url}")

          def parse_mc_version(v):
              parts = []
              for token in re.split(r'[.\-_]', str(v).strip()):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      break
              return tuple(parts) if parts else (0,)

          def minor_key(v):
              p = parse_mc_version(v)
              if p[0] == 1 and len(p) >= 2:
                  return (1, p[1])
              return p[:2]

          def safe_artifact_key(loader, gv):
              return re.sub(r"[^A-Za-z0-9._-]+", "_", f"{loader}-{gv}").strip("_")

          ref = slug_from_url(RAW)
          print(f"Fetching project: {ref}")
          project = get(f"/project/{urllib.parse.quote(ref, safe='')}")
          pid = project.get("id")
          if not pid:
              sys.exit(f"Project has no id: {ref}")
          slug = project.get("slug", ref)
          print(f"Project: {slug} (id={pid})")

          all_versions = get(f"/project/{urllib.parse.quote(pid, safe='')}/version") or []
          print(f"Total versions on Modrinth: {len(all_versions)}")

          print("Fetching mc-runtime-test supported version data...")
          try:
              ci_data = get(
                  "https://raw.githubusercontent.com/headlesshq/mc-runtime-test/main/ci-data.json",
                  is_full_url=True,
              )
          except SystemExit:
              print("ERROR: Could not fetch mc-runtime-test ci-data.json.")
              print("This may be a temporary GitHub outage. Please retry later.")
              raise
          run_data = ci_data.get("run_data", [])
          if not run_data:
              sys.exit("ci-data.json contains no run_data — mc-runtime-test may have changed format.")

          supported = {}
          for entry in run_data:
              mc = entry.get("mc")
              ltype = entry.get("type")
              modloader = entry.get("modloader")
              regex = entry.get("regex")
              java_str = entry.get("java")
              if not all([mc, ltype, modloader, regex, java_str]):
                  continue
              try:
                  java = int(java_str)
              except (ValueError, TypeError):
                  java = 17
              supported[(mc, modloader)] = {
                  "mc": mc,
                  "modloader": modloader,
                  "mcrt_jar": ltype,
                  "regex": regex,
                  "java": java,
              }

          by_minor = {}
          for (mc, modloader), cfg in supported.items():
              key = (minor_key(mc), modloader)
              if key not in by_minor or parse_mc_version(mc) > parse_mc_version(by_minor[key]["mc"]):
                  by_minor[key] = cfg

          print(f"mc-runtime-test supports {len(supported)} (mc, loader) combos")
          print(f"  Versions: {sorted(set(mc for mc, _ in supported.keys()))}")

          def map_loader(loader):
              if loader == "quilt":
                  return "fabric"
              return loader

          def find_test_config(gv, loader):
              if (gv, loader) in supported:
                  return supported[(gv, loader)]
              mk = minor_key(gv)
              if (mk, loader) in by_minor:
                  return by_minor[(mk, loader)]
              return None

          latest_versions = {}
          skipped = []

          for version in all_versions:
              date_published = version.get("date_published", "")
              game_versions = version.get("game_versions") or []
              loaders = version.get("loaders") or []

              files = version.get("files") or []
              primary_file = next((f for f in files if f.get("primary")), None)
              if not primary_file and files:
                  primary_file = files[0]
              if not primary_file:
                  continue

              file_url = primary_file.get("url")
              file_name = primary_file.get("filename")
              if not file_url or not file_name:
                  continue

              version_number = version.get("version_number", "unknown")

              for gv in game_versions:
                  if not isinstance(gv, str) or not gv.strip():
                      continue
                  gv = gv.strip()
                  for loader in loaders:
                      if not isinstance(loader, str) or not loader.strip():
                          continue
                      loader = loader.strip()
                      test_loader = map_loader(loader)
                      if test_loader not in ("fabric", "forge", "neoforge"):
                          skipped.append((gv, loader, "unsupported loader"))
                          continue

                      test_config = find_test_config(gv, test_loader)
                      if test_config is None:
                          skipped.append((gv, test_loader, "no mc-runtime-test support"))
                          continue

                      key = (gv, test_loader)
                      current = latest_versions.get(key)
                      if current is None or date_published > current["date_published"]:
                          latest_versions[key] = {
                              "game_version": gv,
                              "test_mc": test_config["mc"],
                              "loader": test_config["modloader"],
                              "original_loader": loader,
                              "file_url": file_url,
                              "file_name": file_name,
                              "version_number": version_number,
                              "date_published": date_published,
                              "java_version": test_config["java"],
                              "loader_regex": test_config["regex"],
                              "mcrt_jar": test_config["mcrt_jar"],
                              "safe_key": safe_artifact_key(loader, gv),
                          }

          matrix_entries = list(latest_versions.values())
          matrix_entries.sort(key=lambda e: (e["game_version"], e["loader"]))

          if len(matrix_entries) > MAX_MATRIX:
              print(f"WARNING: {len(matrix_entries)} entries exceeds cap of {MAX_MATRIX}. Truncating to latest {MAX_MATRIX}.")
              matrix_entries = matrix_entries[:MAX_MATRIX]

          print(f"\nGenerated {len(matrix_entries)} test entries:")
          for entry in matrix_entries:
              mapped = "" if entry["game_version"] == entry["test_mc"] else f" (tested on {entry['test_mc']})"
              print(f"  {entry['original_loader']:>8}  MC {entry['game_version']:<12} -> {entry['test_mc']}{mapped}  Java {entry['java_version']}  ({entry['version_number']})")

          if skipped:
              unique_skipped = sorted(set(skipped))
              print(f"\nSkipped {len(unique_skipped)} (version, loader) pairs:")
              for gv, loader, reason in unique_skipped:
                  print(f"    {loader} {gv}: {reason}")

          if not matrix_entries:
              print("\nNo testable versions found. The mod may not support any mc-runtime-test compatible version/loader.")

          matrix = json.dumps({"include": matrix_entries})
          Path("launcher-matrix.json").write_text(matrix, encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix_count={len(matrix_entries)}\n")
          PYEOF

      - uses: actions/upload-artifact@v4
        with:
          name: launcher-matrix
          path: launcher-matrix.json
          if-no-files-found: warn

  test:
    name: Launcher Tests
    needs: setup
    if: ${{ needs.setup.outputs.matrix_count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21
            25

      - name: Download matrix data
        uses: actions/download-artifact@v4
        with:
          name: launcher-matrix

      - name: Cache Minecraft
        uses: actions/cache@v4
        with:
          path: /home/runner/.minecraft
          key: mc-runtime-test-combined-${{ github.run_id }}
          restore-keys: |
            mc-runtime-test-combined-

      - name: Download HeadlessMC launcher
        uses: robinraju/release-downloader@a96f54c1b5f5e09e47d9504526e96febd949d4c2
        with:
          repository: 3arthqu4ke/headlessmc
          tag: "2.9.0"
          fileName: headlessmc-launcher-wrapper-2.9.0.jar

      - name: Install xvfb dependencies
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y x11-xserver-utils

      - name: Run launcher tests sequentially
        id: run-tests
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, shutil, re, time, urllib.request, zipfile
          from pathlib import Path
          exec(compile(open("scripts/launcher_test_lib.py").read(), "scripts/launcher_test_lib.py", "exec"))

          MATRIX_FILE = "launcher-matrix.json"
          RESULTS_DIR = Path("launcher-results")
          CRASH_DIR = Path("crash-logs")
          HMC_JAR = "headlessmc-launcher-2.9.0.jar"
          FABRIC_INSTALLER_URL = "https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.1.1/fabric-installer-1.1.1.jar"
          FABRIC_INSTALLER_JAR = "fabric-installer-1.1.1.jar"
          MCRT_VERSION = "4.4.0"
          MCRT_REPO = "headlesshq/mc-runtime-test"
          TEST_TIMEOUT = 600

          RESULTS_DIR.mkdir(parents=True, exist_ok=True)
          CRASH_DIR.mkdir(parents=True, exist_ok=True)

          _mcrt_release = None
          def get_mcrt_release():
              global _mcrt_release
              if _mcrt_release is not None:
                  return _mcrt_release
              url = f"https://api.github.com/repos/{MCRT_REPO}/releases/tags/{MCRT_VERSION}"
              req = urllib.request.Request(url, headers={"User-Agent": "ModCompiler/1.0"})
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      _mcrt_release = json.loads(r.read().decode())
              except Exception as e:
                  print(f"  WARNING: Could not fetch mc-runtime-test release: {e}")
                  _mcrt_release = {}
              return _mcrt_release

          def find_java_home(version):
              tc = Path("/opt/hostedtoolcache/Java_Temurin-Hotspot_jdk")
              if tc.exists():
                  for d in sorted(tc.iterdir(), reverse=True):
                      if d.is_dir() and d.name.split('.')[0] == str(version):
                          if (d / "x64" / "bin" / "java").exists():
                              return str(d / "x64")
              return os.environ.get("JAVA_HOME", "")

          def download_mcrt_jar(mc_version, loader_type):
              mods_dir = Path("run/mods")
              mods_dir.mkdir(parents=True, exist_ok=True)
              pat = f"mc-runtime-test-{mc_version}-*-{loader_type}-release.jar"
              existing = list(mods_dir.glob(pat))
              if existing:
                  return existing[0].name
              release = get_mcrt_release()
              for asset in release.get("assets", []):
                  name = asset.get("name", "")
                  if re.match(f"mc-runtime-test-{re.escape(mc_version)}-.*-{re.escape(loader_type)}-release\\.jar$", name):
                      dl_url = asset.get("browser_download_url", "")
                      if not dl_url:
                          continue
                      try:
                          urllib.request.urlretrieve(dl_url, str(mods_dir / name))
                          print(f"  Downloaded mc-runtime-test: {name}")
                          return name
                      except Exception as e:
                          print(f"  WARNING: Download failed for {name}: {e}")
                          return None
              print(f"  WARNING: No mc-runtime-test jar for {mc_version}/{loader_type}")
              return None

          def cleanup_processes():
              for pat in ["crash-watcher.sh", "headlessmc-launcher", "Xvfb"]:
                  subprocess.run(["pkill", "-f", pat], capture_output=True)
              time.sleep(1)
              subprocess.run(["pkill", "-9", "-f", "java"], capture_output=True)
              time.sleep(1)

          def run_test(entry, index, total):
              gv = entry["game_version"]
              loader = entry["loader"]
              test_mc = entry["test_mc"]
              java_ver = entry["java_version"]
              file_url = entry["file_url"]
              file_name = entry["file_name"]
              loader_regex = entry["loader_regex"]
              mcrt_jar_type = entry["mcrt_jar"]
              safe_key = entry["safe_key"]
              original_loader = entry.get("original_loader", loader)
              version_number = entry.get("version_number", "")

              print(f"::group::Test {index+1}/{total}: {original_loader} MC {gv} (tested on {test_mc})")

              result = {
                  "status": "launcher_failed",
                  "game_version": gv,
                  "loader": original_loader,
                  "test_mc": test_mc,
                  "version_number": version_number,
                  "crash_summary": "",
              }

              try:
                  cleanup_processes()

                  java_home = find_java_home(java_ver)
                  os.environ["JAVA_HOME"] = java_home

                  run_dir = Path("run")
                  if run_dir.exists():
                      shutil.rmtree(run_dir)
                  run_dir.mkdir()
                  (run_dir / "mods").mkdir()

                  hmc_dir = Path("HeadlessMC")
                  hmc_dir.mkdir(exist_ok=True)
                  (hmc_dir / "config.properties").write_text(
                      f"hmc.java.versions={java_home}/bin/java\n"
                      f"hmc.gamedir={Path.cwd()}/run\n"
                      f"hmc.offline=true\n"
                      f"hmc.rethrow.launch.exceptions=true\n"
                      f"hmc.exit.on.failed.command=true\n"
                      f"hmc.assets.dummy=true\n"
                  )

                  (run_dir / "options.txt").write_text("onboardAccessibility:false\npauseOnLostFocus:false\n")

                  print(f"  Downloading {file_name}...")
                  for attempt in range(3):
                      r = subprocess.run(
                          ["curl", "-fsSL", "--retry", "3", "--retry-delay", "5",
                           file_url, "-o", f"run/mods/{file_name}"],
                          capture_output=True, text=True, timeout=120
                      )
                      if r.returncode == 0:
                          break
                      time.sleep(5)

                  if not (run_dir / "mods" / file_name).exists():
                      result["crash_summary"] = f"Failed to download: {file_name}"
                      print(f"  FAILED: Could not download {file_name}")
                      print("::endgroup::")
                      return result

                  # Resolve mod dependencies (fabric-api, etc.)
                  unresolved = resolve_dependencies(run_dir / "mods", test_mc, loader)
                  if unresolved:
                      result["status"] = "dep_unresolved"
                      result["crash_summary"] = f"Unresolved dependencies: {', '.join(unresolved)}"
                      print(f"  FAILED: Unresolved dependencies: {unresolved}")
                      print("::endgroup::")
                      return result

                  # Patch fabric.mod.json if test_mc != game_version
                  if loader == "fabric" and test_mc != gv:
                      patch_fabric_mc_version(run_dir / "mods" / file_name, gv, test_mc)

                  mc_json = Path(os.path.expanduser("~/.minecraft/versions")) / test_mc / f"{test_mc}.json"
                  if not mc_json.exists():
                      print(f"  Downloading Minecraft {test_mc}...")
                      subprocess.run(
                          ["java", "-jar", HMC_JAR, "--command", "download", test_mc],
                          capture_output=True, text=True, timeout=300
                      )

                  # Install modloader
                  install_result = None
                  if loader == "fabric":
                      if not Path(FABRIC_INSTALLER_JAR).exists():
                          print(f"  Downloading Fabric installer...")
                          urllib.request.urlretrieve(FABRIC_INSTALLER_URL, FABRIC_INSTALLER_JAR)
                      minecraft_dir = os.path.expanduser("~/.minecraft")
                      print(f"  Installing Fabric for {test_mc} via Fabric Installer...")
                      install_result = subprocess.run(
                          ["java", "-jar", FABRIC_INSTALLER_JAR, "client",
                           "-dir", minecraft_dir,
                           "-mcversion", test_mc,
                           "-noprofile"],
                          capture_output=True, text=True, timeout=300
                      )
                  else:
                      print(f"  Installing {loader} for {test_mc} (Java {java_ver})...")
                      install_result = subprocess.run(
                          ["java", "-jar", HMC_JAR, "--command", loader, test_mc, "--java", str(java_ver)],
                          capture_output=True, text=True, timeout=600
                      )
                      install_stderr = (install_result.stderr or "")[:500]
                      install_stdout = (install_result.stdout or "")[:500]
                      if install_result.returncode != 0:
                          print(f"  WARNING: {loader} install for {test_mc} returned code {install_result.returncode}")
                      if install_stderr:
                          print(f"  Install stderr: {install_stderr}")
                      if install_stdout:
                          print(f"  Install stdout: {install_stdout}")
                      # Debug: list version directories after install
                      vdir = Path(os.path.expanduser("~/.minecraft/versions"))
                      if vdir.exists():
                          matching = [d.name for d in vdir.iterdir() if loader.replace("neo","neo") in d.name.lower() and test_mc in d.name]
                          print(f"  Install check: found {len(matching)} {loader} dirs matching {test_mc}: {matching[:5]}")

                  # Verify installation
                  if loader == "fabric":
                      versions_dir = Path(os.path.expanduser("~/.minecraft/versions"))
                      fabric_dirs = list(versions_dir.glob(f"fabric-loader-*-{test_mc}"))
                      if not fabric_dirs:
                          result["status"] = "not_tested"
                          reason = f"No Fabric installation found for {test_mc}"
                          if install_result and install_result.returncode != 0:
                              reason += f" (installer failed with code {install_result.returncode})"
                          result["crash_summary"] = reason
                          result["launch_stderr"] = (install_result.stderr or "")[:2000] if install_result else ""
                          print(f"  SKIPPED: {reason}")
                          print("::endgroup::")
                          return result
                      else:
                          version_id = fabric_dirs[0].name
                          print(f"  Fabric installed: {version_id}")
                  else:
                      # Check forge/neoforge installation via filesystem (HeadlessMC install can be async)
                      versions_dir = Path(os.path.expanduser("~/.minecraft/versions"))
                      loader_pattern = "forge" if loader == "forge" else "neoforge"
                      version_id = None
                      nf_version = None
                      poll_waited = 0
                      poll_interval = 10
                      while poll_waited < 300:
                          if versions_dir.exists():
                              loader_dirs = [
                                  d for d in versions_dir.iterdir()
                                  if d.is_dir() and loader_pattern in d.name.lower() and test_mc in d.name
                              ]
                              if loader_dirs:
                                  version_id = loader_dirs[0].name
                                  print(f"  {loader} installed: {version_id} (after {poll_waited}s)")
                                  break
                          time.sleep(poll_interval)
                          poll_waited += poll_interval

                      # Fallback for NeoForge: run the official installer directly
                      if not version_id and loader == "neoforge":
                          nf_version = resolve_neoforge_version(test_mc, install_stdout)
                          if nf_version:
                              print(f"  NeoForge version resolved: {nf_version}")
                              nf_code, nf_out, nf_err = install_neoforge_direct(test_mc, nf_version)
                              print(f"  NeoForge direct installer exit code: {nf_code}")
                              if nf_out:
                                  print(f"  NeoForge installer stdout: {nf_out[:1000]}")
                              if nf_err:
                                  print(f"  NeoForge installer stderr: {nf_err[:1000]}")
                              # Poll again, matching either MC version or NeoForge version
                              poll_waited = 0
                              while poll_waited < 300:
                                  if versions_dir.exists():
                                      loader_dirs = [
                                          d for d in versions_dir.iterdir()
                                          if d.is_dir() and loader_pattern in d.name.lower()
                                          and (test_mc in d.name or (nf_version and nf_version in d.name))
                                      ]
                                      if loader_dirs:
                                          version_id = loader_dirs[0].name
                                          print(f"  {loader} installed via direct installer: {version_id} (after {poll_waited}s)")
                                          break
                                  time.sleep(poll_interval)
                                  poll_waited += poll_interval

                      if not version_id:
                          # Fallback: try hmc list command
                          list_result = subprocess.run(
                              ["java", "-jar", HMC_JAR, "--command", "list", loader_regex],
                              capture_output=True, text=True, timeout=30
                          )
                          list_output = (list_result.stdout or "").strip()
                          if not list_output or "Couldn't find" in list_output or "No" in list_output:
                              result["status"] = "not_tested"
                              reason = f"No {loader} installation found for {test_mc}"
                              if install_result and install_result.returncode != 0:
                                  reason += f" (install failed with code {install_result.returncode})"
                              result["crash_summary"] = reason
                              result["launch_stderr"] = (install_result.stderr or "")[:2000] if install_result else ""
                              print(f"  SKIPPED: {reason}")
                              print("::endgroup::")
                              return result
                          else:
                              version_id = list_output.split("\n")[0].strip()
                              print(f"  {loader} installed (via hmc list): {version_id}")

                  mcrt_name = download_mcrt_jar(test_mc, mcrt_jar_type)
                  if not mcrt_name:
                      result["crash_summary"] = f"No mc-runtime-test jar for {test_mc}/{mcrt_jar_type}"
                      print(f"  FAILED: No mc-runtime-test jar available")
                      print("::endgroup::")
                      return result

                  watcher_script = (
                      '#!/bin/bash\n'
                      'CRASH_DIR="run/crash-reports"\n'
                      'MAX_WAIT=1200\n'
                      'ELAPSED=0\n'
                      'while [ $ELAPSED -lt $MAX_WAIT ]; do\n'
                      '  if ls $CRASH_DIR/crash-*.txt 2>/dev/null || ls run/hs_err_pid*.log 2>/dev/null; then\n'
                      '    echo "CRASH WATCHER: Crash detected!"\n'
                      '    sleep 5\n'
                      '    pkill -f \'headlessmc-launcher\' 2>/dev/null || true\n'
                      '    pkill -f \'net.minecraft\' 2>/dev/null || true\n'
                      '    pkill -f \'net.neoforged\' 2>/dev/null || true\n'
                      '    pkill -f \'cpw.mods\' 2>/dev/null || true\n'
                      '    pkill -f \'Xvfb\' 2>/dev/null || true\n'
                      '    sleep 2\n'
                      '    pkill -9 -f \'java\' 2>/dev/null || true\n'
                      '    echo "CRASH WATCHER: Processes killed."\n'
                      '    exit 0\n'
                      '  fi\n'
                      '  sleep 5\n'
                      '  ELAPSED=$((ELAPSED + 5))\n'
                      'done\n'
                      'echo "CRASH WATCHER: Timeout"\n'
                  )
                  Path("/tmp/crash-watcher.sh").write_text(watcher_script)
                  os.chmod("/tmp/crash-watcher.sh", 0o755)
                  watcher_proc = subprocess.Popen(
                      ["bash", "/tmp/crash-watcher.sh"],
                      stdout=subprocess.PIPE, stderr=subprocess.PIPE
                  )

                  print(f"  Launching Minecraft {test_mc} with {loader}...")
                  try:
                      launch_result = subprocess.run(
                          ["xvfb-run", "java", "-Dhmc.check.xvfb=true",
                           "-jar", HMC_JAR, "--command", "launch", loader_regex, "-regex",
                           "--jvm", "-Djava.awt.headless=true"],
                          capture_output=True, text=True, timeout=TEST_TIMEOUT
                      )
                      exit_code = launch_result.returncode
                  except subprocess.TimeoutExpired:
                      exit_code = -1
                      print(f"  TIMEOUT: Test exceeded {TEST_TIMEOUT}s")

                  subprocess.run(["pkill", "-f", "crash-watcher.sh"], capture_output=True)
                  try:
                      watcher_proc.wait(timeout=5)
                  except subprocess.TimeoutExpired:
                      watcher_proc.kill()

                  crash_reports = list(Path("run/crash-reports").glob("crash-*.txt")) if Path("run/crash-reports").exists() else []
                  hs_err = list(Path("run").glob("hs_err_pid*.log"))

                  if crash_reports or hs_err or exit_code != 0:
                      result["status"] = "launcher_failed"
                      if crash_reports:
                          result["crash_summary"] = crash_reports[0].read_text(encoding="utf-8", errors="replace")[:500]
                      elif hs_err:
                          result["crash_summary"] = hs_err[0].read_text(encoding="utf-8", errors="replace")[:500]
                      else:
                          result["crash_summary"] = f"Exit code: {exit_code}"

                      cdir = CRASH_DIR / safe_key
                      cdir.mkdir(parents=True, exist_ok=True)
                      if Path("run/crash-reports").exists():
                          shutil.copytree("run/crash-reports", cdir / "crash-reports", dirs_exist_ok=True)
                      if Path("run/logs").exists():
                          shutil.copytree("run/logs", cdir / "logs", dirs_exist_ok=True)
                      for f in Path("run").glob("hs_err_pid*.log"):
                          shutil.copy2(str(f), str(cdir / f.name))
                      if Path("run/latest.log").exists():
                          shutil.copy2("run/latest.log", str(cdir / "latest.log"))

                      print(f"  FAILED: Game crashed (exit code {exit_code})")
                  else:
                      result["status"] = "passed"
                      print(f"  PASSED")

              except Exception as e:
                  result["crash_summary"] = str(e)[:500]
                  print(f"  ERROR: {e}")

              cleanup_processes()
              print("::endgroup::")
              return result

          matrix_data = json.loads(Path(MATRIX_FILE).read_text(encoding="utf-8"))
          entries = matrix_data.get("include", [])

          if not entries:
              print("No entries to test")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("total=0\npassed=0\nfailed=0\n")
              sys.exit(0)

          print(f"Will test {len(entries)} versions sequentially\n")

          passed = 0
          failed = 0

          for i, entry in enumerate(entries):
              result = run_test(entry, i, len(entries))
              safe_key = entry["safe_key"]
              rdir = RESULTS_DIR / safe_key
              rdir.mkdir(parents=True, exist_ok=True)
              (rdir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
              if result["status"] == "passed":
                  passed += 1
              else:
                  failed += 1

          print(f"\n{'='*60}")
          print(f"SUMMARY: {passed} passed, {failed} failed out of {len(entries)} tests")
          print(f"{'='*60}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"total={len(entries)}\n")
              f.write(f"passed={passed}\n")
              f.write(f"failed={failed}\n")
          PYEOF

      - name: Upload launcher results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launcher-results
          path: launcher-results/

      - name: Upload crash logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crash-logs
          path: crash-logs/
          if-no-files-found: ignore

      - name: Write step summary
        if: always()
        shell: bash
        run: |
          echo "## Launcher Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | ${{ steps.run-tests.outputs.passed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | ${{ steps.run-tests.outputs.failed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Total  | ${{ steps.run-tests.outputs.total }} |" >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any test failed
        if: always() && steps.run-tests.outputs.failed != '0' && steps.run-tests.outputs.failed != ''
        shell: bash
        run: |
          echo "Launcher tests failed: ${{ steps.run-tests.outputs.failed }} out of ${{ steps.run-tests.outputs.total }}"
          exit 1
