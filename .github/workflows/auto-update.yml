name: Auto Update Mod

on:
  workflow_dispatch:
    inputs:
      mod_jar_path:
        description: Repo-relative path to mod jar (e.g., "To Be Decompiled/my-mod.jar")
        required: true
        type: string
      modrinth_project_url:
        description: Optional Modrinth project URL or slug
        required: false
        default: ""
        type: string
      mod_description:
        description: "Mod description: either a file path (e.g., info.txt) or direct text"
        required: false
        default: ""
        type: string
      version_range:
        description: "Version range to update (e.g., 1.20-1.21.8, 1.20.1fabric,1.21neoforge, or all)"
        required: false
        default: "all"
        type: string
      update_mode:
        description: Update mode
        required: true
        default: "all-versions"
        type: choice
        options:
          - "all-versions"
          - "missing-only"
      publish_mode:
        description: Publish mode (if modrinth project provided)
        required: true
        default: "bundle-only"
        type: choice
        options:
          - "immediately"
          - "bundle-only"
      resume_from:
        description: Resume from previous run (provide previous run ID or leave blank for fresh start)
        required: false
        default: ""
        type: string

jobs:
  decompose:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.decompose.outputs.matrix }}
      state_json: ${{ steps.decompose.outputs.state_json }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: decompose
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          VERSION_RANGE: ${{ inputs.version_range }}
          UPDATE_MODE: ${{ inputs.update_mode }}
          PUBLISH_MODE: ${{ inputs.publish_mode }}
          MOD_DESCRIPTION: ${{ inputs.mod_description }}
          MOD_JAR_PATH: ${{ inputs.mod_jar_path }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          mkdir -p .workflow_state/decomposed
          
          python build_mods.py auto-update-decompose \
            --mod-jar-path "$MOD_JAR_PATH" \
            --modrinth-project-url "$MODRINTH_PROJECT_URL" \
            --mod-description "$MOD_DESCRIPTION" \
            --version-range "$VERSION_RANGE" \
            --update-mode "$UPDATE_MODE" \
            --publish-mode "$PUBLISH_MODE" \
            --manifest version-manifest.json \
            --output-dir .workflow_state/decomposed
          
          python - <<'PY'
          import json
          from pathlib import Path
          
          matrix = json.loads(Path(".workflow_state/decomposed/matrix.json").read_text(encoding="utf-8"))
          state = json.loads(Path(".workflow_state/decomposed/state.json").read_text(encoding="utf-8"))
          
          count = len(matrix.get("include", []))
          print(f"Generated {count} version targets")
          
          import base64
          state_b64 = base64.b64encode(json.dumps(state).encode()).decode()
          Path(".workflow_state/decompose_state.txt").write_text(state_b64, encoding="utf-8")
          PY
          
          printf 'matrix=%s\n' "$(tr -d '\n' < .workflow_state/decomposed/matrix.json)" >> "$GITHUB_OUTPUT"
          printf 'state_json=%s\n' "$(tr -d '\n' < .workflow_state/decompose_state.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: decomposed-state
          path: .workflow_state/decomposed

  ai-rebuild:
    needs: decompose
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.decompose.outputs.matrix) }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/download-artifact@v4
        with:
          name: decomposed-state
          path: .workflow_state/decomposed

      - name: Decode state
        shell: bash
        env:
          STATE_JSON: ${{ needs.decompose.outputs.state_json }}
        run: |
          echo "$STATE_JSON" | base64 -d > .workflow_state/state.json

      - name: Verify API keys loaded
        shell: bash
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            key_count=$(printf '%s\n' "$OPENROUTER_API_KEY" | grep -cve '^[[:space:]]*$')
            echo "OPENROUTER_API_KEY set with $key_count key(s)"
          else
            echo "OPENROUTER_API_KEY not set"
          fi

      - name: Setup workspace
        shell: bash
        run: |
          mkdir -p .workflow_artifacts/ai-${{ matrix.slug }}
          VERSION_DIR=".workflow_state/decomposed/${{ matrix.version }}-${{ matrix.loader }}"
          if [ -d "$VERSION_DIR" ]; then
            cp -r "$VERSION_DIR"/* .workflow_artifacts/ai-${{ matrix.slug }}/
          else
            echo "Version folder not found: $VERSION_DIR"
            ls -la .workflow_state/decomposed/
          fi

      - name: Debug version dir
        run: |
          echo "=== Version dir contents ==="
          ls -la ".workflow_artifacts/ai-${{ matrix.slug }}/"
          echo "=== versions.txt ==="
          cat ".workflow_artifacts/ai-${{ matrix.slug }}/versions.txt" 2>/dev/null || echo "versions.txt not found"
          echo "=== context.json ==="
          cat ".workflow_artifacts/ai-${{ matrix.slug }}/context.json" 2>/dev/null || echo "context.json not found"

      - name: Run AI rebuild
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set -x
          python build_mods.py ai-rebuild \
            --version-dir ".workflow_artifacts/ai-${{ matrix.slug }}" \
            --output-dir ".workflow_artifacts/ai-${{ matrix.slug }}" \
            --artifact-dir ".workflow_artifacts/per-mod/${{ matrix.slug }}" 2>&1

      - name: Mask Modrinth token (immediate)
        if: ${{ inputs.modrinth_project_url != '' && inputs.publish_mode == 'immediately' }}
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - name: Publish to Modrinth immediately
        if: ${{ inputs.modrinth_project_url != '' && inputs.publish_mode == 'immediately' }}
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          status=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path(".workflow_artifacts/per-mod/${{ matrix.slug }}/result.json").read_text())
          print(data.get("status", "failed"))
          PY
          )
          if [ "$status" != "success" ]; then
            echo "Skip Modrinth publish (status=$status)"
            exit 0
          fi
          python3 build_mods.py bundle \
            --artifacts-root ".workflow_artifacts/per-mod/${{ matrix.slug }}" \
            --output-dir ".workflow_artifacts/publish-bundle/${{ matrix.slug }}"
          python3 build_mods.py publish-modrinth \
            --artifacts-root ".workflow_artifacts/publish-bundle/${{ matrix.slug }}" \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir ".workflow_artifacts/modrinth-publish/${{ matrix.slug }}"
          exit_code=$?
          set -e
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-mod-${{ matrix.slug }}
          path: .workflow_artifacts/per-mod/${{ matrix.slug }}

      - uses: actions/upload-artifact@v4
        if: ${{ always() && inputs.publish_mode == 'immediately' }}
        with:
          name: modrinth-publish-${{ matrix.slug }}
          path: .workflow_artifacts/modrinth-publish/${{ matrix.slug }}

  bundle:
    needs:
      - decompose
      - ai-rebuild
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          pattern: ai-mod-*
          path: .workflow_downloads

      - id: bundle
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p .workflow_artifacts/combined/mods
          mkdir -p .workflow_artifacts/combined/progress
          
          for dir in .workflow_downloads/*/; do
            slug=$(basename "$dir" | sed 's/ai-mod-//')
            if [ -f "$dir/result.json" ]; then
              cp -r "$dir"/* .workflow_artifacts/combined/mods/"$slug"/
            fi
            if [ -d "$dir" ]; then
              zip -r ".workflow_artifacts/combined/progress/${slug}.zip" "$dir" 2>/dev/null || true
            fi
          done
          
          echo "# Auto Update Summary" > .workflow_artifacts/combined/SUMMARY.md
          echo "" >> .workflow_artifacts/combined/SUMMARY.md
          echo "## Results" >> .workflow_artifacts/combined/SUMMARY.md
          echo "" >> .workflow_artifacts/combined/SUMMARY.md
          
          for result in .workflow_downloads/*/result.json; do
            if [ -f "$result" ]; then
              status=$(python -c "import json; print(json.load(open('$result')).get('status', 'unknown'))" 2>/dev/null || echo "unknown")
              slug=$(basename $(dirname "$result") | sed 's/ai-mod-//')
              echo "- $slug: $status" >> .workflow_artifacts/combined/SUMMARY.md
            fi
          done
          
          zip -r results.zip .workflow_artifacts/combined/mods 2>/dev/null || true
          zip -r progress.zip .workflow_artifacts/combined/progress 2>/dev/null || true
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-results
          path: |
            .workflow_artifacts/combined
            results.zip
            progress.zip

  publish-modrinth:
    needs:
      - decompose
      - ai-rebuild
      - bundle
    if: ${{ always() && inputs.modrinth_project_url != '' && inputs.publish_mode == 'bundle-only' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: final-results
          path: .workflow_downloads

      - name: Mask Modrinth token
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - id: publish
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          python build_mods.py publish-modrinth \
            --artifacts-root .workflow_downloads \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir .workflow_artifacts/modrinth-publish
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modrinth-publish
          path: .workflow_artifacts/modrinth-publish

  summary:
    needs:
      - decompose
      - ai-rebuild
      - bundle
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          pattern: ai-mod-*
          path: .workflow_downloads/ai-mods

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: modrinth-publish*
          path: .workflow_downloads/modrinth

      - id: build_summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          ai_root = Path(".workflow_downloads/ai-mods")
          modrinth_root = Path(".workflow_downloads/modrinth")

          ai_results = []
          for path in ai_root.rglob("result.json"):
            try:
              data = json.loads(path.read_text(encoding="utf-8"))
            except Exception:
              continue
            if not all(key in data for key in ("slug", "loader", "minecraft_version")):
              continue
            ai_results.append(data)

          total = len(ai_results)
          success = sum(1 for r in ai_results if r.get("status") == "success")
          failed = total - success

          total_calls = 0
          total_latency = 0.0
          success_calls = []

          for r in ai_results:
            metrics = r.get("ai_metrics", {})
            calls = int(metrics.get("api_calls", 0) or 0)
            latency = float(metrics.get("api_latency_seconds_total", 0.0) or 0.0)
            total_calls += calls
            total_latency += latency
            if r.get("status") == "success" and calls:
              success_calls.append(calls)

          avg_latency = (total_latency / total_calls) if total_calls else 0.0
          avg_calls_success = (sum(success_calls) / len(success_calls)) if success_calls else 0.0

          publish_map = {}
          if modrinth_root.exists():
            for path in modrinth_root.rglob("result.json"):
              try:
                data = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                continue
              for upload in data.get("uploads", []) or []:
                key = (upload.get("slug"), upload.get("loader"), upload.get("minecraft_version"))
                publish_map[key] = upload

          lines = [
            "# Auto Update Summary",
            "",
            "## Overview",
            f"- Total targets: {total}",
            f"- Successful: {success}",
            f"- Failed: {failed}",
            "",
            "## AI Metrics",
            f"- Total AI requests: {total_calls}",
            f"- Average AI latency: {avg_latency * 1000:.0f} ms",
            f"- Average AI calls to success: {avg_calls_success:.2f}",
            "",
            "## Per-Target Status",
            "| Slug | Loader | Minecraft | Status | AI Calls | Publish Status | Note |",
            "| --- | --- | --- | --- | --- | --- | --- |",
          ]

          for r in sorted(ai_results, key=lambda x: (x.get("slug", ""), x.get("loader", ""), x.get("minecraft_version", ""))):
            key = (r.get("slug"), r.get("loader"), r.get("minecraft_version"))
            publish = publish_map.get(key, {})
            publish_status = publish.get("publish_status", "-")
            note = publish.get("note", "-") or "-"
            calls = r.get("ai_metrics", {}).get("api_calls", 0)
            lines.append(
              "| {slug} | {loader} | {mc} | {status} | {calls} | {publish} | {note} |".format(
                slug=r.get("slug", "-"),
                loader=r.get("loader", "-"),
                mc=r.get("minecraft_version", "-"),
                status=r.get("status", "-"),
                calls=calls,
                publish=publish_status,
                note=note.replace("\\n", " "),
              )
            )

          summary_dir = Path(".workflow_artifacts/summary")
          summary_dir.mkdir(parents=True, exist_ok=True)
          summary_path = summary_dir / "SUMMARY.md"
          summary_path.write_text("\\n".join(lines) + "\\n", encoding="utf-8")

          summary_json = {
            "total": total,
            "success": success,
            "failed": failed,
            "total_ai_requests": total_calls,
            "average_ai_latency_seconds": avg_latency,
            "average_ai_calls_to_success": avg_calls_success,
          }
          (summary_dir / "summary.json").write_text(json.dumps(summary_json, indent=2), encoding="utf-8")
          print(f"Wrote summary to {summary_path}")
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-update-summary
          path: .workflow_artifacts/summary

      - if: always()
        shell: bash
        run: |
          if [ -f .workflow_artifacts/summary/SUMMARY.md ]; then
            cat .workflow_artifacts/summary/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi
