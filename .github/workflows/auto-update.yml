name: Auto Update Mod

on:
  workflow_dispatch:
    inputs:
      mod_jar_path:
        description: Repo-relative path to mod jar (e.g., "To Be Decompiled/my-mod.jar")
        required: false
        default: ""
        type: string
      auto_fetch_modrinth:
        description: Auto-fetch jar/description from Modrinth when jar path is empty
        required: false
        default: true
        type: boolean
      auto_fix_corrupted:
        description: Auto-fix corrupted versions before updating
        required: false
        default: false
        type: boolean
      auto_fix_only:
        description: Auto-fix corrupted versions only (skip normal updates)
        required: false
        default: false
        type: boolean
      modrinth_project_url:
        description: Optional Modrinth project URL or slug
        required: false
        default: ""
        type: string
      mod_description:
        description: "Mod description: either a file path (e.g., info.txt) or direct text"
        required: false
        default: ""
        type: string
      version_range:
        description: "Version range to update (e.g., 1.20-1.21.8, 1.20.1fabric,1.21neoforge, or all)"
        required: false
        default: "all"
        type: string
      update_mode:
        description: Update mode
        required: true
        default: "all-versions"
        type: choice
        options:
          - "all-versions"
          - "missing-only"
      publish_mode:
        description: Publish mode (if modrinth project provided)
        required: true
        default: "bundle-only"
        type: choice
        options:
          - "immediately"
          - "bundle-only"
      resume_from:
        description: Resume from previous run (provide previous run ID or leave blank for fresh start)
        required: false
        default: ""
        type: string

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      mod_jar_name: ${{ steps.setup.outputs.mod_jar_name }}
      mod_description_name: ${{ steps.setup.outputs.mod_description_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: setup
        name: Setup (resolve jar/description)
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          MOD_JAR_PATH_INPUT: ${{ inputs.mod_jar_path }}
          MOD_DESCRIPTION_INPUT: ${{ inputs.mod_description }}
          AUTO_FETCH_MODRINTH: ${{ inputs.auto_fetch_modrinth }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import shutil
          import urllib.parse
          from pathlib import Path
          
          from modcompiler.auto_update import (
              _download_modrinth_file,
              _extract_modrinth_description,
              _parse_bool,
              _select_latest_modrinth_version,
          )
          from modcompiler.modrinth import (
              ModrinthClient,
              build_modrinth_user_agent,
              normalize_modrinth_project_ref,
              select_primary_modrinth_file,
          )
          
          def fail(msg: str) -> None:
              raise SystemExit(msg)
          
          modrinth_url = os.environ.get("MODRINTH_PROJECT_URL", "").strip()
          jar_input = os.environ.get("MOD_JAR_PATH_INPUT", "").strip()
          desc_input = os.environ.get("MOD_DESCRIPTION_INPUT", "").strip()
          auto_fetch = _parse_bool(os.environ.get("AUTO_FETCH_MODRINTH"), True)
          
          setup_dir = Path(".workflow_state/setup")
          setup_dir.mkdir(parents=True, exist_ok=True)
          
          state = {"project": None, "versions": None, "project_ref": ""}
          
          def ensure_project() -> None:
              if state["project"] is not None:
                  return
              if not modrinth_url:
                  fail("Modrinth URL is required to auto-fetch the jar/description.")
              project_ref = normalize_modrinth_project_ref(modrinth_url)
              state["project_ref"] = project_ref
              token = os.environ.get("MODRINTH_TOKEN", "").strip() or None
              client = ModrinthClient(token=token, user_agent=build_modrinth_user_agent())
              project = client.resolve_project(project_ref)
              versions = client.request_json(
                  "GET",
                  f"/project/{urllib.parse.quote(project_ref, safe='')}/version",
                  params={"include_changelog": "false"},
              )
              if not isinstance(versions, list):
                  fail("Unexpected Modrinth versions response.")
              state["project"] = project
              state["versions"] = versions
          
          resolved_jar = ""
          resolved_jar_name = ""
          resolved_desc_name = ""

          def sanitize(value: str) -> str:
              return re.sub(r"[^A-Za-z0-9._-]+", "_", value.strip()) if value else ""

          def parse_mc_version(value: str):
              parts = []
              for token in value.split("."):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      parts.append(token)
              return parts

          def build_prefix() -> str:
              if state["versions"]:
                  latest = _select_latest_modrinth_version(state["versions"] or [])
                  if latest:
                      game_versions = [str(v) for v in latest.get("game_versions", []) if str(v).strip()]
                      mc_version = ""
                      if game_versions:
                          mc_version = sorted(game_versions, key=parse_mc_version)[-1]
                      loaders = [str(l) for l in latest.get("loaders", [])]
                      loader = loaders[0] if loaders else "unknown"
                      prefix = sanitize(f"{mc_version or 'unknown'}_{loader}")
                      return prefix
              return ""
          if jar_input:
              jar_path = Path(jar_input)
              if not jar_path.is_absolute():
                  jar_path = Path.cwd() / jar_path
              if not jar_path.exists():
                  if not auto_fetch:
                      fail(f"Mod jar not found: {jar_path}")
                  jar_input = ""
              else:
                  if modrinth_url:
                      ensure_project()
                  prefix = build_prefix()
                  name = f"{prefix}_{jar_path.name}" if prefix else jar_path.name
                  dest = setup_dir / name
                  shutil.copy2(jar_path, dest)
                  resolved_jar = str(dest)
                  resolved_jar_name = dest.name
          
          if not resolved_jar:
              if not auto_fetch:
                  fail("Mod jar path is required when auto-fetch is disabled.")
              ensure_project()
              latest = _select_latest_modrinth_version(state["versions"] or [])
              if latest is None:
                  fail("No Modrinth versions were available to download.")
              file_info = select_primary_modrinth_file(latest.get("files", []))
              if not file_info:
                  fail("No downloadable file was found for the latest Modrinth version.")
              file_url = str(file_info.get("url", "")).strip()
              if not file_url:
                  fail("Modrinth file entry is missing a download URL.")
              filename = str(file_info.get("filename", "")).strip()
              if not filename:
                  filename = f"{state['project_ref'] or 'mod'}.jar"
              prefix = build_prefix()
              name = f"{prefix}_{filename}" if prefix else filename
              dest = setup_dir / name
              _download_modrinth_file(file_url, dest)
              resolved_jar = str(dest)
              resolved_jar_name = dest.name
          
          resolved_desc = ""
          if desc_input:
              desc_path = Path(desc_input)
              dest = setup_dir / "description.txt"
              if desc_path.exists() and desc_path.is_file():
                  dest.write_text(desc_path.read_text(encoding="utf-8"), encoding="utf-8")
              else:
                  dest.write_text(desc_input, encoding="utf-8")
              resolved_desc = str(dest)
              resolved_desc_name = dest.name
          elif auto_fetch and modrinth_url:
              ensure_project()
              text = _extract_modrinth_description(state["project"] or {})
              if text:
                  dest = setup_dir / "description.txt"
                  dest.write_text(text, encoding="utf-8")
                  resolved_desc = str(dest)
                  resolved_desc_name = dest.name

          if resolved_jar_name:
              (setup_dir / "selected-jar.txt").write_text(resolved_jar_name, encoding="utf-8")
          if resolved_desc_name:
              (setup_dir / "selected-description.txt").write_text(resolved_desc_name, encoding="utf-8")
          
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"mod_jar_name={resolved_jar_name}\n")
              handle.write(f"mod_description_name={resolved_desc_name}\n")
          
          print(f"Resolved jar: {resolved_jar}")
          print(f"Resolved description: {resolved_desc or '-'}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: setup-artifacts
          path: .workflow_state/setup

  prepare-corrupt-downloads:
    runs-on: ubuntu-latest
    if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: matrix
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import math
          import os
          from pathlib import Path
          
          from modcompiler.auto_update import (
              _fetch_modrinth_project_and_versions,
              _select_latest_modrinth_versions_by_loader_game,
          )
          from modcompiler.modrinth import normalize_modrinth_project_ref, select_primary_modrinth_file
          
          project_url = os.environ.get("MODRINTH_PROJECT_URL", "").strip()
          if not project_url:
              raise SystemExit("Modrinth project URL is required for auto-fix download preparation.")
          
          project_ref = normalize_modrinth_project_ref(project_url)
          token = os.environ.get("MODRINTH_TOKEN", "").strip() or None
          project, versions = _fetch_modrinth_project_and_versions(project_ref, token)
          filtered_versions = _select_latest_modrinth_versions_by_loader_game(versions)
          if filtered_versions:
              versions = filtered_versions
          
          project_info = {
              "project_ref": project_ref,
              "project_name": str(project.get("title") or project.get("name") or project.get("slug") or project_ref),
              "project_description": str(project.get("body") or project.get("description") or ""),
          }
          info_path = Path(".workflow_state/corrupt-project.json")
          info_path.parent.mkdir(parents=True, exist_ok=True)
          info_path.write_text(json.dumps(project_info, indent=2), encoding="utf-8")
          
          items = []
          for version in versions:
              file_info = select_primary_modrinth_file(version.get("files", []))
              if not file_info:
                  continue
              url = str(file_info.get("url", "")).strip()
              if not url:
                  continue
              filename = str(file_info.get("filename", "")).strip()
              version_id = str(version.get("id") or version.get("version_number") or filename or "unknown")
              if not filename:
                  filename = f"{project_ref}-{version_id}.jar"
              items.append({
                  "version_id": version_id,
                  "version_number": str(version.get("version_number") or ""),
                  "loaders": [str(l) for l in version.get("loaders", [])],
                  "game_versions": [str(v) for v in version.get("game_versions", [])],
                  "date_published": str(version.get("date_published") or version.get("date") or ""),
                  "url": url,
                  "filename": filename,
              })
          
          batch_size = 1
          max_jobs = 200
          if items and len(items) > max_jobs * batch_size:
              batch_size = math.ceil(len(items) / max_jobs)
          
          batches = [items[i:i + batch_size] for i in range(0, len(items), batch_size)]
          if not batches:
              batches = [[]]
          
          include = []
          for idx, batch in enumerate(batches):
              payload = base64.b64encode(json.dumps(batch).encode("utf-8")).decode("utf-8")
              include.append({
                  "batch_id": f"{idx:03d}",
                  "files_b64": payload,
              })
          
          matrix = {"include": include}
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          output_path.write_text(f"matrix={json.dumps(matrix)}\n", encoding="utf-8")
          print(f"Prepared {len(items)} files in {len(batches)} batch(es), batch_size={batch_size}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: corrupt-project
          path: .workflow_state/corrupt-project.json

  process-corrupt-jars:
    needs:
      - prepare-corrupt-downloads
    runs-on: ubuntu-latest
    if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-corrupt-downloads.outputs.matrix) }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_KEY_SEED: ${{ matrix.batch_id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/download-artifact@v4
        with:
          name: corrupt-project
          path: .workflow_state

      - name: Download → Decompile → Verify (batch)
        shell: bash
        env:
          FILES_B64: ${{ matrix.files_b64 }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          from pathlib import Path
          
          from modcompiler.auto_update import _verify_mod_source_with_ai, _download_modrinth_file, _get_library_sources
          from modcompiler.decompile import decompile_jar_internal
          from modcompiler.common import load_json
          from modcompiler.openrouter import OpenRouterClient
          
          files_b64 = os.environ.get("FILES_B64", "").strip()
          if not files_b64:
              print("No files to process in this batch.")
              raise SystemExit(0)
          
          files = json.loads(base64.b64decode(files_b64).decode("utf-8"))
          if not files:
              print("No files to process in this batch.")
              raise SystemExit(0)
          
          candidates = [
              Path(".workflow_state/corrupt-project.json"),
              Path("corrupt-project.json"),
              Path(".workflow_state/.workflow_state/corrupt-project.json"),
          ]
          project_path = next((p for p in candidates if p.exists()), None)
          if project_path is None:
              matches = list(Path(".").rglob("corrupt-project.json"))
              if matches:
                  project_path = matches[0]
          if project_path is None:
              raise SystemExit("corrupt-project.json not found after artifact download.")
          project_info = load_json(project_path)
          project_name = str(project_info.get("project_name") or project_info.get("project_ref") or "mod")
          project_description = str(project_info.get("project_description") or "")
          
          client = OpenRouterClient()
          if not client.key_states:
              raise SystemExit("OPENROUTER_API_KEY is required for auto-fix verification.")
          
          manifest = load_json(Path("version-manifest.json"))
          downloads_root = Path(".workflow_state/corrupt-downloads")
          decompiled_root = Path(".workflow_state/corrupt-decompiled")
          verdict_root = Path(".workflow_state/corrupt-verdicts")
          verdict_root.mkdir(parents=True, exist_ok=True)
          prepared_sources = set()
          
          for entry in files:
              version_id = str(entry.get("version_id") or "unknown")
              version_number = str(entry.get("version_number") or "")
              loaders = entry.get("loaders") or []
              game_versions = entry.get("game_versions") or []
              date_published = str(entry.get("date_published") or "")
              url = str(entry.get("url", "")).strip()
              filename = str(entry.get("filename", "")).strip() or f"{version_id}.jar"
              
              jar_path = downloads_root / version_id / filename
              if url and not jar_path.exists():
                  _download_modrinth_file(url, jar_path)
              
              src_dir = decompiled_root / version_id
              if jar_path.exists() and not (src_dir.exists() and (list(src_dir.rglob("*.java")) or list(src_dir.rglob("*.kt")))):
                  decompile_jar_internal(jar_path, manifest, output_dir=src_dir)
              
              verdict_payload = {
                  "tag": "corrupted",
                  "verdict": "fail",
                  "confidence": 0.0,
                  "rating": 0.0,
                  "reason": "Decompiler produced no sources.",
              }
              if src_dir.exists() and (list(src_dir.rglob("*.java")) or list(src_dir.rglob("*.kt"))):
                  verdict_payload = _verify_mod_source_with_ai(
                      client=client,
                      project_name=project_name,
                      project_description=project_description,
                      version_label=version_number or version_id,
                      loader=str(loaders[0]) if loaders else "unknown",
                      game_versions=[str(v) for v in game_versions],
                      src_dir=src_dir,
                  )
              
              tag = str(verdict_payload.get("tag", "")).lower() or "corrupted"
              confidence = float(verdict_payload.get("confidence", 0.0) or 0.0)
              rating = float(verdict_payload.get("rating", 0.0) or 0.0)
              verdict = "pass" if tag == "working" else "fail"
              
              output = {
                  "version_id": version_id,
                  "version_number": version_number,
                  "loaders": [str(l) for l in loaders],
                  "game_versions": [str(v) for v in game_versions],
                  "date_published": date_published,
                  "tag": tag,
                  "verdict": verdict,
                  "confidence": confidence,
                  "rating": rating,
                  "reason": verdict_payload.get("reason", ""),
              }
              (verdict_root / f"{version_id}.json").write_text(json.dumps(output, indent=2), encoding="utf-8")

              if tag == "corrupted":
                  for loader in [str(l) for l in loaders]:
                      if not loader:
                          continue
                      for gv in [str(v) for v in game_versions]:
                          if not gv:
                              continue
                          key = f"{gv}-{loader}"
                          if key in prepared_sources:
                              continue
                          _get_library_sources(Path("."), gv, loader, allow_prepare=True)
                          prepared_sources.add(key)
          
          print("Batch process complete.")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: corrupt-downloads-${{ matrix.batch_id }}
          path: .workflow_state/corrupt-downloads

      - uses: actions/upload-artifact@v4
        with:
          name: corrupt-decompiled-${{ matrix.batch_id }}
          path: .workflow_state/corrupt-decompiled

      - uses: actions/upload-artifact@v4
        with:
          name: corrupt-verdicts-${{ matrix.batch_id }}
          path: .workflow_state/corrupt-verdicts

  prepare-targets:
    needs:
      - setup
      - prepare-corrupt-downloads
      - process-corrupt-jars
    if: always()
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      state_json: ${{ steps.plan.outputs.state_json }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: setup-artifacts
          path: .workflow_state/setup

      - uses: actions/download-artifact@v4
        if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
        continue-on-error: true
        with:
          pattern: corrupt-downloads-*
          path: .workflow_state/corrupt-downloads
          merge-multiple: true

      - uses: actions/download-artifact@v4
        if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
        continue-on-error: true
        with:
          pattern: corrupt-decompiled-*
          path: .workflow_state/corrupt-decompiled
          merge-multiple: true

      - uses: actions/download-artifact@v4
        if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
        continue-on-error: true
        with:
          pattern: corrupt-verdicts-*
          path: .workflow_state/corrupt-verdicts
          merge-multiple: true

      - id: plan
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          VERSION_RANGE: ${{ inputs.version_range }}
          UPDATE_MODE: ${{ inputs.update_mode }}
          PUBLISH_MODE: ${{ inputs.publish_mode }}
          MOD_DESCRIPTION_NAME: ${{ needs.setup.outputs.mod_description_name }}
          MOD_JAR_NAME: ${{ needs.setup.outputs.mod_jar_name }}
          AUTO_FETCH_MODRINTH: ${{ inputs.auto_fetch_modrinth }}
          AUTO_FIX_CORRUPTED: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
          AUTO_FIX_ONLY: ${{ inputs.auto_fix_only }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p .workflow_state/plan
          MOD_JAR_PATH=""
          MOD_DESCRIPTION=""
          if [ -n "$MOD_JAR_NAME" ]; then
            MOD_JAR_PATH=".workflow_state/setup/$MOD_JAR_NAME"
          fi
          if [ -n "$MOD_DESCRIPTION_NAME" ]; then
            MOD_DESCRIPTION=".workflow_state/setup/$MOD_DESCRIPTION_NAME"
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            if [ -f ".workflow_state/setup/selected-jar.txt" ]; then
              sel_name=$(cat ".workflow_state/setup/selected-jar.txt" 2>/dev/null || true)
              if [ -n "$sel_name" ]; then
                MOD_JAR_PATH=".workflow_state/setup/$sel_name"
              fi
            fi
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            candidate=$(ls -t .workflow_state/setup/*.jar 2>/dev/null | head -n1 || true)
            if [ -n "$candidate" ]; then
              MOD_JAR_PATH="$candidate"
            else
              candidate=$(ls -t *.jar 2>/dev/null | head -n1 || true)
              if [ -n "$candidate" ]; then
                MOD_JAR_PATH="$candidate"
              fi
            fi
          fi
          AUTO_FETCH_FOR_DECOMPOSE="false"
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            AUTO_FETCH_FOR_DECOMPOSE="true"
            MOD_JAR_PATH=""
          fi
          if [ -z "$MOD_DESCRIPTION" ] || [ ! -f "$MOD_DESCRIPTION" ]; then
            if [ -f ".workflow_state/setup/selected-description.txt" ]; then
              sel_desc=$(cat ".workflow_state/setup/selected-description.txt" 2>/dev/null || true)
              if [ -n "$sel_desc" ]; then
                MOD_DESCRIPTION=".workflow_state/setup/$sel_desc"
              fi
            fi
          fi
          
          python build_mods.py auto-update-decompose \
            --mod-jar-path "$MOD_JAR_PATH" \
            --modrinth-project-url "$MODRINTH_PROJECT_URL" \
            --mod-description "$MOD_DESCRIPTION" \
            --auto-fetch-modrinth "$AUTO_FETCH_FOR_DECOMPOSE" \
            --auto-fix-corrupted "$AUTO_FIX_CORRUPTED" \
            --auto-fix-only "$AUTO_FIX_ONLY" \
            --auto-fix-corrupted-downloads-dir ".workflow_state/corrupt-downloads" \
            --auto-fix-corrupted-decompiled-dir ".workflow_state/corrupt-decompiled" \
            --auto-fix-corrupted-report-dir ".workflow_state/corrupt-verdicts" \
            --version-range "$VERSION_RANGE" \
            --update-mode "$UPDATE_MODE" \
            --publish-mode "$PUBLISH_MODE" \
            --manifest version-manifest.json \
            --plan-only "true" \
            --output-dir .workflow_state/plan
          
          python - <<'PY'
          import json
          from pathlib import Path
          
          matrix = json.loads(Path(".workflow_state/plan/matrix.json").read_text(encoding="utf-8"))
          state = json.loads(Path(".workflow_state/plan/state.json").read_text(encoding="utf-8"))
          
          count = len(matrix.get("include", []))
          print(f"Generated {count} version targets")
          
          import base64
          state_b64 = base64.b64encode(json.dumps(state).encode()).decode()
          Path(".workflow_state/plan_state.txt").write_text(state_b64, encoding="utf-8")
          PY
          
          printf 'matrix=%s\n' "$(tr -d '\n' < .workflow_state/plan/matrix.json)" >> "$GITHUB_OUTPUT"
          printf 'state_json=%s\n' "$(tr -d '\n' < .workflow_state/plan_state.txt)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: plan-state
          path: .workflow_state/plan

      - uses: actions/upload-artifact@v4
        with:
          name: base-decompiled
          path: .workflow_state/plan/_decompiled

  process-target:
    needs: prepare-targets
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare-targets.outputs.matrix) }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_KEY_SEED: ${{ matrix.slug }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: .workflow_state/minecraft-sources
          key: mc-sources-${{ runner.os }}-${{ matrix.slug }}-${{ hashFiles('version-manifest.json') }}
          restore-keys: |
            mc-sources-${{ runner.os }}-${{ matrix.slug }}-
            mc-sources-${{ runner.os }}-

      - name: Verify API keys loaded
        shell: bash
        run: |
          if [ -n "$OPENROUTER_API_KEY" ]; then
            key_count=$(printf '%s\n' "$OPENROUTER_API_KEY" | grep -cve '^[[:space:]]*$')
            echo "OPENROUTER_API_KEY set with $key_count key(s)"
          else
            echo "OPENROUTER_API_KEY not set"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: setup-artifacts
          path: .workflow_state/setup

      - uses: actions/download-artifact@v4
        with:
          name: plan-state
          path: .workflow_state/plan

      - uses: actions/download-artifact@v4
        with:
          name: base-decompiled
          path: .workflow_state/base-decompiled

      - uses: actions/download-artifact@v4
        if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
        continue-on-error: true
        with:
          pattern: corrupt-verdicts-*
          path: .workflow_state/corrupt-verdicts
          merge-multiple: true

      - uses: actions/download-artifact@v4
        if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
        continue-on-error: true
        with:
          pattern: corrupt-decompiled-*
          path: .workflow_state/corrupt-decompiled
          merge-multiple: true

      - uses: actions/download-artifact@v4
        if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
        continue-on-error: true
        with:
          pattern: corrupt-downloads-*
          path: .workflow_state/corrupt-downloads
          merge-multiple: true

      - name: Decompose target
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          VERSION_RANGE: ${{ inputs.version_range }}
          UPDATE_MODE: ${{ inputs.update_mode }}
          PUBLISH_MODE: ${{ inputs.publish_mode }}
          MOD_DESCRIPTION_NAME: ${{ needs.setup.outputs.mod_description_name }}
          MOD_JAR_NAME: ${{ needs.setup.outputs.mod_jar_name }}
          AUTO_FETCH_MODRINTH: ${{ inputs.auto_fetch_modrinth }}
          AUTO_FIX_CORRUPTED: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
          AUTO_FIX_ONLY: ${{ inputs.auto_fix_only }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p .workflow_state/decomposed-single
          MOD_JAR_PATH=""
          MOD_DESCRIPTION=""
          if [ -n "$MOD_JAR_NAME" ]; then
            MOD_JAR_PATH=".workflow_state/setup/$MOD_JAR_NAME"
          fi
          if [ -n "$MOD_DESCRIPTION_NAME" ]; then
            MOD_DESCRIPTION=".workflow_state/setup/$MOD_DESCRIPTION_NAME"
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            if [ -f ".workflow_state/setup/selected-jar.txt" ]; then
              sel_name=$(cat ".workflow_state/setup/selected-jar.txt" 2>/dev/null || true)
              if [ -n "$sel_name" ]; then
                MOD_JAR_PATH=".workflow_state/setup/$sel_name"
              fi
            fi
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            candidate=$(ls -t .workflow_state/setup/*.jar 2>/dev/null | head -n1 || true)
            if [ -n "$candidate" ]; then
              MOD_JAR_PATH="$candidate"
            else
              candidate=$(ls -t *.jar 2>/dev/null | head -n1 || true)
              if [ -n "$candidate" ]; then
                MOD_JAR_PATH="$candidate"
              fi
            fi
          fi
          AUTO_FETCH_FOR_DECOMPOSE="false"
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            AUTO_FETCH_FOR_DECOMPOSE="true"
            MOD_JAR_PATH=""
          fi
          if [ -z "$MOD_DESCRIPTION" ] || [ ! -f "$MOD_DESCRIPTION" ]; then
            if [ -f ".workflow_state/setup/selected-description.txt" ]; then
              sel_desc=$(cat ".workflow_state/setup/selected-description.txt" 2>/dev/null || true)
              if [ -n "$sel_desc" ]; then
                MOD_DESCRIPTION=".workflow_state/setup/$sel_desc"
              fi
            fi
          fi

          python build_mods.py auto-update-decompose \
            --mod-jar-path "$MOD_JAR_PATH" \
            --modrinth-project-url "$MODRINTH_PROJECT_URL" \
            --mod-description "$MOD_DESCRIPTION" \
            --auto-fetch-modrinth "$AUTO_FETCH_FOR_DECOMPOSE" \
            --auto-fix-corrupted "$AUTO_FIX_CORRUPTED" \
            --auto-fix-only "$AUTO_FIX_ONLY" \
            --auto-fix-corrupted-downloads-dir ".workflow_state/corrupt-downloads" \
            --auto-fix-corrupted-decompiled-dir ".workflow_state/corrupt-decompiled" \
            --auto-fix-corrupted-report-dir ".workflow_state/corrupt-verdicts" \
            --reuse-decompiled-dir ".workflow_state/base-decompiled" \
            --only-target "${{ matrix.version }}-${{ matrix.loader }}" \
            --version-range "$VERSION_RANGE" \
            --update-mode "$UPDATE_MODE" \
            --publish-mode "$PUBLISH_MODE" \
            --manifest version-manifest.json \
            --output-dir .workflow_state/decomposed-single

      - name: Setup workspace
        shell: bash
        run: |
          mkdir -p .workflow_artifacts/ai-${{ matrix.slug }}
          VERSION_DIR=".workflow_state/decomposed-single/${{ matrix.version }}-${{ matrix.loader }}"
          if [ -d "$VERSION_DIR" ]; then
            cp -r "$VERSION_DIR"/* .workflow_artifacts/ai-${{ matrix.slug }}/
          else
            echo "Version folder not found: $VERSION_DIR"
            ls -la .workflow_state/decomposed-single/
          fi

      - name: Prepare Minecraft sources (per target)
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from modcompiler.auto_update import _get_library_sources
          
          version_dir = Path(".workflow_artifacts/ai-${{ matrix.slug }}")
          context_path = version_dir / "context.json"
          if not context_path.exists():
              print("context.json not found; skipping library source prep.")
              raise SystemExit(0)
          
          context = json.loads(context_path.read_text(encoding="utf-8"))
          target_version = context.get("target_version", "")
          target_loader = context.get("target_loader", "")
          if not target_version or not target_loader:
              print("Missing target version/loader; skipping library source prep.")
              raise SystemExit(0)
          
          sources = _get_library_sources(version_dir, target_version, target_loader, allow_prepare=True)
          print(f"Library sources for {target_version}-{target_loader}: {sources or 'not found'}")
          PY

      - name: Debug version dir
        run: |
          echo "=== Version dir contents ==="
          ls -la ".workflow_artifacts/ai-${{ matrix.slug }}/"
          echo "=== versions.txt ==="
          cat ".workflow_artifacts/ai-${{ matrix.slug }}/versions.txt" 2>/dev/null || echo "versions.txt not found"
          echo "=== context.json ==="
          cat ".workflow_artifacts/ai-${{ matrix.slug }}/context.json" 2>/dev/null || echo "context.json not found"

      - name: Run AI rebuild
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set -x
          python build_mods.py ai-rebuild \
            --version-dir ".workflow_artifacts/ai-${{ matrix.slug }}" \
            --output-dir ".workflow_artifacts/ai-${{ matrix.slug }}" \
            --artifact-dir ".workflow_artifacts/per-mod/${{ matrix.slug }}" 2>&1

      - name: Mask Modrinth token (immediate)
        if: ${{ inputs.modrinth_project_url != '' && inputs.publish_mode == 'immediately' }}
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - name: Publish to Modrinth immediately
        if: ${{ inputs.modrinth_project_url != '' && inputs.publish_mode == 'immediately' }}
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          status=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path(".workflow_artifacts/per-mod/${{ matrix.slug }}/result.json").read_text())
          print(data.get("status", "failed"))
          PY
          )
          if [ "$status" != "success" ]; then
            echo "Skip Modrinth publish (status=$status)"
            exit 0
          fi
          python3 build_mods.py bundle \
            --artifacts-root ".workflow_artifacts/per-mod/${{ matrix.slug }}" \
            --output-dir ".workflow_artifacts/publish-bundle/${{ matrix.slug }}"
          python3 build_mods.py publish-modrinth \
            --artifacts-root ".workflow_artifacts/publish-bundle/${{ matrix.slug }}" \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir ".workflow_artifacts/modrinth-publish/${{ matrix.slug }}"
          exit_code=$?
          set -e
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-mod-${{ matrix.slug }}
          path: .workflow_artifacts/per-mod/${{ matrix.slug }}

      - uses: actions/upload-artifact@v4
        if: ${{ always() && inputs.publish_mode == 'immediately' }}
        with:
          name: modrinth-publish-${{ matrix.slug }}
          path: .workflow_artifacts/modrinth-publish/${{ matrix.slug }}

  bundle:
    needs:
      - prepare-targets
      - process-target
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          pattern: ai-mod-*
          path: .workflow_downloads

      - id: bundle
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p .workflow_artifacts/combined/mods
          mkdir -p .workflow_artifacts/combined/progress
          
          for dir in .workflow_downloads/*/; do
            slug=$(basename "$dir" | sed 's/ai-mod-//')
            if [ -f "$dir/result.json" ]; then
              cp -r "$dir"/* .workflow_artifacts/combined/mods/"$slug"/
            fi
            if [ -d "$dir" ]; then
              zip -r ".workflow_artifacts/combined/progress/${slug}.zip" "$dir" 2>/dev/null || true
            fi
          done
          
          echo "# Auto Update Summary" > .workflow_artifacts/combined/SUMMARY.md
          echo "" >> .workflow_artifacts/combined/SUMMARY.md
          echo "## Results" >> .workflow_artifacts/combined/SUMMARY.md
          echo "" >> .workflow_artifacts/combined/SUMMARY.md
          
          for result in .workflow_downloads/*/result.json; do
            if [ -f "$result" ]; then
              status=$(python -c "import json; print(json.load(open('$result')).get('status', 'unknown'))" 2>/dev/null || echo "unknown")
              slug=$(basename $(dirname "$result") | sed 's/ai-mod-//')
              echo "- $slug: $status" >> .workflow_artifacts/combined/SUMMARY.md
            fi
          done
          
          zip -r results.zip .workflow_artifacts/combined/mods 2>/dev/null || true
          zip -r progress.zip .workflow_artifacts/combined/progress 2>/dev/null || true
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: final-results
          path: |
            .workflow_artifacts/combined
            results.zip
            progress.zip

  publish-modrinth:
    needs:
      - prepare-targets
      - process-target
      - bundle
    if: ${{ always() && inputs.modrinth_project_url != '' && inputs.publish_mode == 'bundle-only' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          name: final-results
          path: .workflow_downloads

      - name: Mask Modrinth token
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - id: publish
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          python build_mods.py publish-modrinth \
            --artifacts-root .workflow_downloads \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir .workflow_artifacts/modrinth-publish
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modrinth-publish
          path: .workflow_artifacts/modrinth-publish

  summary:
    needs:
      - prepare-targets
      - process-target
      - bundle
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/download-artifact@v4
        with:
          pattern: ai-mod-*
          path: .workflow_downloads/ai-mods

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: modrinth-publish*
          path: .workflow_downloads/modrinth

      - id: build_summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          ai_root = Path(".workflow_downloads/ai-mods")
          modrinth_root = Path(".workflow_downloads/modrinth")

          ai_results = []
          for path in ai_root.rglob("result.json"):
            try:
              data = json.loads(path.read_text(encoding="utf-8"))
            except Exception:
              continue
            if not all(key in data for key in ("slug", "loader", "minecraft_version")):
              continue
            ai_results.append(data)

          total = len(ai_results)
          success = sum(1 for r in ai_results if r.get("status") == "success")
          failed = total - success

          total_calls = 0
          total_latency = 0.0
          success_calls = []

          for r in ai_results:
            metrics = r.get("ai_metrics", {})
            calls = int(metrics.get("api_calls", 0) or 0)
            latency = float(metrics.get("api_latency_seconds_total", 0.0) or 0.0)
            total_calls += calls
            total_latency += latency
            if r.get("status") == "success" and calls:
              success_calls.append(calls)

          avg_latency = (total_latency / total_calls) if total_calls else 0.0
          avg_calls_success = (sum(success_calls) / len(success_calls)) if success_calls else 0.0

          publish_map = {}
          if modrinth_root.exists():
            for path in modrinth_root.rglob("result.json"):
              try:
                data = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                continue
              for upload in data.get("uploads", []) or []:
                key = (upload.get("slug"), upload.get("loader"), upload.get("minecraft_version"))
                publish_map[key] = upload

          lines = [
            "# Auto Update Summary",
            "",
            "## Overview",
            f"- Total targets: {total}",
            f"- Successful: {success}",
            f"- Failed: {failed}",
            "",
            "## AI Metrics",
            f"- Total AI requests: {total_calls}",
            f"- Average AI latency: {avg_latency * 1000:.0f} ms",
            f"- Average AI calls to success: {avg_calls_success:.2f}",
            "",
            "## Per-Target Status",
            "| Slug | Loader | Minecraft | Status | AI Calls | Publish Status | Note |",
            "| --- | --- | --- | --- | --- | --- | --- |",
          ]

          for r in sorted(ai_results, key=lambda x: (x.get("slug", ""), x.get("loader", ""), x.get("minecraft_version", ""))):
            key = (r.get("slug"), r.get("loader"), r.get("minecraft_version"))
            publish = publish_map.get(key, {})
            publish_status = publish.get("publish_status", "-")
            note = publish.get("note", "-") or "-"
            calls = r.get("ai_metrics", {}).get("api_calls", 0)
            lines.append(
              "| {slug} | {loader} | {mc} | {status} | {calls} | {publish} | {note} |".format(
                slug=r.get("slug", "-"),
                loader=r.get("loader", "-"),
                mc=r.get("minecraft_version", "-"),
                status=r.get("status", "-"),
                calls=calls,
                publish=publish_status,
              note=note.replace("\n", " "),
            )
          )

          summary_dir = Path(".workflow_artifacts/summary")
          summary_dir.mkdir(parents=True, exist_ok=True)
          summary_path = summary_dir / "SUMMARY.md"
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          summary_json = {
            "total": total,
            "success": success,
            "failed": failed,
            "total_ai_requests": total_calls,
            "average_ai_latency_seconds": avg_latency,
            "average_ai_calls_to_success": avg_calls_success,
          }
          (summary_dir / "summary.json").write_text(json.dumps(summary_json, indent=2), encoding="utf-8")
          print(f"Wrote summary to {summary_path}")
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-update-summary
          path: .workflow_artifacts/summary

      - if: always()
        shell: bash
        run: |
          if [ -f .workflow_artifacts/summary/SUMMARY.md ]; then
            cat .workflow_artifacts/summary/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi
