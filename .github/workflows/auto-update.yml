name: Auto Update Mod

on:
  workflow_dispatch:
    inputs:
      mod_jar_path:
        description: Repo-relative path to mod jar (e.g., "To Be Decompiled/my-mod.jar")
        required: false
        default: ""
        type: string
      auto_fetch_modrinth:
        description: Auto-fetch jar/description from Modrinth when jar path is empty
        required: false
        default: true
        type: boolean
      auto_fix_corrupted:
        description: Auto-fix corrupted versions before updating
        required: false
        default: false
        type: boolean
      auto_fix_only:
        description: Auto-fix corrupted versions only (skip normal updates)
        required: false
        default: false
        type: boolean
      modrinth_project_url:
        description: Optional Modrinth project URL or slug
        required: false
        default: ""
        type: string
      mod_description:
        description: "Mod description: either a file path (e.g., info.txt) or direct text"
        required: false
        default: ""
        type: string
      version_range:
        description: "Version range to update (e.g., 1.20-1.21.8, 1.20.1fabric,1.21neoforge, or all)"
        required: false
        default: "all"
        type: string
      update_mode:
        description: Update mode
        required: true
        default: "all-versions"
        type: choice
        options:
          - "all-versions"
          - "missing-only"
      publish_mode:
        description: Publish mode (if modrinth project provided)
        required: true
        default: "bundle-only"
        type: choice
        options:
          - "immediately"
          - "bundle-only"
      resume_from:
        description: Resume from previous run (provide previous run ID or leave blank for fresh start)
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      mod_jar_name: ${{ steps.setup.outputs.mod_jar_name }}
      mod_description_name: ${{ steps.setup.outputs.mod_description_name }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      key_count: ${{ steps.matrix.outputs.key_count }}
      total_targets: ${{ steps.matrix.outputs.total_targets }}
      has_base_decompiled: ${{ steps.base_decompiled.outputs.has_base_decompiled }}
      has_corrupt_project: ${{ steps.corrupt_artifacts.outputs.has_corrupt_project }}
      has_corrupt_downloads: ${{ steps.corrupt_artifacts.outputs.has_corrupt_downloads }}
      has_corrupt_decompiled: ${{ steps.corrupt_artifacts.outputs.has_corrupt_decompiled }}
      has_corrupt_verdicts: ${{ steps.corrupt_artifacts.outputs.has_corrupt_verdicts }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: setup
        name: Setup (resolve jar/description)
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          MOD_JAR_PATH_INPUT: ${{ inputs.mod_jar_path }}
          MOD_DESCRIPTION_INPUT: ${{ inputs.mod_description }}
          AUTO_FETCH_MODRINTH: ${{ inputs.auto_fetch_modrinth }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 - <<'PY'
          import os
          import re
          import shutil
          import urllib.parse
          from pathlib import Path
          
          from modcompiler.auto_update import (
              _download_modrinth_file,
              _extract_modrinth_description,
              _parse_bool,
              _select_latest_modrinth_version,
          )
          from modcompiler.modrinth import (
              ModrinthClient,
              build_modrinth_user_agent,
              normalize_modrinth_project_ref,
              select_primary_modrinth_file,
          )
          
          def fail(msg: str) -> None:
              raise SystemExit(msg)
          
          modrinth_url = os.environ.get("MODRINTH_PROJECT_URL", "").strip()
          jar_input = os.environ.get("MOD_JAR_PATH_INPUT", "").strip()
          desc_input = os.environ.get("MOD_DESCRIPTION_INPUT", "").strip()
          auto_fetch = _parse_bool(os.environ.get("AUTO_FETCH_MODRINTH"), True)
          
          setup_dir = Path(".workflow_state/setup")
          setup_dir.mkdir(parents=True, exist_ok=True)
          
          state = {"project": None, "versions": None, "project_ref": ""}
          
          def ensure_project() -> None:
              if state["project"] is not None:
                  return
              if not modrinth_url:
                  fail("Modrinth URL is required to auto-fetch the jar/description.")
              project_ref = normalize_modrinth_project_ref(modrinth_url)
              state["project_ref"] = project_ref
              token = os.environ.get("MODRINTH_TOKEN", "").strip() or None
              client = ModrinthClient(token=token, user_agent=build_modrinth_user_agent())
              project = client.resolve_project(project_ref)
              versions = client.request_json(
                  "GET",
                  f"/project/{urllib.parse.quote(project_ref, safe='')}/version",
                  params={"include_changelog": "false"},
              )
              if not isinstance(versions, list):
                  fail("Unexpected Modrinth versions response.")
              state["project"] = project
              state["versions"] = versions
          
          resolved_jar = ""
          resolved_jar_name = ""
          resolved_desc_name = ""

          def sanitize(value: str) -> str:
              return re.sub(r"[^A-Za-z0-9._-]+", "_", value.strip()) if value else ""

          def parse_mc_version(value: str):
              parts = []
              for token in value.split("."):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      parts.append(token)
              return parts

          def build_prefix() -> str:
              if state["versions"]:
                  latest = _select_latest_modrinth_version(state["versions"] or [])
                  if latest:
                      game_versions = [str(v) for v in latest.get("game_versions", []) if str(v).strip()]
                      mc_version = ""
                      if game_versions:
                          mc_version = sorted(game_versions, key=parse_mc_version)[-1]
                      loaders = [str(l) for l in latest.get("loaders", [])]
                      loader = loaders[0] if loaders else "unknown"
                      prefix = sanitize(f"{mc_version or 'unknown'}_{loader}")
                      return prefix
              return ""
          if jar_input:
              jar_path = Path(jar_input)
              if not jar_path.is_absolute():
                  jar_path = Path.cwd() / jar_path
              if not jar_path.exists():
                  if not auto_fetch:
                      fail(f"Mod jar not found: {jar_path}")
                  jar_input = ""
              else:
                  if modrinth_url:
                      ensure_project()
                  prefix = build_prefix()
                  name = f"{prefix}_{jar_path.name}" if prefix else jar_path.name
                  dest = setup_dir / name
                  shutil.copy2(jar_path, dest)
                  resolved_jar = str(dest)
                  resolved_jar_name = dest.name
          
          if not resolved_jar:
              if not auto_fetch:
                  fail("Mod jar path is required when auto-fetch is disabled.")
              ensure_project()
              latest = _select_latest_modrinth_version(state["versions"] or [])
              if latest is None:
                  fail("No Modrinth versions were available to download.")
              file_info = select_primary_modrinth_file(latest.get("files", []))
              if not file_info:
                  fail("No downloadable file was found for the latest Modrinth version.")
              file_url = str(file_info.get("url", "")).strip()
              if not file_url:
                  fail("Modrinth file entry is missing a download URL.")
              filename = str(file_info.get("filename", "")).strip()
              if not filename:
                  filename = f"{state['project_ref'] or 'mod'}.jar"
              prefix = build_prefix()
              name = f"{prefix}_{filename}" if prefix else filename
              dest = setup_dir / name
              _download_modrinth_file(file_url, dest)
              resolved_jar = str(dest)
              resolved_jar_name = dest.name
          
          resolved_desc = ""
          if desc_input:
              desc_path = Path(desc_input)
              dest = setup_dir / "description.txt"
              if desc_path.exists() and desc_path.is_file():
                  dest.write_text(desc_path.read_text(encoding="utf-8"), encoding="utf-8")
              else:
                  dest.write_text(desc_input, encoding="utf-8")
              resolved_desc = str(dest)
              resolved_desc_name = dest.name
          elif auto_fetch and modrinth_url:
              ensure_project()
              text = _extract_modrinth_description(state["project"] or {})
              if text:
                  dest = setup_dir / "description.txt"
                  dest.write_text(text, encoding="utf-8")
                  resolved_desc = str(dest)
                  resolved_desc_name = dest.name

          if resolved_jar_name:
              (setup_dir / "selected-jar.txt").write_text(resolved_jar_name, encoding="utf-8")
          if resolved_desc_name:
              (setup_dir / "selected-description.txt").write_text(resolved_desc_name, encoding="utf-8")
          
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"mod_jar_name={resolved_jar_name}\n")
              handle.write(f"mod_description_name={resolved_desc_name}\n")
          
          print(f"Resolved jar: {resolved_jar}")
          print(f"Resolved description: {resolved_desc or '-'}")
          PY

      - name: Prepare targets
        if: ${{ !(inputs.auto_fix_corrupted || inputs.auto_fix_only) }}
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          VERSION_RANGE: ${{ inputs.version_range }}
          UPDATE_MODE: ${{ inputs.update_mode }}
          PUBLISH_MODE: ${{ inputs.publish_mode }}
          MOD_DESCRIPTION_NAME: ${{ steps.setup.outputs.mod_description_name }}
          MOD_JAR_NAME: ${{ steps.setup.outputs.mod_jar_name }}
          AUTO_FETCH_MODRINTH: ${{ inputs.auto_fetch_modrinth }}
          AUTO_FIX_CORRUPTED: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
          AUTO_FIX_ONLY: ${{ inputs.auto_fix_only }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p .workflow_state/decomposed-single
          MOD_JAR_PATH=""
          MOD_DESCRIPTION=""
          if [ -n "$MOD_JAR_NAME" ]; then
            MOD_JAR_PATH=".workflow_state/setup/$MOD_JAR_NAME"
          fi
          if [ -n "$MOD_DESCRIPTION_NAME" ]; then
            MOD_DESCRIPTION=".workflow_state/setup/$MOD_DESCRIPTION_NAME"
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            if [ -f ".workflow_state/setup/selected-jar.txt" ]; then
              sel_name=$(cat ".workflow_state/setup/selected-jar.txt" 2>/dev/null || true)
              if [ -n "$sel_name" ]; then
                MOD_JAR_PATH=".workflow_state/setup/$sel_name"
              fi
            fi
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            candidate=$(ls -t .workflow_state/setup/*.jar 2>/dev/null | head -n1 || true)
            if [ -n "$candidate" ]; then
              MOD_JAR_PATH="$candidate"
            else
              candidate=$(ls -t *.jar 2>/dev/null | head -n1 || true)
              if [ -n "$candidate" ]; then
                MOD_JAR_PATH="$candidate"
              fi
            fi
          fi
          AUTO_FETCH_FOR_DECOMPOSE="false"
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            AUTO_FETCH_FOR_DECOMPOSE="true"
            MOD_JAR_PATH=""
          fi
          if [ -n "$MOD_JAR_PATH_MATRIX" ]; then
            AUTO_FIX_CORRUPTED="false"
            AUTO_FIX_ONLY="false"
          fi
          if [ -z "$MOD_DESCRIPTION" ] || [ ! -f "$MOD_DESCRIPTION" ]; then
            if [ -f ".workflow_state/setup/selected-description.txt" ]; then
              sel_desc=$(cat ".workflow_state/setup/selected-description.txt" 2>/dev/null || true)
              if [ -n "$sel_desc" ]; then
                MOD_DESCRIPTION=".workflow_state/setup/$sel_desc"
              fi
            fi
          fi

          AUTO_FIX_DOWNLOADS_DIR=""
          AUTO_FIX_DECOMPILED_DIR=""
          AUTO_FIX_REPORT_DIR=""
          if [ -d ".workflow_state/corrupt-downloads" ]; then
            AUTO_FIX_DOWNLOADS_DIR=".workflow_state/corrupt-downloads"
          fi
          if [ -d ".workflow_state/corrupt-decompiled" ]; then
            AUTO_FIX_DECOMPILED_DIR=".workflow_state/corrupt-decompiled"
          fi
          if [ -d ".workflow_state/corrupt-verdicts" ]; then
            AUTO_FIX_REPORT_DIR=".workflow_state/corrupt-verdicts"
          fi

          python build_mods.py auto-update-decompose \
            --mod-jar-path "$MOD_JAR_PATH" \
            --modrinth-project-url "$MODRINTH_PROJECT_URL" \
            --mod-description "$MOD_DESCRIPTION" \
            --auto-fetch-modrinth "$AUTO_FETCH_FOR_DECOMPOSE" \
            --auto-fix-corrupted "$AUTO_FIX_CORRUPTED" \
            --auto-fix-only "$AUTO_FIX_ONLY" \
            --auto-fix-corrupted-downloads-dir "$AUTO_FIX_DOWNLOADS_DIR" \
            --auto-fix-corrupted-decompiled-dir "$AUTO_FIX_DECOMPILED_DIR" \
            --auto-fix-corrupted-report-dir "$AUTO_FIX_REPORT_DIR" \
            --version-range "$VERSION_RANGE" \
            --update-mode "$UPDATE_MODE" \
            --publish-mode "$PUBLISH_MODE" \
            --manifest version-manifest.json \
            --plan-only "true" \
            --output-dir .workflow_state/plan

          python - <<'PY'
          import json
          from pathlib import Path

          matrix = json.loads(Path(".workflow_state/plan/matrix.json").read_text(encoding="utf-8"))
          state = json.loads(Path(".workflow_state/plan/state.json").read_text(encoding="utf-8"))

          count = len(matrix.get("include", []))
          print(f"Generated {count} version targets")

          import base64
          state_b64 = base64.b64encode(json.dumps(state).encode()).decode()
          Path(".workflow_state/plan_state.txt").write_text(state_b64, encoding="utf-8")
          PY

      - name: Prepare auto-fix jar matrix
        if: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import re
          from pathlib import Path

          from modcompiler.auto_update import (
              _download_modrinth_file,
              _fetch_modrinth_project_and_versions,
              _select_latest_modrinth_versions_by_loader_game,
          )
          from modcompiler.modrinth import normalize_modrinth_project_ref, select_primary_modrinth_file

          def sanitize(value: str) -> str:
              return re.sub(r"[^A-Za-z0-9._-]+", "_", value.strip()) if value else ""

          def parse_mc_version(value: str):
              parts = []
              for token in value.split("."):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      parts.append(token)
              return parts

          project_url = os.environ.get("MODRINTH_PROJECT_URL", "").strip()
          if not project_url:
              raise SystemExit("Modrinth project URL is required for auto-fix jar preparation.")

          project_ref = normalize_modrinth_project_ref(project_url)
          token = os.environ.get("MODRINTH_TOKEN", "").strip() or None
          project, versions = _fetch_modrinth_project_and_versions(project_ref, token)
          selected = _select_latest_modrinth_versions_by_loader_game(versions)
          if not selected:
              raise SystemExit("No Modrinth versions were available to prepare.")

          setup_root = Path(".workflow_state/setup")
          jar_root = setup_root / "latest-jars"
          jar_root.mkdir(parents=True, exist_ok=True)

          include: list[dict[str, str]] = []
          for version in selected:
              version_id = str(version.get("id") or version.get("version_number") or version.get("name") or "unknown")
              version_number = str(version.get("version_number") or "")
              loaders = [str(l) for l in version.get("loaders", []) if str(l).strip()]
              game_versions = [str(v) for v in version.get("game_versions", []) if str(v).strip()]
              if not loaders or not game_versions:
                  continue
              primary_loader = loaders[0]
              primary_game = sorted(game_versions, key=parse_mc_version)[-1]

              file_info = select_primary_modrinth_file(version.get("files", []))
              if not file_info:
                  continue
              file_url = str(file_info.get("url", "")).strip()
              if not file_url:
                  continue
              filename = str(file_info.get("filename", "")).strip()
              if not filename:
                  filename = f"{sanitize(project_ref)}-{sanitize(version_id)}.jar"

              dest = jar_root / sanitize(version_id) / filename
              if not dest.exists():
                  _download_modrinth_file(file_url, dest)

              include.append({
                  "version": primary_game,
                  "loader": primary_loader,
                  "slug": f"{primary_game}-{primary_loader}",
                  "mod_jar_path": str(dest.relative_to(setup_root)),
                  "modrinth_version_id": version_id,
                  "modrinth_version_number": version_number,
              })

          include.sort(key=lambda x: (x["version"], x["loader"], x.get("modrinth_version_id", "")))
          matrix = {"include": include}

          plan_dir = Path(".workflow_state/plan")
          plan_dir.mkdir(parents=True, exist_ok=True)
          (plan_dir / "matrix.json").write_text(json.dumps(matrix, indent=2), encoding="utf-8")

          state = {
              "auto_fix": True,
              "project_ref": project_ref,
              "total_targets": len(include),
          }
          (plan_dir / "state.json").write_text(json.dumps(state, indent=2), encoding="utf-8")

          state_b64 = base64.b64encode(json.dumps(state).encode()).decode()
          Path(".workflow_state/plan_state.txt").write_text(state_b64, encoding="utf-8")

          print(f"Prepared {len(include)} latest Modrinth jars for auto-fix.")
          PY

      - id: matrix
        name: Build matrix with key slots
        shell: bash
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          raw_keys = os.environ.get("OPENROUTER_API_KEY", "")
          keys = [line.strip() for line in raw_keys.splitlines() if line.strip()]
          if not keys:
              raise SystemExit("OPENROUTER_API_KEY is required (must include at least one key).")
          key_count = len(keys)

          matrix_path = Path(".workflow_state/plan/matrix.json")
          matrix = json.loads(matrix_path.read_text(encoding="utf-8"))
          include = matrix.get("include", [])

          for idx, entry in enumerate(include):
              entry["job_index"] = idx
              entry["key_index"] = idx % key_count

          matrix["include"] = include
          matrix_path.write_text(json.dumps(matrix, indent=2), encoding="utf-8")

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          output_path.write_text(
              "\n".join([
                  f"matrix={json.dumps(matrix)}",
                  f"key_count={key_count}",
                  f"total_targets={len(include)}",
              ]) + "\n",
              encoding="utf-8",
          )
          PY

      - id: base_decompiled
        name: Detect base decompiled cache
        shell: bash
        run: |
          if [ -d ".workflow_state/plan/_decompiled" ] && [ "$(find .workflow_state/plan/_decompiled -type f 2>/dev/null | head -n 1)" != "" ]; then
            echo "has_base_decompiled=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_base_decompiled=false" >> "$GITHUB_OUTPUT"
          fi

      - id: corrupt_artifacts
        name: Detect corrupt artifacts
        shell: bash
        run: |
          if [ -f ".workflow_state/corrupt-project.json" ]; then
            echo "has_corrupt_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_corrupt_project=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -d ".workflow_state/corrupt-downloads" ] && [ "$(find .workflow_state/corrupt-downloads -type f 2>/dev/null | head -n 1)" != "" ]; then
            echo "has_corrupt_downloads=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_corrupt_downloads=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -d ".workflow_state/corrupt-decompiled" ] && [ "$(find .workflow_state/corrupt-decompiled -type f 2>/dev/null | head -n 1)" != "" ]; then
            echo "has_corrupt_decompiled=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_corrupt_decompiled=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -d ".workflow_state/corrupt-verdicts" ] && [ "$(find .workflow_state/corrupt-verdicts -type f 2>/dev/null | head -n 1)" != "" ]; then
            echo "has_corrupt_verdicts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_corrupt_verdicts=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: setup-artifacts
          path: .workflow_state/setup

      - uses: actions/upload-artifact@v4
        with:
          name: plan-state
          path: .workflow_state/plan

      - uses: actions/upload-artifact@v4
        if: ${{ steps.base_decompiled.outputs.has_base_decompiled == 'true' }}
        with:
          name: base-decompiled
          path: .workflow_state/plan/_decompiled
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: ${{ steps.corrupt_artifacts.outputs.has_corrupt_project == 'true' }}
        with:
          name: corrupt-project
          path: .workflow_state/corrupt-project.json
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: ${{ steps.corrupt_artifacts.outputs.has_corrupt_downloads == 'true' }}
        with:
          name: corrupt-downloads
          path: .workflow_state/corrupt-downloads
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: ${{ steps.corrupt_artifacts.outputs.has_corrupt_decompiled == 'true' }}
        with:
          name: corrupt-decompiled
          path: .workflow_state/corrupt-decompiled
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        if: ${{ steps.corrupt_artifacts.outputs.has_corrupt_verdicts == 'true' }}
        with:
          name: corrupt-verdicts
          path: .workflow_state/corrupt-verdicts
          if-no-files-found: ignore

  main:
    name: Main (idx=${{ matrix.job_index }} slot=${{ matrix.key_index }} slug=${{ matrix.slug }})
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PySocks
        shell: bash
        run: |
          python3 -m pip install pysocks

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - uses: actions/cache@v4
        with:
          path: .workflow_state/minecraft-sources
          key: mc-sources-${{ runner.os }}-${{ matrix.slug }}-${{ hashFiles('version-manifest.json') }}
          restore-keys: |
            mc-sources-${{ runner.os }}-${{ matrix.slug }}-
            mc-sources-${{ runner.os }}-

      - uses: actions/download-artifact@v4
        with:
          name: setup-artifacts
          path: .workflow_state/setup

      - uses: actions/download-artifact@v4
        with:
          name: plan-state
          path: .workflow_state/plan

      - uses: actions/download-artifact@v4
        if: ${{ needs.setup.outputs.has_base_decompiled == 'true' }}
        continue-on-error: true
        with:
          name: base-decompiled
          path: .workflow_state/base-decompiled

      - uses: actions/download-artifact@v4
        if: ${{ needs.setup.outputs.has_corrupt_project == 'true' }}
        with:
          name: corrupt-project
          path: .workflow_state

      - uses: actions/download-artifact@v4
        if: ${{ needs.setup.outputs.has_corrupt_downloads == 'true' }}
        with:
          name: corrupt-downloads
          path: .workflow_state/corrupt-downloads

      - uses: actions/download-artifact@v4
        if: ${{ needs.setup.outputs.has_corrupt_decompiled == 'true' }}
        with:
          name: corrupt-decompiled
          path: .workflow_state/corrupt-decompiled

      - uses: actions/download-artifact@v4
        if: ${{ needs.setup.outputs.has_corrupt_verdicts == 'true' }}
        with:
          name: corrupt-verdicts
          path: .workflow_state/corrupt-verdicts

      - name: Start Tor proxy
        shell: bash
        run: |
          set -euo pipefail
          TOR_BIN="tools/tor/tor"
          GEOIP="tools/tor/geoip"
          GEOIP6="tools/tor/geoip6"
          if [ ! -x "$TOR_BIN" ]; then
            echo "Tor binary not found or not executable: $TOR_BIN"
            ls -la tools/tor || true
            exit 1
          fi
          if [ ! -f "$GEOIP" ] || [ ! -f "$GEOIP6" ]; then
            echo "Missing geoip files in tools/tor (expected geoip and geoip6)."
            ls -la tools/tor || true
            exit 1
          fi
          chmod +x "$TOR_BIN" || true
          export LD_LIBRARY_PATH="$PWD/tools/tor:${LD_LIBRARY_PATH:-}"

          TOR_DATA_DIR=".workflow_state/tor/${{ matrix.slug }}"
          TOR_LOG="${TOR_DATA_DIR}/tor.log"
          TOR_PID="${TOR_DATA_DIR}/tor.pid"
          TORRC="${TOR_DATA_DIR}/torrc"
          TOR_SOCKS_PORT="9050"
          TOR_SOCKS_PROXY="socks5h://127.0.0.1:${TOR_SOCKS_PORT}"

          mkdir -p "$TOR_DATA_DIR"

          get_ip() {
            curl -s --max-time 15 https://api.ipify.org || true
          }

          get_tor_ip() {
            curl -s --max-time 30 --socks5-hostname 127.0.0.1:${TOR_SOCKS_PORT} https://api.ipify.org || true
          }

          check_openrouter() {
            curl -s --max-time 20 --socks5-hostname 127.0.0.1:${TOR_SOCKS_PORT} https://openrouter.ai/api/v1/models >/dev/null 2>&1
          }

          DIRECT_IP="$(get_ip)"
          echo "Direct IP: ${DIRECT_IP}"

          attempt=0
          while true; do
            attempt=$((attempt + 1))
            if [ -f "$TOR_PID" ]; then
              kill "$(cat "$TOR_PID")" 2>/dev/null || true
              rm -f "$TOR_PID"
            fi
            rm -f "$TOR_LOG"
            cat >"$TORRC" <<EOF
          SocksPort ${TOR_SOCKS_PORT}
          DataDirectory ${TOR_DATA_DIR}
          GeoIPFile ${GEOIP}
          GeoIPv6File ${GEOIP6}
          PidFile ${TOR_PID}
          Log notice file ${TOR_LOG}
          EOF
            "$TOR_BIN" -f "$TORRC" &
            TOR_LAUNCH_PID=$!

            for i in $(seq 1 90); do
              if grep -q "Bootstrapped 100% (done)" "$TOR_LOG" 2>/dev/null; then
                break
              fi
              sleep 1
            done

            if ! grep -q "Bootstrapped 100% (done)" "$TOR_LOG" 2>/dev/null; then
              echo "Tor did not bootstrap (attempt $attempt). Retrying..."
              kill "$TOR_LAUNCH_PID" 2>/dev/null || true
              sleep 2
              continue
            fi

            TOR_IP="$(get_tor_ip)"
            echo "Tor IP: ${TOR_IP}"
            if [ -n "$DIRECT_IP" ] && [ -n "$TOR_IP" ] && [ "$DIRECT_IP" != "$TOR_IP" ]; then
              if check_openrouter; then
                echo "Tor can reach OpenRouter."
                break
              fi
              echo "Tor exit cannot reach OpenRouter; restarting (attempt $attempt)."
            else
              echo "Tor IP same or empty; restarting (attempt $attempt)."
            fi
            kill "$TOR_LAUNCH_PID" 2>/dev/null || true
            if [ -f "$TOR_PID" ]; then
              kill "$(cat "$TOR_PID")" 2>/dev/null || true
            fi
            sleep 2
          done

          if ! check_openrouter; then
            echo "Tor proxy bootstrapped but OpenRouter unreachable via Tor."
          fi
          echo "TOR_SOCKS_PROXY=${TOR_SOCKS_PROXY}" >> "$GITHUB_ENV"
          echo "TOR_EXIT_IP=${TOR_IP}" >> "$GITHUB_ENV"
          echo "OPENROUTER_SOCKS_PROXY=${TOR_SOCKS_PROXY}" >> "$GITHUB_ENV"

      - name: Decompose target
        shell: bash
        env:
          MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}
          VERSION_RANGE: ${{ inputs.version_range }}
          UPDATE_MODE: ${{ inputs.update_mode }}
          PUBLISH_MODE: ${{ inputs.publish_mode }}
          MOD_DESCRIPTION_NAME: ${{ needs.setup.outputs.mod_description_name }}
          MOD_JAR_NAME: ${{ needs.setup.outputs.mod_jar_name }}
          MOD_JAR_PATH_MATRIX: ${{ matrix.mod_jar_path }}
          AUTO_FETCH_MODRINTH: ${{ inputs.auto_fetch_modrinth }}
          AUTO_FIX_CORRUPTED: ${{ inputs.auto_fix_corrupted || inputs.auto_fix_only }}
          AUTO_FIX_ONLY: ${{ inputs.auto_fix_only }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          mkdir -p .workflow_state/decomposed-single
          MOD_JAR_PATH=""
          MOD_DESCRIPTION=""
          if [ -n "$MOD_JAR_PATH_MATRIX" ]; then
            if [ -f ".workflow_state/setup/$MOD_JAR_PATH_MATRIX" ]; then
              MOD_JAR_PATH=".workflow_state/setup/$MOD_JAR_PATH_MATRIX"
            elif [ -f "$MOD_JAR_PATH_MATRIX" ]; then
              MOD_JAR_PATH="$MOD_JAR_PATH_MATRIX"
            fi
          fi
          if [ -z "$MOD_JAR_PATH" ] && [ -n "$MOD_JAR_NAME" ]; then
            MOD_JAR_PATH=".workflow_state/setup/$MOD_JAR_NAME"
          fi
          if [ -n "$MOD_DESCRIPTION_NAME" ]; then
            MOD_DESCRIPTION=".workflow_state/setup/$MOD_DESCRIPTION_NAME"
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            if [ -f ".workflow_state/setup/selected-jar.txt" ]; then
              sel_name=$(cat ".workflow_state/setup/selected-jar.txt" 2>/dev/null || true)
              if [ -n "$sel_name" ]; then
                MOD_JAR_PATH=".workflow_state/setup/$sel_name"
              fi
            fi
          fi
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            candidate=$(ls -t .workflow_state/setup/*.jar 2>/dev/null | head -n1 || true)
            if [ -n "$candidate" ]; then
              MOD_JAR_PATH="$candidate"
            else
              candidate=$(ls -t *.jar 2>/dev/null | head -n1 || true)
              if [ -n "$candidate" ]; then
                MOD_JAR_PATH="$candidate"
              fi
            fi
          fi
          AUTO_FETCH_FOR_DECOMPOSE="false"
          if [ -z "$MOD_JAR_PATH" ] || [ ! -f "$MOD_JAR_PATH" ]; then
            AUTO_FETCH_FOR_DECOMPOSE="true"
            MOD_JAR_PATH=""
          fi
          if [ -z "$MOD_DESCRIPTION" ] || [ ! -f "$MOD_DESCRIPTION" ]; then
            if [ -f ".workflow_state/setup/selected-description.txt" ]; then
              sel_desc=$(cat ".workflow_state/setup/selected-description.txt" 2>/dev/null || true)
              if [ -n "$sel_desc" ]; then
                MOD_DESCRIPTION=".workflow_state/setup/$sel_desc"
              fi
            fi
          fi

          AUTO_FIX_DOWNLOADS_DIR=""
          AUTO_FIX_DECOMPILED_DIR=""
          AUTO_FIX_REPORT_DIR=""
          if [ -d ".workflow_state/corrupt-downloads" ]; then
            AUTO_FIX_DOWNLOADS_DIR=".workflow_state/corrupt-downloads"
          fi
          if [ -d ".workflow_state/corrupt-decompiled" ]; then
            AUTO_FIX_DECOMPILED_DIR=".workflow_state/corrupt-decompiled"
          fi
          if [ -d ".workflow_state/corrupt-verdicts" ]; then
            AUTO_FIX_REPORT_DIR=".workflow_state/corrupt-verdicts"
          fi

          python build_mods.py auto-update-decompose \
            --mod-jar-path "$MOD_JAR_PATH" \
            --modrinth-project-url "$MODRINTH_PROJECT_URL" \
            --mod-description "$MOD_DESCRIPTION" \
            --auto-fetch-modrinth "$AUTO_FETCH_FOR_DECOMPOSE" \
            --auto-fix-corrupted "$AUTO_FIX_CORRUPTED" \
            --auto-fix-only "$AUTO_FIX_ONLY" \
            --auto-fix-corrupted-downloads-dir "$AUTO_FIX_DOWNLOADS_DIR" \
            --auto-fix-corrupted-decompiled-dir "$AUTO_FIX_DECOMPILED_DIR" \
            --auto-fix-corrupted-report-dir "$AUTO_FIX_REPORT_DIR" \
            --reuse-decompiled-dir ".workflow_state/base-decompiled" \
            --only-target "${{ matrix.version }}-${{ matrix.loader }}" \
            --version-range "$VERSION_RANGE" \
            --update-mode "$UPDATE_MODE" \
            --publish-mode "$PUBLISH_MODE" \
            --manifest version-manifest.json \
            --output-dir .workflow_state/decomposed-single

      - name: Setup workspace
        shell: bash
        run: |
          mkdir -p .workflow_artifacts/ai-${{ matrix.slug }}
          VERSION_DIR=".workflow_state/decomposed-single/${{ matrix.version }}-${{ matrix.loader }}"
          if [ -d "$VERSION_DIR" ]; then
            cp -r "$VERSION_DIR"/* .workflow_artifacts/ai-${{ matrix.slug }}/
          else
            echo "Version folder not found: $VERSION_DIR"
            ls -la .workflow_state/decomposed-single/
          fi

      - name: Prepare Minecraft sources (per target)
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          from modcompiler.auto_update import _get_library_sources
          
          version_dir = Path(".workflow_artifacts/ai-${{ matrix.slug }}")
          context_path = version_dir / "context.json"
          if not context_path.exists():
              print("context.json not found; skipping library source prep.")
              raise SystemExit(0)
          
          context = json.loads(context_path.read_text(encoding="utf-8"))
          target_version = context.get("target_version", "")
          target_loader = context.get("target_loader", "")
          if not target_version or not target_loader:
              print("Missing target version/loader; skipping library source prep.")
              raise SystemExit(0)
          
          sources = _get_library_sources(version_dir, target_version, target_loader, allow_prepare=True)
          print(f"Library sources for {target_version}-{target_loader}: {sources or 'not found'}")
          PY

      - name: Select OpenRouter model
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          model = "openrouter/hunter-alpha"
          
          env_path = os.environ.get("GITHUB_ENV")
          with open(env_path, "a", encoding="utf-8") as handle:
              handle.write(f"OPENROUTER_PRIMARY_MODEL={model}\n")
          print(f"Selected OpenRouter model: {model}")
          PY

      - name: Acquire OpenRouter key lease
        shell: bash
        env:
          KEY_INDEX: ${{ matrix.key_index }}
          JOB_INDEX: ${{ matrix.job_index }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import time
          import urllib.request

          slot = int(os.environ.get("KEY_INDEX", "0"))
          idx = int(os.environ.get("JOB_INDEX", "0"))
          token = os.environ.get("GITHUB_TOKEN", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          raw_keys = os.environ.get("OPENROUTER_API_KEY", "")

          keys = [line.strip() for line in raw_keys.splitlines() if line.strip()]
          if not keys:
              raise SystemExit("OPENROUTER_API_KEY missing or empty.")

          session = {
              "headers": {
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
              }
          }

          def fetch_jobs(page: int = 1):
              url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=session["headers"])
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
              return data

          def list_main_jobs():
              jobs = []
              page = 1
              while True:
                  data = fetch_jobs(page)
                  jobs.extend(data.get("jobs", []))
                  if len(data.get("jobs", [])) < 100:
                      break
                  page += 1
              return jobs

          pattern = re.compile(r"Main \(idx=(\d+) slot=(\d+) ")
          delay = 10
          while True:
              blocking = []
              for job in list_main_jobs():
                  name = job.get("name", "")
                  match = pattern.search(name)
                  if not match:
                      continue
                  job_idx = int(match.group(1))
                  job_slot = int(match.group(2))
                  status = job.get("status", "")
                  if job_slot == slot and job_idx < idx and status != "completed":
                      blocking.append(name)
              if not blocking:
                  break
              print(f"Waiting for key slot {slot}; blocking jobs: {blocking}")
              time.sleep(delay)
              delay = min(delay + 5, 60)

          selected = keys[slot % len(keys)]
          env_path = os.environ.get("GITHUB_ENV")
          with open(env_path, "a", encoding="utf-8") as handle:
              handle.write("OPENROUTER_API_KEY<<EOF\n")
              handle.write(selected + "\n")
              handle.write("EOF\n")
          print("::add-mask::" + selected)
          print(f"Leased key slot {slot} for job idx={idx}.")
          PY

      - name: Run AI rebuild
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          OPENROUTER_SOCKS_PROXY: ${{ env.OPENROUTER_SOCKS_PROXY }}
        run: |
          set -x
          python build_mods.py ai-rebuild \
            --version-dir ".workflow_artifacts/ai-${{ matrix.slug }}" \
            --output-dir ".workflow_artifacts/ai-${{ matrix.slug }}" \
            --artifact-dir ".workflow_artifacts/per-mod/${{ matrix.slug }}" 2>&1

      - name: Mask Modrinth token (immediate)
        if: ${{ inputs.modrinth_project_url != '' && inputs.publish_mode == 'immediately' }}
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - name: Publish to Modrinth immediately
        if: ${{ inputs.modrinth_project_url != '' && inputs.publish_mode == 'immediately' }}
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          status=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path(".workflow_artifacts/per-mod/${{ matrix.slug }}/result.json").read_text())
          print(data.get("status", "failed"))
          PY
          )
          if [ "$status" != "success" ]; then
            echo "Skip Modrinth publish (status=$status)"
            exit 0
          fi
          python3 build_mods.py bundle \
            --artifacts-root ".workflow_artifacts/per-mod/${{ matrix.slug }}" \
            --output-dir ".workflow_artifacts/publish-bundle/${{ matrix.slug }}"
          python3 build_mods.py publish-modrinth \
            --artifacts-root ".workflow_artifacts/publish-bundle/${{ matrix.slug }}" \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir ".workflow_artifacts/modrinth-publish/${{ matrix.slug }}"
          exit_code=$?
          set -e
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-mod-${{ matrix.slug }}
          path: .workflow_artifacts/per-mod/${{ matrix.slug }}

      - uses: actions/upload-artifact@v4
        if: ${{ always() && inputs.publish_mode == 'immediately' }}
        with:
          name: modrinth-publish-${{ matrix.slug }}
          path: .workflow_artifacts/modrinth-publish/${{ matrix.slug }}

      - name: Wait for all Main jobs to complete
        if: ${{ always() && matrix.job_index == 0 }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JOB_DISPLAY_NAME: Main (idx=${{ matrix.job_index }} slot=${{ matrix.key_index }} slug=${{ matrix.slug }})
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import time
          import urllib.request

          token = os.environ.get("GITHUB_TOKEN", "").strip()
          repo = os.environ.get("GITHUB_REPOSITORY", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          current_name = os.environ.get("JOB_DISPLAY_NAME", "")

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
          }

          def fetch_jobs(page: int = 1):
              url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100&page={page}"
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  data = json.loads(resp.read().decode("utf-8"))
              return data

          def list_main_jobs():
              jobs = []
              page = 1
              while True:
                  data = fetch_jobs(page)
                  jobs.extend(data.get("jobs", []))
                  if len(data.get("jobs", [])) < 100:
                      break
                  page += 1
              return jobs

          pattern = re.compile(r"Main \(idx=(\d+) slot=(\d+) ")
          delay = 15
          while True:
              pending = []
              for job in list_main_jobs():
                  name = job.get("name", "")
                  if not pattern.search(name):
                      continue
                  if current_name and name == current_name:
                      continue
                  status = job.get("status", "")
                  if status != "completed":
                      pending.append(name)
              if not pending:
                  break
              print(f"Waiting for all Main jobs to complete. Pending: {pending}")
              time.sleep(delay)
              delay = min(delay + 5, 60)
          PY

      - uses: actions/download-artifact@v4
        if: ${{ always() && matrix.job_index == 0 }}
        with:
          pattern: ai-mod-*
          path: .workflow_downloads/ai-mods

      - uses: actions/download-artifact@v4
        if: ${{ always() && matrix.job_index == 0 }}
        continue-on-error: true
        with:
          pattern: modrinth-publish*
          path: .workflow_downloads/modrinth

      - name: Bundle results
        if: ${{ always() && matrix.job_index == 0 }}
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p .workflow_artifacts/combined
          mkdir -p .workflow_artifacts/combined/progress
          
          python3 build_mods.py bundle \
            --artifacts-root .workflow_downloads/ai-mods \
            --output-dir .workflow_artifacts/combined
          
          for dir in .workflow_downloads/ai-mods/*/; do
            slug=$(basename "$dir" | sed 's/ai-mod-//')
            if [ -d "$dir" ]; then
              zip -r ".workflow_artifacts/combined/progress/${slug}.zip" "$dir" 2>/dev/null || true
            fi
          done
          
          zip -r results.zip .workflow_artifacts/combined/mods 2>/dev/null || true
          zip -r progress.zip .workflow_artifacts/combined/progress 2>/dev/null || true
          exit 0

      - name: Publish bundle to Modrinth
        if: ${{ always() && matrix.job_index == 0 && inputs.modrinth_project_url != '' && inputs.publish_mode == 'bundle-only' }}
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          python3 build_mods.py publish-modrinth \
            --artifacts-root .workflow_artifacts/combined \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir .workflow_artifacts/modrinth-publish
          exit_code=$?
          set -e
          exit 0

      - name: Build summary
        if: ${{ always() && matrix.job_index == 0 }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          ai_root = Path(".workflow_downloads/ai-mods")
          modrinth_root = Path(".workflow_downloads/modrinth")

          ai_results = []
          for path in ai_root.rglob("result.json"):
            try:
              data = json.loads(path.read_text(encoding="utf-8"))
            except Exception:
              continue
            if not all(key in data for key in ("slug", "loader", "minecraft_version")):
              continue
            ai_results.append(data)

          total = len(ai_results)
          success = sum(1 for r in ai_results if r.get("status") == "success")
          failed = total - success

          total_calls = 0
          total_latency = 0.0
          success_calls = []

          for r in ai_results:
            metrics = r.get("ai_metrics", {})
            calls = int(metrics.get("api_calls", 0) or 0)
            latency = float(metrics.get("api_latency_seconds_total", 0.0) or 0.0)
            total_calls += calls
            total_latency += latency
            if r.get("status") == "success" and calls:
              success_calls.append(calls)

          avg_latency = (total_latency / total_calls) if total_calls else 0.0
          avg_calls_success = (sum(success_calls) / len(success_calls)) if success_calls else 0.0

          publish_map = {}
          if modrinth_root.exists():
            for path in modrinth_root.rglob("result.json"):
              try:
                data = json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                continue
              for upload in data.get("uploads", []) or []:
                key = (upload.get("slug"), upload.get("loader"), upload.get("minecraft_version"))
                publish_map[key] = upload

          lines = [
            "# Auto Update Summary",
            "",
            "## Overview",
            f"- Total targets: {total}",
            f"- Successful: {success}",
            f"- Failed: {failed}",
            "",
            "## AI Metrics",
            f"- Total AI requests: {total_calls}",
            f"- Average AI latency: {avg_latency * 1000:.0f} ms",
            f"- Average AI calls to success: {avg_calls_success:.2f}",
            "",
            "## Per-Target Status",
            "| Slug | Loader | Minecraft | Status | AI Calls | Publish Status | Note |",
            "| --- | --- | --- | --- | --- | --- | --- |",
          ]

          for r in sorted(ai_results, key=lambda x: (x.get("slug", ""), x.get("loader", ""), x.get("minecraft_version", ""))):
            key = (r.get("slug"), r.get("loader"), r.get("minecraft_version"))
            publish = publish_map.get(key, {})
            publish_status = publish.get("publish_status", "-")
            note = publish.get("note", "-") or "-"
            calls = r.get("ai_metrics", {}).get("api_calls", 0)
            lines.append(
              "| {slug} | {loader} | {mc} | {status} | {calls} | {publish} | {note} |".format(
                slug=r.get("slug", "-"),
                loader=r.get("loader", "-"),
                mc=r.get("minecraft_version", "-"),
                status=r.get("status", "-"),
                calls=calls,
                publish=publish_status,
                note=note.replace("\n", " "),
              )
            )

          summary_dir = Path(".workflow_artifacts/summary")
          summary_dir.mkdir(parents=True, exist_ok=True)
          summary_path = summary_dir / "SUMMARY.md"
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          summary_json = {
            "total": total,
            "success": success,
            "failed": failed,
            "total_ai_requests": total_calls,
            "average_ai_latency_seconds": avg_latency,
            "average_ai_calls_to_success": avg_calls_success,
          }
          (summary_dir / "summary.json").write_text(json.dumps(summary_json, indent=2), encoding="utf-8")
          print(f"Wrote summary to {summary_path}")
          PY

      - uses: actions/upload-artifact@v4
        if: ${{ always() && matrix.job_index == 0 }}
        with:
          name: final-results
          path: |
            .workflow_artifacts/combined
            results.zip
            progress.zip

      - uses: actions/upload-artifact@v4
        if: ${{ always() && matrix.job_index == 0 && inputs.publish_mode == 'bundle-only' && inputs.modrinth_project_url != '' }}
        with:
          name: modrinth-publish
          path: .workflow_artifacts/modrinth-publish

      - uses: actions/upload-artifact@v4
        if: ${{ always() && matrix.job_index == 0 }}
        with:
          name: auto-update-summary
          path: .workflow_artifacts/summary

      - if: ${{ always() && matrix.job_index == 0 }}
