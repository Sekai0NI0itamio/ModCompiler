name: Port Mod to CurseForge

# ---------------------------------------------------------------------------
# Purpose
# -------
# Reads all versions from a Modrinth project, compares them against an
# existing CurseForge project, and uploads every (mc_version, loader) combo
# that is present on Modrinth but missing on CurseForge.
#
# Only the latest upload per (mc_version, loader) pair is considered from
# Modrinth (chosen by date_published), so superseded re-uploads are ignored.
#
# Tokens used
# -----------
#   MODRINTH_TOKEN   - repository secret (read access, for private/draft projects)
#   CURSEFORGE_TOKEN - repository secret (upload access)
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      modrinth_url:
        description: >
          Modrinth project URL or slug.
          Example: https://modrinth.com/mod/world-auto-feeder
        required: true
        type: string
      curseforge_url:
        description: >
          CurseForge numeric project ID, or a URL containing it.
          Find it in the right sidebar of your project page: "Project ID: XXXXXXX"
          Example: 1234567
        required: true
        type: string
      dry_run:
        description: >
          Dry run — show what would be uploaded without uploading anything.
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  port:
    name: Port versions to CurseForge
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Mask secrets so they never appear in logs ────────────────────────
      - name: Mask secrets
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ];   then echo "::add-mask::$MODRINTH_TOKEN";   fi
          if [ -n "$CURSEFORGE_TOKEN" ]; then echo "::add-mask::$CURSEFORGE_TOKEN"; fi

      # ── Main porting logic ───────────────────────────────────────────────
      - name: Diff and upload
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          MODRINTH_URL: ${{ inputs.modrinth_url }}
          CURSEFORGE_URL: ${{ inputs.curseforge_url }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          python3 - <<'PY'
          import json, os, re, sys, tempfile, time, urllib.error, urllib.parse, urllib.request, uuid
          from pathlib import Path

          # ----------------------------------------------------------------
          # Config
          # ----------------------------------------------------------------
          MODRINTH_API      = "https://api.modrinth.com/v2"
          CURSEFORGE_API    = "https://minecraft.curseforge.com"   # upload endpoint
          USER_AGENT        = "ModCompilerPortScript/1.0 (github.com/modcompiler)"

          MODRINTH_TOKEN   = os.environ.get("MODRINTH_TOKEN", "").strip()
          CURSEFORGE_TOKEN = os.environ.get("CURSEFORGE_TOKEN", "").strip()
          DRY_RUN          = os.environ.get("DRY_RUN", "false").strip().lower() in {"true", "1", "yes"}

          if not CURSEFORGE_TOKEN:
              sys.exit("[ERROR] CURSEFORGE_TOKEN secret is not set on this repository.")

          # Loader name mapping: Modrinth (lowercase) -> CurseForge display name
          LOADER_MAP = {"forge": "Forge", "fabric": "Fabric", "neoforge": "NeoForge", "quilt": "Quilt"}
          KNOWN_LOADERS = set(LOADER_MAP.values()) | {"liteloader", "rift"}

          RELEASE_TYPE_MAP = {"release": "release", "beta": "beta", "alpha": "alpha"}

          # Fixed CurseForge loader version IDs (from official API docs — these never change)
          # Source: https://wiki.devnemo.com/third-party/curseforge-upload-api
          CF_LOADER_IDS = {
              "fabric":   7499,
              "forge":    7498,
              "neoforge": 10150,
              "quilt":    9153,
              "liteloader": 5000,
          }

          # gameVersionTypeID for Minecraft versions on CurseForge
          # All MC versions share type 1 (the main Minecraft game type)
          # Loaders use gameVersionTypeID 68441
          CF_LOADER_TYPE_ID = 68441

          # ----------------------------------------------------------------
          # Helpers: URL normalisation
          # ----------------------------------------------------------------
          def modrinth_ref(url: str) -> str:
              url = url.strip().rstrip("/")
              m = re.search(r"modrinth\.com/(?:mod|plugin|resourcepack|shader|datapack|modpack)/([^/?#]+)", url)
              return m.group(1) if m else url

          def curseforge_project_id(url: str) -> str:
              url = url.strip().rstrip("/")
              m = re.search(r"curseforge\.com/minecraft/mc-mods/([^/?#]+)", url)
              return m.group(1) if m else url

          # ----------------------------------------------------------------
          # Helpers: HTTP
          # ----------------------------------------------------------------
          def _get(base: str, path: str, token: str | None, extra_headers: dict | None = None) -> object:
              url = base + path
              headers = {"User-Agent": USER_AGENT, "Accept": "application/json"}
              if token:
                  key = "Authorization" if base == MODRINTH_API else "X-Api-Token"
                  headers[key] = token
              if extra_headers:
                  headers.update(extra_headers)
              req = urllib.request.Request(url, headers=headers)
              for attempt in range(1, 6):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode("utf-8", errors="replace"))
                  except urllib.error.HTTPError as e:
                      body = e.read().decode("utf-8", errors="replace")[:300]
                      if e.code == 404:
                          sys.exit(f"[ERROR] Not found (HTTP 404): {url}")
                      if e.code in {429, 500, 502, 503, 504} and attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"[ERROR] HTTP {e.code}: {url}\n{body}")
                  except urllib.error.URLError as e:
                      if attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      sys.exit(f"[ERROR] Network error: {e.reason}")
              sys.exit("[ERROR] API request failed after retries.")

          def modrinth_get(path: str) -> object:
              return _get(MODRINTH_API, path, MODRINTH_TOKEN or None)

          def curseforge_get(path: str) -> object:
              return _get(CURSEFORGE_API, path, CURSEFORGE_TOKEN)

          def resolve_cf_numeric_id(slug_or_id: str) -> str:
              """Validate we have a numeric project ID — the upload API requires it."""
              if slug_or_id.isdigit():
                  return slug_or_id
              sys.exit(
                  f"[ERROR] '{slug_or_id}' is a slug, not a numeric project ID.\n"
                  f"Find the numeric ID in the right sidebar of your CurseForge project page\n"
                  f"under 'Project ID: XXXXXXX', then pass that number instead."
              )

          def download_file(url: str, dest: Path) -> None:
              req = urllib.request.Request(url, headers={"User-Agent": USER_AGENT})
              for attempt in range(1, 4):
                  try:
                      with urllib.request.urlopen(req, timeout=120) as r:
                          dest.write_bytes(r.read())
                      return
                  except urllib.error.URLError as e:
                      if attempt < 3:
                          time.sleep(3)
                          continue
                      sys.exit(f"[ERROR] Download failed {url}: {e.reason}")

          # ----------------------------------------------------------------
          # Helpers: version logic
          # ----------------------------------------------------------------
          def primary_file(version: dict) -> dict | None:
              files = version.get("files", [])
              if not files:
                  return None
              primary = [f for f in files if f.get("primary")]
              return (primary or files)[0]

          def latest_per_combo(versions: list) -> dict:
              """Keep the most recently published version per (mc_version, loader) pair."""
              best: dict[tuple, dict] = {}
              for v in versions:
                  pub = v.get("date_published", "")
                  for mc in v.get("game_versions", []):
                      for loader in v.get("loaders", []):
                          key = (mc, loader.lower())
                          if key not in best or pub > best[key].get("date_published", ""):
                              best[key] = v
              return best

          def resolve_cf_version_ids(mc_version: str, loader: str, cf_mc_lookup: dict) -> list:
              """
              Return the CurseForge game version IDs for a mc_version + loader pair.
              MC version ID: looked up from the game versions API (name -> id).
              Loader ID: fixed constant from CF_LOADER_IDS — loaders have permanent IDs.
              """
              ids = []

              # MC version — exact match first, then strip patch (1.20.1 -> 1.20)
              if mc_version in cf_mc_lookup:
                  ids.append(cf_mc_lookup[mc_version])
              else:
                  parts = mc_version.split(".")
                  if len(parts) == 3:
                      short = f"{parts[0]}.{parts[1]}"
                      if short in cf_mc_lookup:
                          ids.append(cf_mc_lookup[short])
              if not ids:
                  print(f"  [WARN] No CurseForge version ID found for MC {mc_version!r}")

              # Loader — use fixed hardcoded ID, not the game versions list
              loader_id = CF_LOADER_IDS.get(loader.lower())
              if loader_id:
                  ids.append(loader_id)
              else:
                  print(f"  [WARN] No hardcoded CurseForge loader ID for {loader!r} — skipping loader tag")

              return ids

          # ----------------------------------------------------------------
          # Step 1: Fetch Modrinth
          # ----------------------------------------------------------------
          mr_ref = modrinth_ref(os.environ["MODRINTH_URL"])
          cf_id  = curseforge_project_id(os.environ["CURSEFORGE_URL"])

          print(f"\n{'='*70}")
          print(f"  Modrinth  : {mr_ref}")
          print(f"  CurseForge: {cf_id}")
          print(f"  Dry run   : {DRY_RUN}")
          print(f"{'='*70}\n")

          print("[1/4] Fetching Modrinth project and versions...")
          mr_project = modrinth_get(f"/project/{urllib.parse.quote(mr_ref, safe='')}")
          mr_id      = mr_project["id"]
          print(f"  Title: {mr_project.get('title')}  ID: {mr_id}")

          all_versions = modrinth_get(f"/project/{urllib.parse.quote(mr_id, safe='')}/version")
          if not isinstance(all_versions, list):
              all_versions = []
          print(f"  Total version entries: {len(all_versions)}")

          mr_latest = latest_per_combo(all_versions)
          print(f"  Unique (mc_version, loader) combos: {len(mr_latest)}")

          # ----------------------------------------------------------------
          # Step 2: Fetch CurseForge game version IDs (public, no auth needed)
          # ----------------------------------------------------------------
          print("\n[2/4] Fetching CurseForge game version list...")
          cf_game_versions = curseforge_get("/api/game/versions")
          if not isinstance(cf_game_versions, list):
              cf_game_versions = []

          # MC-version-only lookup.
          # We filter by name pattern: real MC versions look like "1.20.1", "1.8.9", "26.1.2"
          # We explicitly exclude entries whose names look like Java versions ("Java 17"),
          # environment tags ("Client", "Server"), or other non-MC entries.
          # The gameVersionTypeID approach is unreliable because CurseForge uses multiple
          # type IDs for different MC version families (e.g. 1.x uses one type, 26.x another).
          import re as _re
          _mc_pattern = _re.compile(r'^\d+\.\d+')  # starts with digits.digits
          _exclude_names = {"client", "server", "bukkit", "cauldron", "thermos"}
          cf_mc_lookup = {
              v["name"]: v["id"]
              for v in cf_game_versions
              if _mc_pattern.match(v.get("name", ""))
              and v.get("name", "").lower() not in _exclude_names
              and "snapshot" not in v.get("name", "").lower()
              and "pre" not in v.get("name", "").lower()
              and "rc" not in v.get("name", "").lower()
              and "alpha" not in v.get("name", "").lower()
              and "beta" not in v.get("name", "").lower()
          }
          print(f"  CurseForge MC version entries: {len(cf_mc_lookup)}")

          # Debug: show what IDs the failing versions map to
          # Print all entries whose ID is in the 16100-16200 range (the bad ones)
          bad_range = {v["name"]: v for v in cf_game_versions if 16100 <= v.get("id", 0) <= 16200}
          if bad_range:
              print(f"  DEBUG — game version entries with IDs 16100-16200 ({len(bad_range)} entries):")
              for name, entry in sorted(bad_range.items()):
                  print(f"    id={entry['id']}  typeID={entry.get('gameVersionTypeID')}  name={name!r}  slug={entry.get('slug')!r}")
          # Also show what 1.21.3, 1.21.4 etc. resolve to
          for test_ver in ["1.21.3", "1.21.4", "1.21.5", "1.21.6", "1.21.7", "1.21.8", "1.21.9", "26.1", "26.1.1", "26.1.2"]:
              resolved = cf_mc_lookup.get(test_ver)
              print(f"  DEBUG — {test_ver!r} -> {resolved}")
          cf_numeric_id = resolve_cf_numeric_id(cf_id)

          # NOTE: The /api/projects/{id}/files listing endpoint requires project
          # ownership and returns 403 for tokens that can upload but not list.
          # We skip the diff check entirely and just attempt to upload all versions
          # from Modrinth. CurseForge will return a clear error if a file already
          # exists (errorCode 1009), which we treat as "already present, skip".

          # ----------------------------------------------------------------
          # Step 3: Build upload list (all Modrinth combos)
          # ----------------------------------------------------------------
          print("\n[3/4] Building upload list from Modrinth versions...")
          to_upload = sorted(mr_latest.items())

          print(f"\n  {'='*68}")
          print(f"  Versions to upload to CurseForge: {len(to_upload)}")
          print(f"  {'-'*68}")
          print(f"  {'#':<4} {'MC Version':<14} {'Loader':<12} {'Version #':<20} {'Type':<10} {'Published'}")
          print(f"  {'-'*68}")
          for i, ((mc, loader), v) in enumerate(to_upload, 1):
              vnum  = v.get("version_number", "?")
              vtype = v.get("version_type", "release")
              pub   = v.get("date_published", "")[:19].replace("T", " ")
              pf    = primary_file(v)
              fname = pf["filename"] if pf else "(no file)"
              print(f"  {i:<4} {mc:<14} {loader:<12} {vnum:<20} {vtype:<10} {pub}  {fname}")
          print(f"  {'='*68}\n")

          if DRY_RUN:
              print("  [DRY RUN] No files uploaded.")
              sys.exit(0)

          # ----------------------------------------------------------------
          # Step 4: Upload
          # ----------------------------------------------------------------
          print(f"[4/4] Uploading {len(to_upload)} version(s) to CurseForge...\n")
          success  = 0
          skipped  = 0
          failed   = 0

          with tempfile.TemporaryDirectory(prefix="cf_port_") as tmpdir:
              tmp = Path(tmpdir)
              for i, ((mc, loader), version) in enumerate(to_upload, 1):
                  vnum      = version.get("version_number", "?")
                  vname     = version.get("name") or f"{mr_project.get('title', '')} {vnum}"
                  vtype     = RELEASE_TYPE_MAP.get(version.get("version_type", "release"), "release")
                  changelog = version.get("changelog") or f"Ported from Modrinth. Version {vnum} for {mc} ({loader})."

                  pf = primary_file(version)
                  if not pf:
                      print(f"  [{i}/{len(to_upload)}] SKIP {mc}/{loader} {vnum} — no file on Modrinth.")
                      skipped += 1
                      continue

                  filename     = pf.get("filename", f"mod-{vnum}.jar")
                  download_url = pf.get("url", "")

                  print(f"  [{i}/{len(to_upload)}] {mc} / {loader} — {vnum} ({vtype})")
                  print(f"    File     : {filename}")
                  print(f"    Changelog: {changelog[:100].strip()!r}{'...' if len(changelog) > 100 else ''}")

                  cf_version_ids = resolve_cf_version_ids(mc, loader, cf_mc_lookup)
                  if not cf_version_ids:
                      print(f"    [SKIP] Could not resolve CurseForge version IDs for {mc}/{loader}.")
                      skipped += 1
                      continue
                  print(f"    CF IDs   : {cf_version_ids}")

                  jar_path = tmp / filename
                  print(f"    Downloading from Modrinth CDN...")
                  download_file(download_url, jar_path)
                  print(f"    Downloaded {jar_path.stat().st_size:,} bytes.")

                  cf_metadata = {
                      "changelog":     changelog,
                      "changelogType": "markdown",
                      "displayName":   vname,
                      "gameVersions":  cf_version_ids,
                      "releaseType":   vtype,
                  }

                  print(f"    Uploading to CurseForge...")
                  # curseforge_upload returns (file_id, error_code, error_msg)
                  # errorCode 1009 = file already exists — treat as success
                  url = f"{CURSEFORGE_API}/api/projects/{cf_numeric_id}/upload-file"
                  boundary = f"cfport-{uuid.uuid4().hex}"
                  body = bytearray()
                  meta_bytes = json.dumps(cf_metadata).encode("utf-8")
                  body += f"--{boundary}\r\n".encode()
                  body += b'Content-Disposition: form-data; name="metadata"\r\n'
                  body += b"Content-Type: application/json\r\n\r\n"
                  body += meta_bytes + b"\r\n"
                  jar_bytes = jar_path.read_bytes()
                  body += f"--{boundary}\r\n".encode()
                  body += f'Content-Disposition: form-data; name="file"; filename="{jar_path.name}"\r\n'.encode()
                  body += b"Content-Type: application/java-archive\r\n\r\n"
                  body += jar_bytes + b"\r\n"
                  body += f"--{boundary}--\r\n".encode()
                  headers = {
                      "User-Agent": USER_AGENT,
                      "X-Api-Token": CURSEFORGE_TOKEN,
                      "Content-Type": f"multipart/form-data; boundary={boundary}",
                  }
                  req = urllib.request.Request(url, data=bytes(body), method="POST", headers=headers)
                  upload_ok = False
                  for attempt in range(1, 4):
                      try:
                          with urllib.request.urlopen(req, timeout=120) as r:
                              result = json.loads(r.read().decode("utf-8", errors="replace"))
                              print(f"    ✓ Uploaded — CurseForge file ID: {result['id']}")
                              success += 1
                              upload_ok = True
                              break
                      except urllib.error.HTTPError as e:
                          body_text = e.read().decode("utf-8", errors="replace")
                          try:
                              err = json.loads(body_text)
                              err_code = err.get("errorCode")
                              err_msg  = err.get("errorMessage", body_text[:300])
                          except Exception:
                              err_code, err_msg = None, body_text[:300]
                          print(f"    HTTP {e.code}  errorCode={err_code}  msg={err_msg!r}")
                          if err_code == 1009:
                              print(f"    ~ Already exists on CurseForge (skipping).")
                              skipped += 1
                              upload_ok = True
                              break
                          if e.code in {429, 500, 502, 503, 504} and attempt < 3:
                              time.sleep(5 * attempt)
                              continue
                          print(f"    ✗ Upload failed — not retrying.")
                          failed += 1
                          upload_ok = True
                          break
                      except urllib.error.URLError as e:
                          if attempt < 3:
                              time.sleep(5)
                              continue
                          print(f"    ✗ Upload network error: {e.reason}")
                          failed += 1
                          upload_ok = True
                          break
                  if not upload_ok:
                      print(f"    ✗ Upload failed after retries.")
                      failed += 1

                  if i < len(to_upload):
                      time.sleep(1)

          print(f"\n{'='*70}")
          print(f"  Done.  {success} uploaded,  {skipped} skipped (already exists / no file),  {failed} failed.")
          print(f"{'='*70}\n")

          if failed:
              sys.exit(1)
          PY

      # ── Write step summary ───────────────────────────────────────────────
      - name: Write step summary
        if: always()
        shell: bash
        env:
          MODRINTH_URL: ${{ inputs.modrinth_url }}
          CURSEFORGE_URL: ${{ inputs.curseforge_url }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## CurseForge Port"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Modrinth | \`$MODRINTH_URL\` |"
            echo "| CurseForge | \`$CURSEFORGE_URL\` |"
            echo "| Dry run | \`$DRY_RUN\` |"
          } >> "$GITHUB_STEP_SUMMARY"
