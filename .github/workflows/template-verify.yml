name: Template Verify

on:
  workflow_dispatch:
    inputs:
      range_folder:
        description: "Range folder to test (e.g., 1.21.9-1.21.11) or 'all'"
        required: false
        default: "all"
      loader:
        description: "Loader to test (fabric/forge/neoforge) or 'all'"
        required: false
        default: "all"
      versions:
        description: "Comma-separated exact versions to test (optional override)"
        required: false
        default: ""
      fetch_missing:
        description: "Download templates from provenance sources if missing"
        required: false
        default: "false"
      timeout_minutes:
        description: "Per-version build timeout in minutes (0 = no timeout)"
        required: false
        default: "10"

jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate matrix
        id: set-matrix
        env:
          RANGE_FILTER: ${{ inputs.range_folder }}
          LOADER_FILTER: ${{ inputs.loader }}
        run: |
          python3 - <<'PY' > /tmp/template-matrix.json
          import json
          import os
          manifest = json.load(open("version-manifest.json"))
          range_filter = (os.environ.get("RANGE_FILTER") or "all").strip()
          loader_filter = (os.environ.get("LOADER_FILTER") or "all").strip()
          entries = []
          for entry in manifest.get("ranges", []):
            if range_filter not in ("all", "") and entry.get("folder") != range_filter:
              continue
            for loader in entry.get("loaders", {}):
              if loader_filter not in ("all", "") and loader != loader_filter:
                continue
              entries.append({"range_folder": entry["folder"], "loader": loader})
          print(json.dumps({"include": entries}))
          PY
          echo "matrix=$(cat /tmp/template-matrix.json)" >> "$GITHUB_OUTPUT"
          cat /tmp/template-matrix.json

  verify:
    needs: matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            8
            16
            17
            21

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/settings.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Verify template
        shell: bash
        env:
          VERSIONS_OVERRIDE: ${{ inputs.versions }}
          TIMEOUT_MINUTES: ${{ inputs.timeout_minutes }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          out_dir=".workflow_artifacts/template-verify/${{ matrix.range_folder }}-${{ matrix.loader }}"
          mkdir -p "$out_dir"
          args=(--range-folder "${{ matrix.range_folder }}" --loader "${{ matrix.loader }}" --output-dir "$out_dir")
          if [ -n "$VERSIONS_OVERRIDE" ]; then
            args+=(--versions "$VERSIONS_OVERRIDE")
          fi
          if [ -n "$TIMEOUT_MINUTES" ] && [ "$TIMEOUT_MINUTES" != "0" ]; then
            args+=(--timeout-minutes "$TIMEOUT_MINUTES")
          fi
          if [ "${{ inputs.fetch_missing }}" = "true" ]; then
            python3 scripts/fetch_templates.py --range-folder "${{ matrix.range_folder }}" --loader "${{ matrix.loader }}"
          fi
          set +e
          python3 scripts/verify_template.py "${args[@]}"
          exit_code=$?
          set -e
          echo "Summary for ${{ matrix.range_folder }}-${{ matrix.loader }}:"
          cat "$out_dir/SUMMARY.md" || true
          exit "$exit_code"

      - uses: actions/upload-artifact@v4
        with:
          name: template-verify-${{ matrix.range_folder }}-${{ matrix.loader }}
          path: .workflow_artifacts/template-verify/${{ matrix.range_folder }}-${{ matrix.loader }}

  bundle:
    needs: verify
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: template-verify-*
          path: .workflow_downloads/template-verify

      - name: Build combined summary
        shell: bash
        run: |
          mkdir -p .workflow_downloads/template-verify
          python3 - <<'PY'
          from pathlib import Path
          bundle_root = Path(".workflow_downloads/template-verify")
          summary_lines = [
              "# Template Verify Bundle Summary",
              "",
              "| Range | Loader | Minecraft | Status | Jar | Log |",
              "| --- | --- | --- | --- | --- | --- |",
          ]
          for summary in bundle_root.rglob("SUMMARY.md"):
              text = summary.read_text(encoding="utf-8", errors="ignore")
              rows = [line for line in text.splitlines() if line.strip().startswith("|") and "---" not in line]
              if len(rows) < 2:
                  continue
              cols = [c.strip() for c in rows[1].strip("|").split("|")]
              if len(cols) >= 6:
                  summary_lines.append("| " + " | ".join(cols[:6]) + " |")
          (bundle_root / "SUMMARY.md").write_text("\\n".join(summary_lines) + "\\n", encoding="utf-8")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: template-verify-bundle
          path: .workflow_downloads/template-verify
