name: Decompile All Minecraft Versions

# This workflow decompiles Minecraft source code for ALL supported versions
# and stores them in the repository under decompiled-minecraft/
# This allows AI agents to reference the actual Minecraft API without
# needing to decompile on-demand.

on:
  workflow_dispatch:
    inputs:
      commit_to_repo:
        description: 'Commit decompiled sources to repository (yes/no)'
        required: false
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'

jobs:
  decompile-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        include:
          # 1.8.9
          - version: "1.8.9"
            loader: "forge"
            folder: "1.8.9"
            java: "8"
          
          # 1.12.2
          - version: "1.12.2"
            loader: "forge"
            folder: "1.12-1.12.2"
            java: "8"
          
          # 1.16.5
          - version: "1.16.5"
            loader: "forge"
            folder: "1.16.5"
            java: "8"
          - version: "1.16.5"
            loader: "fabric"
            folder: "1.16.5"
            java: "16"
          
          # 1.17.1
          - version: "1.17.1"
            loader: "forge"
            folder: "1.17-1.17.1"
            java: "16"
          - version: "1.17.1"
            loader: "fabric"
            folder: "1.17-1.17.1"
            java: "16"
          
          # 1.18.2
          - version: "1.18.2"
            loader: "forge"
            folder: "1.18-1.18.2"
            java: "17"
          - version: "1.18.2"
            loader: "fabric"
            folder: "1.18-1.18.2"
            java: "17"
          
          # 1.19.4
          - version: "1.19.4"
            loader: "forge"
            folder: "1.19-1.19.4"
            java: "17"
          - version: "1.19.4"
            loader: "fabric"
            folder: "1.19-1.19.4"
            java: "17"
          
          # 1.20.1
          - version: "1.20.1"
            loader: "forge"
            folder: "1.20-1.20.6"
            java: "17"
          - version: "1.20.1"
            loader: "fabric"
            folder: "1.20-1.20.6"
            java: "17"
          - version: "1.20.1"
            loader: "neoforge"
            folder: "1.20-1.20.6"
            java: "17"
          
          # 1.20.6
          - version: "1.20.6"
            loader: "forge"
            folder: "1.20-1.20.6"
            java: "21"
          - version: "1.20.6"
            loader: "fabric"
            folder: "1.20-1.20.6"
            java: "21"
          - version: "1.20.6"
            loader: "neoforge"
            folder: "1.20-1.20.6"
            java: "21"
          
          # 1.21.1
          - version: "1.21.1"
            loader: "forge"
            folder: "1.21-1.21.1"
            java: "21"
          - version: "1.21.1"
            loader: "fabric"
            folder: "1.21-1.21.1"
            java: "21"
          - version: "1.21.1"
            loader: "neoforge"
            folder: "1.21-1.21.1"
            java: "21"
          
          # 1.21.8
          - version: "1.21.8"
            loader: "forge"
            folder: "1.21.2-1.21.8"
            java: "21"
          - version: "1.21.8"
            loader: "fabric"
            folder: "1.21.2-1.21.8"
            java: "21"
          - version: "1.21.8"
            loader: "neoforge"
            folder: "1.21.2-1.21.8"
            java: "21"
          
          # 1.21.11
          - version: "1.21.11"
            loader: "forge"
            folder: "1.21.9-1.21.11"
            java: "21"
          - version: "1.21.11"
            loader: "fabric"
            folder: "1.21.9-1.21.11"
            java: "21"
          - version: "1.21.11"
            loader: "neoforge"
            folder: "1.21.9-1.21.11"
            java: "21"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: decompile-${{ runner.os }}-${{ matrix.version }}-${{ matrix.loader }}-${{ hashFiles(format('{0}/{1}/template/build.gradle', matrix.folder, matrix.loader)) }}
          restore-keys: |
            decompile-${{ runner.os }}-${{ matrix.version }}-${{ matrix.loader }}-

      - name: Prepare workspace
        run: |
          TEMPLATE_DIR="${{ matrix.folder }}/${{ matrix.loader }}/template"
          WORKSPACE="/tmp/decompile-ws-${{ matrix.version }}-${{ matrix.loader }}"
          
          if [ ! -d "$TEMPLATE_DIR" ]; then
            echo "ERROR: Template not found at $TEMPLATE_DIR"
            exit 1
          fi
          
          rm -rf "$WORKSPACE"
          cp -r "$TEMPLATE_DIR" "$WORKSPACE"
          chmod +x "$WORKSPACE/gradlew" 2>/dev/null || true
          
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "Workspace prepared at $WORKSPACE"

      - name: Decompile Minecraft sources
        run: |
          cd "$WORKSPACE"
          LOADER="${{ matrix.loader }}"
          
          export GRADLE_OPTS="-Dorg.gradle.configuration-cache=false"
          
          echo "=== Decompiling Minecraft ${{ matrix.version }} ($LOADER) ==="
          
          if [[ "$LOADER" == "forge" ]]; then
            ./gradlew --no-daemon --stacktrace genSources 2>&1 | tee /tmp/gradle.log || {
              echo "genSources failed, trying compileJava..."
              mkdir -p src/main/java/com/stub
              echo 'package com.stub; public class Stub {}' > src/main/java/com/stub/Stub.java
              ./gradlew --no-daemon --stacktrace compileJava 2>&1 | tee -a /tmp/gradle.log || true
            }
          elif [[ "$LOADER" == "neoforge" ]]; then
            ./gradlew --no-daemon --stacktrace dependencies 2>&1 | tee /tmp/gradle.log || true
            ./gradlew --no-daemon genSources 2>&1 | tee -a /tmp/gradle.log || true
          elif [[ "$LOADER" == "fabric" ]]; then
            ./gradlew --no-daemon --stacktrace genSources 2>&1 | tee /tmp/gradle.log || {
              echo "genSources failed, trying dependencies..."
              ./gradlew --no-daemon --stacktrace dependencies 2>&1 | tee -a /tmp/gradle.log || true
            }
          fi
          
          echo "=== Gradle complete ==="

      - name: Extract and organize sources
        run: |
          OUTPUT_DIR="/tmp/output-${{ matrix.version }}-${{ matrix.loader }}"
          mkdir -p "$OUTPUT_DIR"
          
          # Search for decompiled .java files in common locations
          SEARCH_ROOTS=(
            "$WORKSPACE/.gradle/loom-cache"
            "$WORKSPACE/build/loom-cache"
            "$HOME/.gradle/caches/fabric-loom"
            "$HOME/.gradle/caches/forge_gradle"
            "$HOME/.gradle/caches/net.minecraftforge"
            "$HOME/.gradle/caches/minecraft"
            "$HOME/.gradle/caches/neoforge"
            "$HOME/.gradle/caches"
          )
          
          FOUND_COUNT=0
          BEST_ROOT=""
          
          for ROOT in "${SEARCH_ROOTS[@]}"; do
            if [ -d "$ROOT" ]; then
              COUNT=$(find "$ROOT" -name "*.java" -type f 2>/dev/null | wc -l)
              if [ "$COUNT" -gt "$FOUND_COUNT" ]; then
                FOUND_COUNT=$COUNT
                BEST_ROOT="$ROOT"
              fi
            fi
          done
          
          echo "Found $FOUND_COUNT .java files in $BEST_ROOT"
          
          if [ "$FOUND_COUNT" -gt 0 ]; then
            # Copy all .java files preserving structure
            cd "$BEST_ROOT"
            find . -name "*.java" -type f | while read -r JAVAFILE; do
              DEST="$OUTPUT_DIR/$JAVAFILE"
              mkdir -p "$(dirname "$DEST")"
              cp "$JAVAFILE" "$DEST"
            done
            
            echo "Copied $FOUND_COUNT files to $OUTPUT_DIR"
          else
            echo "WARNING: No .java files found for ${{ matrix.version }} ${{ matrix.loader }}"
            echo "Check gradle log for errors"
            cp /tmp/gradle.log "$OUTPUT_DIR/gradle-error.log" 2>/dev/null || true
          fi
          
          # Create metadata file
          cat > "$OUTPUT_DIR/metadata.json" << EOF
{
  "minecraft_version": "${{ matrix.version }}",
  "loader": "${{ matrix.loader }}",
  "folder": "${{ matrix.folder }}",
  "java_version": "${{ matrix.java }}",
  "file_count": $FOUND_COUNT,
  "decompiled_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
}
EOF
          
          echo "OUTPUT_DIR=$OUTPUT_DIR" >> $GITHUB_ENV
          echo "FOUND_COUNT=$FOUND_COUNT" >> $GITHUB_ENV

      - name: Upload decompiled sources
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-${{ matrix.version }}-${{ matrix.loader }}
          path: /tmp/output-${{ matrix.version }}-${{ matrix.loader }}/
          retention-days: 90

  assemble-and-commit:
    needs: decompile-matrix
    runs-on: ubuntu-latest
    if: inputs.commit_to_repo == 'yes'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-decompiled

      - name: Organize decompiled sources
        run: |
          DEST_DIR="decompiled-minecraft"
          rm -rf "$DEST_DIR"
          mkdir -p "$DEST_DIR"
          
          # Create index
          cat > "$DEST_DIR/README.md" << 'EOF'
# Decompiled Minecraft Sources

This directory contains decompiled Minecraft source code for all supported versions and loaders.
These sources are used by AI coding assistants to understand Minecraft APIs when porting mods
across versions.

## Structure

```
decompiled-minecraft/
  ├── 1.8.9-forge/
  ├── 1.12.2-forge/
  ├── 1.16.5-forge/
  ├── 1.16.5-fabric/
  ├── 1.17.1-forge/
  ├── 1.17.1-fabric/
  └── ... (one directory per version+loader)
```

Each directory contains:
- Decompiled .java files in their package structure
- `metadata.json` with version info and file count

## Usage for AI Agents

When fixing mod compilation errors:

1. Identify the Minecraft version and loader
2. Navigate to `decompiled-minecraft/{version}-{loader}/`
3. Search for the class or method causing the error
4. Use the actual API signature from the decompiled source

Example: To find FarmBlock in Fabric 1.18:
```bash
grep -r "class FarmBlock" decompiled-minecraft/1.18.2-fabric/
```

## Updating

To regenerate all decompiled sources:
```bash
gh workflow run decompile-all-minecraft-versions.yml --field commit_to_repo=yes
```

This will take ~2 hours and commit the updated sources to the repository.
EOF
          
          # Move all downloaded artifacts into organized structure
          for ARTIFACT_DIR in /tmp/all-decompiled/minecraft-*; do
            if [ -d "$ARTIFACT_DIR" ]; then
              BASENAME=$(basename "$ARTIFACT_DIR")
              # Extract version and loader from artifact name (minecraft-1.18.2-fabric)
              VERSION_LOADER="${BASENAME#minecraft-}"
              
              TARGET="$DEST_DIR/$VERSION_LOADER"
              mkdir -p "$TARGET"
              
              # Copy contents
              cp -r "$ARTIFACT_DIR"/* "$TARGET/"
              
              # Read metadata
              if [ -f "$TARGET/metadata.json" ]; then
                FILE_COUNT=$(jq -r '.file_count' "$TARGET/metadata.json")
                echo "  $VERSION_LOADER: $FILE_COUNT files"
              fi
            fi
          done
          
          # Create summary
          cat > "$DEST_DIR/SUMMARY.md" << 'EOF'
# Decompilation Summary

| Version | Loader | Files | Status |
|---------|--------|-------|--------|
EOF
          
          for DIR in "$DEST_DIR"/*-*/; do
            if [ -d "$DIR" ]; then
              BASENAME=$(basename "$DIR")
              if [ -f "$DIR/metadata.json" ]; then
                VERSION=$(jq -r '.minecraft_version' "$DIR/metadata.json")
                LOADER=$(jq -r '.loader' "$DIR/metadata.json")
                COUNT=$(jq -r '.file_count' "$DIR/metadata.json")
                
                if [ "$COUNT" -gt 0 ]; then
                  STATUS="✓ Success"
                else
                  STATUS="✗ Failed"
                fi
                
                echo "| $VERSION | $LOADER | $COUNT | $STATUS |" >> "$DEST_DIR/SUMMARY.md"
              fi
            fi
          done
          
          echo "" >> "$DEST_DIR/SUMMARY.md"
          echo "Generated: $(date -u)" >> "$DEST_DIR/SUMMARY.md"
          
          cat "$DEST_DIR/SUMMARY.md"

      - name: Commit to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add decompiled-minecraft/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update decompiled Minecraft sources for all supported versions"
            git push
            echo "✓ Decompiled sources committed to repository"
          fi

      - name: Job summary
        run: |
          echo "## Decompiled Minecraft Sources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "decompiled-minecraft/SUMMARY.md" ]; then
            cat decompiled-minecraft/SUMMARY.md >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Sources have been committed to \`decompiled-minecraft/\`" >> $GITHUB_STEP_SUMMARY
