name: Publish Modrinth Bundle

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Workflow run ID that produced the bundle artifact
        required: true
        type: string
      artifact_name:
        description: Artifact name to download (e.g. final-results or all-mod-builds)
        required: true
        default: "final-results"
        type: string
      modrinth_project_url:
        description: Modrinth project URL or slug to publish into
        required: true
        type: string
      bundle_subdir:
        description: Optional path inside the artifact to the bundle root (leave blank to auto-detect)
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: .workflow_downloads
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}

      - name: Mask Modrinth token
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - id: locate_bundle
        shell: bash
        env:
          BUNDLE_SUBDIR: ${{ inputs.bundle_subdir }}
        run: |
          python3 - <<'PY'
          import os
          import shutil
          import subprocess
          import sys
          from pathlib import Path

          root = Path('.workflow_downloads')
          bundle_subdir = os.environ.get('BUNDLE_SUBDIR', '').strip()

          def fail(msg: str) -> None:
              raise SystemExit(msg)

          def debug_tree(label: str, path: Path) -> None:
              print(f"--- {label} ({path}) ---")
              for p in sorted(path.rglob('*')):
                  if p.is_dir():
                      continue
                  rel = p.relative_to(path)
                  print(rel)

          def find_candidate(search_root: Path) -> tuple[Path | None, bool]:
              if (search_root / 'run-summary.json').exists():
                  return search_root, True
              if list(search_root.rglob('result.json')):
                  return search_root, False
              return None, False

          if not root.exists():
              fail(f"Download root not found: {root}")

          debug_tree("Downloaded files", root)

          candidate = None
          candidate_is_bundle = False

          search_roots = []
          if bundle_subdir:
              manual = (root / bundle_subdir).resolve()
              if not manual.exists():
                  fail(f"Bundle subdir not found: {manual}")
              search_roots.append(manual)
          else:
              search_roots.append(root)
              combined = root / '.workflow_artifacts' / 'combined'
              if combined.exists():
                  search_roots.append(combined)

          for search_root in search_roots:
              candidate, candidate_is_bundle = find_candidate(search_root)
              if candidate:
                  break

          if not candidate:
              zip_candidates = [p for p in root.rglob('*.zip') if p.is_file()]
              if zip_candidates:
                  extract_root = Path('.workflow_artifacts/extracted')
                  if extract_root.exists():
                      shutil.rmtree(extract_root)
                  extract_root.mkdir(parents=True, exist_ok=True)
                  for zip_path in zip_candidates:
                      shutil.unpack_archive(str(zip_path), extract_root / zip_path.stem)
                  debug_tree("Extracted files", extract_root)
                  candidate, candidate_is_bundle = find_candidate(extract_root)

          if not candidate:
              fail("Could not locate a bundle root (run-summary.json or any result.json).")

          if candidate_is_bundle:
              bundle_root = candidate
          else:
              out_dir = Path('.workflow_artifacts/normalized')
              cmd = [
                  sys.executable,
                  'build_mods.py',
                  'bundle',
                  '--artifacts-root',
                  str(candidate),
                  '--output-dir',
                  str(out_dir),
              ]
              print('Normalizing bundle:', ' '.join(cmd))
              subprocess.check_call(cmd)
              bundle_root = out_dir

          output_path = Path(os.environ['GITHUB_OUTPUT'])
          output_path.write_text(f"bundle_root={bundle_root}\n", encoding='utf-8')
          print(f"Bundle root: {bundle_root}")
          PY

      - id: publish
        shell: bash
        continue-on-error: true
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set +e
          python build_mods.py publish-modrinth \
            --artifacts-root "${{ steps.locate_bundle.outputs.bundle_root }}" \
            --project "${{ inputs.modrinth_project_url }}" \
            --artifact-dir .workflow_artifacts/modrinth-publish
          exit_code=$?
          set -e
          printf 'exit_code=%s\n' "$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: modrinth-publish
          path: .workflow_artifacts/modrinth-publish

      - if: always()
        shell: bash
        run: |
          if [ -f .workflow_artifacts/modrinth-publish/SUMMARY.md ]; then
            cat .workflow_artifacts/modrinth-publish/SUMMARY.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - if: always()
        shell: bash
        run: |
          code="${{ steps.publish.outputs.exit_code }}"
          if [ -z "$code" ]; then
            code=1
          fi
          exit "$code"
