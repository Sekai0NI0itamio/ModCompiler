name: Profile Diagnosis

# ---------------------------------------------------------------------------
# Purpose
# -------
# Fetches every public project owned by a Modrinth user, then for each
# project in parallel:
#   1. Downloads all published versions (latest per loader+MC pair)
#   2. Decompiles each jar with Vineflower
#   3. Runs a full diagnosis:
#        - Shell detection (jar < 5 KB or 0 classes)
#        - Identifies the original (oldest working) version
#        - Finds the latest working version per loader
#        - Computes missing versions vs what this repo can build
#   4. Prepares a launcher test matrix for working (non-shell) versions
#   5. Launches each working version in a headless Minecraft client
#   6. Merges launcher test results back into diagnosis data
#   7. Produces a per-project report.txt and bundle zip
#   8. Assembles a combined master report.txt across all projects
#
# Jobs
# ----
#   list-projects          - Fetches all public projects for the user, emits matrix
#   diagnose               - Matrix job (one runner per project), full diagnosis
#   prepare-launcher-tests - Collects launcher matrices from all projects, emits combined matrix
#   launcher-test          - Matrix job, launches each version in headless Minecraft
#   update-diagnosis       - Merges launcher results back into diagnosis.json and report.txt
#   assemble-report        - Merges all per-project reports into one master report
#
# Artifacts
# ---------
#   diagnosis-<slug>          per-project bundle (report.txt + all version data)
#   launcher-result-<key>     per-test launcher result (pass/fail)
#   crash-<key>               crash logs when a launcher test fails
#   diagnosis-updated         updated bundles with launcher results merged in
#   profile-diagnosis-report  master report.txt covering all projects
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      modrinth_username:
        description: 'Modrinth username to diagnose'
        required: false
        default: 'Itamio'
        type: string

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Job 1 — list all public projects for the user
# ---------------------------------------------------------------------------
jobs:
  list-projects:
    name: List projects for ${{ inputs.modrinth_username }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.emit.outputs.matrix }}
      project_count: ${{ steps.emit.outputs.project_count }}

    steps:
      - name: Fetch user projects from Modrinth API
        id: emit
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          USERNAME: ${{ inputs.modrinth_username }}
        run: |
          python3 - <<'PY'
          import json, os, sys, time, urllib.error, urllib.parse, urllib.request

          API      = "https://api.modrinth.com/v2"
          TOKEN    = os.environ.get("MODRINTH_TOKEN", "")
          USERNAME = os.environ.get("USERNAME", "Itamio").strip()

          def headers():
              h = {"User-Agent": "ModCompilerProfileDiagnosis/1.0", "Accept": "application/json"}
              if TOKEN:
                  h["Authorization"] = TOKEN
              return h

          def get(path):
              url = API + path
              req = urllib.request.Request(url, headers=headers())
              for attempt in range(1, 6):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode())
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          sys.exit(f"User not found: {USERNAME}")
                      if e.code in {429,500,502,503,504} and attempt < 5:
                          time.sleep(2**attempt); continue
                      sys.exit(f"HTTP {e.code}: {url}")
                  except urllib.error.URLError as e:
                      if attempt < 5:
                          time.sleep(2**attempt); continue
                      sys.exit(f"Network error: {e.reason}")

          print(f"Fetching projects for user: {USERNAME}")
          projects = get(f"/user/{urllib.parse.quote(USERNAME, safe='')}/projects") or []
          print(f"Found {len(projects)} projects")

          entries = []
          for p in projects:
              slug  = p.get("slug", p.get("id", "unknown"))
              title = p.get("title", slug)
              pid   = p.get("id", "")
              ptype = p.get("project_type", "mod")
              print(f"  {slug}  ({title})  type={ptype}")
              entries.append({"slug": slug, "title": title, "project_id": pid, "project_type": ptype})

          matrix = json.dumps({"include": entries})
          count  = str(len(entries))

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
              f.write(f"project_count={count}\n")

          print(f"Matrix emitted: {count} projects")
          PY

# ---------------------------------------------------------------------------
# Job 2 — diagnose each project (matrix, one runner per project)
# ---------------------------------------------------------------------------
  diagnose:
    name: Diagnose ${{ matrix.slug }}
    needs: list-projects
    if: ${{ needs.list-projects.outputs.project_count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.list-projects.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── Download Vineflower ──────────────────────────────────────────────
      - name: Download Vineflower
        shell: bash
        run: |
          mkdir -p .workflow_tools
          curl -fsSL \
            https://repo1.maven.org/maven2/org/vineflower/vineflower/1.11.0/vineflower-1.11.0.jar \
            -o .workflow_tools/vineflower.jar

      # ── Fetch all versions + jars for this project ───────────────────────
      - name: Fetch project versions and jars
        id: fetch
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          SLUG: ${{ matrix.slug }}
          TITLE: ${{ matrix.title }}
        run: |
          python3 - <<'PY'
          import json, os, sys, time, urllib.error, urllib.parse, urllib.request
          from pathlib import Path

          API   = "https://api.modrinth.com/v2"
          TOKEN = os.environ.get("MODRINTH_TOKEN", "")
          SLUG  = os.environ.get("SLUG", "").strip()

          def headers():
              h = {"User-Agent": "ModCompilerProfileDiagnosis/1.0", "Accept": "application/json"}
              if TOKEN:
                  h["Authorization"] = TOKEN
              return h

          def get(path):
              url = API + path
              req = urllib.request.Request(url, headers=headers())
              for attempt in range(1, 6):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode())
                  except urllib.error.HTTPError as e:
                      if e.code == 404:
                          return None
                      if e.code in {429,500,502,503,504} and attempt < 5:
                          time.sleep(2**attempt); continue
                      sys.exit(f"HTTP {e.code}: {url}")
                  except urllib.error.URLError as e:
                      if attempt < 5:
                          time.sleep(2**attempt); continue
                      sys.exit(f"Network error: {e.reason}")

          def download(url, dest):
              dest = Path(dest)
              dest.parent.mkdir(parents=True, exist_ok=True)
              req = urllib.request.Request(url, headers=headers())
              for attempt in range(1, 4):
                  try:
                      with urllib.request.urlopen(req, timeout=60) as r:
                          dest.write_bytes(r.read())
                      return dest.stat().st_size
                  except Exception:
                      if attempt < 3:
                          time.sleep(2**attempt)
              return 0

          out = Path(f".diag/{SLUG}")
          out.mkdir(parents=True, exist_ok=True)

          project = get(f"/project/{urllib.parse.quote(SLUG, safe='')}")
          if not project:
              sys.exit(f"Project not found: {SLUG}")

          (out / "project.json").write_text(json.dumps(project, indent=2), encoding="utf-8")

          all_versions = get(f"/project/{urllib.parse.quote(project['id'], safe='')}/version") or []
          (out / "all_versions.json").write_text(json.dumps(all_versions, indent=2), encoding="utf-8")
          print(f"{SLUG}: {len(all_versions)} total versions on Modrinth")

          # ── Select only the latest version per (loader, mc_version) pair ──
          # This mirrors the logic in fetch-modrinth-project.yml so we only
          # download and decompile one representative jar per slot, not every
          # historical upload.
          def parse_version_number(version_str):
              import re as _re
              parts = []
              for token in _re.split(r"[.\-_]", str(version_str).strip()):
                  if token.isdigit():
                      parts.append(int(token))
                  elif token:
                      parts.append(token)
              return tuple(parts) if parts else (0,)

          def select_latest_per_loader_mc(versions):
              best = {}
              for v in versions:
                  loaders = [str(l) for l in v.get("loaders", []) if str(l).strip()]
                  game_versions = [str(g) for g in v.get("game_versions", []) if str(g).strip()]
                  if not loaders or not game_versions:
                      continue
                  vnum = str(v.get("version_number") or "").strip()
                  vkey = parse_version_number(vnum)
                  published = v.get("date_published", "") or ""
                  for loader in loaders:
                      for gv in game_versions:
                          key = (loader, gv)
                          current = best.get(key)
                          if current is None:
                              best[key] = {"version": v, "vkey": vkey, "published": published}
                              continue
                          try:
                              is_newer = vkey > current["vkey"]
                          except TypeError:
                              is_newer = str(vkey) > str(current["vkey"])
                          if is_newer or (vkey == current["vkey"] and published > current["published"]):
                              best[key] = {"version": v, "vkey": vkey, "published": published}
              seen_ids = set()
              selected = []
              for entry in best.values():
                  vid = entry["version"]["id"]
                  if vid not in seen_ids:
                      seen_ids.add(vid)
                      selected.append(entry["version"])
              selected.sort(key=lambda v: v.get("date_published", ""), reverse=True)
              return selected

          selected_versions = select_latest_per_loader_mc(all_versions)
          selected_ids = {v["id"] for v in selected_versions}
          skipped_count = len(all_versions) - len(selected_versions)

          (out / "selected_versions.json").write_text(json.dumps(selected_versions, indent=2), encoding="utf-8")
          print(f"{SLUG}: {len(selected_versions)} selected (latest per loader+MC), {skipped_count} older skipped")

          # Download only the selected (latest per slot) versions
          for v in selected_versions:
              vid  = v["id"]
              vdir = out / "versions" / vid
              vdir.mkdir(parents=True, exist_ok=True)
              (vdir / "version.json").write_text(json.dumps(v, indent=2), encoding="utf-8")

              primary = next((f for f in v.get("files", []) if f.get("primary")), None)
              if not primary and v.get("files"):
                  primary = v["files"][0]

              if primary:
                  size = download(primary["url"], vdir / primary["filename"])
                  print(f"  [{vid}] {v.get('version_number','')} {v.get('loaders',[])} {v.get('game_versions',[])} → {primary['filename']} ({size:,}B)")
              else:
                  print(f"  [{vid}] no primary file")

          print(f"Done fetching {SLUG}")
          PY

      # ── Decompile every jar ───────────────────────────────────────────────
      - name: Decompile all jars
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, sys
          from pathlib import Path

          SLUG = os.environ.get("SLUG", "").strip()
          base = Path(f".diag/{SLUG}/versions")
          if not base.exists():
              print("No versions directory, skipping decompile")
              sys.exit(0)

          for vdir in sorted(base.iterdir()):
              if not vdir.is_dir():
                  continue
              vid = vdir.name
              jars = list(vdir.glob("*.jar"))
              if not jars:
                  continue
              jar = jars[0]

              # Copy to "To Be Decompiled/" for the CLI
              tbd = Path("To Be Decompiled")
              tbd.mkdir(exist_ok=True)
              dest_jar = tbd / jar.name
              import shutil
              shutil.copy(jar, dest_jar)

              artifact_dir = vdir / "decompiled"
              artifact_dir.mkdir(exist_ok=True)

              print(f"  Decompiling {jar.name} ({jar.stat().st_size:,}B)...")
              result = subprocess.run(
                  [
                      "python3", "build_mods.py", "decompile-jar",
                      "--jar-path", jar.name,
                      "--manifest", "version-manifest.json",
                      "--decompiler-jar", ".workflow_tools/vineflower.jar",
                      "--artifact-dir", str(artifact_dir),
                  ],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  print(f"    FAILED: {result.stderr[:300]}")
                  (artifact_dir / "decompile_error.txt").write_text(
                      result.stdout + "\n" + result.stderr, encoding="utf-8"
                  )
              else:
                  print(f"    OK")

              # Extract decompiled zip if present
              for zf in artifact_dir.glob("*.zip"):
                  import zipfile
                  with zipfile.ZipFile(zf) as z:
                      z.extractall(artifact_dir / "src")
                  zf.unlink()

              dest_jar.unlink(missing_ok=True)

          print("Decompile pass complete")
          PY

      # ── Run diagnosis and produce report.txt ─────────────────────────────
      - name: Run diagnosis
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
          TITLE: ${{ matrix.title }}
        run: |
          python3 - <<'PY'
          import json, os, zipfile
          from pathlib import Path
          from datetime import datetime

          SLUG  = os.environ.get("SLUG", "").strip()
          TITLE = os.environ.get("TITLE", SLUG).strip()
          base  = Path(f".diag/{SLUG}")

          # ── Load project metadata ────────────────────────────────────────
          project = json.loads((base / "project.json").read_text(encoding="utf-8"))
          all_versions = json.loads((base / "all_versions.json").read_text(encoding="utf-8"))

          # Use selected_versions (latest per loader+MC) for shell/working analysis.
          # all_versions is kept only for the total count in the summary.
          selected_path = base / "selected_versions.json"
          if selected_path.exists():
              analysis_versions = json.loads(selected_path.read_text(encoding="utf-8"))
          else:
              # Fallback: if selected_versions.json is missing, use all
              analysis_versions = all_versions
          skipped_count = len(all_versions) - len(analysis_versions)

          # ── Load version-manifest to know what this repo can build ───────
          manifest = json.loads(Path("version-manifest.json").read_text(encoding="utf-8"))

          # Build a flat set of (mc_version, loader) pairs the repo supports
          repo_capabilities = set()
          for rng in manifest["ranges"]:
              for loader, lcfg in rng["loaders"].items():
                  supported = lcfg.get("supported_versions", [])
                  if not supported:
                      supported = [rng["min_version"]]
                  for sv in supported:
                      repo_capabilities.add((sv, loader))
                  repo_capabilities.add((rng["min_version"], loader))
                  repo_capabilities.add((rng["max_version"], loader))

          # ── Shell detection ──────────────────────────────────────────────
          # The authoritative check is the decompile result.json produced by
          # build_mods.py decompile-jar, which calls jar_has_class_files().
          #
          # result.json status values:
          #   "skipped"  → jar contained ZERO .class files → definitive shell
          #   "success"  → jar had classes AND decompiler produced Java source
          #   "failed"   → jar had classes but decompiler failed (not a shell)
          #
          # We also fall back to directly inspecting the jar for .class files
          # if result.json is missing (e.g. decompile step was skipped).

          def jar_has_class_files(jar_path):
              """Return True if the jar contains at least one .class file."""
              try:
                  with zipfile.ZipFile(jar_path) as z:
                      return any(
                          e.filename.endswith(".class")
                          for e in z.infolist()
                          if not e.is_dir()
                      )
              except Exception:
                  return None  # can't tell — treat as unknown

          def count_classes_in_jar(jar_path):
              try:
                  with zipfile.ZipFile(jar_path) as z:
                      return sum(1 for e in z.infolist()
                                 if not e.is_dir() and e.filename.endswith(".class"))
              except Exception:
                  return -1

          def read_decompile_result(vdir):
              """Read result.json written by build_mods.py decompile-jar."""
              rj = vdir / "decompiled" / "result.json"
              if rj.exists():
                  try:
                      return json.loads(rj.read_text(encoding="utf-8"))
                  except Exception:
                      pass
              return None

          def read_mod_info(vdir):
              mi = vdir / "decompiled" / "mod_info.txt"
              if not mi.exists():
                  return {}
              info = {}
              for line in mi.read_text(encoding="utf-8", errors="replace").splitlines():
                  if "=" in line:
                      k, _, v = line.partition("=")
                      info[k.strip()] = v.strip()
              return info

          version_records = []
          for v in analysis_versions:
              vid  = v["id"]
              vdir = base / "versions" / vid
              jars = list(vdir.glob("*.jar")) if vdir.exists() else []

              jar_size    = jars[0].stat().st_size if jars else 0
              class_count = count_classes_in_jar(jars[0]) if jars else -1
              mod_info    = read_mod_info(vdir)

              # Primary: use the decompile result.json status
              decompile_result = read_decompile_result(vdir)
              decompile_status = decompile_result.get("status", "unknown") if decompile_result else "unknown"

              if decompile_status == "skipped":
                  # build_mods.py confirmed zero .class files → definitive shell
                  is_shell = True
                  shell_reason = "no .class files (decompile status=skipped)"
              elif decompile_status in ("success", "failed"):
                  # Jar had class files — not a shell regardless of size
                  is_shell = False
                  shell_reason = ""
              else:
                  # result.json missing — fall back to direct jar inspection
                  if not jars:
                      is_shell = True
                      shell_reason = "no jar downloaded"
                  else:
                      has_classes = jar_has_class_files(jars[0])
                      if has_classes is None:
                          # Can't open jar — treat as unknown/not shell
                          is_shell = False
                          shell_reason = "jar unreadable"
                      elif not has_classes:
                          is_shell = True
                          shell_reason = "no .class files in jar (direct check)"
                      else:
                          is_shell = False
                          shell_reason = ""

              version_records.append({
                  "id":               vid,
                  "version_number":   v.get("version_number", vid),
                  "name":             v.get("name", ""),
                  "version_type":     v.get("version_type", ""),
                  "date_published":   v.get("date_published", ""),
                  "game_versions":    v.get("game_versions", []),
                  "loaders":          v.get("loaders", []),
                  "jar_name":         jars[0].name if jars else "",
                  "jar_size":         jar_size,
                  "class_count":      class_count,
                  "decompile_status": decompile_status,
                  "is_shell":         is_shell,
                  "shell_reason":     shell_reason,
                  "mod_info":         mod_info,
              })

          # Sort oldest first
          version_records.sort(key=lambda r: r["date_published"])

          # ── Find original version (oldest working) ───────────────────────
          working = [r for r in version_records if not r["is_shell"]]
          shells  = [r for r in version_records if r["is_shell"]]
          original = working[0] if working else None

          # ── Find latest working version per loader ───────────────────────
          latest_per_loader = {}
          for r in working:  # already sorted oldest→newest
              for loader in r["loaders"]:
                  latest_per_loader[loader] = r

          # ── Compute published (mc_version, loader) pairs ─────────────────
          published_pairs = set()
          for r in working:
              for loader in r["loaders"]:
                  for gv in r["game_versions"]:
                      published_pairs.add((gv, loader))

          # ── Compute missing versions ─────────────────────────────────────
          # What the repo CAN build but is NOT yet published as a working version
          missing_pairs = repo_capabilities - published_pairs

          # Group missing by loader for readability
          missing_by_loader = {}
          for (gv, loader) in sorted(missing_pairs):
              missing_by_loader.setdefault(loader, []).append(gv)

          # ── Write report.txt ─────────────────────────────────────────────
          lines = []
          SEP = "=" * 72

          lines += [
              SEP,
              f"PROJECT: {TITLE}",
              f"SLUG:    {SLUG}",
              f"URL:     https://modrinth.com/mod/{SLUG}",
              f"ID:      {project.get('id', '?')}",
              f"TYPE:    {project.get('project_type', 'mod')}",
              f"LICENSE: {project.get('license', {}).get('id', '?')}",
              f"DOWNLOADS: {project.get('downloads', 0):,}",
              f"CLIENT SIDE: {project.get('client_side', '?')}",
              f"SERVER SIDE: {project.get('server_side', '?')}",
              f"CATEGORIES: {', '.join(project.get('categories', []))}",
              f"LOADERS: {', '.join(project.get('loaders', []))}",
              f"MC VERSIONS (Modrinth): {', '.join(project.get('game_versions', []))}",
              SEP,
              "",
              "── SUMMARY ──────────────────────────────────────────────────────────",
              f"  Total versions on Modrinth : {len(all_versions)}",
              f"  Analysed (latest per slot) : {len(analysis_versions)}  ({skipped_count} older versions skipped)",
              f"  Working versions           : {len(working)}",
              f"  Shell versions             : {len(shells)}",
              f"  Missing (repo can build)   : {len(missing_pairs)}",
              "",
          ]

          # Original version
          lines.append("── ORIGINAL VERSION (oldest working) ────────────────────────────────")
          if original:
              lines += [
                  f"  Version number : {original['version_number']}",
                  f"  Published      : {original['date_published'][:10]}",
                  f"  Loaders        : {', '.join(original['loaders'])}",
                  f"  MC versions    : {', '.join(original['game_versions'])}",
                  f"  Jar            : {original['jar_name']} ({original['jar_size']:,} bytes, {original['class_count']} classes)",
              ]
              if original["mod_info"]:
                  lines.append(f"  mod_id         : {original['mod_info'].get('mod_id', '?')}")
                  lines.append(f"  group          : {original['mod_info'].get('group', '?')}")
                  lines.append(f"  entrypoint     : {original['mod_info'].get('entrypoint_class', '?')}")
          else:
              lines.append("  No working versions found.")
          lines.append("")

          # Latest working per loader
          lines.append("── LATEST WORKING VERSION PER LOADER ────────────────────────────────")
          if latest_per_loader:
              for loader, r in sorted(latest_per_loader.items()):
                  lines += [
                      f"  [{loader}]",
                      f"    Version number : {r['version_number']}",
                      f"    Published      : {r['date_published'][:10]}",
                      f"    MC versions    : {', '.join(r['game_versions'])}",
                      f"    Jar            : {r['jar_name']} ({r['jar_size']:,} bytes, {r['class_count']} classes)",
                  ]
          else:
              lines.append("  No working versions found.")
          lines.append("")

          # All versions table
          lines.append("── ALL VERSIONS ─────────────────────────────────────────────────────")
          lines.append(f"  {'Version':<20} {'Date':<12} {'Loaders':<20} {'MC versions':<30} {'Status':<10} {'Decompile':<10} {'Classes':>8}")
          lines.append(f"  {'-'*20} {'-'*12} {'-'*20} {'-'*30} {'-'*10} {'-'*10} {'-'*8}")
          for r in version_records:
              status = "SHELL" if r["is_shell"] else "working"
              loaders_str = ",".join(r["loaders"])[:18]
              gv_str = ",".join(r["game_versions"])[:28]
              lines.append(
                  f"  {r['version_number']:<20} {r['date_published'][:10]:<12} "
                  f"{loaders_str:<20} {gv_str:<30} {status:<10} "
                  f"{r['decompile_status']:<10} {r['class_count']:>8}"
              )
          lines.append("")

          # Missing versions
          lines.append("── MISSING VERSIONS (repo can build, not yet published) ─────────────")
          if missing_pairs:
              for loader in sorted(missing_by_loader.keys()):
                  mc_list = sorted(missing_by_loader[loader])
                  lines.append(f"  [{loader}]  {', '.join(mc_list)}")
          else:
              lines.append("  None — all repo-buildable versions are already published!")
          lines.append("")

          # Shell versions detail
          if shells:
              lines.append("── SHELL VERSIONS (zero .class files in jar) ────────────────────────")
              for r in shells:
                  lines.append(
                      f"  {r['version_number']:<20} {r['date_published'][:10]}  "
                      f"loaders={','.join(r['loaders'])}  "
                      f"mc={','.join(r['game_versions'])}  "
                      f"reason={r['shell_reason']}"
                  )
              lines.append("")

          lines += [
              f"Generated: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}",
              SEP,
          ]

          report_text = "\n".join(lines) + "\n"
          (base / "report.txt").write_text(report_text, encoding="utf-8")
          print(report_text)

          # Also write a machine-readable diagnosis.json
          diagnosis = {
              "slug":              SLUG,
              "title":             TITLE,
              "project_id":        project.get("id"),
              "total_versions":    len(all_versions),
              "analysed_versions": len(analysis_versions),
              "skipped_versions":  skipped_count,
              "working_count":     len(working),
              "shell_count":       len(shells),
              "missing_count":     len(missing_pairs),
              "original":          original,
              "latest_per_loader": {k: v for k, v in latest_per_loader.items()},
              "missing_pairs":     [{"mc_version": gv, "loader": l} for gv, l in sorted(missing_pairs)],
              "version_records":   version_records,
          }
          (base / "diagnosis.json").write_text(json.dumps(diagnosis, indent=2, default=str), encoding="utf-8")
          print(f"Report written for {SLUG}")
          PY

      # ── Prepare launcher test matrix ──────────────────────────────────────
      - name: Launcher test
        id: launcher-matrix
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          python3 - <<'PYEOF'
          import json, os, re, sys, time, urllib.error, urllib.parse, urllib.request
          from pathlib import Path

          SLUG = os.environ.get("SLUG", "").strip()
          base = Path(f".diag/{SLUG}")

          diagnosis_path = base / "diagnosis.json"
          if not diagnosis_path.exists():
              print("No diagnosis.json found, skipping launcher test matrix preparation")
              (base / "launcher-matrix.json").write_text("[]", encoding="utf-8")
              sys.exit(0)

          diagnosis = json.loads(diagnosis_path.read_text(encoding="utf-8"))
          working_versions = [r for r in diagnosis.get("version_records", []) if not r.get("is_shell", False)]

          if not working_versions:
              print("No working versions to test")
              (base / "launcher-matrix.json").write_text("[]", encoding="utf-8")
              sys.exit(0)

          CI_DATA_URL = "https://raw.githubusercontent.com/headlesshq/mc-runtime-test/main/ci-data.json"

          def get(url):
              req = urllib.request.Request(url, headers={"User-Agent": "ModCompilerProfileDiagnosis/1.0", "Accept": "application/json"})
              for attempt in range(1, 6):
                  try:
                      with urllib.request.urlopen(req, timeout=30) as r:
                          return json.loads(r.read().decode())
                  except urllib.error.HTTPError as e:
                      if e.code in {429, 500, 502, 503, 504} and attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      print(f"HTTP {e.code} fetching {url}, skipping launcher tests")
                      (base / "launcher-matrix.json").write_text("[]", encoding="utf-8")
                      sys.exit(0)
                  except urllib.error.URLError as e:
                      if attempt < 5:
                          time.sleep(2 ** attempt)
                          continue
                      print(f"Network error fetching {url}: {e.reason}, skipping launcher tests")
                      (base / "launcher-matrix.json").write_text("[]", encoding="utf-8")
                      sys.exit(0)
              print(f"Failed after 5 retries: {url}, skipping launcher tests")
              (base / "launcher-matrix.json").write_text("[]", encoding="utf-8")
              sys.exit(0)

          print("Fetching mc-runtime-test ci-data.json...")
          ci_data = get(CI_DATA_URL)
          run_data = ci_data.get("run_data", [])
          if not run_data:
              print("ci-data.json contains no run_data, skipping launcher tests")
              (base / "launcher-matrix.json").write_text("[]", encoding="utf-8")
              sys.exit(0)

          supported = {}
          for entry in run_data:
              mc = entry.get("mc")
              ltype = entry.get("type")
              modloader = entry.get("modloader")
              regex = entry.get("regex")
              java_str = entry.get("java")
              if not all([mc, ltype, modloader, regex, java_str]):
                  continue
              try:
                  java = int(java_str)
              except (ValueError, TypeError):
                  java = 17
              supported[(mc, modloader)] = {
                  "mc": mc,
                  "modloader": modloader,
                  "mcrt_jar": ltype,
                  "regex": regex,
                  "java": java,
              }

          def parse_mc_version(v):
              parts = []
              for token in re.split(r'[.\-_]', str(v).strip()):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      break
              return tuple(parts) if parts else (0,)

          def minor_key(v):
              p = parse_mc_version(v)
              if p[0] == 1 and len(p) >= 2:
                  return (1, p[1])
              return p[:2]

          by_minor = {}
          for (mc, modloader), cfg in supported.items():
              key = (minor_key(mc), modloader)
              if key not in by_minor or parse_mc_version(mc) > parse_mc_version(by_minor[key]["mc"]):
                  by_minor[key] = cfg

          print(f"mc-runtime-test supports {len(supported)} (mc, loader) combos")

          def map_loader(loader):
              if loader == "quilt":
                  return "fabric"
              return loader

          def find_test_config(gv, loader):
              if (gv, loader) in supported:
                  return supported[(gv, loader)]
              mk = minor_key(gv)
              if (mk, loader) in by_minor:
                  return by_minor[(mk, loader)]
              return None

          def safe_artifact_key(s, loader, gv):
              return re.sub(r"[^A-Za-z0-9._-]+", "_", f"{s}-{loader}-{gv}").strip("_")

          all_versions = json.loads((base / "all_versions.json").read_text(encoding="utf-8"))
          version_map = {}
          for v in all_versions:
              version_map[v["id"]] = v

          matrix_entries = []
          skipped = []

          for r in working_versions:
              vid = r["id"]
              v = version_map.get(vid)
              if not v:
                  skipped.append((r.get("version_number", vid), "version data not found"))
                  continue

              files = v.get("files") or []
              primary_file = next((f for f in files if f.get("primary")), None)
              if not primary_file and files:
                  primary_file = files[0]
              if not primary_file:
                  skipped.append((r.get("version_number", vid), "no file"))
                  continue

              file_url = primary_file.get("url")
              file_name = primary_file.get("filename")
              if not file_url or not file_name:
                  skipped.append((r.get("version_number", vid), "missing URL/filename"))
                  continue

              for gv in r.get("game_versions", []):
                  for loader in r.get("loaders", []):
                      test_loader = map_loader(loader)
                      if test_loader not in ("fabric", "forge", "neoforge"):
                          skipped.append((gv, loader, "unsupported loader"))
                          continue

                      test_config = find_test_config(gv, test_loader)
                      if test_config is None:
                          skipped.append((gv, test_loader, "no mc-runtime-test support"))
                          continue

                      matrix_entries.append({
                          "slug": SLUG,
                          "version_id": vid,
                          "version_number": r.get("version_number", vid),
                          "game_version": gv,
                          "test_mc": test_config["mc"],
                          "loader": test_config["modloader"],
                          "original_loader": loader,
                          "file_url": file_url,
                          "file_name": file_name,
                          "java_version": test_config["java"],
                          "loader_regex": test_config["regex"],
                          "mcrt_jar": test_config["mcrt_jar"],
                          "safe_key": safe_artifact_key(SLUG, loader, gv),
                      })

          matrix_entries.sort(key=lambda e: (e["game_version"], e["loader"]))

          print(f"\nGenerated {len(matrix_entries)} launcher test entries for {SLUG}:")
          for entry in matrix_entries:
              mapped = "" if entry["game_version"] == entry["test_mc"] else f" (tested on {entry['test_mc']})"
              print(f"  {entry['original_loader']:>8}  MC {entry['game_version']:<12} -> {entry['test_mc']}{mapped}  Java {entry['java_version']}  ({entry['version_number']})")

          if skipped:
              unique_skipped = sorted(set(str(s) for s in skipped))
              print(f"\nSkipped {len(unique_skipped)} entries:")
              for s in unique_skipped[:20]:
                  print(f"    {s}")

          (base / "launcher-matrix.json").write_text(json.dumps(matrix_entries, indent=2), encoding="utf-8")
          print(f"Launcher test matrix written for {SLUG}: {len(matrix_entries)} entries")
          PYEOF

      # ── Upload per-project bundle ─────────────────────────────────────────
      - name: Upload project bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnosis-${{ matrix.slug }}
          path: .diag/${{ matrix.slug }}/
          if-no-files-found: warn

# ---------------------------------------------------------------------------
# Job 3 — collect launcher matrices from all projects, emit combined matrix
# ---------------------------------------------------------------------------
  prepare-launcher-tests:
    name: Prepare launcher test matrix
    needs: diagnose
    if: always()
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.combine.outputs.matrix }}
      matrix_count: ${{ steps.combine.outputs.matrix_count }}

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download all project bundles
        uses: actions/download-artifact@v4
        with:
          pattern: diagnosis-*
          path: .diag-downloads

      - name: Combine launcher matrices
        id: combine
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          downloads = Path(".diag-downloads")
          all_entries = []

          for bundle_dir in sorted(downloads.iterdir()):
              if not bundle_dir.is_dir():
                  continue
              matrix_file = bundle_dir / "launcher-matrix.json"
              if matrix_file.exists():
                  try:
                      entries = json.loads(matrix_file.read_text(encoding="utf-8"))
                      all_entries.extend(entries)
                  except Exception:
                      pass

          all_entries.sort(key=lambda e: (e.get("slug", ""), e.get("game_version", ""), e.get("loader", "")))

          MAX_MATRIX = 256
          if len(all_entries) > MAX_MATRIX:
              print(f"WARNING: {len(all_entries)} entries exceeds cap of {MAX_MATRIX}. Truncating.")
              all_entries = all_entries[:MAX_MATRIX]

          print(f"Combined launcher test matrix: {len(all_entries)} entries")
          for entry in all_entries:
              print(f"  {entry.get('slug', '?')}  {entry.get('original_loader', '?'):>8}  MC {entry.get('game_version', '?')}")

          matrix = json.dumps({"include": all_entries})
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={matrix}\n")
              f.write(f"matrix_count={len(all_entries)}\n")
          PYEOF

# ---------------------------------------------------------------------------
# Job 4 — test each version+loader pair in a headless Minecraft client
# ---------------------------------------------------------------------------
  launcher-test:
    name: Launcher test ${{ matrix.slug }} ${{ matrix.original_loader }} ${{ matrix.game_version }}
    needs: prepare-launcher-tests
    if: ${{ needs.prepare-launcher-tests.outputs.matrix_count != '0' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix: ${{ fromJson(needs.prepare-launcher-tests.outputs.matrix) }}

    steps:
      - name: Install Java ${{ matrix.java_version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java_version }}
          distribution: temurin

      - name: Download Mod Jar
        env:
          MOD_FILE_URL: ${{ matrix.file_url }}
          MOD_FILE_NAME: ${{ matrix.file_name }}
        run: |
          mkdir -p run/mods
          echo "Downloading $MOD_FILE_NAME ..."
          for attempt in 1 2 3; do
            if curl -fsSL --retry 3 --retry-delay 5 "$MOD_FILE_URL" -o "run/mods/$MOD_FILE_NAME"; then
              break
            fi
            echo "Download attempt $attempt failed, retrying in 10s..."
            sleep 10
          done
          if [ ! -f "run/mods/$MOD_FILE_NAME" ]; then
            echo "ERROR: Mod jar was not downloaded"
            exit 1
          fi
          if [ ! -s "run/mods/$MOD_FILE_NAME" ]; then
            echo "ERROR: Mod jar is empty (0 bytes)"
            rm -f "run/mods/$MOD_FILE_NAME"
            exit 1
          fi
          SIZE=$(stat -c%s "run/mods/$MOD_FILE_NAME" 2>/dev/null || echo "?")
          echo "Downloaded: $MOD_FILE_NAME ($SIZE bytes)"

      - name: Start crash watcher
        run: |
          cat > /tmp/crash-watcher.sh << 'WATCHER'
          #!/bin/bash
          CRASH_DIR="run/crash-reports"
          MAX_WAIT=1200
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if ls $CRASH_DIR/crash-*.txt 2>/dev/null || ls run/hs_err_pid*.log 2>/dev/null; then
              echo "CRASH WATCHER: Crash detected! Waiting 5s for report to finish writing..."
              sleep 5
              echo "CRASH WATCHER: Killing Java processes..."
              pkill -f 'headlessmc-launcher' 2>/dev/null || true
              pkill -f 'net.minecraft' 2>/dev/null || true
              pkill -f 'net.neoforged' 2>/dev/null || true
              pkill -f 'cpw.mods' 2>/dev/null || true
              pkill -f 'Xvfb' 2>/dev/null || true
              sleep 2
              pkill -9 -f 'java' 2>/dev/null || true
              echo "CRASH WATCHER: Processes killed."
              exit 0
            fi
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done
          echo "CRASH WATCHER: Timeout reached ($MAX_WAIT s), no crash detected."
          WATCHER
          chmod +x /tmp/crash-watcher.sh
          nohup bash /tmp/crash-watcher.sh > /tmp/crash-watcher.log 2>&1 &
          echo "Crash watcher started (PID $!)"

      - name: Launch Headless Minecraft Client
        id: mc-test
        uses: headlesshq/mc-runtime-test@4.4.0
        with:
          mc: ${{ matrix.test_mc }}
          modloader: ${{ matrix.loader }}
          regex: ${{ matrix.loader_regex }}
          java: ${{ matrix.java_version }}
          mc-runtime-test: ${{ matrix.mcrt_jar }}
          dummy-assets: true
          xvfb: true
          cache-mc: github

      - name: Stop crash watcher
        if: always()
        run: |
          pkill -f 'crash-watcher.sh' 2>/dev/null || true
          if [ -f /tmp/crash-watcher.log ]; then
            echo "=== Crash watcher log ==="
            cat /tmp/crash-watcher.log
          fi

      - name: Mark test as passed
        if: success()
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
          VERSION_ID: ${{ matrix.version_id }}
          VERSION_NUMBER: ${{ matrix.version_number }}
          GAME_VERSION: ${{ matrix.game_version }}
          TEST_MC: ${{ matrix.test_mc }}
          LOADER: ${{ matrix.loader }}
          ORIGINAL_LOADER: ${{ matrix.original_loader }}
        run: |
          mkdir -p launcher-result
          python3 - <<'PYEOF'
          import json, os
          result = {
              "slug": os.environ["SLUG"],
              "version_id": os.environ["VERSION_ID"],
              "version_number": os.environ["VERSION_NUMBER"],
              "game_version": os.environ["GAME_VERSION"],
              "test_mc": os.environ["TEST_MC"],
              "loader": os.environ["LOADER"],
              "original_loader": os.environ["ORIGINAL_LOADER"],
              "status": "passed",
          }
          with open("launcher-result/result.json", "w") as f:
              json.dump(result, f, indent=2)
          PYEOF
          echo "SUCCESS: Mod launched correctly for $ORIGINAL_LOADER on Minecraft $GAME_VERSION (tested on $TEST_MC)"

      - name: Collect crash logs
        if: failure()
        continue-on-error: true
        run: |
          echo "Game crashed! Collecting diagnostic logs..."
          mkdir -p crash-logs launcher-result

          if [ -d run/crash-reports ]; then
            cp -r run/crash-reports crash-logs/ 2>/dev/null || true
            echo "  Collected crash-reports/"
          fi

          if [ -d run/logs ]; then
            cp -r run/logs crash-logs/ 2>/dev/null || true
            echo "  Collected logs/"
          fi

          if [ -f run/latest.log ]; then
            cp run/latest.log crash-logs/ 2>/dev/null || true
            echo "  Collected latest.log"
          fi

          for f in run/hs_err_pid*.log; do
            if [ -f "$f" ]; then
              cp "$f" crash-logs/ 2>/dev/null || true
              echo "  Collected JVM crash log: $(basename "$f")"
            fi
          done

          if [ -f run/options.txt ]; then
            cp run/options.txt crash-logs/ 2>/dev/null || true
          fi

          echo ""
          echo "=== Crash log summary ==="
          echo ""
          find crash-logs -type f 2>/dev/null | head -20 | while read -r f; do
            echo "--- $f ---"
            head -50 "$f" 2>/dev/null || true
            echo ""
          done

      - name: Write failure result
        if: failure()
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
          VERSION_ID: ${{ matrix.version_id }}
          VERSION_NUMBER: ${{ matrix.version_number }}
          GAME_VERSION: ${{ matrix.game_version }}
          TEST_MC: ${{ matrix.test_mc }}
          LOADER: ${{ matrix.loader }}
          ORIGINAL_LOADER: ${{ matrix.original_loader }}
        run: |
          mkdir -p launcher-result
          python3 - <<'PYEOF'
          import json, os
          from pathlib import Path

          crash_summary = ""
          latest_log = Path("crash-logs/latest.log")
          if latest_log.exists():
              try:
                  crash_summary = latest_log.read_text(encoding="utf-8", errors="replace")[:2000]
              except Exception:
                  pass

          result = {
              "slug": os.environ["SLUG"],
              "version_id": os.environ["VERSION_ID"],
              "version_number": os.environ["VERSION_NUMBER"],
              "game_version": os.environ["GAME_VERSION"],
              "test_mc": os.environ["TEST_MC"],
              "loader": os.environ["LOADER"],
              "original_loader": os.environ["ORIGINAL_LOADER"],
              "status": "launcher_failed",
          }
          if crash_summary:
              result["crash_summary"] = crash_summary
          with open("launcher-result/result.json", "w") as f:
              json.dump(result, f, indent=2)
          PYEOF

      - name: Upload launcher result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launcher-result-${{ matrix.safe_key }}
          path: launcher-result/
          if-no-files-found: warn

      - name: Upload crash logs
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: crash-${{ matrix.safe_key }}
          path: crash-logs/
          if-no-files-found: warn

# ---------------------------------------------------------------------------
# Job 5 — merge launcher test results back into diagnosis data
# ---------------------------------------------------------------------------
  update-diagnosis:
    name: Update diagnosis with launcher results
    needs: [diagnose, launcher-test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download all project bundles
        uses: actions/download-artifact@v4
        with:
          pattern: diagnosis-*
          path: .diag-downloads

      - name: Download all launcher results
        uses: actions/download-artifact@v4
        with:
          pattern: launcher-result-*
          path: .launcher-results

      - name: Merge launcher results into diagnosis
        shell: bash
        run: |
          python3 - <<'PYEOF'
          import json, os, shutil
          from pathlib import Path
          from datetime import datetime

          downloads = Path(".diag-downloads")
          results_dir = Path(".launcher-results")
          out = Path(".diag-updated")
          out.mkdir(exist_ok=True)

          launcher_results = {}
          if results_dir.exists():
              for result_dir in sorted(results_dir.iterdir()):
                  if not result_dir.is_dir():
                      continue
                  result_file = result_dir / "result.json"
                  if result_file.exists():
                      try:
                          result = json.loads(result_file.read_text(encoding="utf-8"))
                          key = (result.get("slug", ""), result.get("version_id", ""),
                                 result.get("game_version", ""), result.get("loader", ""))
                          launcher_results[key] = result
                      except Exception:
                          pass

          print(f"Found {len(launcher_results)} launcher test results")

          for bundle_dir in sorted(downloads.iterdir()):
              if not bundle_dir.is_dir():
                  continue
              diag_file = bundle_dir / "diagnosis.json"
              report_file = bundle_dir / "report.txt"
              if not diag_file.exists():
                  continue

              diagnosis = json.loads(diag_file.read_text(encoding="utf-8"))
              slug = diagnosis.get("slug", "")

              launcher_passed = 0
              launcher_failed = 0
              launcher_skipped = 0

              for record in diagnosis.get("version_records", []):
                  vid = record.get("id", "")
                  is_shell = record.get("is_shell", False)
                  if is_shell:
                      record["launcher_status"] = "skipped_shell"
                      launcher_skipped += 1
                      continue

                  version_results = []
                  for gv in record.get("game_versions", []):
                      for loader in record.get("loaders", []):
                          test_loader = loader
                          if loader == "quilt":
                              test_loader = "fabric"
                          key = (slug, vid, gv, test_loader)
                          result = launcher_results.get(key)
                          if result:
                              version_results.append(result)

                  if version_results:
                      statuses = [r.get("status") for r in version_results]
                      if "launcher_failed" in statuses:
                          record["launcher_status"] = "launcher_failed"
                          launcher_failed += 1
                          crash = next((r.get("crash_summary", "") for r in version_results
                                        if r.get("status") == "launcher_failed" and r.get("crash_summary")), "")
                          if crash:
                              record["launcher_crash_summary"] = crash
                      elif all(s == "passed" for s in statuses):
                          record["launcher_status"] = "passed"
                          launcher_passed += 1
                      else:
                          record["launcher_status"] = "partial"
                          launcher_passed += statuses.count("passed")
                          launcher_failed += statuses.count("launcher_failed")
                  else:
                      record["launcher_status"] = "not_tested"

              diagnosis["launcher_tested"] = True
              diagnosis["launcher_passed"] = launcher_passed
              diagnosis["launcher_failed"] = launcher_failed
              diagnosis["launcher_skipped"] = launcher_skipped

              if report_file.exists():
                  report_text = report_file.read_text(encoding="utf-8")
                  lines = []
                  lines.append("")
                  lines.append("── LAUNCHER TEST RESULTS ───────────────────────────────────────────")
                  lines.append(f"  Passed  : {launcher_passed}")
                  lines.append(f"  Failed  : {launcher_failed}")
                  lines.append(f"  Skipped : {launcher_skipped} (shells)")
                  lines.append("")
                  lines.append(f"  {'Version':<20} {'Loaders':<20} {'MC versions':<30} {'Launcher':<12}")
                  lines.append(f"  {'-'*20} {'-'*20} {'-'*30} {'-'*12}")
                  for record in diagnosis.get("version_records", []):
                      if record.get("is_shell", False):
                          continue
                      status = record.get("launcher_status", "not_tested")
                      loaders_str = ",".join(record.get("loaders", []))[:18]
                      gv_str = ",".join(record.get("game_versions", []))[:28]
                      lines.append(
                          f"  {record.get('version_number', ''):<20} {loaders_str:<20} {gv_str:<30} {status:<12}"
                      )
                  lines.append("")

                  launcher_section = "\n".join(lines) + "\n"

                  if "Generated:" in report_text:
                      parts = report_text.rsplit("Generated:", 1)
                      report_text = parts[0] + launcher_section + "Generated:" + parts[1]
                  else:
                      report_text += launcher_section

                  report_file.write_text(report_text, encoding="utf-8")

              diag_file.write_text(json.dumps(diagnosis, indent=2, default=str), encoding="utf-8")

              project_out = out / bundle_dir.name
              if project_out.exists():
                  shutil.rmtree(project_out)
              shutil.copytree(bundle_dir, project_out)

              print(f"Updated diagnosis for {slug}: passed={launcher_passed}, failed={launcher_failed}, skipped={launcher_skipped}")

          print("All diagnoses updated")
          PYEOF

      - name: Upload updated bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnosis-updated
          path: .diag-updated/
          if-no-files-found: warn

# ---------------------------------------------------------------------------
# Job 6 — assemble master report across all projects
# ---------------------------------------------------------------------------
  assemble-report:
    name: Assemble master report
    needs: [list-projects, update-diagnosis]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download updated diagnosis bundles
        uses: actions/download-artifact@v4
        with:
          name: diagnosis-updated
          path: .diag-downloads

      - name: Build master report
        shell: bash
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          from datetime import datetime

          downloads = Path(".diag-downloads")
          out       = Path(".master-report")
          out.mkdir(exist_ok=True)

          SEP = "=" * 72
          THIN = "-" * 72

          all_reports = []
          all_diagnoses = []

          updated_dir = downloads / "diagnosis-updated"
          search_dir = updated_dir if updated_dir.exists() else downloads

          for bundle_dir in sorted(search_dir.iterdir()):
              if not bundle_dir.is_dir():
                  continue
              report_file = bundle_dir / "report.txt"
              diag_file   = bundle_dir / "diagnosis.json"

              if report_file.exists():
                  all_reports.append(report_file.read_text(encoding="utf-8"))
              if diag_file.exists():
                  all_diagnoses.append(json.loads(diag_file.read_text(encoding="utf-8")))

          has_launcher = any(d.get("launcher_tested") for d in all_diagnoses)

          header_lines = [
              SEP,
              "MODRINTH PROFILE DIAGNOSIS — MASTER REPORT",
              f"User:      Itamio  (https://modrinth.com/user/Itamio)",
              f"Generated: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}",
              f"Projects:  {len(all_diagnoses)}",
              f"Note:      Only the latest version per (loader, MC version) slot is",
              f"           analysed. Older/superseded uploads are counted but skipped.",
              SEP,
              "",
              "── OVERVIEW TABLE ───────────────────────────────────────────────────",
          ]

          if has_launcher:
              header_lines.append(
                  f"  {'Project':<30} {'Total':>6} {'Work':>5} {'Shell':>5} {'Miss':>5} {'L.Pass':>7} {'L.Fail':>7}"
              )
              header_lines.append(
                  f"  {'-'*30} {'-'*6} {'-'*5} {'-'*5} {'-'*5} {'-'*7} {'-'*7}"
              )
          else:
              header_lines.append(
                  f"  {'Project':<35} {'Total':>6} {'Analysed':>9} {'Working':>8} {'Shells':>7} {'Missing':>8}"
              )
              header_lines.append(
                  f"  {'-'*35} {'-'*6} {'-'*9} {'-'*8} {'-'*7} {'-'*8}"
              )

          total_working = 0
          total_shells  = 0
          total_missing = 0
          total_lpass   = 0
          total_lfail   = 0

          for d in sorted(all_diagnoses, key=lambda x: x.get("slug", "")):
              slug     = d.get("slug", "?")
              title    = d.get("title", slug)
              total    = d.get("total_versions", 0)
              working  = d.get("working_count", 0)
              shells   = d.get("shell_count", 0)
              missing  = d.get("missing_count", 0)
              lpass    = d.get("launcher_passed", 0)
              lfail    = d.get("launcher_failed", 0)
              total_working += working
              total_shells  += shells
              total_missing += missing
              total_lpass   += lpass
              total_lfail   += lfail
              if has_launcher:
                  header_lines.append(
                      f"  {title[:28]:<30} {total:>6} {working:>5} {shells:>5} {missing:>5} {lpass:>7} {lfail:>7}"
                  )
              else:
                  analysed = d.get("analysed_versions", total)
                  header_lines.append(
                      f"  {title[:33]:<35} {total:>6} {analysed:>9} {working:>8} {shells:>7} {missing:>8}"
                  )

          if has_launcher:
              header_lines.append(
                  f"  {'TOTAL':<30} {'':>6} {total_working:>5} {total_shells:>5} {total_missing:>5} {total_lpass:>7} {total_lfail:>7}"
              )
          else:
              header_lines.append(
                  f"  {'TOTAL':<35} {'':>6} {'':>9} {total_working:>8} {total_shells:>7} {total_missing:>8}"
              )

          header_lines += [
              "",
              "── PROJECTS WITH MISSING VERSIONS ───────────────────────────────────",
          ]

          for d in sorted(all_diagnoses, key=lambda x: x.get("slug", "")):
              if d.get("missing_count", 0) > 0:
                  slug    = d.get("slug", "?")
                  missing = d.get("missing_pairs", [])
                  by_loader = {}
                  for mp in missing:
                      by_loader.setdefault(mp["loader"], []).append(mp["mc_version"])
                  header_lines.append(f"  {slug}:")
                  for loader in sorted(by_loader.keys()):
                      mc_list = sorted(by_loader[loader])
                      header_lines.append(f"    [{loader}]  {', '.join(mc_list)}")

          header_lines += [
              "",
              "── PROJECTS WITH SHELL VERSIONS ─────────────────────────────────────",
          ]
          for d in sorted(all_diagnoses, key=lambda x: x.get("slug", "")):
              if d.get("shell_count", 0) > 0:
                  slug   = d.get("slug", "?")
                  shells = d.get("shell_count", 0)
                  header_lines.append(f"  {slug}: {shells} shell version(s) (zero .class files)")

          if has_launcher and total_lfail > 0:
              header_lines += [
                  "",
                  "── PROJECTS WITH LAUNCHER FAILURES ─────────────────────────────────",
              ]
              for d in sorted(all_diagnoses, key=lambda x: x.get("slug", "")):
                  if d.get("launcher_failed", 0) > 0:
                      slug = d.get("slug", "?")
                      lfail = d.get("launcher_failed", 0)
                      failed_versions = [
                          r for r in d.get("version_records", [])
                          if r.get("launcher_status") == "launcher_failed"
                      ]
                      header_lines.append(f"  {slug}: {lfail} launcher failure(s)")
                      for r in failed_versions:
                          loaders_str = ",".join(r.get("loaders", []))
                          gv_str = ",".join(r.get("game_versions", []))
                          header_lines.append(
                              f"    {r.get('version_number', '?')}  {loaders_str}  MC {gv_str}"
                          )

          header_lines += ["", SEP, "", "── PER-PROJECT DETAILS ──────────────────────────────────────────────", ""]

          master = "\n".join(header_lines) + "\n\n"
          master += "\n\n".join(all_reports)

          (out / "report.txt").write_text(master, encoding="utf-8")
          print(master[:3000])
          print(f"\n... (full report written to report.txt)")
          PY

      - name: Write step summary
        if: always()
        shell: bash
        run: |
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -80 .master-report/report.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload master report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profile-diagnosis-report
          path: .master-report/report.txt
          if-no-files-found: error
