name: ModrinthProjectDiagnosis

# ---------------------------------------------------------------------------
# Purpose
# -------
# Provides a comprehensive health diagnosis of every version published on a
# Modrinth project. For each (loader, MC version) slot this workflow:
#
#   1. Retrieves all published versions with their metadata and publish dates
#   2. Selects the latest jar per (loader, MC version) slot
#   3. Checks each jar for shell/corruption (class count, jar integrity)
#   4. Tests each working jar in a headless Minecraft instance (crashes? errors?)
#   5. Produces a per-jar health report (class count, code metrics, launcher logs)
#   6. Notes any missing version+loader combos with explanation files
#   7. Generates a final summary table covering ALL versions, health status,
#      missing versions, and corrupted versions
#
# Launcher tests run in PARALLEL via matrix strategy.
# Each test launches the game in background, waits up to 120s for load,
# then kills the process. Crash detection is done via crash reports and
# hs_err logs after termination.
#
# Final artifact: DiagnosisLogs/  (uploaded as workflow artifact)
# ---------------------------------------------------------------------------

on:
  workflow_dispatch:
    inputs:
      modrinth_project_url:
        description: >
          Modrinth project URL, slug, or project ID.
          Examples: https://modrinth.com/mod/sort-chest  |  sort-chest
        required: true
        type: string

permissions:
  contents: read

env:
  MODRINTH_PROJECT_URL: ${{ inputs.modrinth_project_url }}

jobs:
  # ===========================================================================
  # JOB 1: DIAGNOSE — Fetch all versions, detect shells, build test matrix
  # ===========================================================================
  diagnose:
    name: Diagnose Modrinth Project
    runs-on: ubuntu-latest
    outputs:
      project_slug: ${{ steps.diagnose.outputs.project_slug }}
      project_title: ${{ steps.diagnose.outputs.project_title }}
      total_slots: ${{ steps.diagnose.outputs.total_slots }}
      has_working: ${{ steps.diagnose.outputs.has_working }}
      matrix_count: ${{ steps.diagnose.outputs.matrix_count }}
      launcher_matrix: ${{ steps.diagnose.outputs.launcher_matrix }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Mask Modrinth token
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          if [ -n "$MODRINTH_TOKEN" ]; then
            echo "::add-mask::$MODRINTH_TOKEN"
          fi

      - name: Run diagnosis
        id: diagnose
        shell: bash
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          mkdir -p .workflow_artifacts/diagnosis
          python3 - <<'PY'
          import json, os, re, sys, time, urllib.parse, urllib.request, urllib.error, zipfile
          from pathlib import Path
          from datetime import datetime

          sys.path.insert(0, str(Path.cwd()))
          from modcompiler.modrinth import (
              ModrinthClient, build_modrinth_user_agent,
              normalize_modrinth_project_ref, select_primary_modrinth_file,
          )
          from modcompiler.common import load_json

          TOKEN = os.environ.get("MODRINTH_TOKEN", "").strip()
          RAW_URL = "${{ inputs.modrinth_project_url }}"
          OUT = Path(".workflow_artifacts/diagnosis")
          OUT.mkdir(parents=True, exist_ok=True)

          # ---- Resolve project ----
          ref = normalize_modrinth_project_ref(RAW_URL)
          client = ModrinthClient(token=TOKEN or None, user_agent=build_modrinth_user_agent())
          project = client.resolve_project(ref)
          slug = project.get("slug", ref)
          title = project.get("title", slug)
          print(f"Project: {title} ({slug})")

          # ---- Fetch ALL versions ----
          all_versions = client.request_json(
              "GET", f"/project/{urllib.parse.quote(ref, safe='')}/version",
              params={"include_changelog": "false"},
          )
          if not isinstance(all_versions, list):
              all_versions = []
          print(f"Total versions on Modrinth: {len(all_versions)}")

          # ---- Helper: parse version number for sorting ----
          def parse_vnum(s):
              parts = []
              for t in re.split(r"[.\-_]", str(s).strip()):
                  if t.isdigit():
                      parts.append(int(t))
                  elif t:
                      parts.append(t)
              return tuple(parts) if parts else (0,)

          # ---- Select the LATEST version per (loader, MC version) slot ----
          best = {}
          for v in all_versions:
              loaders = [str(l) for l in v.get("loaders", []) if str(l).strip()]
              gvs = [str(g) for g in v.get("game_versions", []) if str(g).strip()]
              if not loaders or not gvs:
                  continue
              vnum = str(v.get("version_number", "")).strip()
              vkey = parse_vnum(vnum)
              pub = v.get("date_published", "") or ""
              for loader in loaders:
                  for gv in gvs:
                      key = (loader, gv)
                      cur = best.get(key)
                      if cur is None:
                          best[key] = {"v": v, "key": vkey, "pub": pub}
                      else:
                          try:
                              is_newer = vkey > cur["key"]
                          except TypeError:
                              is_newer = str(vkey) > str(cur["key"])
                          if is_newer or (vkey == cur["key"] and pub > cur["pub"]):
                              best[key] = {"v": v, "key": vkey, "pub": pub}

          # Deduplicate by version ID (same version can cover multiple loader+MC slots)
          seen = set()
          selected = []
          for entry in best.values():
              vid = entry["v"]["id"]
              if vid not in seen:
                  seen.add(vid)
                  selected.append(entry["v"])
          print(f"Selected {len(selected)} versions (latest per loader+MC slot)")

          # ---- Helper: count .class files in a jar ----
          def jar_class_count(path):
              try:
                  with zipfile.ZipFile(path) as z:
                      return sum(
                          1 for e in z.infolist()
                          if not e.is_dir() and e.filename.endswith(".class")
                      )
              except Exception:
                  return -1

          # ---- Helper: count total methods via javap ----
          def jar_method_count(path):
              """Count methods by parsing class file bytecode directly (no javap needed)."""
              try:
                  import struct
                  with zipfile.ZipFile(path) as z:
                      class_entries = [
                          e for e in z.infolist()
                          if not e.is_dir() and e.filename.endswith(".class")
                          and "$" not in e.filename
                      ]
                  total_methods = 0
                  inspected = 0
                  with zipfile.ZipFile(path) as z:
                      for entry in class_entries[:50]:
                          try:
                              data = z.read(entry.filename)
                              # Skip past magic (4), minor/major version (4)
                              # constant_pool_count is at offset 8 (u2)
                              if len(data) < 10:
                                  continue
                              cp_count = struct.unpack(">H", data[8:10])[0]
                              # Walk through constant pool to find method count
                              # After constant pool: access_flags (2), this_class (2), super_class (2),
                              # interfaces_count (2), interfaces (2*N), fields_count (2)
                              idx = 10
                              for _ in range(cp_count - 1):
                                  if idx >= len(data):
                                      break
                                  tag = data[idx]
                                  idx += 1
                                  if tag in (1,):  # CONSTANT_Utf8
                                      if idx + 2 > len(data):
                                          break
                                      length = struct.unpack(">H", data[idx:idx+2])[0]
                                      idx += 2 + length
                                  elif tag in (3, 4):  # CONSTANT_Integer, CONSTANT_Float
                                      idx += 4
                                  elif tag in (5, 6):  # CONSTANT_Long, CONSTANT_Double
                                      idx += 8
                                  elif tag in (7,):  # CONSTANT_Class
                                      idx += 2
                                  elif tag in (8,):  # CONSTANT_String
                                      idx += 2
                                  elif tag in (9, 10, 11):  # CONSTANT_Fieldref, Methodref, InterfaceMethodref
                                      idx += 4
                                  elif tag in (12,):  # CONSTANT_NameAndType
                                      idx += 4
                                  elif tag in (15,):  # CONSTANT_MethodHandle
                                      idx += 3
                                  elif tag in (16,):  # CONSTANT_MethodType
                                      idx += 2
                                  elif tag in (17, 18):  # CONSTANT_Dynamic, InvokeDynamic
                                      idx += 4
                                  elif tag in (19, 20):  # CONSTANT_Module, CONSTANT_Package
                                      idx += 2
                                  else:
                                      break
                              # After constant pool: access_flags(2) + this_class(2) + super_class(2)
                              if idx + 6 > len(data):
                                  continue
                              idx += 6
                              # interfaces_count (2) + interfaces (2*N)
                              if idx + 2 > len(data):
                                  continue
                              iface_count = struct.unpack(">H", data[idx:idx+2])[0]
                              idx += 2 + 2 * iface_count
                              # fields_count (2) + fields
                              if idx + 2 > len(data):
                                  continue
                              fields_count = struct.unpack(">H", data[idx:idx+2])[0]
                              idx += 2
                              # Skip fields (each field_info is variable length, but we need to walk attributes)
                              # Each field: access_flags(2), name_index(2), descriptor_index(2), attributes_count(2), attributes
                              for _ in range(fields_count):
                                  if idx + 8 > len(data):
                                      break
                                  idx += 6  # access_flags + name_index + descriptor_index
                                  attr_count = struct.unpack(">H", data[idx:idx+2])[0]
                                  idx += 2
                                  for _ in range(attr_count):
                                      if idx + 6 > len(data):
                                          break
                                      idx += 2  # attribute_name_index
                                      attr_len = struct.unpack(">I", data[idx:idx+4])[0]
                                      idx += 4 + attr_len
                              # methods_count (2)
                              if idx + 2 > len(data):
                                  continue
                              methods_count = struct.unpack(">H", data[idx:idx+2])[0]
                              total_methods += methods_count
                              inspected += 1
                          except Exception:
                              pass
                  if inspected == 0:
                      return 0
                  avg = total_methods / inspected
                  return int(avg * len(class_entries))
              except Exception:
                  return -1

          # ---- Helper: check for mod metadata files inside jar ----
          def jar_has_mod_metadata(path):
              try:
                  with zipfile.ZipFile(path) as z:
                      names = set(z.namelist())
                      for marker in ["fabric.mod.json", "META-INF/mods.toml", "META-INF/neoforge.mods.toml",
                                      "mcmod.info", "META-INF/jarcontainersilence", "quilt.mod.json",
                                      "META-INF/plugin.xml"]:
                          if marker in names:
                              return marker
                  return None
              except Exception:
                  return None

          # ---- Download & analyse each selected version ----
          records = []
          shells = []
          working = []
          downloads_dir = OUT / "downloads"
          downloads_dir.mkdir(parents=True, exist_ok=True)

          for v in selected:
              vid = v["id"]
              vnum = v.get("version_number", vid)
              fi = select_primary_modrinth_file(v.get("files", []))
              jar_name = ""
              jar_url = ""
              jar_size = 0
              class_count = -1
              method_count = -1
              mod_metadata = ""
              is_shell = False
              shell_reason = ""

              if fi:
                  jar_name = fi["filename"]
                  jar_url = fi["url"]
                  jar_dest = downloads_dir / vid / jar_name
                  jar_dest.parent.mkdir(parents=True, exist_ok=True)
                  req = urllib.request.Request(jar_url, headers={"User-Agent": build_modrinth_user_agent()})
                  try:
                      with urllib.request.urlopen(req, timeout=60) as r:
                          jar_dest.write_bytes(r.read())
                      jar_size = jar_dest.stat().st_size
                      print(f"  Downloaded {vnum}: {jar_name} ({jar_size:,}B)")
                  except Exception as e:
                      print(f"  Download FAILED for {vnum}: {e}")

                  if jar_dest.exists():
                      class_count = jar_class_count(jar_dest)
                      if class_count > 0:
                          method_count = jar_method_count(jar_dest)
                      mod_metadata = jar_has_mod_metadata(jar_dest) or ""

                  if class_count == 0:
                      is_shell = True
                      shell_reason = "no .class files in jar"
                  elif class_count == -1:
                      is_shell = True
                      shell_reason = "jar unreadable or corrupt"
              else:
                  is_shell = True
                  shell_reason = "no primary file in version"

              rec = {
                  "id": vid,
                  "version_number": vnum,
                  "name": v.get("name", ""),
                  "version_type": v.get("version_type", ""),
                  "date_published": v.get("date_published", ""),
                  "game_versions": [str(g) for g in v.get("game_versions", [])],
                  "loaders": [str(l) for l in v.get("loaders", [])],
                  "jar_name": jar_name,
                  "file_url": jar_url,
                  "jar_size": jar_size,
                  "class_count": class_count,
                  "method_estimate": method_count,
                  "mod_metadata": mod_metadata,
                  "is_shell": is_shell,
                  "shell_reason": shell_reason,
              }
              records.append(rec)
              if is_shell:
                  shells.append(rec)
              else:
                  working.append(rec)

          # ---- Determine missing version+loader combos ----
          manifest = load_json(Path("version-manifest.json"))
          repo_caps = set()
          for rng in manifest["ranges"]:
              for loader, lcfg in rng["loaders"].items():
                  svs = lcfg.get("supported_versions", [])
                  if not svs:
                      svs = [rng["min_version"]]
                  for sv in svs:
                      repo_caps.add((sv, loader))

          published_pairs = set()
          for r in records:
              if not r["is_shell"]:
                  for loader in r["loaders"]:
                      for gv in r["game_versions"]:
                          published_pairs.add((gv, loader))

          missing_pairs = sorted(repo_caps - published_pairs)
          missing_by_loader = {}
          for gv, ldr in missing_pairs:
              missing_by_loader.setdefault(ldr, []).append(gv)

          # ---- Print summary ----
          print(f"\n{'='*60}")
          print(f"DIAGNOSIS SUMMARY:")
          print(f"  Total versions fetched : {len(all_versions)}")
          print(f"  Slots (latest per slot) : {len(selected)}")
          print(f"  Working                 : {len(working)}")
          print(f"  Shell/corrupted         : {len(shells)}")
          print(f"  Missing (repo can build): {len(missing_pairs)}")
          print(f"{'='*60}")

          # ---- Write machine-readable outputs ----
          diag = {
              "slug": slug,
              "title": title,
              "project_ref": ref,
              "total_versions": len(all_versions),
              "analysed_slots": len(selected),
              "working_count": len(working),
              "shell_count": len(shells),
              "missing_count": len(missing_pairs),
              "has_issues": len(shells) > 0 or len(missing_pairs) > 0,
              "version_records": records,
              "missing_pairs": [{"mc_version": gv, "loader": l} for gv, l in missing_pairs],
              "missing_by_loader": {k: sorted(v) for k, v in missing_by_loader.items()},
          }
          (OUT / "diagnosis.json").write_text(json.dumps(diag, indent=2, default=str), encoding="utf-8")

          # ---- Write human-readable diagnosis.txt ----
          SEP = "=" * 72
          lines = [
              SEP,
              f"MODRINTH PROJECT DIAGNOSIS",
              f"Project: {title}",
              f"Slug: {slug}",
              f"URL: https://modrinth.com/mod/{slug}",
              f"Generated: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}",
              SEP,
              "",
              "── OVERVIEW ─────────────────────────────────────────────────────",
              f"  Total versions published : {len(all_versions)}",
              f"  Analysed slots           : {len(selected)}",
              f"  Working jars             : {len(working)}",
              f"  Shell/corrupted jars     : {len(shells)}",
              f"  Missing (repo can build) : {len(missing_pairs)}",
              "",
          ]

          lines += ["── ALL ANALYSED SLOTS ──────────────────────────────────────────"]
          lines.append(f"  {'Version':<24} {'Date':<12} {'Loaders':<18} {'MC':<18} {'Status':<10} {'Classes':>7} {'Methods':>7} {'Metadata'}")
          lines.append(f"  {'-'*24} {'-'*12} {'-'*18} {'-'*18} {'-'*10} {'-'*7} {'-'*7} {'-'*20}")
          for r in records:
              status = "SHELL" if r["is_shell"] else "OK"
              ldrs = ",".join(r["loaders"])[:16]
              gvs = ",".join(r["game_versions"])[:16]
              meta = r.get("mod_metadata", "")[:18]
              mc = r["method_estimate"] if r["method_estimate"] >= 0 else -1
              lines.append(
                  f"  {r['version_number']:<24} {r['date_published'][:10]:<12} "
                  f"{ldrs:<18} {gvs:<18} {status:<10} "
                  f"{r['class_count']:>7} {mc:>7} {meta:<20}"
              )
          lines.append("")

          if shells:
              lines += ["── SHELL / CORRUPTED VERSIONS ─────────────────────────────────"]
              for r in shells:
                  lines.append(
                      f"  {r['version_number']:<22} {r['date_published'][:10]}  "
                      f"loaders={','.join(r['loaders'])}  reason={r['shell_reason']}"
                  )
              lines.append("")

          if missing_pairs:
              lines += ["── MISSING VERSION+LOADER COMBOS (repo can build) ─────────────"]
              for ldr in sorted(missing_by_loader.keys()):
                  lines.append(f"  [{ldr}]  {', '.join(sorted(missing_by_loader[ldr]))}")
              lines.append("")

          lines.append(SEP)
          (OUT / "diagnosis.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          print(f"Wrote diagnosis.txt ({len(lines)} lines)")

          # ---- Build launcher test matrix for working versions ----
          print("\nBuilding launcher test matrix...")
          try:
              req = urllib.request.Request(
                  "https://raw.githubusercontent.com/headlesshq/mc-runtime-test/main/ci-data.json",
                  headers={"User-Agent": "ModCompilerLauncherDiagnosis/1.0"},
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  ci_data = json.loads(resp.read().decode())
          except Exception as e:
              print(f"WARNING: Could not fetch ci-data.json: {e}")
              ci_data = {"run_data": []}

          run_data = ci_data.get("run_data", [])
          supported = {}
          for entry in run_data:
              mc = entry.get("mc")
              ltype = entry.get("type")
              modloader = entry.get("modloader")
              regex = entry.get("regex")
              java_str = entry.get("java")
              if not all([mc, ltype, modloader, regex, java_str]):
                  continue
              try:
                  java = int(java_str)
              except (ValueError, TypeError):
                  java = 17
              supported[(mc, modloader)] = {
                  "mc": mc, "modloader": modloader,
                  "mcrt_jar": ltype, "regex": regex, "java": java,
              }

          def parse_mc_version(v):
              parts = []
              for token in re.split(r'[.\-_]', str(v).strip()):
                  if token.isdigit():
                      parts.append(int(token))
                  else:
                      break
              return tuple(parts) if parts else (0,)

          def minor_key(v):
              p = parse_mc_version(v)
              if p[0] == 1 and len(p) >= 2:
                  return (1, p[1])
              return p[:2]

          by_minor = {}
          for (mc, modloader), cfg in supported.items():
              key = (minor_key(mc), modloader)
              if key not in by_minor or parse_mc_version(mc) > parse_mc_version(by_minor[key]["mc"]):
                  by_minor[key] = cfg

          def map_loader(loader):
              return "fabric" if loader == "quilt" else loader

          def find_test_config(gv, loader):
              if (gv, loader) in supported:
                  return supported[(gv, loader)]
              mk = minor_key(gv)
              if (mk, loader) in by_minor:
                  return by_minor[(mk, loader)]
              return None

          def safe_artifact_key(loader, gv):
              return re.sub(r"[^A-Za-z0-9._-]+", "_", f"{loader}-{gv}").strip("_")

          matrix_entries = []
          skipped = []
          for r in working:
              file_url = r.get("file_url", "")
              file_name = r.get("jar_name", "")
              if not file_url or not file_name:
                  continue
              for gv in r.get("game_versions", []):
                  if not isinstance(gv, str) or not gv.strip():
                      continue
                  gv = gv.strip()
                  for loader in r.get("loaders", []):
                      if not isinstance(loader, str) or not loader.strip():
                          continue
                      loader = loader.strip()
                      test_loader = map_loader(loader)
                      if test_loader not in ("fabric", "forge", "neoforge"):
                          skipped.append((gv, loader, "unsupported loader"))
                          continue
                      test_config = find_test_config(gv, test_loader)
                      if test_config is None:
                          skipped.append((gv, test_loader, "no mc-runtime-test support"))
                          continue
                      matrix_entries.append({
                          "game_version": gv,
                          "test_mc": test_config["mc"],
                          "loader": test_config["modloader"],
                          "original_loader": loader,
                          "file_url": file_url,
                          "file_name": file_name,
                          "version_number": r.get("version_number", ""),
                          "java_version": test_config["java"],
                          "loader_regex": test_config["regex"],
                          "mcrt_jar": test_config["mcrt_jar"],
                          "safe_key": safe_artifact_key(loader, gv),
                      })

          matrix_entries.sort(key=lambda e: (e["game_version"], e["loader"]))
          matrix_json = json.dumps({"include": matrix_entries})
          (OUT / "launcher-matrix.json").write_text(matrix_json, encoding="utf-8")
          print(f"Launcher test matrix: {len(matrix_entries)} entries")
          for entry in matrix_entries:
              mapped = "" if entry["game_version"] == entry["test_mc"] else f" (tested on {entry['test_mc']})"
              print(f"  {entry['original_loader']:>8} MC {entry['game_version']:<12}{mapped} Java {entry['java_version']}")

          # ---- Write GitHub outputs ----
          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as f:
              f.write(f"project_slug={slug}\n")
              f.write(f"project_title={title}\n")
              f.write(f"total_slots={len(selected)}\n")
              f.write(f"has_working={'true' if working else 'false'}\n")
              f.write(f"matrix_count={len(matrix_entries)}\n")
              # Use multiline syntax for the matrix JSON (so it can contain newlines safely)
              f.write(f"launcher_matrix<<MATRIX_EOF\n{matrix_json}\nMATRIX_EOF\n")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: diagnosis-output
          path: .workflow_artifacts/diagnosis/
          if-no-files-found: error

  # ===========================================================================
  # JOB 2: LAUNCHER TEST — Parallel matrix. Each job tests ONE jar.
  #
  # Strategy: Launch game in background, wait up to 120s for load, then kill.
  # After killing, check for crash reports / hs_err logs to determine pass/fail.
  # This avoids the 10-minute stall when mc-runtime-test doesn't auto-quit.
  # ===========================================================================
  launcher-test:
    name: "${{ matrix.original_loader }} MC ${{ matrix.game_version }}"
    needs: [diagnose]
    if: always() && needs.diagnose.outputs.matrix_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 50
      matrix: ${{ fromJson(needs.diagnose.outputs.launcher_matrix) }}

    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java_version }}

      - name: Download HeadlessMC launcher
        uses: robinraju/release-downloader@a96f54c1b5f5e09e47d9504526e96febd949d4c2
        with:
          repository: 3arthqu4ke/headlessmc
          tag: 2.9.0
          fileName: headlessmc-launcher-2.9.0.jar

      - name: Install xvfb deps
        run: sudo DEBIAN_FRONTEND=noninteractive apt-get install -y x11-xserver-utils

      - name: Cache ~/.minecraft
        uses: actions/cache@v4
        with:
          path: ~/.minecraft
          key: mc-runtime-test-diag-${{ matrix.test_mc }}-${{ matrix.loader }}-${{ github.run_id }}
          restore-keys: |
            mc-runtime-test-diag-${{ matrix.test_mc }}-${{ matrix.loader }}-
            mc-runtime-test-diag-

      - name: Run launcher test
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p launcher-result
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, shutil, re, time, urllib.request, zipfile
          from pathlib import Path
          # Load shared library from scripts/ (reliable, no sys.path needed)
          exec(compile(open("scripts/launcher_test_lib.py").read(), "scripts/launcher_test_lib.py", "exec"))
          resolve_deps = resolve_dependencies
          find_java_home_lib = find_java_home
          patch_mc = patch_fabric_mc_version

          # ---- Config from matrix ----
          GAME_VERSION = "${{ matrix.game_version }}"
          TEST_MC = "${{ matrix.test_mc }}"
          LOADER = "${{ matrix.loader }}"
          ORIGINAL_LOADER = "${{ matrix.original_loader }}"
          FILE_URL = "${{ matrix.file_url }}"
          FILE_NAME = "${{ matrix.file_name }}"
          VERSION_NUMBER = "${{ matrix.version_number }}"
          JAVA_VERSION = "${{ matrix.java_version }}"
          LOADER_REGEX = "${{ matrix.loader_regex }}"
          MCRT_JAR = "${{ matrix.mcrt_jar }}"
          SAFE_KEY = "${{ matrix.safe_key }}"

          HMC_JAR = "headlessmc-launcher-2.9.0.jar"
          FABRIC_INSTALLER_URL = "https://maven.fabricmc.net/net/fabricmc/fabric-installer/1.1.1/fabric-installer-1.1.1.jar"
          FABRIC_INSTALLER_JAR = "fabric-installer-1.1.1.jar"
          MCRT_VERSION = "4.4.0"
          MCRT_REPO = "headlesshq/mc-runtime-test"
          LAUNCH_TIMEOUT = 120  # seconds to wait for game to load before killing
          GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "").strip()

          launch_stdout = ""
          launch_stderr = ""

          OUT_DIR = Path("launcher-result")
          OUT_DIR.mkdir(parents=True, exist_ok=True)

          print(f"::group::Test: {ORIGINAL_LOADER} MC {GAME_VERSION} (on {TEST_MC}, Java {JAVA_VERSION})")

          result = {
              "status": "launcher_failed",
              "game_version": GAME_VERSION,
              "loader": ORIGINAL_LOADER,
              "test_mc": TEST_MC,
              "version_number": VERSION_NUMBER,
              "crash_summary": "",
              "logs": "",
          }

          def cleanup():
              """Kill all related processes."""
              for pat in ["headlessmc-launcher", "Xvfb", "net.minecraft", "net.neoforged", "cpw.mods"]:
                  subprocess.run(["pkill", "-f", pat], capture_output=True)
              time.sleep(1)
              subprocess.run(["pkill", "-9", "-f", "java"], capture_output=True)
              time.sleep(1)

          def find_java_home():
              return find_java_home_lib(JAVA_VERSION)

          def download_mcrt_jar():
              """Download mc-runtime-test jar for this MC version + loader type."""
              mods_dir = Path("run/mods")
              mods_dir.mkdir(parents=True, exist_ok=True)
              pat = f"mc-runtime-test-{TEST_MC}-*-{MCRT_JAR}-release.jar"
              existing = list(mods_dir.glob(pat))
              if existing:
                  return existing[0].name

              url = f"https://api.github.com/repos/{MCRT_REPO}/releases/tags/{MCRT_VERSION}"
              headers = {"User-Agent": "ModCompiler/1.0"}
              if GITHUB_TOKEN:
                  headers["Authorization"] = f"Bearer {GITHUB_TOKEN}"
              req = urllib.request.Request(url, headers=headers)
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      release = json.loads(r.read().decode())
              except Exception as e:
                  print(f"  WARNING: Could not fetch mc-runtime-test release: {e}")
                  return None

              for asset in release.get("assets", []):
                  name = asset.get("name", "")
                  if re.match(f"mc-runtime-test-{re.escape(TEST_MC)}-.*-{re.escape(MCRT_JAR)}-release\\.jar$", name):
                      dl_url = asset.get("browser_download_url", "")
                      if not dl_url:
                          continue
                      try:
                          urllib.request.urlretrieve(dl_url, str(mods_dir / name))
                          print(f"  Downloaded mc-runtime-test: {name}")
                          return name
                      except Exception as e:
                          print(f"  WARNING: Download failed for {name}: {e}")
                          return None
              print(f"  WARNING: No mc-runtime-test jar for {TEST_MC}/{MCRT_JAR}")
              return None

          try:
              cleanup()
              java_home = find_java_home()
              os.environ["JAVA_HOME"] = java_home
              print(f"  JAVA_HOME={java_home}")

              # ---- Setup run directory ----
              run_dir = Path("run")
              if run_dir.exists():
                  shutil.rmtree(run_dir)
              run_dir.mkdir()
              (run_dir / "mods").mkdir()

              hmc_dir = Path("HeadlessMC")
              hmc_dir.mkdir(exist_ok=True)
              (hmc_dir / "config.properties").write_text(
                  f"hmc.java.versions={java_home}/bin/java\n"
                  f"hmc.gamedir={Path.cwd()}/run\n"
                  f"hmc.offline=true\n"
                  f"hmc.rethrow.launch.exceptions=true\n"
                  f"hmc.exit.on.failed.command=true\n"
                  f"hmc.assets.dummy=true\n"
              )
              (run_dir / "options.txt").write_text("onboardAccessibility:false\npauseOnLostFocus:false\n")

              # ---- Download mod jar ----
              print(f"  Downloading {FILE_NAME}...")
              for attempt in range(3):
                  r = subprocess.run(
                      ["curl", "-fsSL", "--retry", "3", "--retry-delay", "5",
                       FILE_URL, "-o", f"run/mods/{FILE_NAME}"],
                      capture_output=True, text=True, timeout=120
                  )
                  if r.returncode == 0:
                      break
                  time.sleep(5)

              # Resolve mod dependencies (fabric-api, etc.)
              unresolved = resolve_deps(run_dir / "mods", TEST_MC, LOADER)
              if unresolved:
                  result["status"] = "dep_unresolved"
                  result["crash_summary"] = f"Unresolved dependencies: {', '.join(unresolved)}"
                  print(f"  FAILED: Unresolved dependencies: {unresolved}")
                  print("::endgroup::")
                  return result

              if not (run_dir / "mods" / FILE_NAME).exists():
                  result["crash_summary"] = f"Failed to download mod jar: {FILE_NAME}"
                  print(f"  FAILED: Could not download {FILE_NAME}")
                  print("::endgroup::")
                  # Write result and exit
                  entry_dir = OUT_DIR / SAFE_KEY
                  entry_dir.mkdir(parents=True, exist_ok=True)
                  (entry_dir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
                  sys.exit(0)

              # Patch fabric.mod.json if test_mc != game_version
              if LOADER == "fabric" and TEST_MC != GAME_VERSION:
                  patch_mc(run_dir / "mods" / FILE_NAME, GAME_VERSION, TEST_MC)

              # ---- Download Minecraft + install modloader ----
              # Always run install to ensure the correct loader version is available
              mc_json = Path(os.path.expanduser("~/.minecraft/versions")) / TEST_MC / f"{TEST_MC}.json"
              if not mc_json.exists():
                  print(f"  Downloading Minecraft {TEST_MC}...")
                  subprocess.run(
                      ["java", "-jar", HMC_JAR, "--command", "download", TEST_MC],
                      capture_output=True, text=True, timeout=300
                  )

              if LOADER == "fabric":
                  if not Path(FABRIC_INSTALLER_JAR).exists():
                      print(f"  Downloading Fabric installer...")
                      urllib.request.urlretrieve(FABRIC_INSTALLER_URL, FABRIC_INSTALLER_JAR)
                  minecraft_dir = os.path.expanduser("~/.minecraft")
                  print(f"  Installing Fabric for {TEST_MC} via Fabric Installer...")
                  install_result = subprocess.run(
                      ["java", "-jar", FABRIC_INSTALLER_JAR, "client",
                       "-dir", minecraft_dir,
                       "-mcversion", TEST_MC,
                       "-noprofile"],
                      capture_output=True, text=True, timeout=300
                  )
                  if install_result.returncode != 0:
                      print(f"  WARNING: Fabric installer returned code {install_result.returncode}")
                      if install_result.stderr:
                          print(f"  stderr: {install_result.stderr[:500]}")
              else:
                  print(f"  Installing {LOADER} for {TEST_MC} (Java {JAVA_VERSION})...")
                  install_result = subprocess.run(
                      ["java", "-jar", HMC_JAR, "--command", LOADER, TEST_MC, "--java", JAVA_VERSION],
                      capture_output=True, text=True, timeout=600
                  )
                  if install_result.returncode != 0:
                      install_stderr = (install_result.stderr or "")[:300]
                      install_stdout = (install_result.stdout or "")[:300]
                      print(f"  WARNING: {LOADER} install for {TEST_MC} returned code {install_result.returncode}")
                      if install_stderr:
                          print(f"  Install stderr: {install_stderr}")
                      if install_stdout:
                          print(f"  Install stdout: {install_stdout}")

              # Verify the installation exists
              if LOADER == "fabric":
                  versions_dir = Path(os.path.expanduser("~/.minecraft/versions"))
                  fabric_dirs = list(versions_dir.glob(f"fabric-loader-*-{TEST_MC}"))
                  if not fabric_dirs:
                      result["status"] = "not_tested"
                      reason = f"No Fabric installation found for {TEST_MC}"
                      if install_result.returncode != 0:
                          reason += f" (installer failed with code {install_result.returncode})"
                      result["crash_summary"] = reason
                      result["launch_stderr"] = (install_result.stderr or "")[:2000]
                      print(f"  SKIPPED: {reason}")
                      print("::endgroup::")
                      entry_dir = OUT_DIR / SAFE_KEY
                      entry_dir.mkdir(parents=True, exist_ok=True)
                      (entry_dir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
                      sys.exit(0)
                  else:
                      version_id = fabric_dirs[0].name
                      print(f"  Fabric installed: {version_id}")
              else:
                  list_result = subprocess.run(
                      ["java", "-jar", HMC_JAR, "--command", "list", LOADER_REGEX],
                      capture_output=True, text=True, timeout=30
                  )
                  list_output = (list_result.stdout or "").strip()
                  if not list_output or "Couldn't find" in list_output or "No" in list_output:
                      result["status"] = "not_tested"
                      reason = f"No {LOADER} installation found for {TEST_MC}"
                      if install_result.returncode != 0:
                          reason += f" (install failed with code {install_result.returncode})"
                      result["crash_summary"] = reason
                      result["launch_stderr"] = (install_result.stderr or "")[:2000]
                      print(f"  SKIPPED: {reason}")
                      print("::endgroup::")
                      entry_dir = OUT_DIR / SAFE_KEY
                      entry_dir.mkdir(parents=True, exist_ok=True)
                      (entry_dir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
                      sys.exit(0)

              # ---- Download mc-runtime-test jar ----
              mcrt_name = download_mcrt_jar()
              if not mcrt_name:
                  result["status"] = "not_tested"
                  result["crash_summary"] = f"No mc-runtime-test jar for {TEST_MC}/{MCRT_JAR}"
                  print(f"  FAILED: No mc-runtime-test jar available")
                  print("::endgroup::")
                  entry_dir = OUT_DIR / SAFE_KEY
                  entry_dir.mkdir(parents=True, exist_ok=True)
                  (entry_dir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")
                  sys.exit(0)

              # ---- Launch game in BACKGROUND ----
              print(f"  Launching Minecraft {TEST_MC} with {LOADER}...")
              launch_proc = subprocess.Popen(
                  ["xvfb-run", "java", "-Dhmc.check.xvfb=true",
                   "-jar", HMC_JAR, "--command", "launch", LOADER_REGEX, "-regex",
                   "--jvm", "-Djava.awt.headless=true"],
                  stdout=subprocess.PIPE, stderr=subprocess.PIPE
              )

              # ---- Wait for game to load, then kill ----
              game_started = False
              crash_detected = False
              waited = 0
              poll_interval = 5

              while waited < LAUNCH_TIMEOUT:
                  time.sleep(poll_interval)
                  waited += poll_interval

                  # Check if process exited on its own
                  if launch_proc.poll() is not None:
                      print(f"  Game exited on its own after {waited}s (exit code {launch_proc.returncode})")
                      game_started = True
                      break

                  # Check for crash reports
                  crash_reports_dir = Path("run/crash-reports")
                  crash_files = list(crash_reports_dir.glob("crash-*.txt")) if crash_reports_dir.exists() else []
                  hs_err = list(Path("run").glob("hs_err_pid*.log"))

                  if crash_files or hs_err:
                      print(f"  CRASH DETECTED after {waited}s!")
                      crash_detected = True
                      # Give it a moment to fully crash, then kill
                      time.sleep(5)
                      if launch_proc.poll() is None:
                          launch_proc.kill()
                          launch_proc.wait(timeout=10)
                      break

                  # Check if game log shows title screen reached
                  log_path = Path("run/logs/latest.log")
                  if log_path.exists():
                      log_text = log_path.read_text(encoding="utf-8", errors="replace")
                      if "Setting user:" in log_text or "Loaded" in log_text:
                          if not game_started:
                              print(f"  Game reached title screen after {waited}s")
                              game_started = True
                              # Give mc-runtime-test a few more seconds to work
                              if waited < LAUNCH_TIMEOUT - 10:
                                  time.sleep(10)
                                  waited += 10
                              break

              # ---- Kill if still running ----
              if launch_proc.poll() is None:
                  print(f"  Killing game after {waited}s (timeout)")
                  launch_proc.kill()
                  try:
                      launch_proc.wait(timeout=10)
                  except subprocess.TimeoutExpired:
                      launch_proc.kill()

              # ---- Capture stdout/stderr from the launch process ----
              launch_stdout = ""
              launch_stderr = ""
              try:
                  if launch_proc.stdout:
                      launch_stdout = launch_proc.stdout.read().decode("utf-8", errors="replace")[:10000]
              except Exception:
                  pass
              try:
                  if launch_proc.stderr:
                      launch_stderr = launch_proc.stderr.read().decode("utf-8", errors="replace")[:10000]
              except Exception:
                  pass

              # ---- Analyse results ----
              crash_reports_dir = Path("run/crash-reports")
              crash_files = list(crash_reports_dir.glob("crash-*.txt")) if crash_reports_dir.exists() else []
              hs_err = list(Path("run").glob("hs_err_pid*.log"))

              # Collect game log
              log_text = ""
              log_path = Path("run/logs/latest.log")
              if log_path.exists():
                  log_text = log_path.read_text(encoding="utf-8", errors="replace")[:5000]
              elif Path("run/latest.log").exists():
                  log_text = Path("run/latest.log").read_text(encoding="utf-8", errors="replace")[:5000]

              exit_code = launch_proc.returncode if launch_proc.poll() is not None else -9

              if crash_files or hs_err:
                  result["status"] = "launcher_failed"
                  if crash_files:
                      result["crash_summary"] = crash_files[0].read_text(encoding="utf-8", errors="replace")[:500]
                  elif hs_err:
                      result["crash_summary"] = hs_err[0].read_text(encoding="utf-8", errors="replace")[:500]
                  result["logs"] = log_text
                  print(f"  FAILED: Game crashed")
              elif crash_detected:
                  result["status"] = "launcher_failed"
                  result["crash_summary"] = "Crash detected during game load"
                  result["logs"] = log_text
                  print(f"  FAILED: Crash detected")
              elif game_started and exit_code not in (0, -9):
                  # Game started but exited with error
                  result["status"] = "launcher_failed"
                  crash_info = f"Game exited with code {exit_code}"
                  if not log_text and launch_stderr:
                      crash_info += f"\nStderr: {launch_stderr[:400]}"
                  elif not log_text and launch_stdout:
                      crash_info += f"\nStdout: {launch_stdout[:400]}"
                  result["crash_summary"] = crash_info
                  result["logs"] = log_text
                  result["launch_stdout"] = launch_stdout[:2000]
                  result["launch_stderr"] = launch_stderr[:2000]
                  print(f"  FAILED: Game exited with code {exit_code}")
              else:
                  # Game loaded successfully (reached title screen) or mc-runtime-test quit normally
                  result["status"] = "passed"
                  result["logs"] = log_text
                  print(f"  PASSED")

          except Exception as e:
              result["crash_summary"] = str(e)[:500]
              print(f"  ERROR: {e}")
              cleanup()

          cleanup()

          # ---- Write result ----
          entry_dir = OUT_DIR / SAFE_KEY
          entry_dir.mkdir(parents=True, exist_ok=True)
          (entry_dir / "result.json").write_text(json.dumps(result, indent=2), encoding="utf-8")

          # Also save crash logs if any
          crash_reports_dir = Path("run/crash-reports")
          if crash_reports_dir.exists():
              crash_target = entry_dir / "crash-logs"
              shutil.copytree(str(crash_reports_dir), str(crash_target), dirs_exist_ok=True)
          for f in Path("run").glob("hs_err_pid*.log"):
              shutil.copy2(str(f), str(entry_dir / f.name))
          log_path = Path("run/logs/latest.log")
          if log_path.exists():
              shutil.copy2(str(log_path), str(entry_dir / "latest.log"))
          # Also save stdout/stderr from launch process
          if launch_stdout:
              (entry_dir / "launcher-stdout.log").write_text(launch_stdout, encoding="utf-8")
          if launch_stderr:
              (entry_dir / "launcher-stderr.log").write_text(launch_stderr, encoding="utf-8")

          print(f"  Result: {result['status']}")
          print("::endgroup::")
          PYEOF

      - name: Upload launcher result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launcher-result-${{ matrix.safe_key }}
          path: launcher-result/
          if-no-files-found: warn

  # ===========================================================================
  # JOB 3: FINALIZE — Download all launcher results, build DiagnosisLogs
  # ===========================================================================
  finalize:
    name: Finalize Diagnosis Report
    needs: [diagnose, launcher-test]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download diagnosis output
        uses: actions/download-artifact@v4
        with:
          name: diagnosis-output
          path: .workflow_downloads/diagnosis

      - name: Download all launcher results (parallel matrix jobs)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: launcher-result-*
          path: .workflow_downloads/launcher-results
          merge-multiple: true

      - name: Build DiagnosisLogs bundle
        shell: bash
        run: |
          mkdir -p .workflow_artifacts/DiagnosisLogs
          python3 - <<'PYEOF'
          import json, os, re, shutil, subprocess, sys, tempfile, zipfile, urllib.request
          from pathlib import Path
          from datetime import datetime

          DIAG_DIR = Path(".workflow_downloads/diagnosis")
          RESULTS_DIR = Path(".workflow_downloads/launcher-results")
          OUT = Path(".workflow_artifacts/DiagnosisLogs")
          DOWNLOADS_DIR = DIAG_DIR / "downloads"

          # ---- Decompilation helper ----
          def decompile_jar(jar_path, output_dir):
              """Decompile a jar using Vineflower and return the decompiled source dir."""
              try:
                  safe_rmtree = lambda p: shutil.rmtree(str(p), ignore_errors=True)
                  output_dir = Path(output_dir)
                  safe_rmtree(output_dir)
                  output_dir.mkdir(parents=True, exist_ok=True)

                  decompiler_jar = Path(tempfile.gettempdir()) / "vineflower-1.9.3.jar"
                  if not decompiler_jar.exists():
                      urllib.request.urlretrieve(
                          "https://github.com/Vineflower/vineflower/releases/download/1.9.3/vineflower-1.9.3.jar",
                          decompiler_jar
                      )

                  temp_root = Path(tempfile.mkdtemp(prefix="diagnosis-decompile-"))
                  try:
                      expanded = temp_root / "expanded"
                      java_out = temp_root / "java-output"
                      expanded.mkdir(parents=True, exist_ok=True)
                      java_out.mkdir(parents=True, exist_ok=True)

                      with zipfile.ZipFile(jar_path) as zf:
                          zf.extractall(expanded)

                      result = subprocess.run(
                          ["java", "-jar", str(decompiler_jar), str(expanded), str(java_out)],
                          capture_output=True, text=True, timeout=120
                      )

                      if result.returncode != 0:
                          print(f"  WARNING: Decompiler returned code {result.returncode} for {jar_path.name}")
                          if result.stderr:
                              print(f"  Decompiler stderr: {result.stderr[:300]}")

                      # Copy decompiled sources to output
                      src_files = list(java_out.rglob("*.java"))
                      if src_files:
                          for sf in src_files:
                              rel = sf.relative_to(java_out)
                              dest = output_dir / rel
                              dest.parent.mkdir(parents=True, exist_ok=True)
                              shutil.copy2(str(sf), str(dest))
                          return str(output_dir), len(src_files)
                      else:
                          print(f"  WARNING: No .java files produced by decompiler for {jar_path.name}")
                          return None, 0
                  finally:
                      safe_rmtree(temp_root)
              except Exception as e:
                  print(f"  WARNING: Decompilation failed for {jar_path.name}: {e}")
                  return None, 0

          # ---- Load diagnosis data ----
          diagnosis = json.loads((DIAG_DIR / "diagnosis.json").read_text(encoding="utf-8"))
          slug = diagnosis["slug"]
          title = diagnosis["title"]
          records = diagnosis.get("version_records", [])
          missing_pairs = diagnosis.get("missing_pairs", [])

          # Build lookup: (game_version, loader) -> launcher result
          launcher_map = {}
          if RESULTS_DIR.exists():
              for rf in RESULTS_DIR.rglob("result.json"):
                  try:
                      r = json.loads(rf.read_text(encoding="utf-8"))
                      gv = r.get("game_version", "")
                      loader = r.get("loader", "")
                      launcher_map[(gv, loader)] = r
                  except Exception:
                      pass
          print(f"Loaded {len(launcher_map)} launcher results from {RESULTS_DIR}")

          def safe_dirname(version_number, loader, mc_version):
              s = f"{version_number}-{loader}-{mc_version}"
              return re.sub(r"[^A-Za-z0-9._-]+", "_", s).strip("_")

          def check_code_health(r, launcher_status=""):
              """Auto-analyse jar health and return a health score + notes.
              
              Launcher test results trump code metrics:
              - If launcher test passed, the mod works → at worst WARNING
              - If launcher test crashed, the mod is broken → UNHEALTHY regardless
              - If launcher test failed with non-crash exit, still UNHEALTHY
              - Code metrics alone determine HEALTHY/WARNING for untested or passed mods
              """
              class_count = r.get("class_count", 0)
              method_est = r.get("method_estimate", 0)
              has_metadata = bool(r.get("mod_metadata", ""))
              jar_size = r.get("jar_size", 0)

              if r.get("is_shell", False):
                  return "SHELL", f"Shell jar: {r.get('shell_reason', 'unknown')}"

              # Launcher test results override code metrics
              launcher_failed = launcher_status in ("launcher_failed", "crashed", "failed", "dep_unresolved")
              launcher_passed = launcher_status == "passed"

              issues = []
              positives = []

              if class_count < 5:
                  issues.append(f"Very few classes ({class_count})")
              elif class_count < 20:
                  issues.append(f"Small mod ({class_count} classes)")
              else:
                  positives.append(f"Substantial codebase ({class_count} classes)")

              if method_est > 0:
                  positives.append(f"Est. {method_est} methods")
              elif method_est == 0 and class_count > 0:
                  issues.append("Could not estimate methods")
              # method_est == -1 means not attempted (e.g. shell), skip

              if has_metadata:
                  positives.append(f"Has mod metadata ({r['mod_metadata']})")
              else:
                  issues.append("No mod metadata file found")

              if jar_size > 100000:
                  positives.append(f"Jar size {jar_size/1024:.0f}KB")
              elif jar_size > 0:
                  issues.append(f"Small jar ({jar_size/1024:.1f}KB)")

              # Determine final health with launcher integration
              if launcher_failed:
                  return "UNHEALTHY", "; ".join(issues + positives + [f"Launcher: {launcher_status}"])
              elif launcher_status == "not_tested":
                  # Couldn't test (system limitation) — don't penalize, report what we know
                  if not issues:
                      return "HEALTHY", "; ".join(positives + ["Launcher: not_tested"])
                  else:
                      return "WARNING", "; ".join(issues + positives + ["Launcher: not_tested"])
              elif launcher_passed:
                  # Mod works! Code metric issues are downgraded to WARNING
                  if not issues:
                      return "HEALTHY", "; ".join(positives + ["Launcher: passed"])
                  else:
                      return "WARNING", "; ".join(issues + positives + ["Launcher: passed"])
              else:
                  # No launcher test (not_tested, N/A, etc.) — rely on code metrics only
                  if not issues:
                      return "HEALTHY", "; ".join(positives)
                  elif len(issues) <= 1:
                      return "WARNING", "; ".join(issues + positives)
                  else:
                      return "UNHEALTHY", "; ".join(issues + positives)

          # ---- Process each version record ----
          for r in records:
              vnum = r.get("version_number", "unknown")
              vid = r.get("id", "unknown")
              is_shell = r.get("is_shell", False)

              for loader in r.get("loaders", []):
                  for mc_version in r.get("game_versions", []):
                      if is_shell:
                          dirname = safe_dirname(vnum, loader, mc_version)
                          entry_dir = OUT / dirname
                          entry_dir.mkdir(parents=True, exist_ok=True)

                          lines = [
                              "=" * 60,
                              f"SHELL / CORRUPTED VERSION REPORT",
                              "=" * 60,
                              "",
                              f"Version number    : {vnum}",
                              f"Version ID        : {vid}",
                              f"Loader            : {loader}",
                              f"Minecraft version : {mc_version}",
                              f"Date published    : {r.get('date_published', '?')[:10]}",
                              f"Status            : SHELL",
                              f"Reason            : {r.get('shell_reason', 'unknown')}",
                              "",
                              "This jar does not contain any actual mod code.",
                              "It may be an accidental upload, an outdated build artifact,",
                              "or a failed CI pipeline output. Do not use this version.",
                              "",
                              "=" * 60,
                          ]
                          (entry_dir / "health-report.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
                          continue

                      # Working or launcher-tested version
                      dirname = safe_dirname(vnum, loader, mc_version)
                      entry_dir = OUT / dirname
                      entry_dir.mkdir(parents=True, exist_ok=True)

                      lr = launcher_map.get((mc_version, loader), {})
                      launcher_status = lr.get("status", "not_tested")
                      crash_summary = lr.get("crash_summary", "")
                      launcher_logs = lr.get("logs", "")

                      health_status, health_reason = check_code_health(r, launcher_status)

                      # Copy jar file if available
                      jar_dir = DOWNLOADS_DIR / vid
                      jar_path = None
                      if jar_dir.exists():
                          jar_files = list(jar_dir.glob("*.jar"))
                          if jar_files:
                              jar_target = entry_dir / "jar"
                              jar_target.mkdir(exist_ok=True)
                              shutil.copy2(str(jar_files[0]), str(jar_target / jar_files[0].name))
                              jar_path = jar_target / jar_files[0].name

                      # Decompile jar if available
                      if jar_path and jar_path.exists():
                          decomp_target = entry_dir / "decompiled"
                          print(f"  Decompiling {jar_path.name}...")
                          decomp_dir, decomp_count = decompile_jar(str(jar_path), str(decomp_target))
                          if decomp_dir:
                              print(f"    -> {decomp_count} source files decompiled")
                          else:
                              print(f"    -> Decompilation failed or produced no output")

                      # Copy launcher logs from parallel matrix results
                      safe_key = re.sub(r"[^A-Za-z0-9._-]+", "_", f"{loader}-{mc_version}").strip("_")
                      launcher_result_dir = RESULTS_DIR / safe_key
                      if launcher_result_dir.exists():
                          # Copy latest.log
                          if (launcher_result_dir / "latest.log").exists():
                              log_target = entry_dir / "launcher-logs"
                              log_target.mkdir(exist_ok=True)
                              shutil.copy2(str(launcher_result_dir / "latest.log"), str(log_target / "latest.log"))
                          # Copy crash logs
                          if (launcher_result_dir / "crash-logs").exists():
                              log_target = entry_dir / "launcher-logs"
                              log_target.mkdir(exist_ok=True)
                              shutil.copytree(str(launcher_result_dir / "crash-logs"), str(log_target / "crash-logs"), dirs_exist_ok=True)
                          # Copy hs_err logs
                          for f in launcher_result_dir.glob("hs_err_pid*.log"):
                              log_target = entry_dir / "launcher-logs"
                              log_target.mkdir(exist_ok=True)
                              shutil.copy2(str(f), str(log_target / f.name))
                          # Copy launcher stdout/stderr
                          for log_name in ("launcher-stdout.log", "launcher-stderr.log"):
                              p = launcher_result_dir / log_name
                              if p.exists():
                                  log_target = entry_dir / "launcher-logs"
                                  log_target.mkdir(exist_ok=True)
                                  shutil.copy2(str(p), str(log_target / log_name))

                      # Write metadata.txt
                      meta_lines = [
                          "=" * 60,
                          f"VERSION METADATA",
                          "=" * 60,
                          "",
                          f"Version number    : {vnum}",
                          f"Version ID        : {vid}",
                          f"Version name      : {r.get('name', '')}",
                          f"Version type      : {r.get('version_type', '')}",
                          f"Date published    : {r.get('date_published', '?')[:10]}",
                          f"Loader            : {loader}",
                          f"Minecraft version : {mc_version}",
                          f"Jar file          : {r.get('jar_name', '')}",
                          f"Jar size          : {r.get('jar_size', 0):,} bytes",
                          f"Download URL      : {r.get('file_url', '')}",
                          "",
                          "=" * 60,
                      ]
                      (entry_dir / "metadata.txt").write_text("\n".join(meta_lines) + "\n", encoding="utf-8")

                      # Write health-report.txt
                      health_lines = [
                          "=" * 60,
                          f"HEALTH REPORT",
                          "=" * 60,
                          "",
                          f"Overall health    : {health_status}",
                          f"Analysis notes    : {health_reason}",
                          "",
                          f"── CODE METRICS ──────────────────────────────────",
                          f"  Class count          : {r.get('class_count', 0)}",
                          f"  Method estimate      : {r.get('method_estimate', -1)}",
                          f"  Mod metadata         : {r.get('mod_metadata', 'none')}",
                          f"  Jar size             : {r.get('jar_size', 0):,} bytes",
                          "",
                          f"── LAUNCHER TEST ─────────────────────────────────",
                          f"  Launcher status      : {launcher_status}",
                      ]
                      if launcher_status == "launcher_failed" and crash_summary:
                          health_lines.append(f"  Crash summary        : {crash_summary[:300]}")
                      elif launcher_status == "dep_unresolved" and crash_summary:
                          health_lines.append(f"  Unresolved deps      : {crash_summary[:300]}")
                      elif launcher_status == "not_tested" and crash_summary:
                          health_lines.append(f"  Skip reason          : {crash_summary[:300]}")
                      health_lines.append("")
                      health_lines.append("=" * 60)
                      (entry_dir / "health-report.txt").write_text("\n".join(health_lines) + "\n", encoding="utf-8")

          # ---- Create missing version entries ----
          for pair in missing_pairs:
              mc_ver = pair.get("mc_version", "")
              loader = pair.get("loader", "")
              if mc_ver and loader:
                  dirname = f"missing-{mc_ver}-{loader}"
                  entry_dir = OUT / dirname
                  entry_dir.mkdir(parents=True, exist_ok=True)
                  lines = [
                      "=" * 60,
                      f"MISSING VERSION REPORT",
                      "=" * 60,
                      "",
                      f"Loader            : {loader}",
                      f"Minecraft version : {mc_ver}",
                      "",
                      "This version+loader combination is NOT published on Modrinth.",
                      "The ModCompiler repository has templates that can build for this",
                      "target, but no corresponding version exists on the Modrinth project.",
                      "",
                      "Possible reasons:",
                      "  - The mod was never built/ported for this version",
                      "  - The version was removed from Modrinth",
                      "  - The CI pipeline failed before publishing",
                      "",
                      "Action needed: Generate and upload a build for this target.",
                      "",
                      "=" * 60,
                  ]
                  (entry_dir / "missing.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")

          # ---- Old Working Versions: Download & decompile 4 oldest jars ----
          print("\nPreparing Old Working Versions...")
          old_working_dir = OUT / "Old Working Versions"
          old_working_dir.mkdir(parents=True, exist_ok=True)

          # Collect all non-shell versions with their date_published, sort by oldest
          all_version_entries = []
          for r in records:
              if r.get("is_shell", False):
                  continue
              vid = r.get("id", "")
              pub = r.get("date_published", "")
              if not pub or not vid:
                  continue
              jar_dir = DOWNLOADS_DIR / vid
              jar_files = list(jar_dir.glob("*.jar")) if jar_dir.exists() else []
              if not jar_files:
                  continue
              all_version_entries.append({
                  "vid": vid,
                  "pub": pub,
                  "vnum": r.get("version_number", "unknown"),
                  "loaders": r.get("loaders", []),
                  "game_versions": r.get("game_versions", []),
                  "jar_path": str(jar_files[0]),
                  "jar_name": jar_files[0].name,
              })

          all_version_entries.sort(key=lambda e: e["pub"])
          oldest_4 = all_version_entries[:4]

          (old_working_dir / "old-versions-index.txt").write_text(
              "=" * 60 + "\n" +
              "OLD WORKING VERSIONS INDEX\n" +
              "=" * 60 + "\n\n" +
              "These are the 4 oldest published versions of the mod.\n" +
              "They represent the earliest known working states and are\n" +
              "useful for understanding the mod's original behavior.\n\n" +
              "---\n\n" +
              "\n\n".join(
                  f"Version: {e['vnum']}\n"
                  f"  Published: {e['pub'][:10]}\n"
                  f"  Loaders: {', '.join(e['loaders'])}\n"
                  f"  MC Versions: {', '.join(e['game_versions'])}\n"
                  f"  Jar: {e['jar_name']}"
                  for e in oldest_4
              ) + "\n",
              encoding="utf-8"
          )

          for idx, entry in enumerate(oldest_4):
              vdir = old_working_dir / f"v{idx+1}-{entry['vnum']}-{entry['pub'][:10]}"
              vdir.mkdir(parents=True, exist_ok=True)

              # Copy jar
              jar_src = Path(entry["jar_path"])
              if jar_src.exists():
                  jar_target = vdir / "jar"
                  jar_target.mkdir(exist_ok=True)
                  shutil.copy2(str(jar_src), str(jar_target / entry["jar_name"]))

                  # Decompile
                  decomp_target = vdir / "decompiled"
                  print(f"  Decompiling old version {entry['vnum']} ({entry['jar_name']})...")
                  decomp_dir, decomp_count = decompile_jar(str(jar_src), str(decomp_target))
                  if decomp_dir:
                      print(f"    -> {decomp_count} source files decompiled")

              # Write metadata
              (vdir / "version-info.txt").write_text(
                  f"OLD WORKING VERSION #{idx+1}\n"
                  f"{'='*60}\n\n"
                  f"Version number    : {entry['vnum']}\n"
                  f"Published         : {entry['pub'][:10]}\n"
                  f"Loaders           : {', '.join(entry['loaders'])}\n"
                  f"MC Versions       : {', '.join(entry['game_versions'])}\n"
                  f"Jar file          : {entry['jar_name']}\n"
                  f"Version ID        : {entry['vid']}\n\n"
                  f"This is one of the earliest published versions of the mod.\n"
                  f"Study its decompiled source to understand the original\n"
                  f"mod structure, dependencies, and behavior.\n",
                  encoding="utf-8"
              )

          print(f"  Old Working Versions: {len(oldest_4)} entries prepared")

          # ---- Fetch Modrinth project metadata ----
          print("\nFetching Modrinth project metadata...")
          project_info = {"title": title, "slug": slug, "description": "", "body": "", "categories": [],
                          "client_side": "", "server_side": "", "downloads": 0, "followers": 0,
                          "license": "", "issues_url": "", "source_url": "", "wiki_url": "",
                          "discord_url": "", "donation_urls": [], "team": "", "status": "",
                          "approved": "", "published": ""}
          try:
              req = urllib.request.Request(
                  f"https://api.modrinth.com/v2/project/{slug}",
                  headers={"User-Agent": "ModCompiler/1.0 (Sekai0NI0itamio)"}
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  proj = json.loads(resp.read().decode())
              project_info.update({
                  "title": proj.get("title", title),
                  "description": proj.get("description", ""),
                  "body": proj.get("body", ""),
                  "categories": proj.get("categories", []),
                  "client_side": proj.get("client_side", ""),
                  "server_side": proj.get("server_side", ""),
                  "downloads": proj.get("downloads", 0),
                  "followers": proj.get("followers", 0),
                  "license": str(proj.get("license", {}).get("name", "")) if isinstance(proj.get("license"), dict) else str(proj.get("license", "")),
                  "issues_url": proj.get("issues_url", ""),
                  "source_url": proj.get("source_url", ""),
                  "wiki_url": proj.get("wiki_url", ""),
                  "discord_url": proj.get("discord_url", ""),
                  "donation_urls": proj.get("donation_urls", []),
                  "team": proj.get("team", ""),
                  "status": proj.get("status", ""),
                  "approved": proj.get("approved", ""),
                  "published": proj.get("published", ""),
              })
              print(f"  Fetched project metadata for {project_info['title']}")
          except Exception as e:
              print(f"  WARNING: Could not fetch project metadata: {e}")

          # Save project metadata
          (OUT / "project-info.json").write_text(json.dumps(project_info, indent=2, default=str), encoding="utf-8")
          (OUT / "project-description.md").write_text(
              f"# {project_info['title']}\n\n"
              f"**Slug:** {slug}\n"
              f"**URL:** https://modrinth.com/mod/{slug}\n"
              f"**Downloads:** {project_info['downloads']:,}\n"
              f"**Followers:** {project_info['followers']:,}\n"
              f"**License:** {project_info['license']}\n"
              f"**Client Side:** {project_info['client_side']}\n"
              f"**Server Side:** {project_info['server_side']}\n"
              f"**Categories:** {', '.join(project_info['categories'])}\n\n"
              f"## Description\n\n{project_info['description']}\n\n"
              f"## Full Body\n\n{project_info['body']}\n\n"
              f"## Links\n\n"
              f"- Source: {project_info['source_url']}\n"
              f"- Issues: {project_info['issues_url']}\n"
              f"- Wiki: {project_info['wiki_url']}\n"
              f"- Discord: {project_info['discord_url']}\n",
              encoding="utf-8"
          )
          print(f"  Saved project metadata to project-info.json and project-description.md")

          # ---- Copy base diagnosis files ----
          if (DIAG_DIR / "diagnosis.txt").exists():
              shutil.copy2(str(DIAG_DIR / "diagnosis.txt"), str(OUT / "Diagnosis.txt"))

          # ---- Build final summary table ----
          SEP = "=" * 72
          summary_lines = [
              SEP,
              f"MODRINTH PROJECT DIAGNOSIS — FINAL SUMMARY",
              f"Project: {title}",
              f"Slug: {slug}",
              f"URL: https://modrinth.com/mod/{slug}",
              f"Generated: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}",
              SEP,
              "",
              "── HEALTH LEGEND ───────────────────────────────────────────────",
              "  HEALTHY   = Has classes, methods, metadata, launcher test passed",
              "  WARNING   = Minor concerns (few classes, small jar, etc.)",
              "  UNHEALTHY = Multiple concerns or launcher test failed",
              "  SHELL     = Corrupted/empty jar, no mod code",
              "  MISSING   = Version+loader combo not published on Modrinth",
              "  N/A       = Not tested or not applicable",
              "",
              "── VERSION STATUS TABLE ───────────────────────────────────────",
              f"  {'Version/Combo':<40} {'Health':<12} {'Launcher':<12} {'Classes':>7} {'Methods':>7}",
              f"  {'-'*40} {'-'*12} {'-'*12} {'-'*7} {'-'*7}",
          ]

          table_entries = []
          for r in records:
              vnum = r.get("version_number", "unknown")
              for loader in r.get("loaders", []):
                  for mc_version in r.get("game_versions", []):
                      is_shell = r.get("is_shell", False)
                      if is_shell:
                          health = "SHELL"
                      else:
                          lr = launcher_map.get((mc_version, loader), {})
                          launcher_status = lr.get("status", "not_tested")
                          h, _ = check_code_health(r, launcher_status)
                          health = h
                      lr = launcher_map.get((mc_version, loader), {})
                      launcher = lr.get("status", "not_tested") if not is_shell else "N/A"
                      label = f"{vnum} [{loader} {mc_version}]"
                      table_entries.append((label, health, launcher, r.get("class_count", 0), r.get("method_estimate", -1)))

          for pair in missing_pairs:
              mc_ver = pair.get("mc_version", "")
              loader = pair.get("loader", "")
              label = f"[MISSING] {loader} {mc_ver}"
              table_entries.append((label, "MISSING", "N/A", 0, -1))

          def sort_key(e):
              label = e[0]
              if label.startswith("[MISSING]"):
                  return (2, label)
              if e[1] == "SHELL":
                  return (1, label)
              return (0, label)

          table_entries.sort(key=sort_key)
          for label, health, launcher, classes, methods in table_entries:
              mc = str(methods) if methods >= 0 else "?"
              summary_lines.append(f"  {label:<40} {health:<12} {launcher:<12} {classes:>7} {mc:>7}")

          summary_lines += [
              "",
              "── COUNTS ──────────────────────────────────────────────────────",
              f"  HEALTHY   : {sum(1 for e in table_entries if e[1] == 'HEALTHY')}",
              f"  WARNING   : {sum(1 for e in table_entries if e[1] == 'WARNING')}",
              f"  UNHEALTHY : {sum(1 for e in table_entries if e[1] == 'UNHEALTHY')}",
              f"  SHELL     : {sum(1 for e in table_entries if e[1] == 'SHELL')}",
              f"  MISSING   : {sum(1 for e in table_entries if e[1] == 'MISSING')}",
              f"  ─────────────────────────────",
              f"  TOTAL     : {len(table_entries)}",
              "",
              SEP,
          ]

          (OUT / "Final-Diagnosis.txt").write_text("\n".join(summary_lines) + "\n", encoding="utf-8")
          print(f"Wrote Final-Diagnosis.txt ({len(summary_lines)} lines)")
          print(f"DiagnosisLogs contains {len(table_entries)} entries")

          for status in ("HEALTHY", "WARNING", "UNHEALTHY", "SHELL", "MISSING"):
              count = sum(1 for e in table_entries if e[1] == status)
              print(f"  {status:<10}: {count}")

          # ---- Write recommendation.txt for AI agent ----
          rec_lines = [
              "=" * 70,
              "AI AGENT RECOMMENDATION — NEXT STEPS",
              "=" * 70,
              "",
              f"Project: {title}",
              f"Modrinth: https://modrinth.com/mod/{slug}",
              f"Author: itamio (ALWAYS)",
              "",
              "This document guides an AI coding agent through diagnosing and fixing",
              "the mod issues detected in this diagnosis bundle.",
              "",
              "── IMPORTANT CONTEXT ───────────────────────────────────────────",
              "",
              "1. The mod author is ALWAYS 'itamio'. Every mod in this project is",
              "   created by itamio. The MOD SHOULD NOT REQUIRE ANY EXTERNAL",
              "   DEPENDENCY MODS. If a dependency is detected (e.g., fabric-api",
              "   is missing), this is INCORRECT — the mod must be self-contained.",
              "",
              "2. Read the project-description.md and project-info.json files to",
              "   understand what the mod is supposed to do, its features, and its",
              "   intended behavior.",
              "",
              "3. Read the 'Old Working Versions/' folder to study the earliest",
              "   known working versions. These represent the mod's original",
              "   correct behavior. Compare broken versions against these.",
              "",
              "── STEP-BY-STEP FIX PROCESS ────────────────────────────────────",
              "",
              "STEP 1: UNDERSTAND THE MOD",
              "  - Read project-description.md (mod name, description, features)",
              "  - Read project-info.json (metadata, categories, links)",
              "  - Read the Old Working Versions decompiled source code",
              "  - Identify: what does this mod DO? How does it work?",
              "",
              "STEP 2: DIAGNOSE BROKEN VERSIONS",
              "  - For each UNHEALTHY version in the Final-Diagnosis.txt:",
              "    a) Read its decompiled source code in the version's folder",
              "    b) Read its health-report.txt (crash summary, launcher status)",
              "    c) Read its launcher-logs/ (latest.log, crash reports, stderr)",
              "    d) Compare with the Old Working Versions to find differences",
              "  - Use sub-agents to analyze each broken version IN PARALLEL",
              "  - Each sub-agent should produce a report.txt in the version folder",
              "    containing: what is broken, why, and how to fix it",
              "",
              "STEP 3: FIX EACH VERSION (ONE AT A TIME, SMALL BATCHES)",
              "  - For each broken version, use a sub-agent to:",
              "    a) Read the decompiled source and the diagnosis report",
              "    b) Apply the fix identified in the report.txt",
              "    c) Package the fixed source code into the correct format for",
              "       the build workflow (see 'incoming/' directory format)",
              "    d) Initiate a build using the 'Build Mods' workflow",
              "       (workflow_dispatch with zip_path pointing to the fix zip)",
              "    e) Retrieve the build logs and launcher test results",
              "    f) If the fix failed, analyze the new logs and iterate",
              "  - DO NOT build all versions at once in a massive bundle.",
              "    Each fix should be built and tested individually for speed.",
              "",
              "STEP 4: VERIFY AND REPORT",
              "  - After all fixes are applied, re-run this diagnosis workflow",
              "  - Confirm that all previously UNHEALTHY versions are now HEALTHY",
              "    or WARNING (small mods will always be WARNING)",
              "  - Produce a final summary of all changes made",
              "",
              "── KEY RULES ───────────────────────────────────────────────────",
              "",
              "1. NEVER add external dependencies. The mod must be self-contained.",
              "2. Compare every broken version against the Old Working Versions.",
              "3. Use sub-agents for parallel diagnosis of multiple versions.",
              "4. Fix and build ONE version at a time (not all at once).",
              "5. Every version+loader combo must be verified independently.",
              "6. If a version crashes with NoSuchMethodError, check if the",
              "   Minecraft API changed between versions.",
              "7. If a version crashes with LoadingErrorScreen, the mod's",
              "   entrypoint or metadata is likely wrong for that loader version.",
              "8. Fabric versions MUST NOT require fabric-api. If the mod's",
              "   fabric.mod.json declares a dependency on fabric-api, remove it.",
              "",
              "── BUILDING FIXED VERSIONS ─────────────────────────────────────",
              "",
              "To build a fixed version:",
              "  1. Package the fixed source code into incoming/ format",
              "  2. Use the 'Build Mods' workflow (build.yml)",
              "  3. Provide zip_path pointing to the fix zip as input",
              "  4. The workflow will compile all mod versions and run them",
              "     through headless Minecraft launcher tests",
              "  5. Check the build logs and launcher test results for failures",
              "  6. Re-run this diagnosis workflow to verify the fix",
              "",
              "── FILE REFERENCE ──────────────────────────────────────────────",
              "",
              "  project-description.md   — Mod description, features, links",
              "  project-info.json        — Machine-readable project metadata",
              "  Final-Diagnosis.txt      — Complete health summary table",
              "  Old Working Versions/    — Decompiled oldest 4 working versions",
              "  <version>-<loader>-<mc>/ — Per-version folder with:",
              "    health-report.txt      — Health score, crash summary",
              "    metadata.txt           — Version metadata",
              "    jar/                   — Original jar file",
              "    decompiled/            — Decompiled Java source code",
              "    launcher-logs/         — Game logs, crash reports, stderr",
              "",
              "=" * 70,
          ]
          (OUT / "recommendation.txt").write_text("\n".join(rec_lines) + "\n", encoding="utf-8")
          print("Wrote recommendation.txt")

          PYEOF

      - name: Upload DiagnosisLogs
        uses: actions/upload-artifact@v4
        with:
          name: DiagnosisLogs
          path: .workflow_artifacts/DiagnosisLogs/
          if-no-files-found: error

      - name: Write step summary
        if: always()
        shell: bash
        run: |
          echo "## Modrinth Project Diagnosis Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
