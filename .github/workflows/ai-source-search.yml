name: AI Source Search — Fetch Minecraft API for IDE Agent

# This workflow is designed to be triggered by an AI coding IDE (like Kiro)
# when it needs to look up actual Minecraft/Forge/NeoForge API signatures
# before writing or fixing mod code.
#
# USAGE (from IDE agent):
#   python3 scripts/ai_source_search.py \
#       --version 1.21.5 \
#       --loader forge \
#       --queries "computeIfAbsent" "SavedDataType" "DimensionDataStorage" \
#       --files "*DimensionDataStorage*.java" "*SavedData*.java"
#
# The workflow:
#   1. Sets up the Gradle template for the requested version+loader
#   2. Runs the Gradle task that downloads and decompiles Minecraft sources
#   3. Searches for each query across the decompiled source
#   4. Dumps the full class list so the AI can browse the API tree
#   5. Uploads everything as a single artifact the AI can download and read

on:
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'Minecraft version (e.g., 1.21.5, 1.21.9)'
        required: true
        type: string
      loader:
        description: 'Mod loader'
        required: true
        type: choice
        options:
          - forge
          - neoforge
          - fabric
      queries:
        description: |
          Newline- or comma-separated search queries (regex).
          Example: computeIfAbsent,SavedDataType,DimensionDataStorage
        required: true
        type: string
      file_patterns:
        description: |
          Newline- or comma-separated file patterns to restrict search.
          Leave blank to search all .java files.
          Example: *DimensionDataStorage*.java,*SavedData*.java
        required: false
        default: '*.java'
        type: string
      context_lines:
        description: 'Lines of context around each match'
        required: false
        default: '15'
        type: string
      dump_full_class:
        description: 'Dump the full content of matching class files (yes/no)'
        required: false
        default: 'yes'
        type: choice
        options:
          - 'yes'
          - 'no'

jobs:
  search:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Determine Java version
        id: java_version
        run: |
          VERSION="${{ inputs.minecraft_version }}"
          
          # Determine Java version based on Minecraft version
          if [[ "$VERSION" =~ ^1\.(8|12|16) ]]; then
            JAVA_VER=8
          elif [[ "$VERSION" =~ ^1\.(17|18|19) ]]; then
            JAVA_VER=17
          elif [[ "$VERSION" =~ ^1\.20\.[0-4]$ ]] || [[ "$VERSION" == "1.20" ]]; then
            JAVA_VER=17
          elif [[ "$VERSION" =~ ^26\. ]]; then
            JAVA_VER=25
          else
            # 1.20.5+ requires Java 21
            JAVA_VER=21
          fi
          
          echo "java_version=$JAVA_VER" >> $GITHUB_OUTPUT
          echo "Using Java $JAVA_VER for Minecraft $VERSION"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ steps.java_version.outputs.java_version }}

      # -------------------------------------------------------
      # Map version → repo folder
      # -------------------------------------------------------
      - name: Resolve version folder
        id: resolve
        run: |
          VERSION="${{ inputs.minecraft_version }}"
          LOADER="${{ inputs.loader }}"

          if   [[ "$VERSION" == "1.8.9" ]];                          then FOLDER="1.8.9"
          elif [[ "$VERSION" =~ ^1\.12 ]];                           then FOLDER="1.12-1.12.2"
          elif [[ "$VERSION" == "1.16.5" ]];                         then FOLDER="1.16.5"
          elif [[ "$VERSION" =~ ^1\.17 ]];                           then FOLDER="1.17-1.17.1"
          elif [[ "$VERSION" =~ ^1\.18 ]];                           then FOLDER="1.18-1.18.2"
          elif [[ "$VERSION" =~ ^1\.19 ]];                           then FOLDER="1.19-1.19.4"
          elif [[ "$VERSION" =~ ^1\.20\.[0-6]$ ]] || [[ "$VERSION" == "1.20" ]]; then FOLDER="1.20-1.20.6"
          elif [[ "$VERSION" == "1.21" ]] || [[ "$VERSION" == "1.21.1" ]]; then FOLDER="1.21-1.21.1"
          elif [[ "$VERSION" =~ ^1\.21\.[2-8]$ ]];                  then FOLDER="1.21.2-1.21.8"
          elif [[ "$VERSION" =~ ^1\.21\.(9|10|11)$ ]];              then FOLDER="1.21.9-1.21.11"
          elif [[ "$VERSION" =~ ^26\. ]];                              then FOLDER="26.1-26.x"
          else
            echo "ERROR: Unsupported version: $VERSION"
            exit 1
          fi

          TEMPLATE_DIR="${FOLDER}/${LOADER}/template"
          if [ ! -d "$TEMPLATE_DIR" ]; then
            echo "ERROR: No template at $TEMPLATE_DIR"
            echo "Available loaders for $FOLDER:"
            ls -d ${FOLDER}/*/template 2>/dev/null || echo "  (none)"
            exit 1
          fi

          echo "folder=$FOLDER"           >> $GITHUB_OUTPUT
          echo "template_dir=$TEMPLATE_DIR" >> $GITHUB_OUTPUT
          echo "Resolved: $FOLDER / $LOADER  →  $TEMPLATE_DIR"

      # -------------------------------------------------------
      # Gradle cache — keyed on template files
      # -------------------------------------------------------
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ai-src-${{ runner.os }}-${{ inputs.loader }}-${{ hashFiles(format('{0}/build.gradle', steps.resolve.outputs.template_dir), format('{0}/gradle.properties', steps.resolve.outputs.template_dir)) }}
          restore-keys: |
            ai-src-${{ runner.os }}-${{ inputs.loader }}-

      # -------------------------------------------------------
      # Copy template to isolated workspace
      # -------------------------------------------------------
      - name: Prepare workspace
        run: |
          TEMPLATE_DIR="${{ steps.resolve.outputs.template_dir }}"
          WORKSPACE="/tmp/ai-src-ws"
          rm -rf "$WORKSPACE"
          cp -r "$TEMPLATE_DIR" "$WORKSPACE"
          chmod +x "$WORKSPACE/gradlew"
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV

      # -------------------------------------------------------
      # Run Gradle to download + decompile Minecraft sources
      # For 26.x: Minecraft ships unobfuscated — download source directly
      # For older: use Gradle decompile/genSources tasks
      # -------------------------------------------------------
      - name: Download and decompile Minecraft sources
        run: |
          cd "$WORKSPACE"
          LOADER="${{ inputs.loader }}"
          VERSION="${{ inputs.minecraft_version }}"

          # Disable configuration cache for first-run source gen
          export GRADLE_OPTS="-Dorg.gradle.configuration-cache=false"

          echo "=== Downloading Minecraft sources for $LOADER $VERSION ==="

          # -------------------------------------------------------
          # STRATEGY 1: For 26.x — Minecraft is unobfuscated.
          # Download the sources jar directly from Mojang's CDN.
          # This is the most reliable approach for modern versions.
          # -------------------------------------------------------
          if [[ "$VERSION" =~ ^26\. ]]; then
            echo "=== 26.x: Downloading unobfuscated Minecraft source from Mojang ==="
            
            # Fetch the version manifest
            MANIFEST_URL="https://piston-meta.mojang.com/mc/game/version_manifest_v2.json"
            curl -fsSL "$MANIFEST_URL" -o /tmp/mc-manifest.json 2>/dev/null || echo '{}' > /tmp/mc-manifest.json
            
            # Find version URL (single-line Python)
            VERSION_URL=$(python3 -c "import json; d=json.load(open('/tmp/mc-manifest.json')); [print(v['url']) for v in d.get('versions',[]) if v['id']=='$VERSION']" 2>/dev/null | head -1 || echo "")
            
            if [ -n "$VERSION_URL" ]; then
              echo "Found version URL: $VERSION_URL"
              curl -fsSL "$VERSION_URL" -o /tmp/mc-version-meta.json 2>/dev/null || echo '{}' > /tmp/mc-version-meta.json
              
              # Extract client sources URL (single-line Python)
              CLIENT_SRC_URL=$(python3 -c "import json; d=json.load(open('/tmp/mc-version-meta.json')); dl=d.get('downloads',{}); [print(dl[k]['url']) for k in ['client_mappings','client'] if k in dl and dl[k].get('url')]" 2>/dev/null | head -1 || echo "")
              echo "Client source URL: $CLIENT_SRC_URL"
              
              if [ -n "$CLIENT_SRC_URL" ]; then
                mkdir -p /tmp/mc-sources
                curl -fsSL "$CLIENT_SRC_URL" -o /tmp/mc-sources/client.jar 2>/dev/null || true
                
                # Extract java files from the jar
                if [ -f /tmp/mc-sources/client.jar ]; then
                  echo "Extracting source jar..."
                  unzip -q /tmp/mc-sources/client.jar "*.java" -d /tmp/mc-sources/extracted 2>/dev/null || \
                  unzip -q /tmp/mc-sources/client.jar -d /tmp/mc-sources/extracted 2>/dev/null || true
                  JAVA_COUNT=$(find /tmp/mc-sources/extracted -name "*.java" 2>/dev/null | wc -l)
                  echo "Extracted $JAVA_COUNT .java files from Mojang source jar"
                fi
              fi
            fi
            
            echo "=== Also running Gradle for mod loader API sources ==="
          fi

          # -------------------------------------------------------
          # STRATEGY 2: Gradle-based decompilation (all versions)
          # -------------------------------------------------------
          if [[ "$LOADER" == "forge" ]]; then
            # ForgeGradle 7+ uses 'decompile' task (not genSources)
            if ./gradlew --no-daemon tasks --all 2>/dev/null | grep -q "^decompile "; then
              echo "Using 'decompile' task (ForgeGradle 7+)"
              ./gradlew --no-daemon --stacktrace decompile 2>&1 | tee /tmp/gradle.log || {
                echo "decompile failed, trying downloadSources..."
                ./gradlew --no-daemon --stacktrace downloadSources 2>&1 | tee -a /tmp/gradle.log || true
              }
            else
              echo "Using 'genSources' task (ForgeGradle <7)"
              ./gradlew --no-daemon --stacktrace genSources 2>&1 | tee /tmp/gradle.log || {
                echo "genSources failed — trying compileJava to force dependency resolution..."
                mkdir -p src/main/java/com/stub
                echo 'package com.stub; public class Stub {}' > src/main/java/com/stub/Stub.java
                ./gradlew --no-daemon --stacktrace compileJava 2>&1 | tee -a /tmp/gradle.log || true
              }
            fi
          elif [[ "$LOADER" == "neoforge" ]]; then
            # NeoForge: try decompile, then genSources, then dependencies
            if ./gradlew --no-daemon tasks --all 2>/dev/null | grep -q "^decompile "; then
              echo "Using 'decompile' task"
              ./gradlew --no-daemon --stacktrace decompile 2>&1 | tee /tmp/gradle.log || true
            elif ./gradlew --no-daemon tasks --all 2>/dev/null | grep -q "^genSources "; then
              echo "Using 'genSources' task"
              ./gradlew --no-daemon --stacktrace genSources 2>&1 | tee /tmp/gradle.log || true
            else
              echo "Using 'dependencies' task"
              ./gradlew --no-daemon --stacktrace dependencies 2>&1 | tee /tmp/gradle.log || true
            fi
          elif [[ "$LOADER" == "fabric" ]]; then
            # Fabric Loom: genSources decompiles Minecraft
            ./gradlew --no-daemon --stacktrace genSources 2>&1 | tee /tmp/gradle.log || {
              echo "genSources failed — trying dependencies..."
              ./gradlew --no-daemon --stacktrace dependencies 2>&1 | tee -a /tmp/gradle.log || true
            }
          fi

          echo "=== Gradle done ==="

      # -------------------------------------------------------
      # Find and extract decompiled .java files
      #
      # Priority order:
      # 1. Mojang direct source download (26.x — unobfuscated)
      # 2. Sources jar from Gradle cache (all loaders)
      # 3. Extracted .java files from Gradle cache (Forge/NeoForge)
      #
      # For Fabric: genSources produces a *-sources.jar inside
      #   $WORKSPACE/.gradle/loom-cache/
      # For ForgeGradle 7+: 'decompile' produces a sources jar in
      #   $HOME/.gradle/caches/minecraftforge/
      # For ForgeGradle <7: 'genSources' extracts .java files
      # For NeoForge: sources jar in $HOME/.gradle/caches/neoforge/
      # -------------------------------------------------------
      - name: Locate and extract decompiled sources
        id: locate
        run: |
          LOADER="${{ inputs.loader }}"
          VERSION="${{ inputs.minecraft_version }}"
          EXTRACTED_DIR="/tmp/extracted-sources"
          mkdir -p "$EXTRACTED_DIR"

          echo "=== Searching for decompiled sources (loader=$LOADER version=$VERSION) ==="

          # -------------------------------------------------------
          # STEP 0: For 26.x — copy Mojang direct sources first
          # These are the most complete and accurate for 26.x
          # -------------------------------------------------------
          if [[ "$VERSION" =~ ^26\. ]]; then
            MOJANG_EXTRACTED="/tmp/mc-sources/extracted"
            if [ -d "$MOJANG_EXTRACTED" ]; then
              MOJANG_COUNT=$(find "$MOJANG_EXTRACTED" -name "*.java" 2>/dev/null | wc -l)
              echo "Copying $MOJANG_COUNT Mojang direct source files..."
              find "$MOJANG_EXTRACTED" -name "*.java" -type f | while read -r F; do
                REL="${F#$MOJANG_EXTRACTED/}"
                DEST="$EXTRACTED_DIR/$REL"
                mkdir -p "$(dirname "$DEST")"
                cp "$F" "$DEST"
              done
              echo "Copied Mojang sources to $EXTRACTED_DIR"
            fi
          fi

          # -------------------------------------------------------
          # Helper: find and extract the best sources jar
          # -------------------------------------------------------
          extract_sources_jar() {
            local SEARCH_ROOTS=("$@")
            local BEST_JAR=""
            local BEST_SIZE=0

            for ROOT in "${SEARCH_ROOTS[@]}"; do
              [ -d "$ROOT" ] || continue
              while IFS= read -r JAR; do
                SIZE=$(stat -c%s "$JAR" 2>/dev/null || echo 0)
                if [ "$SIZE" -gt "$BEST_SIZE" ]; then
                  BEST_SIZE=$SIZE
                  BEST_JAR=$JAR
                fi
              done < <(find "$ROOT" \
                \( -name "*-sources.jar" -o -name "*named-sources.jar" \
                   -o -name "*-sources-*.jar" -o -name "*decompiled*.jar" \) \
                -not -name "*.lock" -type f 2>/dev/null)
            done

            if [ -n "$BEST_JAR" ]; then
              echo "Found sources jar ($BEST_SIZE bytes): $BEST_JAR"
              unzip -q "$BEST_JAR" "*.java" -d "$EXTRACTED_DIR" 2>/dev/null || \
              unzip -q "$BEST_JAR" -d "$EXTRACTED_DIR" 2>/dev/null || true
              return 0
            fi
            return 1
          }

          # -------------------------------------------------------
          # Helper: find extracted .java files in cache dirs
          # -------------------------------------------------------
          find_java_files() {
            local SEARCH_ROOTS=("$@")
            local BEST_ROOT=""
            local BEST_COUNT=0

            for ROOT in "${SEARCH_ROOTS[@]}"; do
              [ -d "$ROOT" ] || continue
              COUNT=$(find "$ROOT" -name "*.java" -type f 2>/dev/null | wc -l)
              if [ "$COUNT" -gt "$BEST_COUNT" ]; then
                BEST_COUNT=$COUNT
                BEST_ROOT=$ROOT
              fi
            done

            if [ "$BEST_COUNT" -gt 0 ]; then
              echo "Found $BEST_COUNT .java files in $BEST_ROOT — copying..."
              find "$BEST_ROOT" -name "*.java" -type f | while read -r F; do
                REL="${F#$BEST_ROOT/}"
                DEST="$EXTRACTED_DIR/$REL"
                mkdir -p "$(dirname "$DEST")"
                cp "$F" "$DEST"
              done
              return 0
            fi
            return 1
          }

          # -------------------------------------------------------
          # STEP 1: Extract from Gradle cache (mod loader API sources)
          # This adds Forge/NeoForge/Fabric API classes on top of MC sources
          # -------------------------------------------------------
          if [[ "$LOADER" == "fabric" ]]; then
            echo "--- Fabric: searching for sources jar ---"
            extract_sources_jar \
              "$WORKSPACE/.gradle" \
              "$HOME/.gradle/caches" \
              "$WORKSPACE/build" \
              || echo "WARNING: No Fabric sources jar found"

          elif [[ "$LOADER" == "forge" ]]; then
            echo "--- Forge: searching for sources jar first ---"
            if extract_sources_jar \
              "$HOME/.gradle/caches/minecraftforge" \
              "$HOME/.gradle/caches/forge_gradle" \
              "$HOME/.gradle/caches/net.minecraftforge" \
              "$HOME/.gradle/caches/minecraft" \
              "$HOME/.gradle/caches/modules-2" \
              "$WORKSPACE/.gradle" \
              "$HOME/.gradle/caches"; then
              echo "Extracted from sources jar"
            else
              echo "--- Forge: no sources jar, searching for extracted .java files ---"
              find_java_files \
                "$HOME/.gradle/caches/minecraftforge" \
                "$HOME/.gradle/caches/forge_gradle" \
                "$HOME/.gradle/caches/net.minecraftforge" \
                "$HOME/.gradle/caches/minecraft" \
                "$HOME/.gradle/caches/modules-2" \
                "$HOME/.gradle/caches" \
                "$WORKSPACE/.gradle" \
                || echo "WARNING: No Forge .java files found"
            fi

          elif [[ "$LOADER" == "neoforge" ]]; then
            echo "--- NeoForge: searching for sources jar ---"
            if extract_sources_jar \
              "$HOME/.gradle/caches/neoforge" \
              "$HOME/.gradle/caches/net.neoforged" \
              "$HOME/.gradle/caches/modules-2" \
              "$HOME/.gradle/caches" \
              "$WORKSPACE/.gradle"; then
              echo "Extracted from sources jar"
            else
              echo "--- NeoForge: searching for extracted .java files ---"
              find_java_files \
                "$HOME/.gradle/caches/neoforge" \
                "$HOME/.gradle/caches/net.neoforged" \
                "$HOME/.gradle/caches/modules-2" \
                "$HOME/.gradle/caches" \
                "$WORKSPACE/.gradle" \
                || echo "WARNING: No NeoForge .java files found"
            fi
          fi

          # -------------------------------------------------------
          # STEP 2: For Fabric 26.x — also download Fabric API sources
          # The Fabric API jar contains HudElementRegistry etc.
          # -------------------------------------------------------
          if [[ "$LOADER" == "fabric" ]] && [[ "$VERSION" =~ ^26\. ]]; then
            echo "--- Fabric 26.x: downloading Fabric API sources from Maven ---"
            
            # Get fabric_api_version from gradle.properties
            FABRIC_API_VER=$(grep "fabric_api_version" "$WORKSPACE/gradle.properties" 2>/dev/null | cut -d= -f2 | tr -d ' ')
            echo "Fabric API version: $FABRIC_API_VER"
            
            if [ -n "$FABRIC_API_VER" ]; then
              # Download Fabric API sources jar from Maven
              FABRIC_API_GROUP="net/fabricmc/fabric-api/fabric-api"
              FABRIC_API_URL="https://maven.fabricmc.net/${FABRIC_API_GROUP}/${FABRIC_API_VER}/fabric-api-${FABRIC_API_VER}-sources.jar"
              echo "Trying: $FABRIC_API_URL"
              
              mkdir -p /tmp/fabric-api-sources
              if curl -fsSL "$FABRIC_API_URL" -o /tmp/fabric-api-sources/fabric-api-sources.jar 2>/dev/null; then
                echo "Downloaded Fabric API sources jar"
                unzip -q /tmp/fabric-api-sources/fabric-api-sources.jar "*.java" \
                  -d "$EXTRACTED_DIR" 2>/dev/null || \
                unzip -q /tmp/fabric-api-sources/fabric-api-sources.jar \
                  -d "$EXTRACTED_DIR" 2>/dev/null || true
                FABRIC_API_COUNT=$(find "$EXTRACTED_DIR" -path "*/fabricmc/fabric*" -name "*.java" 2>/dev/null | wc -l)
                echo "Extracted $FABRIC_API_COUNT Fabric API .java files"
              else
                echo "WARNING: Could not download Fabric API sources from $FABRIC_API_URL"
                # Try without -sources suffix (some versions use different naming)
                FABRIC_API_URL2="https://maven.fabricmc.net/${FABRIC_API_GROUP}/${FABRIC_API_VER}/fabric-api-${FABRIC_API_VER}.jar"
                echo "Trying alternate: $FABRIC_API_URL2"
                curl -fsSL "$FABRIC_API_URL2" -o /tmp/fabric-api-sources/fabric-api.jar 2>/dev/null || true
              fi
            fi
          fi

          # -------------------------------------------------------
          # STEP 3: For all Fabric versions — also try to get Fabric API
          # sources from the loom cache (already downloaded by Gradle)
          # -------------------------------------------------------
          if [[ "$LOADER" == "fabric" ]]; then
            echo "--- Fabric: searching for Fabric API sources in loom cache ---"
            FABRIC_API_JARS=$(find "$HOME/.gradle" "$WORKSPACE/.gradle" \
              -name "fabric-api*sources*.jar" -o -name "fabric-api*-sources.jar" \
              2>/dev/null | head -5)
            for JAR in $FABRIC_API_JARS; do
              echo "Found Fabric API jar: $JAR"
              unzip -q "$JAR" "*.java" -d "$EXTRACTED_DIR" 2>/dev/null || \
              unzip -q "$JAR" -d "$EXTRACTED_DIR" 2>/dev/null || true
            done
          fi

          # Count what we have
          JAVA_COUNT=$(find "$EXTRACTED_DIR" -name "*.java" -type f 2>/dev/null | wc -l)
          echo "source_root=$EXTRACTED_DIR" >> $GITHUB_OUTPUT
          echo "java_count=$JAVA_COUNT" >> $GITHUB_OUTPUT
          echo "Found $JAVA_COUNT .java files in $EXTRACTED_DIR"

          # Debug: show cache structure if nothing found
          if [ "$JAVA_COUNT" -eq 0 ]; then
            echo ""
            echo "=== DEBUG: All jars in Gradle cache (looking for sources) ==="
            find "$HOME/.gradle/caches" -name "*.jar" 2>/dev/null \
              | grep -i "source\|decompile\|named\|mapped" \
              | head -30 || true
            echo ""
            echo "=== DEBUG: workspace .gradle contents (depth 5) ==="
            find "$WORKSPACE/.gradle" -maxdepth 5 2>/dev/null | head -50 || true
            echo ""
            echo "=== DEBUG: home .gradle/caches top dirs ==="
            find "$HOME/.gradle/caches" -maxdepth 3 -type d 2>/dev/null | head -40 || true
          fi

      # -------------------------------------------------------
      # Run all queries and collect results
      # Also produce a broad API overview even with no matches
      # -------------------------------------------------------
      - name: Run searches
        run: |
          SOURCE_ROOT="${{ steps.locate.outputs.source_root }}"
          JAVA_COUNT="${{ steps.locate.outputs.java_count }}"
          CONTEXT="${{ inputs.context_lines }}"
          DUMP_FULL="${{ inputs.dump_full_class }}"

          mkdir -p search-results/queries
          mkdir -p search-results/full-classes
          mkdir -p search-results/api-overview

          # Write metadata
          cat > search-results/README.md << 'READMEEOF'
          # Minecraft Source Search Results

          This artifact was produced by the `AI Source Search` GitHub Actions workflow.
          It contains decompiled Minecraft source code search results for use by an AI
          coding IDE (Kiro, Copilot, etc.) when fixing mod compilation errors.

          ## Files

          - `search-info.txt`         — search parameters and statistics
          - `all-java-files.txt`      — full list of every .java file found
          - `queries/`                — one result file per search query
          - `full-classes/`           — full content of files that matched queries
          - `api-overview/`           — broad API samples: event classes, render classes,
                                        client classes, and a random 10% sample of all files
          - `gradle-output.log`       — Gradle output (useful if sources are missing)

          ## How to use

          1. Read `search-info.txt` to confirm sources were found.
          2. Read `queries/<query>.txt` to see matches for each query.
          3. Read `full-classes/<ClassName>.java` for the complete class definition.
          4. Browse `api-overview/` for broad API discovery when you don't know the class name.
          5. Use the API signatures you find to fix the mod source code.
          READMEEOF

          {
            echo "Version  : ${{ inputs.minecraft_version }}"
            echo "Loader   : ${{ inputs.loader }}"
            echo "Queries  : ${{ inputs.queries }}"
            echo "Patterns : ${{ inputs.file_patterns }}"
            echo "Context  : $CONTEXT lines"
            echo "Src root : $SOURCE_ROOT"
            echo "Java files: $JAVA_COUNT"
            echo "Timestamp: $(date -u)"
          } > search-results/search-info.txt

          if [ "$JAVA_COUNT" -eq 0 ]; then
            echo "" >> search-results/search-info.txt
            echo "ERROR: No .java files found. Source decompilation failed." >> search-results/search-info.txt
            echo "Check gradle-output.log for details." >> search-results/search-info.txt
            cp /tmp/gradle.log search-results/gradle-output.log 2>/dev/null || true
            exit 1
          fi

          # Build list of file patterns
          IFS=',' read -ra PATTERNS <<< "${{ inputs.file_patterns }}"
          CLEAN_PATTERNS=()
          for P in "${PATTERNS[@]}"; do
            P="${P#"${P%%[![:space:]]*}"}"
            P="${P%"${P##*[![:space:]]}"}"
            [ -n "$P" ] && CLEAN_PATTERNS+=("$P")
          done
          [ ${#CLEAN_PATTERNS[@]} -eq 0 ] && CLEAN_PATTERNS=("*.java")

          # Build list of queries
          IFS=',' read -ra QUERIES <<< "${{ inputs.queries }}"

          TOTAL_MATCHES=0
          MATCHED_FILES=()

          for QUERY in "${QUERIES[@]}"; do
            QUERY="${QUERY#"${QUERY%%[![:space:]]*}"}"
            QUERY="${QUERY%"${QUERY##*[![:space:]]}"}"
            [ -z "$QUERY" ] && continue

            SAFE_Q=$(echo "$QUERY" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9_-]/_/g' | cut -c1-60)
            OUT="search-results/queries/${SAFE_Q}.txt"

            echo "Searching: $QUERY"
            {
              echo "Query: $QUERY"
              echo "Patterns: ${CLEAN_PATTERNS[*]}"
              echo "---"
            } > "$OUT"

            FIND_NAME_ARGS=()
            for P in "${CLEAN_PATTERNS[@]}"; do
              [ ${#FIND_NAME_ARGS[@]} -gt 0 ] && FIND_NAME_ARGS+=(-o)
              FIND_NAME_ARGS+=(-name "$P")
            done

            while IFS= read -r JFILE; do
              MATCHES=$(grep -n "$QUERY" "$JFILE" 2>/dev/null || true)
              if [ -n "$MATCHES" ]; then
                echo "" >> "$OUT"
                echo "=== $JFILE ===" >> "$OUT"
                grep -n --context="$CONTEXT" "$QUERY" "$JFILE" >> "$OUT" 2>/dev/null || true
                MATCHED_FILES+=("$JFILE")
              fi
            done < <(find "$SOURCE_ROOT" \( "${FIND_NAME_ARGS[@]}" \) -type f 2>/dev/null)

            MATCH_COUNT=$(grep -c "^===" "$OUT" 2>/dev/null || echo "0")
            echo "  → $MATCH_COUNT matching files"
            TOTAL_MATCHES=$((TOTAL_MATCHES + MATCH_COUNT))
          done

          # Dump full content of matched class files
          if [[ "$DUMP_FULL" == "yes" ]] && [ ${#MATCHED_FILES[@]} -gt 0 ]; then
            mapfile -t UNIQUE_FILES < <(printf '%s\n' "${MATCHED_FILES[@]}" | sort -u)
            echo "Dumping ${#UNIQUE_FILES[@]} matched class files..."
            for FPATH in "${UNIQUE_FILES[@]}"; do
              BASENAME=$(basename "$FPATH")
              DEST="search-results/full-classes/$BASENAME"
              if [ -f "$DEST" ]; then
                DEST="search-results/full-classes/$(echo "$FPATH" | md5sum | cut -c1-8)_$BASENAME"
              fi
              cp "$FPATH" "$DEST" 2>/dev/null || true
            done
          fi

          # -------------------------------------------------------
          # API OVERVIEW — broad samples for AI agent discovery
          # Even if queries found nothing, these help the agent
          # understand what's available in this version/loader
          # -------------------------------------------------------
          echo "=== Building API overview ==="

          ALL_JAVA=$(find "$SOURCE_ROOT" -name "*.java" -type f 2>/dev/null | sort)
          TOTAL=$(echo "$ALL_JAVA" | wc -l)

          # 1. Event classes — most useful for mod development
          echo "$ALL_JAVA" | grep -i "event" | head -200 \
            > search-results/api-overview/event-classes.txt || true
          EVENT_COUNT=$(wc -l < search-results/api-overview/event-classes.txt)
          echo "  Event classes: $EVENT_COUNT"

          # 2. Render/GUI classes — critical for HUD mods
          echo "$ALL_JAVA" | grep -iE "render|gui|hud|screen|overlay|graphics" | head -200 \
            > search-results/api-overview/render-gui-classes.txt || true
          RENDER_COUNT=$(wc -l < search-results/api-overview/render-gui-classes.txt)
          echo "  Render/GUI classes: $RENDER_COUNT"

          # 3. Client classes
          echo "$ALL_JAVA" | grep -i "client" | head -200 \
            > search-results/api-overview/client-classes.txt || true

          # 4. Forge/NeoForge/Fabric API classes (mod loader specific)
          echo "$ALL_JAVA" | grep -iE "minecraftforge|neoforged|fabricmc" | head -200 \
            > search-results/api-overview/modloader-api-classes.txt || true

          # 5. Random 10% sample — gives broad coverage of what's available
          SAMPLE_SIZE=$(( TOTAL / 10 + 1 ))
          echo "$ALL_JAVA" | shuf | head "$SAMPLE_SIZE" \
            > search-results/api-overview/random-10pct-sample.txt || true
          echo "  Random 10% sample: $SAMPLE_SIZE of $TOTAL files"

          # 6. Dump full content of key event files found in overview
          # This is the most valuable part — actual source of render/event classes
          echo "=== Dumping full content of render/event API files ==="
          DUMP_COUNT=0
          while IFS= read -r FPATH; do
            [ -f "$FPATH" ] || continue
            BASENAME=$(basename "$FPATH")
            DEST="search-results/api-overview/full_${BASENAME}"
            cp "$FPATH" "$DEST" 2>/dev/null || true
            DUMP_COUNT=$((DUMP_COUNT + 1))
            [ $DUMP_COUNT -ge 50 ] && break  # cap at 50 files
          done < <(cat search-results/api-overview/render-gui-classes.txt \
                       search-results/api-overview/event-classes.txt \
                   | sort -u | head -50 | while read -r REL; do
                       echo "$SOURCE_ROOT/$REL"
                     done)
          echo "  Dumped $DUMP_COUNT full API files to api-overview/"

          # Full class list
          echo "$ALL_JAVA" \
            | sed "s|$SOURCE_ROOT/||" \
            | sort \
            > search-results/all-java-files.txt || true

          # Append stats to search-info
          {
            echo ""
            echo "Total matches across all queries: $TOTAL_MATCHES"
            echo "Full class files dumped: $(ls search-results/full-classes/ 2>/dev/null | wc -l)"
            echo "API overview files: $(ls search-results/api-overview/ 2>/dev/null | wc -l)"
            echo "Event classes found: $EVENT_COUNT"
            echo "Render/GUI classes found: $RENDER_COUNT"
          } >> search-results/search-info.txt

          # Save gradle log
          cp /tmp/gradle.log search-results/gradle-output.log 2>/dev/null || true

          echo ""
          echo "=== SEARCH COMPLETE ==="
          cat search-results/search-info.txt

      # -------------------------------------------------------
      # Upload everything as one artifact
      # -------------------------------------------------------
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ai-source-search-${{ inputs.minecraft_version }}-${{ inputs.loader }}
          path: search-results/
          retention-days: 14

      - name: Job summary
        run: |
          echo "## AI Source Search Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ inputs.minecraft_version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Loader | ${{ inputs.loader }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Queries | \`${{ inputs.queries }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Java files found | ${{ steps.locate.outputs.java_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download artifact: \`ai-source-search-${{ inputs.minecraft_version }}-${{ inputs.loader }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Query Results" >> $GITHUB_STEP_SUMMARY
          for F in search-results/queries/*.txt; do
            [ -f "$F" ] || continue
            QNAME=$(basename "$F" .txt)
            MATCHES=$(grep -c "^[0-9]" "$F" 2>/dev/null || echo "0")
            echo "- \`$QNAME\`: $MATCHES matches" >> $GITHUB_STEP_SUMMARY
          done
