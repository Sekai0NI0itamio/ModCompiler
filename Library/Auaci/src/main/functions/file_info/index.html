<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>File Info</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; margin:0; color:#111; }
    .header { padding: 12px 14px; border-bottom: 1px solid #e5e7eb; display:flex; flex-direction:column; gap:4px; }
    .name { font-weight: 700; font-size: 15px; }
    .path { color:#6b7280; font-size: 12px; word-break: break-all; }
    .content { padding: 12px 14px; display:flex; flex-direction:column; gap:10px; }
    .row { display:flex; gap:8px; align-items:baseline; }
    .label { width: 140px; color:#6b7280; font-size: 12px; }
    .value { color:#111; font-size: 13px; }
    .muted { color:#6b7280; }
    .footer { padding: 10px 14px; border-top:1px solid #e5e7eb; font-size: 12px; color:#6b7280; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div class="header">
    <div id="fi-name" class="name"></div>
    <div id="fi-path" class="path"></div>
  </div>
  <div class="content">
    <div class="row"><div class="label">Type</div><div id="fi-type" class="value"></div></div>
    <div class="row"><div class="label">Size</div><div id="fi-size" class="value">Calculating…</div></div>
    <div class="row"><div class="label">Modified</div><div id="fi-mtime" class="value"></div></div>
    <div class="row"><div class="label">Created</div><div id="fi-btime" class="value"></div></div>
    <div class="row"><div class="label">Permissions</div><div id="fi-perms" class="value mono"></div></div>
    <div class="row"><div class="label">UID / GID</div><div id="fi-ids" class="value mono"></div></div>
    <div class="row"><div class="label">Where From</div><div id="fi-where" class="value"></div></div>
    <div class="row"><div class="label">Quarantine</div><div id="fi-quar" class="value"></div></div>
  </div>
  <div class="footer">Close this window to stop size calculation.</div>
  <script src="./renderer.js"></script>
</body>
</html>
