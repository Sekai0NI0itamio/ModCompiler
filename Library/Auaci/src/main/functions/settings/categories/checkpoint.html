<section aria-labelledby="checkpoint-title">
  <h1 id="checkpoint-title">Checkpoint</h1>
  <p style="color:#6b7280; max-width:760px;">
    Choose how Auaci creates and restores checkpoints. Lite mode is fast and optimized for
    most projects. Git mode uses commit snapshots for full fidelity in git repositories.
  </p>

  <style>
    .action-row { display:flex; gap:10px; align-items:center; margin-top:12px; }
    .action-btn {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 12px;
      border-radius:8px;
      border:1px solid #e6e9ef;
      background: #fff;
      color: #111;
      cursor:pointer;
      font-weight:600;
      transition: transform 160ms cubic-bezier(.2,.8,.2,1), box-shadow 160ms ease, opacity 120ms;
      will-change: transform, box-shadow;
      user-select: none;
    }
    .action-btn:active { transform: translateY(1px) scale(0.99); }
    .action-btn.save {
      background: linear-gradient(180deg,#2563eb,#1e4fd6);
      color: white;
      border: none;
      box-shadow: 0 6px 18px rgba(37,99,235,0.18);
    }
    .action-btn.reset {
      background: #fff;
      color: #111;
      border:1px solid #e6e9ef;
      box-shadow: none;
    }
    .action-btn.pressed {
      transform: translateY(2px) scale(0.985);
      box-shadow: 0 3px 10px rgba(0,0,0,0.08) !important;
      transition: transform 140ms cubic-bezier(.2,.8,.2,1), box-shadow 140ms ease;
    }
    .unsaved-input {
      box-shadow: 0 0 0 3px rgba(246,211,105,0.35);
      border-radius: 10px;
    }
    .settings-banner {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(12px);
      min-width: 220px;
      max-width: 86%;
      padding: 10px 14px;
      border-radius: 8px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.18);
      font-weight: 600;
      color: #042a16;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms cubic-bezier(.2,.8,.2,1);
      z-index: 2000;
    }
    .settings-banner.visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0);
    }
    .settings-banner.info {
      background: linear-gradient(180deg, #eef2ff, #e3e9ff);
      border: 1px solid #c9d3ff;
      color: #0f1b66;
    }
    .settings-banner.success {
      background: linear-gradient(180deg, #dff6e6, #c9f0da);
      border: 1px solid #b7e6c4;
      color: #064927;
    }
    .settings-banner.error {
      background: linear-gradient(180deg, #ffecec, #ffdede);
      border: 1px solid #ffbdbd;
      color: #5a0b0b;
    }
    .mode-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 16px;
      max-width: 760px;
    }
    .mode-card {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #e6e9ef;
      background: #fff;
      cursor: pointer;
    }
    .mode-card input { margin-top: 3px; }
    .mode-card strong { display:block; font-size: 14px; }
    .mode-card span { display:block; color:#6b7280; font-size: 12px; margin-top: 4px; line-height: 1.4; }
  </style>

  <div id="checkpoint-mode-group" class="mode-grid" role="radiogroup" aria-label="Checkpoint mode">
    <label class="mode-card" for="checkpoint-mode-lite">
      <input type="radio" id="checkpoint-mode-lite" name="checkpoint-mode" value="lite" />
      <div>
        <strong>Lite</strong>
        <span>Fast checkpoints using the operation log. Best for non-git projects.</span>
      </div>
    </label>
    <label class="mode-card" for="checkpoint-mode-git">
      <input type="radio" id="checkpoint-mode-git" name="checkpoint-mode" value="git" />
      <div>
        <strong>Git</strong>
        <span>Create git commit snapshots for each checkpoint (slower but full-fidelity).</span>
      </div>
    </label>
  </div>

  <div style="margin-top:28px; display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
    <div class="action-row" style="margin:0;">
      <button id="save-checkpoint-settings" class="action-btn save" title="Save checkpoint settings">Save</button>
      <button id="reset-checkpoint-settings" class="action-btn reset" title="Reset checkpoint settings">Reset</button>
    </div>

    <div style="margin-left:auto; display:flex; gap:10px; align-items:center;">
      <span id="save-status" style="color:#2d7a2d; font-weight:600; display:none;">Saved</span>
      <span id="save-error" style="color:#b91c1c; display:none;"></span>
    </div>
  </div>

  <div id="settings-banner" class="settings-banner" role="status" aria-live="polite" hidden>
    <span class="banner-icon" aria-hidden="true"></span>
    <span id="settings-banner-text">Saved</span>
  </div>
</section>
