<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings</title>
  <style>
    :root {
      --bg: #ffffff;
      --muted: #6b7280;
      --accent: #2563eb;
      --panel: #f8fafc;
      --radius: 10px;
    }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--bg);
      color: #0f172a;
      height: 100vh;
      display: flex;
      gap: 16px;
    }
    .sidebar {
      width: 220px;
      background: var(--panel);
      padding: 12px;
      box-sizing: border-box;
      border-right: 1px solid rgba(15,23,42,0.06);
    }
    .sidebar h3 { margin: 8px 4px; font-size: 13px; color: var(--muted); }
    .category {
      display: block;
      padding: 8px;
      margin: 6px 4px;
      border-radius: 8px;
      cursor: pointer;
      color: #0f172a;
    }
    .category.active {
      background: rgba(37,99,235,0.12);
      color: var(--accent);
      font-weight: 600;
    }
    .content {
      flex: 1;
      padding: 18px;
      box-sizing: border-box;
      overflow: auto;
    }
    .page {
      max-width: 820px;
    }
    .page h1 { margin: 0 0 8px; font-size: 20px; }
    .page p { color: var(--muted); line-height: 1.6; }
  </style>
</head>
<body>
  <div class="sidebar" role="navigation" aria-label="Settings categories">
    <h3>Categories</h3>
    <div id="cat-general" class="category active" data-category="general">General</div>
    <div id="cat-chat" class="category" data-category="chat">Chat</div>
    <div id="cat-hidden-files" class="category" data-category="hidden-files">Directory Viewer</div>
    <div id="cat-checkpoint" class="category" data-category="checkpoint">Checkpoint</div>
    <!-- future categories go here -->
  </div>

  <div class="content">
    <div id="category-content" class="page" aria-live="polite">
      <!-- loaded by init.js -->
    </div>
  </div>

  <script>
    // The settings window uses its own small renderer init (init.js).
    // We'll load init.js as an inline script for simplicity (or you can require it).
    (function () {
      try {
        const { ipcRenderer } = require('electron');
        // we still call an initialization function provided by a small module if needed
      } catch (e) {
        // Node integration might be disabled depending on your BrowserWindow settings.
      }
    })();
  </script>
  <script src="./init.js"></script>
</body>
</html>
