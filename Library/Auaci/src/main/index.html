<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auaci</title>
    <!-- Main / layout styles -->
    <link rel="stylesheet" href="./styles/main/main-styles.css">

    <!-- Component styles (each component has its own css folder) -->
    <link rel="stylesheet" href="./styles/components/directory-viewer/directory_viewer-styles.css">
    <link rel="stylesheet" href="./styles/components/editor/editor-styles.css">
    <link rel="stylesheet" href="./styles/components/chat/chat-layout.css">
    <link rel="stylesheet" href="./styles/components/chat/chat-code.css">
    <link rel="stylesheet" href="./styles/components/chat/chat-theme.css"> 
    <!-- Xterm styles for embedded terminal -->
    <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css">
</head>

<body>
    <div id="app-container">
        <div id="directory-viewer">
            <div id="directory-viewer-topbar">
                <button id="create-file-btn" title="Create File">
                    <img src="./assets/directory_viewer/add_file.png" alt="Create File">
                </button>
                <button id="create-folder-btn" title="Create Folder">
                    <img src="./assets/directory_viewer/add_folder.png" alt="Create Folder">
                </button>
                <button id="collapse-all-btn" title="Collapse All Folders">
                    <img src="./assets/directory_viewer/collapse-all.png" alt="Collapse All">
                </button>
                <button id="refresh-btn" title="Refresh Directory">
                    <img src="./assets/directory_viewer/refresh.png" alt="Refresh Directory">
                </button>
            </div>
            <div id="directory-viewer-content"></div>
        </div>
        <div id="editor">
            <div id="editor-tabs"></div>
            <!-- Monaco editor will mount into this div -->
            <div id="editor-content" class="monaco-editor-container" role="region" aria-label="Editor"></div>
            <!-- Embedded terminal (hidden by default) -->
            <div id="terminal-container" role="region" aria-label="Terminal" style="display:none">
              <div id="terminal"></div>
            </div>
        </div>
        <div id="chat">
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div id="input-container">
                    <div id="gpt-response-indicator">
                        <span class="gpt-indicator-text">GPT is responding</span>
                        <span class="gpt-indicator-dots">
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </span>
                        <button id="stop-response-btn" title="Stop" aria-label="Stop generating">
                          Stop
                        </button>
                    </div>

                    <!-- Scrollable wrapper that contains both the textarea and the file previews -->
                    <div id="input-scroll" role="region" aria-label="Chat input scrollable">
                      <div id="user-input" contenteditable="true" role="textbox" aria-multiline="true" data-placeholder="Type your message..." spellcheck="false"></div>
                      <div id="file-previews" style="display:none"></div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Keep a small safety script to mark platform on the document before titlebar module runs. -->
    <script>
      try {
        const isMac = process && process.platform === 'darwin';
        document.documentElement.setAttribute('data-platform', isMac ? 'darwin' : 'not-darwin');
      } catch (e) { /* ignore */ }
    </script>

                    <!-- Chat input scroll helpers (NO auto-scroll on typing) -->
    <script>
      (function () {
        const wrapper = document.getElementById('input-scroll');
        const filePreviews = document.getElementById('file-previews');

        if (!wrapper || !filePreviews) return;

        function scrollToBottom() {
          wrapper.scrollTop = wrapper.scrollHeight;
        }

        // Only scroll when the app programmatically changes attachments/previews.
        // Never scroll on typing/editing input content (users may intentionally scroll up).
        const mo = new MutationObserver(() => {
          requestAnimationFrame(() => scrollToBottom());
        });
        mo.observe(filePreviews, { childList: true, subtree: true });

        // On initial load, ensure scroll is at the bottom.
        window.addEventListener('load', () => {
          setTimeout(scrollToBottom, 0);
        });

        // Expose helper for other scripts to call when they programmatically change content
        window.chatInputScroll = { scrollToBottom };
      })();
    </script>

    <!-- Load main renderer script at the very end -->
    <script src="./index.js"></script>
</body>

</html>
